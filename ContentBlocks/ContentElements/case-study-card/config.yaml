name: desiderio/case-study-card
typeName: desiderio_casestudycard
title: 'Case Study Card'
description: 'A compact card that teases one customer success story with a cover image, client name, summary, and a single highlighted result figure. Use it on landing or reference pages to build trust and link through to the full case study. Fields include the section heading, client name and logo, rich-text summary, a key result value and label, a cover image, and a read-more link.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: client_name
    type: Textarea
    rows: 1
    label: 'Client Name'
    required: true
  -
    identifier: client_logo
    type: File
    label: 'Client Logo'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: summary
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Summary
    rows: 3
    required: true
  -
    identifier: result_value
    type: Textarea
    rows: 1
    label: 'Key Result Value'
    description: 'e.g. 3x, 150%, $2M'
  -
    identifier: result_label
    type: Textarea
    rows: 1
    label: 'Key Result Label'
  -
    identifier: image
    type: File
    label: 'Cover Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: link
    type: Link
    label: 'Read More Link'
