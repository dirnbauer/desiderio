name: desiderio/hero-form
typeName: desiderio_heroform
title: 'Form Capture Hero'
description: 'A hero band that places an inline signup or contact form directly beneath the message, rendered through the TYPO3 Form Framework. Use it at the top of landing or campaign pages where capturing a lead, booking, or subscription is the primary goal. Set the headline, a supporting sub-headline, an optional badge, and a privacy notice shown below the form.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: form_action
    type: Link
    label: 'Form Action URL'
  -
    identifier: input_placeholder
    type: Textarea
    rows: 1
    label: 'Input Placeholder'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: privacy_notice
    type: Textarea
    rows: 1
    label: 'Privacy Text'
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
