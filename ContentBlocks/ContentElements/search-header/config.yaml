name: desiderio/search-header
typeName: desiderio_searchheader
title: 'Search Page Header'
description: 'Renders a page-top band with eyebrow, large headline and subheadline above a search form: an icon-decorated input named q with configurable placeholder and a submit button, sent via GET to a selectable target page. Use it for: the head of search-result, help-center, documentation or knowledge-base pages where finding content is the main task. Prefer ''Search Hero'' for a homepage or portal opener built around search; this element tops a dedicated search page.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: placeholder
    type: Textarea
    rows: 1
    label: Placeholder
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
