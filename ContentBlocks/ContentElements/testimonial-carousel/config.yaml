name: desiderio/testimonial-carousel
typeName: desiderio_testimonialcarousel
title: 'Carousel Testimonial'
description: 'Renders an accessible carousel cycling customer quotes one slide at a time — each with quote, author name, title, avatar, and optional star rating — with previous/next controls, dot navigation, and optional autoplay. Use it for: sets of short customer quotes when page space is tight, rotating references on landing or product pages. Prefer ''Grid Testimonial'' when all quotes should be visible at once; use ''Review Carousel'' for product reviews.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: autoplay
    type: Checkbox
    label: Autoplay
    default: 1
  -
    identifier: testimonials
    type: Collection
    table: testimonial_carousel_testimonials
    prefixField: true
    label: Testimonials
    minItems: 2
    fields:
      -
        identifier: quote
        type: Textarea
        label: Quote
        rows: 3
        required: true
      -
        identifier: author_name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
        required: true
      -
        identifier: author_title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_title'
      -
        identifier: author_image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_photo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: rating
        type: Select
        renderType: selectSingle
        label: 'Star Rating'
        items:
          -
            label: 'No Rating'
            value: '0'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.5_stars'
            value: '5'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_stars'
            value: '4'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_stars'
            value: '3'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_stars'
            value: '2'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.1_stars'
            value: '1'
        default: '0'
