<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-cta-minimal" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="cta-minimal">
    <d:layout.container>
        <div class="cta-minimal__content">
            <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
            <f:if condition="{data.description_text}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'description_text')}</d:atom.typography></f:if>
            <f:if condition="{data.cta_text} && {data.cta_link.url}">
                <f:link.typolink parameter="{data.cta_link}" class="cta-minimal__link">{data -> f:render.text(field: 'cta_text')} &rarr;</f:link.typolink>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
