name: desiderio/cta-split
typeName: desiderio_ctasplit
title: 'Split Call to Action'
description: 'A two-column conversion block presenting two side-by-side cards, each with its own title, rich-text description, and button. Use it when you want to offer visitors two distinct next steps, such as contacting sales versus starting a trial. Key fields are the optional shared headline plus each side''s title, description, and button text with link, where the right button renders in an outlined style.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: left_title
    type: Textarea
    rows: 1
    label: 'Left Title'
  -
    identifier: left_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Left Description'
    rows: 2
  -
    identifier: left_button_text
    type: Textarea
    rows: 1
    label: 'Left Button Text'
  -
    identifier: left_button_link
    type: Link
    label: 'Left Button Link'
  -
    identifier: right_title
    type: Textarea
    rows: 1
    label: 'Right Title'
  -
    identifier: right_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Right Description'
    rows: 2
  -
    identifier: right_button_text
    type: Textarea
    rows: 1
    label: 'Right Button Text'
  -
    identifier: right_button_link
    type: Link
    label: 'Right Button Link'
