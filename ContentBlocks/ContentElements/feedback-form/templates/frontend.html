<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-feedback-form" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="feedback-form">
    <d:layout.container>
        <d:molecule.card class="feedback-form__card">
            <f:if condition="{data.header} || {data.description}">
                <header class="feedback-form__intro">
                    <f:if condition="{data.header}">
                        <d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography>
                    </f:if>
                    <f:if condition="{data.description}"><d:atom.typography tag="div" variant="muted" class="d-richtext">{data -> f:render.text(field: 'description')}</d:atom.typography></f:if>
                </header>
            </f:if>

            <d:molecule.formRenderer persistenceIdentifier="EXT:desiderio/Resources/Private/Forms/DesiderioFeedback.form.yaml" class="feedback-form__form"/>
        </d:molecule.card>
    </d:layout.container>
</d:layout.section>

</html>
