name: desiderio/cta-floating
typeName: desiderio_ctafloating
title: 'Floating CTA Bar'
description: 'A sticky bar docked to the top or bottom viewport edge that stays visible while scrolling, with an optional eyebrow kicker, a one-line benefit headline, a supporting line, and a single action button. Use it for: limited-time offers, trial or event signups, and deadlines that must stay reachable across a long page. Prefer ''Announcement Bar'' for a static informational strip; ''Full-Width CTA Banner'' for a banner in the normal page flow.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
    description: 'Optional scannable kicker, e.g. Limited time or New.'
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
    description: 'One short benefit-led line, e.g. Start your free trial today.'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    description: 'Optional supporting line that removes the last objection.'
  -
    identifier: cta_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    description: '2-4 words, action-led, e.g. Claim offer.'
  -
    identifier: cta_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
  -
    identifier: position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:position'
    description: 'Dock the bar to the bottom (default) or top edge of the viewport.'
    items:
      -
        label: Bottom
        value: bottom
      -
        label: Top
        value: top
    default: bottom
