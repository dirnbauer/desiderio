<f:argument name="header" type="bool" optional="{true}" default="{false}" />
<f:argument name="class" type="string" optional="{true}" default="" />

<f:if condition="{header}">
    <f:then>
        <th data-slot="table-head" class="h-10 px-2 text-left align-middle font-medium whitespace-nowrap text-foreground [&amp;:has([role=checkbox])]:pr-0 {class}"><f:slot /></th>
    </f:then>
    <f:else>
        <td data-slot="table-cell" class="p-2 align-middle whitespace-nowrap [&amp;:has([role=checkbox])]:pr-0 {class}"><f:slot /></td>
    </f:else>
</f:if>
