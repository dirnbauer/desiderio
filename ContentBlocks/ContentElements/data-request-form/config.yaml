name: desiderio/data-request-form
typeName: desiderio_datarequestform
title: 'Data Request Form'
description: 'A privacy block rendering a heading, rich-text intro, a fixed embedded TYPO3 data-request form, and an optional privacy note beneath it. Use it for: GDPR subject-access sections, passages like ''request, export, or delete your data'' in privacy policies, data-rights and compliance contact sections. Prefer ''Contact Form Block'' for general enquiries; use ''Privacy Notice'' for policy text without a form.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: privacy_text
    type: Textarea
    label: 'Privacy Notice Text'
    rows: 2
