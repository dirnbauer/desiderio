<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<footer class="desiderio-footer">
    <d:layout.container>
        <div class="desiderio-footer__inner">
            <div class="desiderio-footer__brand">
                <p class="desiderio-footer__title">{breadcrumb.0.title}</p>
                <d:atom.typography tag="p" variant="muted">
                    Built with shadcn/ui Fluid components for TYPO3 14.
                </d:atom.typography>
            </div>

            <div class="desiderio-footer__copy">
                <d:atom.typography tag="p" variant="small">
                    Inspired by Camino.
                </d:atom.typography>
            </div>
        </div>
    </d:layout.container>
</footer>

</html>
