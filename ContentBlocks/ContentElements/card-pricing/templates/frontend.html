<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-card-pricing" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="card-pricing">
    <d:layout.container size="sm">
        <d:molecule.card
            class="card-pricing__card {f:if(condition: data.highlighted, then: 'card-pricing__card--highlighted ring-2 ring-primary')}"
        >
            <d:molecule.cardHeader class="card-pricing__header">
                <f:if condition="{data.highlighted}">
                    <d:atom.badge variant="default" class="card-pricing__badge">
                        <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:plan.recommended"/>
                    </d:atom.badge>
                </f:if>

                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h3" class="card-pricing__title" itemprop="name">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>

                <f:if condition="{data.description}">
                    <d:atom.typography variant="muted" class="card-pricing__description">{data -> f:render.text(field: 'description')}</d:atom.typography>
                </f:if>

                <p class="card-pricing__price">
                    <span class="card-pricing__amount">{data -> f:render.text(field: 'price')}</span>
                    <f:if condition="{data.billing_period}">
                        <span class="card-pricing__period">{data -> f:render.text(field: 'billing_period')}</span>
                    </f:if>
                </p>
            </d:molecule.cardHeader>

            <d:molecule.cardContent class="card-pricing__content">
                <f:if condition="{data.feature_items}">
                    <ul class="card-pricing__features" role="list">
                        <f:for each="{data.feature_items}" as="feature">
                            <f:if condition="{feature.text}">
                                <li class="card-pricing__feature {f:if(condition: '!{feature.included}', then: 'card-pricing__feature--excluded')}">
                                    <span class="card-pricing__feature-marker" aria-hidden="true">
                                        <f:if condition="{feature.included}">
                                            <f:then><d:atom.icon name="check-circle" size="sm" class="card-pricing__icon card-pricing__icon--included"/></f:then>
                                            <f:else><d:atom.icon name="x-circle" size="sm" class="card-pricing__icon card-pricing__icon--excluded"/></f:else>
                                        </f:if>
                                    </span>
                                    <span class="card-pricing__feature-text">
                                        <span class="d-sr-only">
                                            <f:if condition="{feature.included}">
                                                <f:then><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:included"/>: </f:then>
                                                <f:else><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:not_included"/>: </f:else>
                                            </f:if>
                                        </span>
                                        {feature -> f:render.text(field: 'text')}
                                    </span>
                                </li>
                            </f:if>
                        </f:for>
                    </ul>
                </f:if>
            </d:molecule.cardContent>

            <f:if condition="{data.button_text} && {data.button_link.url}">
                <d:molecule.cardFooter class="card-pricing__footer">
                    <d:atom.button
                        href="{data.button_link.url}"
                        target="{data.button_link.target}"
                        variant="{f:if(condition: data.highlighted, then: 'default', else: 'outline')}"
                        class="card-pricing__button w-full"
                    >
                        <span>{data -> f:render.text(field: 'button_text')}</span>
                        <f:if condition="{data.header}">
                            <span class="d-sr-only"> – {data.header}</span>
                        </f:if>
                    </d:atom.button>
                </d:molecule.cardFooter>
            </f:if>
        </d:molecule.card>
    </d:layout.container>
</d:layout.section>

</html>
