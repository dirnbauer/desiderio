name: desiderio/advisor-grid
typeName: desiderio_advisorgrid
title: 'Advisor Grid'
description: 'Renders a three-column grid of cards, each with a round portrait (or initial fallback), name, area of expertise, and company, beneath an optional heading and subheadline. Use it for: advisory-board lists, mentor or expert rosters, scientific committees — people identified by name plus expertise and affiliation without biographies. Prefer ''Board Members'' when short bios exist, ''Team Section'' for employees, ''Investor Grid'' for backer logos and funding rounds.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: advisors
    type: Collection
    table: advisor_grid_advisors
    prefixField: true
    label: Advisors
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: expertise
        type: Textarea
        rows: 1
        label: 'Area of Expertise'
      -
        identifier: company
        type: Textarea
        rows: 1
        label: Company
