name: desiderio/directions
typeName: desiderio_directions
title: Directions
description: 'Directions provides a focused editorial building block for a recognizable page task. Editors can manage headline and copy fields and repeatable entries.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: routes
    type: Collection
    label: Routes
    minItems: 1
    fields:
      -
        identifier: mode
        type: Textarea
        rows: 1
        label: 'Transport Mode'
        required: true
      -
        identifier: description
        type: Textarea
        label: Directions
        rows: 3
