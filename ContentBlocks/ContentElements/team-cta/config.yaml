name: desiderio/team-cta
typeName: desiderio_teamcta
title: 'Team Hiring CTA'
description: 'Renders a highlighted card, optionally over a background image, with an open-positions count badge, heading, rich-text message, and one large hiring button. Use it for: join-our-team or we-are-hiring passages, recruiting appeals closing a team or about section, links to a careers portal. Prefer ''Career Listing'' when the source lists actual open roles, ''Job Card'' for one specific vacancy, and ''Full-Width CTA Banner'' for non-hiring conversion messages.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: open_count
    type: Textarea
    rows: 1
    label: 'Open Positions Count'
  -
    identifier: cta_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: cta_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:background_image'
    allowed: common-image-types
    maxitems: 1
