name: desiderio/legal-disclaimer
typeName: desiderio_legaldisclaimer
title: 'Legal Disclaimer'
description: 'Legal Disclaimer closes a page with utility information, legal links, contact routes, or service details. Editors can manage headline and copy fields and layout or variant options.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'Disclaimer Text'
    enableRichtext: true
    rows: 6
    required: true
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: Boxed
        value: boxed
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.bordered'
        value: bordered
    default: default
