name: desiderio/pricing-usage
typeName: desiderio_pricingusage
title: 'Usage-Based Pricing'
description: 'A grid of cards each showing a per-unit, pay-as-you-go rate for a billable item. Use it on a pricing page for metered or consumption-based products where customers pay only for what they use. Each item holds a title, a rate paired with its unit (e.g. per request), a rich-text description, and an optional details link.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: pricing_usage_items
    prefixField: true
    label: 'Usage Items'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: rate
        type: Textarea
        rows: 1
        label: Rate
        required: true
      -
        identifier: unit
        type: Textarea
        rows: 1
        label: Unit
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: link
        type: Link
        label: 'Details Link'
