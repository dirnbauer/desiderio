name: desiderio/hero-search
typeName: desiderio_herosearch
title: Hero Search
description: Hero with prominent search bar for platforms and directories
group: hero
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  - identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  - identifier: form_action
    type: Link
    label: Search Action URL
  - identifier: placeholder
    type: Textarea
    rows: 1
    label: Search Placeholder
  - identifier: categories
    type: Collection
    label: Category Filters
    fields:
      - identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      - identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
