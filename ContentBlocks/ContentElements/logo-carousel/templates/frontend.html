<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-logo-carousel" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="logo-carousel">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="logo-carousel__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="logo-carousel__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="logo-carousel__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <div
            class="logo-carousel__track logo-carousel__track--{data.speed -> f:or(alternative: 'normal')}"
            role="group"
            aria-label="{data.header -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:logoCloud.aria\', default: \'Trusted by leading teams\')}')}"
        >
            <ul class="logo-carousel__slide-group">
                <f:for each="{data.logo_items}" as="logo">
                    <li class="logo-carousel__item">
                        <f:if condition="{logo.link.url}">
                            <f:then>
                                <d:atom.link href="{f:uri.typolink(parameter: logo.link.url)}" target="{logo.link.target}" variant="muted" class="logo-carousel__link">
                                    <f:for each="{logo.image}" as="fileReference">
                                        <f:image image="{fileReference}" maxWidth="260" alt="{logo.name}" class="logo-carousel__image" loading="lazy" decoding="async"/>
                                    </f:for>
                                </d:atom.link>
                            </f:then>
                            <f:else>
                                <f:for each="{logo.image}" as="fileReference">
                                    <f:image image="{fileReference}" maxWidth="260" alt="{logo.name}" class="logo-carousel__image" loading="lazy" decoding="async"/>
                                </f:for>
                            </f:else>
                        </f:if>
                    </li>
                </f:for>
            </ul>
            <ul class="logo-carousel__slide-group" aria-hidden="true">
                <f:for each="{data.logo_items}" as="logo">
                    <li class="logo-carousel__item">
                        <f:for each="{logo.image}" as="fileReference">
                            <f:image image="{fileReference}" maxWidth="260" alt="" class="logo-carousel__image" loading="lazy" decoding="async"/>
                        </f:for>
                    </li>
                </f:for>
            </ul>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
