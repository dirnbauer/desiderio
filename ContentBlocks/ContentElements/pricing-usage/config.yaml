name: desiderio/pricing-usage
typeName: desiderio_pricingusage
title: 'Usage-Based Pricing'
description: 'Renders an intro plus a grid of rate cards, each showing a title, a per-unit rate (''$0.10 / request''), an optional description, and a details link. Use it for: pay-as-you-go price lists, metered billing rates (per GB, per API call, per user, per transaction), fee schedules with unit prices. Prefer ''Pricing Slider'' when readers should explore volume tiers interactively; ''Pricing Tier Table'' for quantity-tier rate tables.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: pricing_usage_items
    prefixField: true
    label: 'Usage Items'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: rate
        type: Textarea
        rows: 1
        label: Rate
        required: true
      -
        identifier: unit
        type: Textarea
        rows: 1
        label: Unit
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: link
        type: Link
        label: 'Details Link'
