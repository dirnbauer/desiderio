name: desiderio/callout
typeName: desiderio_callout
title: 'Callout Box'
description: 'Renders a boxed, color-coded note in info, warning, success, danger, or note variant with an optional heading and required rich-text content, marked up as role=note. Use it for: important asides in articles and documentation — tips, cautions, prerequisites, deadlines, legal or safety notes lifted from highlighted boxes in a source document. Prefer ''Inline Alert Notice'' for short one-line messages, ''Notification'' for dismissible toasts, ''Content Highlight'' to emphasize a body passage.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:content'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 4
    required: true
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.info'
        value: info
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.warning'
        value: warning
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.success'
        value: success
      -
        label: Danger
        value: danger
      -
        label: Note
        value: note
    default: info
