<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-metric-dashboard" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="metric-dashboard">
    <d:layout.container>
        <f:if condition="{data.header} || {data.description}">
            <header class="metric-dashboard__intro">
                <f:if condition="{data.header}">
                    <h2 class="metric-dashboard__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.description}">
                    <p class="metric-dashboard__description">{data -> f:render.text(field: 'description')}</p>
                </f:if>
            </header>
        </f:if>

        <div class="metric-dashboard__grid">
            <f:for each="{data.items}" as="item">
                <article class="metric-dashboard__card">
                    <div class="metric-dashboard__label">{item -> f:render.text(field: 'label')}</div>
                    <div class="metric-dashboard__value">{item -> f:render.text(field: 'value')}</div>
                    <f:if condition="{item.change}">
                        <div class="metric-dashboard__change metric-dashboard__change--{item.trend -> f:or(alternative: 'neutral')}">
                            {item -> f:render.text(field: 'change')}
                        </div>
                    </f:if>
                </article>
            </f:for>
        </div>

        <f:if condition="{data.chart_data}">
            <div class="metric-dashboard__chart"
                 data-chart-data="{data.chart_data -> f:format.htmlspecialchars()}"
                 data-chart-id="metric-dash-{data.uid}">
                <svg class="metric-dashboard__sparkline" id="metric-dash-{data.uid}"></svg>
            </div>
        </f:if>
    </d:layout.container>
</d:layout.section>

<script>
(function () {
  const svg = document.getElementById('metric-dash-' + {data.uid});
  const root = svg && svg.closest('.metric-dashboard__chart');
  if (!svg || !root) return;
  let rows;
  try { rows = JSON.parse(root.getAttribute('data-chart-data') || '[]'); } catch (e) { return; }
  if (!Array.isArray(rows) || !rows.length) return;
  const values = rows.map(function (row) {
    return row && row.value != null ? Number(row.value) : NaN;
  }).filter(function (value) { return !isNaN(value); });
  if (!values.length) return;
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const w = 640, h = 150, pad = 10;
  const max = Math.max.apply(null, values);
  const min = Math.min.apply(null, values);
  const range = max - min || 1;
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  const points = values.map(function (value, index) {
    const x = pad + (values.length === 1 ? (w - 2 * pad) / 2 : (index / (values.length - 1)) * (w - 2 * pad));
    const y = h - pad - ((value - min) / range) * (h - 2 * pad);
    return [x, y];
  });
  const pointList = points.map(function (p) { return p[0].toFixed(2) + ' ' + p[1].toFixed(2); }).join(' ');
  const area = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  area.setAttribute('points', pad + ' ' + (h - pad) + ' ' + pointList + ' ' + (w - pad) + ' ' + (h - pad));
  area.setAttribute('fill', 'var(--primary)');
  area.setAttribute('opacity', '0.12');
  svg.appendChild(area);
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  line.setAttribute('points', pointList);
  line.setAttribute('fill', 'none');
  line.setAttribute('stroke', 'var(--primary)');
  line.setAttribute('stroke-width', '3');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(line);
})();
</script>

</html>
