name: desiderio/status-indicator
typeName: desiderio_statusindicator
title: 'Status Indicator Data View'
description: 'A service status board that pairs an overall state line with a list of individual services, each marked by a colored dot and a status word. Use it on a status or uptime page to signal at a glance whether systems are operational, degraded, in outage, or under maintenance. An overall status selector sets the summary, and each service has a name, a status state, and an optional status detail.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: overall_status
    type: Select
    renderType: selectSingle
    label: 'Overall Status'
    items:
      -
        label: Operational
        value: operational
      -
        label: Degraded
        value: degraded
      -
        label: Outage
        value: outage
      -
        label: Maintenance
        value: maintenance
    default: operational
  -
    identifier: items
    type: Collection
    table: status_indicator_items
    prefixField: true
    label: Services
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Service Name'
        required: true
      -
        identifier: status
        type: Select
        renderType: selectSingle
        label: Status
        items:
          -
            label: Operational
            value: operational
          -
            label: Degraded
            value: degraded
          -
            label: Outage
            value: outage
          -
            label: Maintenance
            value: maintenance
        default: operational
      -
        identifier: detail
        type: Textarea
        rows: 1
        label: 'Status Detail'
