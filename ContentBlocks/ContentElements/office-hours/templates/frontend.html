<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-office-hours" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="office-hours">
    <d:layout.container>
        <d:molecule.card class="office-hours__card">
            <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
            <f:if condition="{data.description_text}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'description_text')}</d:atom.typography></f:if>
            <dl class="office-hours__list">
                <f:for each="{data.hours_items}" as="entry">
                    <div class="office-hours__row">
                        <dt class="office-hours__day">{entry -> f:render.text(field: 'day')}</dt>
                        <dd class="office-hours__time">{entry -> f:render.text(field: 'time')}</dd>
                    </div>
                </f:for>
            </dl>
        </d:molecule.card>
    </d:layout.container>
</d:layout.section>

</html>
