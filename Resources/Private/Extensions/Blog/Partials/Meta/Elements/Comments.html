<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:variable name="name" value="comments" />
<f:if condition="{settings.comments.active} && {post.commentsActive}">
    <f:variable name="commentCount" value="{post.activeComments -> f:count()}" />
    <f:render partial="Meta/Rendering/Item" arguments="{name: name}" contentAs="content">
        <meta itemprop="commentCount" content="{commentCount}"/>
        <blogvh:link.post post="{post}" section="comments" class="inline-flex items-center gap-1 text-foreground !no-underline transition-colors hover:text-primary">
            <span aria-hidden="true"><d:atom.icon name="message-circle" size="xs"/></span>
            <span>
                <f:translate key="blog.comments.count" extensionName="desiderio" arguments="{count: commentCount}">
                    {commentCount} comments
                </f:translate>
            </span>
        </blogvh:link.post>
    </f:render>
</f:if>

</html>
