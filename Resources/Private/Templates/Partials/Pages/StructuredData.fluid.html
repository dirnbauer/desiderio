<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:di="http://typo3.org/ns/Webconsulting/Desiderio/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:variable name="siteTitle" value="{site.configuration.websiteTitle -> f:or(alternative: breadcrumb.0.title)}"/>
<f:variable name="searchAction" value="{breadcrumb.0.link}"/>
<f:if condition="{site.configuration.settings.desiderio.search.targetPageId}">
    <f:variable name="searchAction" value="{f:uri.page(pageUid: site.configuration.settings.desiderio.search.targetPageId)}"/>
</f:if>

<di:structuredData
    enabled="{site.configuration.settings.desiderio.seo.structuredDataEnabled}"
    name="{siteTitle}"
    url="{breadcrumb.0.link}"
    searchUrl="{searchAction}"
    queryParameter="{site.configuration.settings.desiderio.search.queryParameter -> f:or(alternative: 'q')}"
    searchEnabled="{site.configuration.settings.desiderio.search.enabled}"
/>

</html>
