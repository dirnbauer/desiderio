<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Default" />

<f:section name="Content">
    <f:if condition="!{archiveData}">
        <f:then>
            <header class="mb-8 rounded-xl border border-border bg-card p-5 sm:p-8">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
                    <div class="flex flex-col gap-3">
                        <d:atom.badge variant="secondary" class="w-fit gap-1">
                            <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="calendar" size="xs"/></span>
                            <span><f:translate extensionName="Blog" key="headline.archive">Archive</f:translate></span>
                        </d:atom.badge>
                        <d:atom.typography tag="h1" variant="h1">
                            <f:if condition="{month}">{f:format.date(format: '{settings.widgets.archive.monthDateFormat}', date: timestamp)}</f:if> {year}
                        </d:atom.typography>
                    </div>
                    <blogvh:link.archive class="inline-flex h-9 items-center gap-2 rounded-md border border-border bg-background px-3 text-sm font-medium text-foreground transition-colors hover:bg-muted" rss="true" year="{year}" month="{month}">
                        <d:atom.icon name="rss" size="xs"/>
                        <span><f:translate extensionName="Blog" key="link.rss" default="RSS"/></span>
                    </blogvh:link.archive>
                </div>
            </header>
            <f:render partial="List" arguments="{_all}" />
            <f:if condition="{settings.archiveUid}">
                <footer class="mt-8">
                    <f:link.page pageUid="{settings.archiveUid}" class="inline-flex h-9 items-center gap-2 rounded-md border border-border bg-background px-3 text-sm font-medium text-foreground transition-colors hover:bg-muted">
                        <d:atom.icon name="arrow-left" size="xs"/>
                        <span><f:translate extensionName="Blog" key="list.backlink.archive">Back to archive</f:translate></span>
                    </f:link.page>
                </footer>
            </f:if>
        </f:then>
        <f:else>
            <header class="mb-8 flex flex-col gap-3">
                <d:atom.badge variant="secondary" class="w-fit gap-1">
                    <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="calendar" size="xs"/></span>
                    <span><f:translate extensionName="Blog" key="headline.archive">Archive</f:translate></span>
                </d:atom.badge>
                <d:atom.typography tag="h1" variant="h1"><f:translate extensionName="Blog" key="headline.archive">Archive</f:translate></d:atom.typography>
            </header>
            <div class="grid gap-4 md:grid-cols-2">
                <f:for each="{archiveData}" as="months" key="year">
                    <f:render partial="List/Archive" arguments="{_all}" />
                </f:for>
            </div>
        </f:else>
    </f:if>
</f:section>

</html>
