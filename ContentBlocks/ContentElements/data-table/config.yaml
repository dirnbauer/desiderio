name: desiderio/data-table
typeName: desiderio_datatable
title: 'Data Table'
description: 'Data Table organizes rows, options, and details so visitors can compare information quickly. Editors can manage headline and copy fields, repeatable entries and layout or variant options.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'Table Style'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: Striped
        value: striped
      -
        label: Bordered
        value: bordered
    default: default
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: show_header_row
    type: Checkbox
    label: 'Show Header Row'
    default: 1
  -
    identifier: column_definitions
    type: Collection
    table: data_table_columns
    label: 'Column Definitions'
    minItems: 1
    fields:
      -
        identifier: column_label
        type: Textarea
        rows: 1
        label: 'Column Label'
        required: true
      -
        identifier: column_key
        type: Textarea
        rows: 1
        label: 'Column Key'
        required: true
      -
        identifier: column_align
        type: Select
        renderType: selectSingle
        label: Alignment
        items:
          -
            label: Left
            value: left
          -
            label: Center
            value: center
          -
            label: Right
            value: right
        default: left
  -
    identifier: rows
    type: Collection
    table: data_table_rows
    label: 'Table Rows'
    labelField: row_label
    minItems: 1
    fields:
      -
        identifier: row_label
        type: Textarea
        rows: 1
        label: 'Row Label'
      -
        identifier: cells
        type: Collection
        table: data_table_cells
        label: Cells
        labelField: value
        minItems: 1
        fields:
          -
            identifier: value
            type: Textarea
            rows: 1
            label: Value
  -
    identifier: show_caption
    type: Checkbox
    label: 'Show Caption'
    default: 0
  -
    identifier: caption_text
    type: Textarea
    rows: 1
    label: 'Caption Text'
    displayCond: 'FIELD:show_caption:=:1'
