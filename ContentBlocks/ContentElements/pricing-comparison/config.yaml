name: desiderio/pricing-comparison
typeName: desiderio_pricingcomparison
title: 'Pricing Comparison'
description: 'A shadcn/ui styled TYPO3 content element for pricing section, using theme tokens for light and dark mode.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: plans
    type: Collection
    label: 'Plan Names'
    minItems: 2
    maxItems: 4
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Plan Name'
        required: true
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
  -
    identifier: feature_items
    type: Collection
    label: 'Feature Rows'
    minItems: 1
    fields:
      -
        identifier: feature_name
        type: Textarea
        rows: 1
        label: 'Feature Name'
        required: true
      -
        identifier: tier_values
        type: Textarea
        rows: 1
        label: 'Values (comma-separated)'
        description: 'One value per plan, e.g. Yes, Yes, No'
        required: true
