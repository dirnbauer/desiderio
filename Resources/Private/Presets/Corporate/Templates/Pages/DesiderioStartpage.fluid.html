<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:section name="Stage">
    <f:render partial="Presets/Stage" arguments="{content: content.stage, class: 'desiderio-corporate-start__stage', containerSize: 'xl'}"/>
</f:section>

<f:section name="Main">
    <div class="desiderio-corporate-start">
        <d:layout.container size="xl" class="desiderio-corporate-start__container">
            <header class="desiderio-corporate-start__masthead">
                <p class="desiderio-corporate-start__eyebrow">{breadcrumb.0.title}</p>
                <h1>{site.configuration.websiteTitle -> f:or(alternative: page.pageRecord.title)}</h1>
                <f:if condition="{page.pageRecord.abstract}">
                    <p>{page.pageRecord.abstract}</p>
                </f:if>
            </header>
            <div class="desiderio-corporate-start__content">
                <f:render partial="Presets/ContentArea" arguments="{content: content.main}"/>
            </div>
        </d:layout.container>
    </div>
</f:section>

</html>
