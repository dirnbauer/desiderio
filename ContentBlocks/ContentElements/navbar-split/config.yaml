name: desiderio/navbar-split
typeName: desiderio_navbarsplit
title: 'Split Navigation Bar'
description: 'Renders a symmetrical header bar with a centered, linkable brand name framed by two separately managed link groups on the left and right, plus an optional call-to-action button on the right. Use it for: classic or editorial site headers, brand-centered navigation with a handful of evenly balanced links. Prefer ''Centered Navigation Bar'' when a single link list simply surrounds the brand; ''Navigation Bar'' for a standard left-brand layout.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand'
    required: true
  -
    identifier: brand_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand_link'
  -
    identifier: left_items
    type: Collection
    table: navbar_split_left_items
    prefixField: true
    label: 'Left Links'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: right_items
    type: Collection
    table: navbar_split_right_items
    prefixField: true
    label: 'Right Links'
    fields:
      -
        identifier: label
        type: Text
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
