name: desiderio/team-department
typeName: desiderio_teamdepartment
title: 'Team by Department'
description: 'Renders an optional heading and subheadline, then one section per department: the department name above a four-column grid of compact text-only cards with member name and optional role — no photos. Use it for: larger staff rosters grouped by unit, personnel or contact lists ordered by division, organizational overviews from annual reports or intranet pages. Prefer ''Organization Chart'' for hierarchy tiers; use ''Team Section'' when members have portraits and bios.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: department_items
    type: Collection
    table: team_department_departments
    prefixField: true
    label: Departments
    labelField: name
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Department Name'
        required: true
      -
        identifier: members
        type: Collection
        table: team_department_members
        label: Members
        labelField: name
        minItems: 1
        maxItems: 12
        fields:
          -
            identifier: name
            type: Textarea
            rows: 1
            label: 'Member Name'
            required: true
          -
            identifier: role
            type: Textarea
            rows: 1
            label: Role
