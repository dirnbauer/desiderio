<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-testimonial" href="{cb:assetPath()}/frontend.css"/>
<f:variable name="ratingInt" value="{data.rating -> f:format.number(decimals: 0)}"/>

<d:layout.section class="testimonial testimonial--{data.variant}">
    <d:layout.container>
        <f:if condition="{data.header}">
            <h2 class="testimonial__heading">{data -> f:render.text(field: 'header')}</h2>
        </f:if>

        <div class="testimonial__card {f:if(condition: '{data.variant} == \'card\'', then: 'testimonial__card--bordered')}">
            <f:if condition="{ratingInt} > 0">
                <div class="testimonial__rating" role="img" aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:rating.sr.rated', arguments: {0: ratingInt}, default: 'Rated {ratingInt} out of 5')}">
                    <f:for each="{0: 1, 1: 2, 2: 3, 3: 4, 4: 5}" as="star">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                             fill="{f:if(condition: '{star} <= {ratingInt}', then: 'currentColor', else: 'none')}"
                             stroke="currentColor" stroke-width="2"
                             class="testimonial__star {f:if(condition: '{star} <= {ratingInt}', then: 'testimonial__star--filled')}"
                             aria-hidden="true" focusable="false">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                    </f:for>
                </div>
            </f:if>

            <blockquote class="testimonial__quote">
                <f:if condition="{data.variant} == 'large'">
                    <span class="testimonial__quote-mark" aria-hidden="true">&ldquo;</span>
                </f:if>
                {data -> f:render.text(field: 'quote')}
            </blockquote>

            <div class="testimonial__author">
                <f:if condition="{data.author_image}">
                    <div class="testimonial__avatar">
                        <f:for each="{data.author_image}" as="fileReference">
                            <f:image image="{fileReference}" width="96c" height="96c"
                                 alt="" loading="lazy" decoding="async" class="testimonial__avatar-image" additionalAttributes="{srcset: '{f:uri.image(image: fileReference, width: \'96c\', height: \'96c\')} 1x, {f:uri.image(image: fileReference, width: \'192c\', height: \'192c\')} 2x'}"/>
                        </f:for>
                    </div>
                </f:if>
                <div class="testimonial__author-info">
                    <cite class="testimonial__author-name">{data -> f:render.text(field: 'author_name')}</cite>
                    <f:if condition="{data.author_title} || {data.author_company}">
                        <span class="testimonial__author-role">
                            {data -> f:render.text(field: 'author_title')}<f:if condition="{data.author_title} && {data.author_company}">, </f:if>{data -> f:render.text(field: 'author_company')}
                        </span>
                    </f:if>
                </div>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
