<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-use-case-grid" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="use-case-grid">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="use-case-grid__intro">
                <f:if condition="{data.eyebrow}"><span class="use-case-grid__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span></f:if>
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>
        <div class="use-case-grid__grid" role="list">
            <f:for each="{data.items}" as="item">
                <d:molecule.card class="use-case-grid__item" role="listitem">
                    <h3 class="use-case-grid__title">
                        <f:if condition="{item.link.url}">
                            <f:then><d:atom.link href="{f:uri.typolink(parameter: item.link.url)}" target="{item.link.target}" variant="muted" class="use-case-grid__link">{item -> f:render.text(field: 'title')}</d:atom.link></f:then>
                            <f:else>{item -> f:render.text(field: 'title')}</f:else>
                        </f:if>
                    </h3>
                    <div class="use-case-grid__description d-richtext">{item -> f:render.text(field: 'description')}</div>
                </d:molecule.card>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
