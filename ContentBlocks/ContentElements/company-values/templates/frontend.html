<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-company-values" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="company-values">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="company-values__intro">
                <f:if condition="{data.eyebrow}"><span class="company-values__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span></f:if>
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <div class="company-values__grid">
            <f:for each="{data.value_items}" as="value">
                <d:molecule.card class="company-values__item">
                    <f:if condition="{value.icon}"><span class="company-values__icon">{value -> f:render.text(field: 'icon')}</span></f:if>
                    <h3 class="company-values__title">{value -> f:render.text(field: 'title')}</h3>
                    <f:if condition="{value.description}"><p class="company-values__description">{value -> f:render.text(field: 'description')}</p></f:if>
                </d:molecule.card>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
