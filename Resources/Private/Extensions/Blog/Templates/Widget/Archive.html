<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Widget" />

<f:section name="Title"><f:translate extensionName="Blog" key="headline.archive">Archive</f:translate></f:section>

<f:section name="Content">
    <f:variable name="years" value="{archiveData}" />
    <f:if condition="{years}">
        <f:if condition="{settings.widgets.archive.groupByYear} == 1">
            <f:then>
                <ul class="flex flex-col gap-3 text-sm" data-blog-archive-type="year" data-archive-type="year">
                    <f:for each="{years}" key="year" as="months">
                        <li class="flex flex-col gap-2" data-blog-archive-year="{year}">
                            <blogvh:link.archive year="{year}" title="{year}" class="flex items-center justify-between gap-3 font-medium text-foreground underline-offset-4 hover:text-primary hover:underline">
                                <span>{year}</span>
                                <f:if condition="{settings.widgets.archive.showCounter}">
                                    <f:variable name="yearCount" value="0" />
                                    <f:for each="{months}" as="month"><f:variable name="yearCount" value="{yearCount + month.count}" /></f:for>
                                    <d:atom.badge variant="secondary">{yearCount}</d:atom.badge>
                                </f:if>
                            </blogvh:link.archive>
                            <f:if condition="{settings.widgets.archive.groupByMonth}">
                                <ul class="ml-3 flex flex-col gap-2 border-l border-border pl-3" data-blog-archive-type="month" data-archive-type="month">
                                    <f:for each="{months}" as="month">
                                        <f:render section="Month" arguments="{settings: settings, year: year, month: month}" />
                                    </f:for>
                                </ul>
                            </f:if>
                        </li>
                    </f:for>
                </ul>
            </f:then>
            <f:else>
                <ul class="flex flex-col gap-2 text-sm" data-blog-archive-type="month" data-archive-type="month">
                    <f:for each="{years}" key="year" as="months">
                        <f:for each="{months}" as="month">
                            <f:render section="Month" arguments="{settings: settings, year: year, month: month}" />
                        </f:for>
                    </f:for>
                </ul>
            </f:else>
        </f:if>
    </f:if>
</f:section>

<f:section name="Month">
    <li data-blog-archive-year="{year}" data-blog-archive-month="{month.month}">
        <blogvh:link.archive year="{year}" month="{month.month}" title="{f:format.date(format: '{settings.widgets.archive.monthDateFormat} {settings.widgets.archive.yearDateFormat}', date: month.timestamp)}" class="flex items-center justify-between gap-3 text-muted-foreground underline-offset-4 hover:text-primary hover:underline">
            <f:if condition="{settings.widgets.archive.groupByYear} == 1">
                <f:then>
                    <span>{f:format.date(format: '{settings.widgets.archive.monthDateFormat}', date: month.timestamp)}</span>
                </f:then>
                <f:else>
                    <span>{f:format.date(format: '{settings.widgets.archive.monthDateFormat} {settings.widgets.archive.yearDateFormat}', date: month.timestamp)}</span>
                </f:else>
            </f:if>
            <f:if condition="{settings.widgets.archive.showCounter} == 1">
                <d:atom.badge variant="secondary">{month.count}</d:atom.badge>
            </f:if>
        </blogvh:link.archive>
    </li>
</f:section>

</html>
