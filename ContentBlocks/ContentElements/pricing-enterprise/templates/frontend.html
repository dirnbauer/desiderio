<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-pricing-enterprise" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="pricing-enterprise">
    <d:layout.container>
        <div class="pricing-enterprise__card">
            <div class="pricing-enterprise__content">
                <f:if condition="{data.eyebrow}">
                    <span class="pricing-enterprise__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="pricing-enterprise__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.description}">
                    <p class="pricing-enterprise__description">{data -> f:render.text(field: 'description')}</p>
                </f:if>

                <f:if condition="{data.features}">
                    <ul class="pricing-enterprise__features">
                        <f:for each="{data.features}" as="feature">
                            <f:if condition="{feature.text}">
                                <li class="pricing-enterprise__feature">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
                                    <span>{feature -> f:render.text(field: 'text')}</span>
                                </li>
                            </f:if>
                        </f:for>
                    </ul>
                </f:if>

                <f:if condition="{data.contact_text} && {data.contact_link.url}">
                    <f:link.typolink parameter="{data.contact_link}" class="pricing-enterprise__button">
                        {data -> f:render.text(field: 'contact_text')}
                    </f:link.typolink>
                </f:if>
            </div>

            <f:if condition="{data.image}">
                <div class="pricing-enterprise__media">
                    <f:for each="{data.image}" as="fileReference">
                        <img src="{f:uri.image(image: fileReference, maxWidth: 480)}" alt="" class="pricing-enterprise__image"/>
                    </f:for>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
