name: desiderio/metric-dashboard
typeName: desiderio_metricdashboard
title: 'Metric Dashboard'
description: 'Combine a grid of trend metrics with one overview chart to give a dashboard-style snapshot of performance.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: items
    type: Collection
    table: metric_dashboard_items
    prefixField: true
    label: Metrics
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        required: true
      -
        identifier: change
        type: Textarea
        rows: 1
        label: Change
      -
        identifier: trend
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:trend'
        items:
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.up'
            value: up
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.down'
            value: down
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.neutral'
            value: neutral
        default: neutral
  -
    identifier: chart_data
    type: Textarea
    label: 'Chart Data (JSON)'
    description: 'Optional JSON array for the overview chart. Use objects with label and value for axis labels.'
    rows: 4
  -
    identifier: chart_series_label
    type: Text
    label: 'Chart series label'
    default: 'Monthly recurring revenue'
  -
    identifier: chart_unit
    type: Text
    label: 'Chart unit'
    default: 'k USD'
