<html xmlns="http://www.w3.org/1999/xhtml" lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:variable name="facetOptionLimit">{f:if(condition: '{settings.faceting.limit}', then: '{settings.faceting.limit}', else: 10)}</f:variable>

<section class="overflow-hidden rounded-xl border border-border bg-card text-card-foreground shadow-sm" aria-labelledby="facet-label-{facet.name}">
    <header class="border-b border-border px-4 py-3">
        <h2 class="text-sm font-semibold tracking-tight" id="facet-label-{facet.name}">{facet.label}</h2>
    </header>

    <ul class="facet-option-list facet-type-options fluidfacet space-y-1 p-2" data-facet-name="{facet.name}" data-facet-label="{facet.label}" id="facet{facet.name}">
        <f:for each="{facet.options}" as="option" iteration="iteration">
            <li class="facet-option {f:if(condition:'!({iteration.index} < {facetOptionLimit})', then:' tx-solr-facet-hidden')}" data-facet-item-value="{option.value}">
                <a class="facet solr-ajaxified group flex items-center justify-between gap-3 rounded-lg px-3 py-2 text-sm font-medium text-foreground transition-colors hover:bg-muted hover:text-foreground focus-visible:bg-muted focus-visible:text-foreground focus-visible:outline-hidden focus-visible:ring-3 focus-visible:ring-ring active:bg-muted active:text-foreground {f:if(condition: option.selected, then: 'bg-muted text-foreground')}" href="{s:uri.facet.addFacetItem(facet: facet, facetItem: option)}">
                    <span class="min-w-0 truncate">{option.label}</span>
                    <span class="inline-flex h-6 min-w-6 shrink-0 items-center justify-center rounded-full bg-secondary px-2 text-xs font-medium text-secondary-foreground transition-colors group-hover:bg-primary group-hover:text-primary-foreground group-focus-visible:bg-primary group-focus-visible:text-primary-foreground group-active:bg-primary group-active:text-primary-foreground data-[selected=true]:bg-primary data-[selected=true]:text-primary-foreground" data-selected="{f:if(condition: option.selected, then: 'true', else: 'false')}" aria-label="{f:translate(key: 'solr.resultCount.aria', domain: 'desiderio.labels', arguments: {count: option.documentCount})}">{option.documentCount}</span>
                </a>
            </li>
        </f:for>

        <f:if condition="{facet.options -> f:count()} > {facetOptionLimit}">
            <li>
                <a href="#" class="tx-solr-facet-show-all inline-flex h-8 items-center rounded-lg px-3 text-sm font-medium text-muted-foreground transition-colors hover:bg-muted hover:text-foreground focus-visible:bg-muted focus-visible:text-foreground focus-visible:outline-hidden focus-visible:ring-3 focus-visible:ring-ring active:bg-muted active:text-foreground" data-label-more="{f:translate(key: 'solr.facet.showMore', domain: 'desiderio.labels')}" data-label-less="{f:translate(key: 'solr.facet.showFewer', domain: 'desiderio.labels')}">
                    <f:translate key="solr.facet.showMore" domain="desiderio.labels">Show more</f:translate>
                </a>
            </li>
        </f:if>
    </ul>
</section>

</html>
