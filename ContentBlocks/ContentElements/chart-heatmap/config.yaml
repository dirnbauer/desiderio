name: desiderio/chart-heatmap
typeName: desiderio_chartheatmap
title: 'Heatmap Chart'
description: 'Renders a color-coded intensity matrix drawn by JavaScript from comma-separated column labels and ''row label | values'' lines, plus a screen-reader data table with every row, column and unit. Use it for: two-dimensional value grids in a document — activity by weekday and hour, usage per team and month, risk matrices, feature adoption by segment. Prefer ''Contribution Chart'' for one metric over a long time span; use ''Data Table'' when exact numbers must stay visible.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: col_labels
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-heatmap/language/labels.xlf:field.col_labels'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-heatmap/language/labels.xlf:field.col_labels.description'
    required: true
  -
    identifier: series
    type: Textarea
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-heatmap/language/labels.xlf:field.series'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-heatmap/language/labels.xlf:field.series.description'
    rows: 6
    required: true
  -
    identifier: unit
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-heatmap/language/labels.xlf:field.unit'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-heatmap/language/labels.xlf:field.unit.description'
  -
    identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:chart_data_json'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-heatmap/language/labels.xlf:field.chart_data.description'
    rows: 8
    required: true
