name: desiderio/cta-gradient
typeName: desiderio_ctagradient
title: 'Gradient CTA Card'
description: 'A high-attention card on a bold gradient background with a headline, rich-text description, and one contrasting button. Use it for: final appeals that must dominate the page, launch or campaign promotions, standout offers a document flags as its most important message. Prefer ''Full-Width CTA Banner'' for a calmer band in theme colors, or ''CTA Card'' for a subtle contained card, where the gradient would clash.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: cta_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: cta_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
