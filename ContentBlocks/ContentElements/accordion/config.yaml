name: desiderio/accordion
typeName: desiderio_accordion
title: Accordion
description: 'Accordion turns layered answers or grouped information into a compact expandable block. Editors can manage headline and copy fields, repeatable entries and layout or variant options.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: allow_multiple
    type: Checkbox
    label: 'Allow Multiple Open'
    description: 'Allow multiple accordion items to be open at once'
    default: 0
  -
    identifier: items
    type: Collection
    table: accordion_items
    label: 'Accordion Items'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Question / Title'
        required: true
      -
        identifier: content
        type: Textarea
        label: 'Answer / Content'
        enableRichtext: true
        rows: 5
      -
        identifier: open_by_default
        type: Checkbox
        label: 'Open by Default'
        default: 0
