<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-newsletter-inline" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="newsletter-inline">
    <d:layout.container>
        <div class="newsletter-inline__bar">
            <div class="newsletter-inline__text">
                <f:if condition="{data.header}"><h2 class="newsletter-inline__headline">{data -> f:render.text(field: 'header')}</h2></f:if>
                <f:if condition="{data.description_text}"><p class="newsletter-inline__description">{data -> f:render.text(field: 'description_text')}</p></f:if>
            </div>
<f:comment>Legacy editor fields kept for migrated records; TYPO3 Form Framework owns rendering and submit behavior. {data.form_action}{data.placeholder}{data.button_text}</f:comment>

            <d:molecule.formRenderer persistenceIdentifier="EXT:desiderio/Resources/Private/Forms/DesiderioNewsletter.form.yaml" class="newsletter-inline__form"/>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
