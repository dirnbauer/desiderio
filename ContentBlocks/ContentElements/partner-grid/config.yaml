name: desiderio/partner-grid
typeName: desiderio_partnergrid
title: 'Partner Grid'
description: 'Display partner and integration logos in a grid, each labeled by type and linking to the partner.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: partners
    type: Collection
    table: partner_grid_partners
    prefixField: true
    label: Partners
    minItems: 1
    fields:
      -
        identifier: logo
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:logo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:partner.name'
        required: true
      -
        identifier: kind
        type: Text
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:partner.kind'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:partner.link'
