name: desiderio/pricing-annual-monthly
typeName: desiderio_pricingannualmonthly
title: 'Annual vs Monthly Pricing'
description: 'A grid of plan cards showing each plan''s monthly price prominently and the annual price beneath it with an optional savings badge, plus a check-mark feature list and button; both billing periods stay visible at once. Use it for: pricing that quotes monthly and yearly rates per plan, annual-discount offers, save-when-billed-yearly copy. Prefer ''Pricing Section'' when plans carry one price; ''Toggle Pricing'' similarly pairs monthly and yearly prices.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: plans
    type: Collection
    table: pricing_annual_monthly_plans
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:plans'
    labelField: name
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Plan Name'
        required: true
      -
        identifier: monthly_price
        type: Textarea
        rows: 1
        label: 'Monthly Price'
        required: true
      -
        identifier: annual_price
        type: Textarea
        rows: 1
        label: 'Annual Price'
        required: true
      -
        identifier: savings
        type: Textarea
        rows: 1
        label: 'Savings Badge'
        description: 'e.g. Save 20%'
      -
        identifier: features
        type: Collection
        table: pricing_annual_monthly_plan_features
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
        labelField: text
        minItems: 1
        maxItems: 8
        fields:
          -
            identifier: text
            type: Textarea
            rows: 1
            label: Feature
      -
        identifier: is_featured
        type: Checkbox
        label: 'Featured Plan'
      -
        identifier: button_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
        default: 'Get Started'
      -
        identifier: button_link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
