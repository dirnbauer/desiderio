name: desiderio/hero-parallax
typeName: desiderio_heroparallax
title: 'Parallax Hero'
description: 'A hero whose background image scrolls at a different speed to create a sense of depth, with a darkening overlay over the text and a subtle fade-in reveal. Use it as an immersive opener for storytelling or brand pages that benefit from motion. Set the background image and add a badge, headline, sub-headline, and one primary button.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: background_image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:background_image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
