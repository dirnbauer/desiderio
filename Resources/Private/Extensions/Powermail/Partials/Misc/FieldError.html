<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />

<f:if condition="{settings.validation.client}">
    <div id="powermail_field_error_{field.marker}" class="powermail_field_error_container_{field.marker} text-xs text-muted-foreground" style="color: var(--muted-foreground)" data-powermail-field-error="{field.marker}" aria-live="polite"></div>
</f:if>
</html>
