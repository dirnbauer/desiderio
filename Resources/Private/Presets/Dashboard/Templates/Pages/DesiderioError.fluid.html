<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:section name="Main">
    <div class="desiderio-dashboard-template desiderio-dashboard-system desiderio-dashboard-system--error">
        <d:layout.container size="full" class="desiderio-dashboard-template__container">
            <f:render partial="Presets/DashboardRail" arguments="{title: breadcrumb.0.title, mainMenu: mainMenu, homeLink: breadcrumb.0.link}"/>
            <section class="desiderio-dashboard-template__content" aria-labelledby="desiderio-dashboard-heading">
                <div class="desiderio-dashboard-template__toolbar">
                    <p class="desiderio-dashboard-template__eyebrow desiderio-dashboard-template__eyebrow--error">{f:translate(extensionName: 'desiderio', key: 'dashboard.eyebrow.status', default: 'Status')}</p>
                    <h1 id="desiderio-dashboard-heading">{page.pageRecord.title}</h1>
                    <p class="desiderio-dashboard-template__lede">{f:translate(extensionName: 'desiderio', key: 'dashboard.error.summary', default: 'This view could not be loaded. Check the address or return to your overview.')}</p>
                </div>
                <div class="desiderio-dashboard-template__canvas desiderio-dashboard-system__canvas">
                    <div class="desiderio-dashboard-system__alert" role="alert">
                        <d:atom.icon name="alert-triangle" size="sm" class="desiderio-dashboard-system__alert-icon"/>
                        <div class="desiderio-dashboard-system__alert-body">
                            <f:render partial="Presets/ContentArea" arguments="{content: content.main}"/>
                            <f:render partial="Presets/ErrorHomeLink" arguments="{homeLink: breadcrumb.0.link}"/>
                        </div>
                    </div>
                </div>
            </section>
        </d:layout.container>
    </div>
</f:section>

</html>
