name: desiderio/review-carousel
typeName: desiderio_reviewcarousel
title: 'Review Carousel'
description: 'A slider that cycles through customer reviews one at a time with previous, next and dot controls. Use it on landing or testimonial sections to present social proof compactly without a long scrolling list. Each review holds a reviewer name and photo, a star rating, a title, the review text and a date, framed by an eyebrow and headline.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: reviews
    type: Collection
    table: review_carousel_reviews
    prefixField: true
    label: Reviews
    minItems: 2
    fields:
      -
        identifier: reviewer_name
        type: Textarea
        rows: 1
        label: 'Reviewer Name'
        required: true
      -
        identifier: reviewer_image
        type: File
        label: 'Reviewer Photo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: rating
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:rating'
        items:
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.5_stars'
            value: '5'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_stars'
            value: '4'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_stars'
            value: '3'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_stars'
            value: '2'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.1_stars'
            value: '1'
        default: '5'
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Review Title'
      -
        identifier: review_text
        type: Textarea
        label: 'Review Text'
        rows: 3
        required: true
      -
        identifier: date
        type: Textarea
        rows: 1
        label: Date
