name: desiderio/compliance-badges
typeName: desiderio_compliancebadges
title: 'Compliance Badges'
description: 'A horizontal row of outlined badges, each marked with a checkmark seal icon, used to show certifications, standards, and trust marks. Place it in the footer or near conversion points to reinforce credibility and compliance. Each badge holds a label and an optional link, and the whole row can be aligned left, center, or right beneath an optional heading.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: alignment
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:alignment'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.center'
        value: center
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.right'
        value: right
    default: center
  -
    identifier: items
    type: Collection
    table: compliance_badges_items
    prefixField: true
    label: Badges
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
