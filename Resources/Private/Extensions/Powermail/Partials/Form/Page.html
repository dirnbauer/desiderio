<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
<f:argument name="page" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="iterationPages" type="object" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<fieldset class="powermail_fieldset powermail_fieldset_{page.uid} {page.css} space-y-5 rounded-none border border-border bg-background/60 p-4">
    <f:if condition="{page.css} != 'nolabel'">
        <legend class="px-2 text-sm font-medium text-foreground">{page.title}</legend>
    </f:if>

    <div class="grid gap-4 sm:grid-cols-2">
        <f:for each="{page.fields}" as="field" iteration="iteration">
            <f:render partial="Form/Field/{vh:string.upper(string: field.type)}" arguments="{field: field, settings: settings, mail: mail}" />
        </f:for>
    </div>

    <f:if condition="{settings.main.moresteps}">
        <div class="powermail_fieldwrap powermail_tab_navigation flex justify-between gap-2 border-t border-border pt-4">
            <f:if condition="!{iterationPages.isFirst}">
                <button type="button" class="group/button inline-flex h-8 shrink-0 items-center justify-center gap-1.5 rounded-none border border-border bg-background px-2.5 text-xs font-medium text-foreground whitespace-nowrap transition-all outline-none select-none hover:bg-muted hover:text-foreground focus-visible:border-ring focus-visible:ring-1 focus-visible:ring-ring/50 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 dark:border-input dark:bg-input/30 dark:hover:bg-input/50" data-powermail-morestep-show="{iterationPages.index}">
                    <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.multistep.previous" />
                </button>
            </f:if>
            <f:if condition="!{iterationPages.isLast}">
                <button type="button" class="ms-auto group/button inline-flex h-8 shrink-0 items-center justify-center gap-1.5 rounded-none border border-transparent bg-clip-padding bg-primary px-2.5 text-xs font-medium text-primary-foreground whitespace-nowrap transition-all outline-none select-none hover:bg-primary/80 focus-visible:border-ring focus-visible:ring-1 focus-visible:ring-ring/50 active:translate-y-px disabled:pointer-events-none disabled:opacity-50" data-powermail-morestep-validate="{settings.validation.morestep.fieldset}" data-powermail-morestep-show="{iterationPages.cycle}" data-powermail-morestep-previous>
                    <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.multistep.next" />
                </button>
            </f:if>
        </div>
    </f:if>
</fieldset>
</html>
