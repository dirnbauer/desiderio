<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-legal-disclaimer" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="legal-disclaimer-section" spacing="md">
    <d:layout.container size="md">
        <aside class="legal-disclaimer legal-disclaimer--{data.variant -> f:or(alternative: 'default')}"
               aria-label="{data.header -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:disclaimer.aria\')}')}">
            <f:if condition="{data.header}">
                <d:atom.typography tag="h2" variant="large" class="legal-disclaimer__title">{data -> f:render.text(field: 'header')}</d:atom.typography>
            </f:if>
            <div class="legal-disclaimer__content">
                {data -> f:render.text(field: 'content')}
            </div>
        </aside>
    </d:layout.container>
</d:layout.section>

</html>
