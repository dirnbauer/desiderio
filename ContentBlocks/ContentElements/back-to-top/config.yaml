name: desiderio/back-to-top
typeName: desiderio_backtotop
title: 'Back to Top Button'
description: 'A floating button with an upward chevron that scrolls the visitor back to the top of the page once they have scrolled down. Place it on long pages or articles to ease navigation back to the start. Key fields: button label, a checkbox to show the label text beside the icon, and a position select for bottom-right, bottom-left or bottom-center.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: label
    type: Textarea
    rows: 1
    label: 'Button Label'
    default: 'Back to top'
  -
    identifier: show_label
    type: Checkbox
    label: 'Show Label Text'
    default: 0
  -
    identifier: position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:position'
    items:
      -
        label: 'Bottom Right'
        value: bottom-right
      -
        label: 'Bottom Left'
        value: bottom-left
      -
        label: 'Bottom Center'
        value: bottom-center
    default: bottom-right
