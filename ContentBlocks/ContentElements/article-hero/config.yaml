name: desiderio/article-hero
typeName: desiderio_articlehero
title: 'Article Hero'
description: 'Renders the article lead as an h1 headline with optional eyebrow, summary (dek), a meta row of topic, publish date, and reading time, an author name, and a lightbox-zoomable cover image. Use it for: the opening of a single article, blog post, press release, or magazine feature — title plus byline and date from the source document. The only element rendering an h1; prefer ''Hero Section'' for landing pages, ''Page Header'' for plain page titles.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: dek
    type: Textarea
    label: Summary
    rows: 3
  -
    identifier: topic
    type: Textarea
    rows: 1
    label: Topic
  -
    identifier: publish_date
    type: Textarea
    rows: 1
    label: 'Publish Date'
  -
    identifier: reading_time
    type: Textarea
    rows: 1
    label: 'Dauer in min'
  -
    identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
  -
    identifier: cover_image
    type: File
    label: 'Cover Image'
    allowed: common-image-types
    maxitems: 1
