name: desiderio/faq
typeName: desiderio_faq
title: 'FAQ Accordion'
description: 'Place the FAQ Accordion content element as a focused page section.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: faq_items
    prefixField: true
    label: Questions
    minItems: 1
    fields:
      -
        identifier: question
        type: Textarea
        rows: 1
        label: Question
        required: true
      -
        identifier: answer
        type: Textarea
        label: Answer
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
        required: true
