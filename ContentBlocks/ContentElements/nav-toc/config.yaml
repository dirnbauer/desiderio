name: desiderio/nav-toc
typeName: desiderio_navtoc
title: 'Table of Contents'
description: 'A compact sidebar panel that lists page sections as anchor links so readers can jump directly to a heading. Use it on long articles, documentation, or guides to give an at-a-glance overview and quick in-page navigation. It has an optional panel title plus TOC items, each with a label, an anchor ID, and a heading level (H2 or H3) for indentation.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: nav_toc_items
    prefixField: true
    label: 'TOC Items'
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: anchor
        type: Textarea
        rows: 1
        label: 'Anchor ID'
      -
        identifier: level
        type: Select
        renderType: selectSingle
        label: Level
        items:
          -
            label: 'Heading 2'
            value: h2
          -
            label: 'Heading 3'
            value: h3
        default: h2
