<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Default" />

<f:section name="Content">
    <f:if condition="{category}">
        <f:then>
            <header class="mb-8 rounded-xl border border-border bg-card p-5 sm:p-8">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
                    <div class="flex flex-col gap-3">
                        <d:atom.badge variant="secondary" class="w-fit gap-1">
                            <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="folder" size="xs"/></span>
                            <span><f:translate extensionName="Blog" key="headline.category.simple">Category</f:translate></span>
                        </d:atom.badge>
                        <d:atom.typography tag="h1" variant="h1" class="text-balance">{category.title}</d:atom.typography>
                        <f:if condition="{category.description}">
                            <p class="max-w-3xl text-base leading-7 text-muted-foreground">{category.description}</p>
                        </f:if>
                    </div>
                    <blogvh:link.category class="inline-flex h-9 items-center gap-2 rounded-md border border-border bg-background px-3 text-sm font-medium text-foreground transition-colors hover:bg-muted" rss="true" category="{category}">
                        <d:atom.icon name="rss" size="xs"/>
                        <span><f:translate extensionName="Blog" key="link.rss" default="RSS"/></span>
                    </blogvh:link.category>
                </div>
            </header>
            <f:render partial="List" arguments="{_all}" />
            <f:if condition="{settings.categoryUid} || {category.content}">
                <footer class="mt-8 flex flex-col gap-6 border-t border-border pt-6">
                    <f:if condition="{settings.categoryUid}">
                        <div>
                            <f:link.page pageUid="{settings.categoryUid}" class="inline-flex h-9 items-center gap-2 rounded-md border border-border bg-background px-3 text-sm font-medium text-foreground transition-colors hover:bg-muted">
                                <d:atom.icon name="arrow-left" size="xs"/>
                                <span><f:translate extensionName="Blog" key="list.backlink.categories">Back to all categories</f:translate></span>
                            </f:link.page>
                        </div>
                    </f:if>
                    <f:if condition="{category.content}">
                        <div class="prose max-w-none">
                            <f:cObject typoscriptObjectPath="lib.blog.contentElementRendering">{category.contentElementUidList}</f:cObject>
                        </div>
                    </f:if>
                </footer>
            </f:if>
        </f:then>
        <f:else>
            <header class="mb-8 flex flex-col gap-3">
                <d:atom.badge variant="secondary" class="w-fit gap-1">
                    <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="folder" size="xs"/></span>
                    <span><f:translate extensionName="Blog" key="headline.categories">Categories</f:translate></span>
                </d:atom.badge>
                <d:atom.typography tag="h1" variant="h1"><f:translate extensionName="Blog" key="headline.categories">Categories</f:translate></d:atom.typography>
            </header>
            <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                <f:for each="{categories}" as="category">
                    <f:render partial="List/Category" arguments="{_all}" />
                </f:for>
            </div>
        </f:else>
    </f:if>
</f:section>

</html>
