name: desiderio/map-embed
typeName: desiderio_mapembed
title: 'Map Embed'
description: 'An embedded interactive map shown in a responsive iframe alongside optional location text. Use it on a contact or location page to help visitors find your premises and reduce friction before a visit or enquiry. Fields include an optional header, the map embed URL, a postal address block, and the map height in pixels.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: embed_url
    type: Text
    label: 'Map Embed URL'
  -
    identifier: address
    type: Textarea
    label: Address
    rows: 3
  -
    identifier: height
    type: Number
    label: 'Map Height (px)'
    default: 400
