name: desiderio/chart-area
typeName: desiderio_chartarea
title: Chart Area
description: Area chart with gradient fill beneath the line
group: data
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  - identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  - identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:chart_data_json'
    rows: 6
    required: true
  - identifier: color_variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:color_field'
    items:
      - label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
      - label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.blue'
        value: blue
      - label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.green'
        value: green
    default: primary
  - identifier: fill_opacity
    type: Select
    renderType: selectSingle
    label: Fill Opacity
    items:
      - label: Light
        value: light
      - label: Medium
        value: medium
      - label: Strong
        value: strong
    default: medium
