name: desiderio/header-profile
typeName: desiderio_headerprofile
title: 'Profile Header'
description: 'Renders a person-focused header with a round avatar, name, role line, short rich-text bio, and up to two action buttons. Use it for: an individual''s introduction at the top of an author, speaker, or staff profile page — name, job title, portrait, and one or two sentences of context from a CV or bio paragraph. Prefer ''Team Member Spotlight'' for a person card inside a page; ''Team Section'' for whole teams.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
  -
    identifier: role
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:role'
    description: 'Role or title, e.g. VP of Engineering'
  -
    identifier: bio
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Bio
    rows: 3
    description: 'One or two sentences of context'
  -
    identifier: avatar
    type: File
    label: Avatar
    allowed: common-image-types
    maxitems: 1
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
