name: desiderio/board-members
typeName: desiderio_boardmembers
title: 'Board Members'
description: 'A three-column grid of profile cards, each showing a portrait photo (with an initial fallback) alongside a name, title, affiliation and short bio. Use it on an about or governance page to introduce a board, committee or leadership team. Key fields: heading and subheadline intro, plus per-member portrait, name, title, affiliation and rich-text short bio.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: members
    type: Collection
    table: board_members_members
    prefixField: true
    label: 'Board Members'
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: affiliation
        type: Textarea
        rows: 1
        label: Affiliation
      -
        identifier: bio
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'Short Bio'
        rows: 2
