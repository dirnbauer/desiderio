name: desiderio/card
typeName: desiderio_card
title: 'Content Card'
description: 'A flexible content card available in default, horizontal, with-image, and overlay variants for laying out headings, text, and images. Use it anywhere you need a scannable, self-contained block, typically repeated across a grid of related content. Fields include the heading, style variant, card image with left/right position for the horizontal layout, rich-text description, an optional badge, a card link on the title, and a CTA button with its own link.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:card_style'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.horizontal'
        value: horizontal
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.with_image'
        value: with-image
      -
        label: Overlay
        value: overlay
    default: default
  -
    identifier: card_image
    type: File
    label: 'Card Image'
    allowed: common-image-types
    maxitems: 1
    displayCond: 'FIELD:variant:=:with-image,overlay,horizontal'
  -
    identifier: image_position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image_position'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.right'
        value: right
    default: left
    displayCond: 'FIELD:variant:=:horizontal'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Card Description'
    rows: 3
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
  -
    identifier: link
    type: Link
    label: 'Card Link'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
    displayCond: 'FIELD:button_text:!=:'
