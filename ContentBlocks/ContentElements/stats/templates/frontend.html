<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-stats" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="stats">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="stats__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="stats__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h2" class="stats__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <d:atom.typography variant="lead" class="stats__description">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
                </f:if>
            </header>
        </f:if>

        <dl class="stats__grid stats__grid--cols-{data.columns -> f:or(alternative: '4')}"
            aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:stats.aria')}">
            <f:for each="{data.stats}" as="stat">
                <div class="stats__item" data-astro-reveal="slide-up">
                    <dt class="stats__label">{stat -> f:render.text(field: 'label')}</dt>
                    <dd class="stats__value" data-astro-counter>{stat -> f:render.text(field: 'value')}</dd>
                    <f:if condition="{stat.description}">
                        <dd class="stats__item-description">{stat -> f:render.text(field: 'description')}</dd>
                    </f:if>
                </div>
            </f:for>
        </dl>
    </d:layout.container>
</d:layout.section>
</html>
