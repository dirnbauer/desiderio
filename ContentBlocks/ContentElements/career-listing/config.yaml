name: desiderio/career-listing
typeName: desiderio_careerlisting
title: 'Career Listing'
description: 'A shadcn/ui styled TYPO3 content element for team presentation, using theme tokens for light and dark mode.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: jobs
    type: Collection
    label: 'Job Openings'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Job Title'
        required: true
      -
        identifier: department
        type: Textarea
        rows: 1
        label: Department
      -
        identifier: location
        type: Textarea
        rows: 1
        label: Location
      -
        identifier: type
        type: Text
        label: Type
      -
        identifier: apply_link
        type: Link
        label: 'Apply Link'
