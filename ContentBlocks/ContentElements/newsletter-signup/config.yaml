name: desiderio/newsletter-signup
typeName: desiderio_newslettersignup
title: 'Newsletter Signup'
description: 'Newsletter Signup captures visitor intent with focused form or request messaging. Editors can manage headline and copy fields, repeatable entries and link and CTA controls.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: email_placeholder
    type: Text
    label: 'Email Placeholder'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: privacy_text
    type: Textarea
    label: 'Privacy Text'
    rows: 2
  -
    identifier: points
    type: Collection
    table: newsletter_signup_points
    label: 'Supporting Points'
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Point
