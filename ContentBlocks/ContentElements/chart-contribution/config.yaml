name: desiderio/chart-contribution
typeName: desiderio_chartcontribution
title: 'Contribution Chart'
description: 'Render a GitHub-style intensity grid of many time points with flanking headline stats and a call-to-action.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: metric_label
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.metric_label'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.metric_label.description'
  -
    identifier: unit
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.unit'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.unit.description'
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.badge_text'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.badge_text.description'
  -
    identifier: points
    type: Collection
    table: chart_contribution_points
    prefixField: true
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.points'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.points.description'
    minItems: 2
    fields:
      -
        identifier: point_label
        type: Text
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.point_label'
        description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.point_label.description'
        required: true
      -
        identifier: point_value
        type: Number
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.point_value'
        description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.point_value.description'
        required: true
  -
    identifier: left_stat_label
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.left_stat_label'
  -
    identifier: left_stat_value
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.left_stat_value'
  -
    identifier: left_stat_detail
    type: Textarea
    rows: 2
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.left_stat_detail'
  -
    identifier: right_stat_label
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.right_stat_label'
  -
    identifier: right_stat_value
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.right_stat_value'
  -
    identifier: right_stat_detail
    type: Textarea
    rows: 2
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-contribution/language/labels.xlf:field.right_stat_detail'
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
