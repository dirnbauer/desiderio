name: desiderio/product-specs
typeName: desiderio_productspecs
title: 'Product Specs Table'
description: 'Renders a two-column section with an accessible table of label-and-value specification rows beside an optional product image, introduced by eyebrow, heading and rich-text description. Use it for: technical data sheets, dimensions, weights, materials, system requirements - any key-value attribute list describing one product. Prefer ''Data Table'' for multi-column tabular data; ''Definition List'' for term-definition pairs outside a product context; ''Product Comparison Grid'' to contrast several products.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: specs
    type: Collection
    table: product_specs_specs
    prefixField: true
    label: Specifications
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'Spec Label'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'Spec Value'
        required: true
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:product_image'
    allowed: common-image-types
    maxitems: 1
