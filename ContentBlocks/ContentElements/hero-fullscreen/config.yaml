name: desiderio/hero-fullscreen
typeName: desiderio_herofullscreen
title: 'Fullscreen Hero'
description: 'Fullscreen Hero opens landing pages, campaigns, or product pages with a strong first message. Editors can manage headline and copy fields, media pickers, link and CTA controls and layout or variant options.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: background_image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:background_image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: overlay_opacity
    type: Select
    renderType: selectSingle
    label: 'Overlay Opacity'
    items:
      -
        label: 'Light (30%)'
        value: '0.3'
      -
        label: 'Medium (50%)'
        value: '0.5'
      -
        label: 'Heavy (70%)'
        value: '0.7'
    default: '0.5'
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
