<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-cta-inline" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="cta-inline">
    <d:layout.container>
        <div class="cta-inline__bar">
            <div class="cta-inline__text">
                <f:if condition="{data.header}"><h3 class="cta-inline__headline">{data -> f:render.text(field: 'header')}</h3></f:if>
                <f:if condition="{data.description_text}"><p class="cta-inline__description">{data -> f:render.text(field: 'description_text')}</p></f:if>
            </div>
            <f:if condition="{data.cta_text} && {data.cta_link.url}">
                <d:atom.button href="{data.cta_link.url}" target="{data.cta_link.target}">{data -> f:render.text(field: 'cta_text')}</d:atom.button>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
