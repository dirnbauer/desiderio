<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-progress-bar" href="{cb:assetPath()}/frontend.css"/>

<f:variable name="pct" value="{data.progress_value}"/>
<f:if condition="{pct} > 100"><f:variable name="pct" value="100"/></f:if>
<f:if condition="{pct} < 0"><f:variable name="pct" value="0"/></f:if>
<f:variable name="labelId" value="d-progress-label-{data.uid}"/>

<d:layout.section class="progress-bar progress-bar--{data.variant -> f:or(alternative: 'default')}">
    <d:layout.container size="md">
        <f:if condition="{data.header} && {data.variant} != 'labeled'">
            <d:atom.typography tag="h2" variant="h3" class="progress-bar__headline" id="{labelId}">{data -> f:render.text(field: 'header')}</d:atom.typography>
        </f:if>

        <div class="progress-bar__row">
            <f:if condition="{data.variant} == 'labeled'">
                <div class="progress-bar__meta">
                    <f:if condition="{data.header}">
                        <h2 class="progress-bar__label" id="{labelId}">{data -> f:render.text(field: 'header')}</h2>
                    </f:if>
                    <f:if condition="{data.show_percentage}">
                        <span class="progress-bar__value">{pct}<span aria-hidden="true">%</span></span>
                    </f:if>
                </div>
            </f:if>

            <div class="progress-bar__track progress-bar__track--{data.color -> f:or(alternative: 'primary')}"
                 role="progressbar"
                 aria-valuenow="{pct}"
                 aria-valuemin="0"
                 aria-valuemax="100"
                 aria-labelledby="{f:if(condition: data.header, then: labelId)}"
                 aria-valuetext="{pct}%">
                <f:variable name="fillClass" value="progress-bar__fill progress-bar__fill--{data.color -> f:or(alternative: 'primary')}{f:if(condition: '{data.variant} == {s:}striped{s:}', then: ' progress-bar__fill--striped')}"/>
                <div class="{fillClass}" style="inline-size: {pct}%"></div>
            </div>

            <f:if condition="{data.show_percentage} && {data.variant} != 'labeled'">
                <p class="progress-bar__caption"><span class="progress-bar__caption-value">{pct}<span aria-hidden="true">%</span></span></p>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
