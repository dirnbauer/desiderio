name: desiderio/feature-split
typeName: desiderio_featuresplit
title: 'Split Feature Section'
description: 'A two-column block with a copy side carrying a feature point list beside a single side image. Use it on product or solution pages to explain a topic in prose while bullet-style points and a visual reinforce it. Key fields are the headline, rich-text description, the side image, and repeatable feature points each with a required title and short description.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: image
    type: File
    label: 'Side Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: items
    type: Collection
    table: feature_split_items
    prefixField: true
    label: 'Feature Points'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
