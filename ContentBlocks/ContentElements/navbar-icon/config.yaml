name: desiderio/navbar-icon
typeName: desiderio_navbaricon
title: 'Icon Navigation Bar'
description: 'A header bar where each navigation link pairs a label with a small icon for faster visual scanning. Use it for app-style or product headers where icons help users recognize destinations at a glance. It provides a linkable brand, nav items each with a label, link, and a selectable icon, plus a call-to-action button text and link.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand'
    required: true
  -
    identifier: brand_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand_link'
  -
    identifier: nav_items
    type: Collection
    table: navbar_icon_nav_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:navigation_items'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
      -
        identifier: icon
        type: Select
        renderType: selectSingle
        label: 'Icon Name'
        description: 'Semantic icon key rendered through the active shadcn icon library.'
        itemsProcessors:
          10:
            class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
