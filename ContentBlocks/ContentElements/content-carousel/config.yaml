name: desiderio/content-carousel
typeName: desiderio_contentcarousel
title: 'Content Carousel'
description: 'Use when the content carousel should make a collection easy to scan.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'Carousel Style'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: Autoplay
        value: autoplay
      -
        label: Thumbnails
        value: thumbnails
      -
        label: Cards
        value: cards
    default: default
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: content_carousel_items
    prefixField: true
    label: Slides
    minItems: 2
    fields:
      -
        identifier: slide_image
        type: File
        label: 'Slide Image'
        allowed: common-image-types
        maxitems: 1
        required: true
      -
        identifier: slide_title
        type: Textarea
        rows: 1
        label: 'Slide Title'
      -
        identifier: slide_description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 3
        label: 'Slide Description'
      -
        identifier: slide_link
        type: Link
        label: 'Slide Link'
  -
    identifier: autoplay_interval
    type: Number
    label: 'Autoplay Interval (ms)'
    description: 'Time between slides in milliseconds'
    default: 5000
    displayCond: 'FIELD:variant:=:autoplay'
  -
    identifier: show_navigation
    type: Checkbox
    label: 'Show Navigation Arrows'
    default: 1
  -
    identifier: show_pagination
    type: Checkbox
    label: 'Show Pagination Dots'
    default: 1
