<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:s2f="http://typo3.org/ns/Webconsulting/Shadcn2fluidTemplates/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<footer class="desiderio-footer">
    <s2f:layout.container>
        <div class="desiderio-footer__inner">
            <div class="desiderio-footer__brand">
                <p class="desiderio-footer__title">{breadcrumb.0.title}</p>
                <s2f:atom.typography tag="p" variant="muted">
                    Built with shadcn2fluid components for TYPO3 14.
                </s2f:atom.typography>
            </div>

            <div class="desiderio-footer__copy">
                <s2f:atom.typography tag="p" variant="small">
                    Inspired by Camino. Thank you to the TYPO3 Core Team.
                </s2f:atom.typography>
            </div>
        </div>
    </s2f:layout.container>
</footer>

</html>
