<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-chart-area" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="chart-area-section">
    <d:layout.container>
        <div class="chart-area chart-area--{data.color_variant -> f:or(alternative: 'primary')}"
             data-chart-data="{data.chart_data -> f:format.htmlspecialchars()}"
             data-fill-opacity="{data.fill_opacity -> f:or(alternative: 'medium')}"
             data-chart-id="chart-area-{data.uid}">
            <div class="chart-area__card">
                <f:if condition="{data.header} || {data.description}">
                    <div class="chart-area__header">
                        <f:if condition="{data.header}">
                            <h3 class="chart-area__title">{data -> f:render.text(field: 'header')}</h3>
                        </f:if>
                        <f:if condition="{data.description}">
                            <p class="chart-area__description">{data -> f:render.text(field: 'description')}</p>
                        </f:if>
                    </div>
                </f:if>
                <div class="chart-area__content">
                    <svg class="chart-area__canvas" id="chart-area-{data.uid}"></svg>
                </div>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
