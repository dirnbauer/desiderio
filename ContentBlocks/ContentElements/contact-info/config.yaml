name: desiderio/contact-info
typeName: desiderio_contactinfo
title: 'Contact Info'
description: 'Renders a heading and subheadline above a grid of cards, each contact item showing an icon, a label heading and a value that becomes a link when one is set (tel, mailto, map). Use it for: quick-reference contact facts extracted from a document — address, phone, email, fax, support hotline. Prefer ''Contact Form Block'' when the section also needs a message form; ''Office Locations'' for several sites; ''Office Hours'' for opening times.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: contact_info_items
    prefixField: true
    label: 'Contact Items'
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
      -
        identifier: icon
        type: Select
        renderType: selectSingle
        label: 'Icon Name'
        description: 'Semantic icon key rendered through the active shadcn icon library.'
        itemsProcessors:
          10:
            class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
