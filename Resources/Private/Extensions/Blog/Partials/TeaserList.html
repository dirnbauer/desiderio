<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="posts" type="iterable" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>
<f:argument name="type" type="string" optional="true"/>

<f:if condition="{posts}">
    <ul role="list" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3" data-blog-teaserlist="{type -> f:or(alternative: 'default')}" data-blog-postcount="{posts -> f:count()}">
        <f:for each="{posts}" iteration="iterator" as="post">
            <blogvh:cache post="{post}" />
            <li class="min-w-0">
                <f:render partial="Teaser/Post" arguments="{post: post, settings: settings, iterator: iterator}" />
            </li>
        </f:for>
    </ul>
</f:if>

</html>
