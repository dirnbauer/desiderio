<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:comment>
    The stage hero carries the visual headline (an h2 like every other content
    element). The single page-level h1 with the page title comes from the
    Pages/PageTitle partial: enable tx_desiderio_h1_sronly on the home page so
    it renders screen-reader-only and does not duplicate the hero heading.
</f:comment>

<f:section name="Stage">
    <f:render partial="Pages/PageTitle" arguments="{_all}"/>
    <!--TYPO3SEARCH_begin-->
    <f:if condition="{content.stage}">
        <f:render.contentArea contentArea="{content.stage}"/>
    </f:if>
    <!--TYPO3SEARCH_end-->
</f:section>

</html>
