name: desiderio/feature-minimal
typeName: desiderio_featureminimal
title: 'Minimal Feature Section'
description: 'Renders a heading and optional subheadline above a plain text list of features, each with a title and one-line description — no icons, images, or cards, just typography and whitespace. Use it for: short benefit or capability lists that come without icons or imagery, quiet spec summaries, principles or values stated as brief text pairs. Prefer ''Feature Overview Grid'' or ''Icon Feature Grid'' when items carry icons; use ''Feature Checklist'' for included-items check lists.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_minimal_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:short_description'
