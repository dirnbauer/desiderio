name: desiderio/content-sidebar
typeName: desiderio_contentsidebar
title: 'Content Sidebar'
description: 'A shadcn/ui styled TYPO3 content element for content presentation, using theme tokens for light and dark mode.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'Main Content'
    enableRichtext: true
    rows: 8
  -
    identifier: sidebar_content
    type: Textarea
    label: 'Sidebar Content'
    enableRichtext: true
    rows: 6
  -
    identifier: sidebar_position
    type: Select
    renderType: selectSingle
    label: 'Sidebar Position'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.right'
        value: right
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
    default: right
