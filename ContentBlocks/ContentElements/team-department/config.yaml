name: desiderio/team-department
typeName: desiderio_teamdepartment
title: 'Department Team Section'
description: 'Department Team Section introduces people, roles, culture, or hiring context with clear editorial structure. Editors can manage headline and copy fields and repeatable entries.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: department_items
    type: Collection
    table: team_department_departments
    label: Departments
    labelField: name
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Department Name'
        required: true
      -
        identifier: members
        type: Collection
        table: team_department_members
        label: Members
        labelField: name
        minItems: 1
        maxItems: 12
        fields:
          -
            identifier: name
            type: Textarea
            rows: 1
            label: 'Member Name'
            required: true
          -
            identifier: role
            type: Textarea
            rows: 1
            label: Role
