<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-privacy-notice" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="privacy-notice-section">
    <d:layout.container>
        <section class="privacy-notice" aria-labelledby="privacy-notice-{data.uid}-title">
            <f:if condition="{data.header}">
                <h2 class="privacy-notice__title" id="privacy-notice-{data.uid}-title">{data -> f:render.text(field: 'header')}</h2>
            </f:if>
            <f:if condition="{data.last_updated}">
                <p class="privacy-notice__updated"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:terms_summary.last_updated" default="Last updated"/>: <time>{data -> f:render.text(field: 'last_updated')}</time></p>
            </f:if>
            <f:if condition="{data.intro}">
                <p class="privacy-notice__intro">{data -> f:render.text(field: 'intro')}</p>
            </f:if>
            <f:if condition="{data.sections}">
                <div class="privacy-notice__sections">
                    <f:for each="{data.sections}" as="section">
                        <details class="privacy-notice__section">
                            <summary class="privacy-notice__section-title">
                                <span>{section -> f:render.text(field: 'title')}</span>
                                <svg class="privacy-notice__icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="m6 9 6 6 6-6"/></svg>
                            </summary>
                            <div class="privacy-notice__section-content">
                                {section -> f:render.text(field: 'content')}
                            </div>
                        </details>
                    </f:for>
                </div>
            </f:if>
        </section>
    </d:layout.container>
</d:layout.section>

</html>
