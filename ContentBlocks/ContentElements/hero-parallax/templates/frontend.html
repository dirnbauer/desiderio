<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="d-hero-parallax" href="{cb:assetPath()}/frontend.css"/>
<d:layout.section spacing="none" class="hero-parallax">
    <f:if condition="{data.background_image}">
        <div class="hero-parallax__bg-wrap" aria-hidden="true">
            <f:for each="{data.background_image}" as="image">
                <f:image image="{image}" class="hero-parallax__bg" alt="" loading="eager" fetchpriority="high"/>
            </f:for>
        </div>
    </f:if>
    <div class="hero-parallax__overlay" aria-hidden="true"></div>
    <d:layout.container>
        <div class="hero-parallax__content" data-astro-reveal="fade">
            <f:if condition="{data.badge_text}"><d:atom.badge variant="secondary">{data -> f:render.text(field: 'badge_text')}</d:atom.badge></f:if>
            <f:if condition="{data.header}">
                <d:atom.typography tag="h1" variant="h1" class="hero-parallax__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
            </f:if>
            <f:if condition="{data.subheadline}"><p class="hero-parallax__subheadline">{data -> f:render.text(field: 'subheadline')}</p></f:if>
            <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                <div class="hero-parallax__actions">
                    <d:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</d:atom.button>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
