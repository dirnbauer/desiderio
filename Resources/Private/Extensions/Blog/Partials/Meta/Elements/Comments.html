<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:variable name="name" value="comments" />
<f:variable name="text"><f:translate extensionName="Blog" key="meta.comments.comments" /></f:variable>

<f:if condition="{settings.comments.active} && {post.commentsActive}">
    <f:variable name="commentCount" value="{post.activeComments -> f:count()}" />
    <f:if condition="{settings.comments.disqus.enable} != 1">
        <f:if condition="{commentCount} == 0">
            <f:variable name="text"><f:translate extensionName="Blog" key="meta.comments.has_comments" arguments="{0: commentCount}" /></f:variable>
        </f:if>
        <f:if condition="{commentCount} == 1">
            <f:variable name="text"><f:translate extensionName="Blog" key="meta.comments.has_comment" arguments="{0: commentCount}" /></f:variable>
        </f:if>
        <f:if condition="{commentCount} >= 1">
            <f:variable name="text"><f:translate extensionName="Blog" key="meta.comments.has_comments" arguments="{0: commentCount}" /></f:variable>
        </f:if>
    </f:if>
    <f:render partial="Meta/Rendering/Item" arguments="{name: name}" contentAs="content">
        <meta itemprop="commentCount" content="{commentCount}"/>
        <blogvh:link.post post="{post}" section="comments" class="inline-flex min-h-6 items-center gap-1 rounded-sm text-foreground !no-underline outline-none transition-colors hover:text-primary focus-visible:ring-3 focus-visible:ring-ring/40">
            <span aria-hidden="true"><d:atom.icon name="message-circle" size="xs"/></span>
            <span>{text}</span>
        </blogvh:link.post>
    </f:render>
</f:if>

</html>
