<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-stats-bar" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="stats-bar">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="stats-bar__intro">
                <f:if condition="{data.eyebrow}">
                    <p class="stats-bar__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h2" class="stats-bar__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <d:atom.typography variant="muted" class="stats-bar__description">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
                </f:if>
            </header>
        </f:if>

        <dl class="stats-bar__items">
            <f:for each="{data.items}" as="item">
                <div class="stats-bar__item" data-astro-reveal="slide-up">
                    <div class="stats-bar__meta">
                        <dt class="stats-bar__label">{item -> f:render.text(field: 'label')}</dt>
                        <dd class="stats-bar__value">{item -> f:render.text(field: 'value')}</dd>
                    </div>
                    <div
                        class="stats-bar__track"
                        role="progressbar"
                        aria-valuenow="{item.percentage}"
                        aria-valuemin="0"
                        aria-valuemax="100"
                        aria-label="{item.label}"
                    >
                        <div class="stats-bar__fill" style="width: {item.percentage}%"></div>
                    </div>
                </div>
            </f:for>
        </dl>
    </d:layout.container>
</d:layout.section>
</html>
