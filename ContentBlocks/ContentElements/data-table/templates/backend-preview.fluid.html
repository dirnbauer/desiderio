<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Preview"/>

<f:section name="Header">
    <f:if condition="{data.header}">
        <f:then><cb:link.editRecord uid="{data.uid}" table="{data.mainType}">{data.header}</cb:link.editRecord></f:then>
        <f:else><cb:link.editRecord uid="{data.uid}" table="{data.mainType}">Data Table</cb:link.editRecord></f:else>
    </f:if>
</f:section>

<f:section name="Content">
    <f:asset.css identifier="desiderio-content-preview" href="EXT:desiderio/Resources/Public/Css/content-preview.css" />
    <div class="d-ce-preview" data-slot="card">
        <div class="d-ce-preview__meta">
            <span class="d-ce-preview__type" data-slot="badge">Data Table</span>
            <f:if condition="{settings._content_block_name}"><span class="d-ce-preview__ctype">{settings._content_block_name}</span></f:if>
        </div>
        <f:if condition="{data.header}">
            <h3 class="d-ce-preview__title">{data.header}</h3>
        </f:if>
        <f:if condition="{data.variant}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Variant</span>
                <span class="d-ce-preview__value">{data.variant}</span>
            </div>
        </f:if>
        <f:if condition="{data.caption_text}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Caption Text</span>
                <span class="d-ce-preview__value">{data.caption_text}</span>
            </div>
        </f:if>
        <f:if condition="{data.column_definitions}">
            <div class="d-ce-preview__collection">
                <span class="d-ce-preview__label">Column Definitions</span>
                <ul class="d-ce-preview__list">
                    <f:for each="{data.column_definitions}" as="item">
                        <li>
                            <f:if condition="{item.column_label}"><span>{item.column_label}</span></f:if>
                            <f:if condition="{item.column_key}"><span>{item.column_key}</span></f:if>
                            <f:if condition="{item.column_align}"><span>{item.column_align}</span></f:if>
                        </li>
                    </f:for>
                </ul>
            </div>
        </f:if>
        <f:if condition="{data.rows}">
            <div class="d-ce-preview__collection">
                <span class="d-ce-preview__label">Rows</span>
                <ul class="d-ce-preview__list">
                    <f:for each="{data.rows}" as="item">
                        <li>
                            <f:if condition="{item.row_data}"><span>{item.row_data}</span></f:if>
                        </li>
                    </f:for>
                </ul>
            </div>
        </f:if>
    </div>
</f:section>

</html>
