<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers" data-namespace-typo3-fluid="true">
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<fieldset data-slot="form-item" class="powermail_fieldwrap_{field.marker} {field.css} space-y-2">
    <f:if condition="{field.css} != 'nolabel'">
        <legend class="sr-only">
            <vh:string.escapeLabels>{field.title}</vh:string.escapeLabels>
        </legend>
    </f:if>
    <div class="grid gap-2">
        <f:for each="{field.modifiedSettings}" as="setting" iteration="index">
            <div>
                <label for="powermail_field_{field.marker}_{index.cycle}" class="group/checkbox flex cursor-pointer items-start gap-3 rounded-md border border-input bg-background p-3 text-sm text-foreground shadow-xs transition-colors hover:bg-muted/50 dark:bg-input/30 {vh:validation.errorClass(field: field, class: 'border-destructive bg-destructive/5')}">
                    <span data-slot="checkbox" class="relative mt-0.5 inline-flex size-4 shrink-0 items-center justify-center">
                        <f:form.checkbox
                            property="{field.marker}"
                            multiple="true"
                            value="{setting.value}"
                            checked="{vh:misc.prefillMultiField(field: field, mail: mail, cycle: index.cycle)}"
                            id="powermail_field_{field.marker}_{index.cycle}"
                            additionalAttributes="{vh:validation.validationDataAttribute(field: field, iteration: index)}"
                            class="peer size-4! min-h-4! shrink-0 appearance-none rounded-sm! border border-input bg-background shadow-xs transition-[color,box-shadow] outline-none checked:border-primary checked:bg-primary focus-visible:border-ring focus-visible:ring-[3px] focus-visible:ring-ring/50 disabled:cursor-not-allowed disabled:opacity-50 aria-invalid:border-destructive aria-invalid:ring-destructive/20 dark:bg-input/30 dark:aria-invalid:border-destructive/50 dark:aria-invalid:ring-destructive/40" />
                        <svg class="pointer-events-none absolute left-1/2 top-1/2 size-3 -translate-x-1/2 -translate-y-1/2 text-primary-foreground opacity-0 transition-opacity peer-checked:opacity-100" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M20 6 9 17l-5-5" />
                        </svg>
                    </span>
                    <span data-slot="label" class="min-w-0 text-sm leading-5 text-foreground">
                        <vh:string.escapeLabels>{setting.label}</vh:string.escapeLabels>
                        <f:if condition="{field.mandatory}">
                            <span class="ms-1 text-destructive" aria-hidden="true">*</span>
                        </f:if>
                    </span>
                </label>
            </div>
        </f:for>
    </div>
    <f:if condition="{settings.validation.client}">
        <div class="powermail_field_error_container_{field.marker} text-xs text-destructive"></div>
    </f:if>
</fieldset>
</html>
