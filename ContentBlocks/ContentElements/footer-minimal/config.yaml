name: desiderio/footer-minimal
typeName: desiderio_footerminimal
title: 'Minimal Footer'
description: 'Renders a single-row footer with a required copyright line and an optional inline list of links — nothing else. Use it for: documents whose closing matter is just a copyright notice plus a few legal or utility links such as privacy, terms, or imprint. Prefer ''Legal Links Row'' for a standalone legal navigation strip; choose ''Brand Footer'' when a logo or tagline must appear.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
    required: true
  -
    identifier: link_items
    type: Collection
    table: footer_minimal_link_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:links'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
