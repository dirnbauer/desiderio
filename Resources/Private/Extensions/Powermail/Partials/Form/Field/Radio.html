<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers" data-namespace-typo3-fluid="true">
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<fieldset data-slot="field-set" class="powermail_fieldwrap_{field.marker} {field.css} {f:render(partial: 'Form/ShadcnClass', arguments: {slot: 'fieldSet'}) -> f:format.trim()}">
    <f:if condition="{field.css} != 'nolabel'">
        <legend class="sr-only">
            <vh:string.escapeLabels>{field.title}</vh:string.escapeLabels>
        </legend>
    </f:if>
    <div data-slot="radio-group" class="grid gap-3 sm:grid-cols-2">
        <f:for each="{field.modifiedSettings}" as="setting" iteration="index">
            <div>
                <label for="powermail_field_{field.marker}_{index.cycle}" class="{f:render(partial: 'Form/ShadcnClass', arguments: {slot: 'optionLabel'}) -> f:format.trim()} {vh:validation.errorClass(field: field, class: 'text-destructive')}">
                    <span data-slot="radio-group-item" class="relative inline-flex size-4 shrink-0 items-center justify-center">
                        <f:form.radio
                            property="{field.marker}"
                            value="{setting.value}"
                            checked="{vh:misc.prefillMultiField(field: field, mail: mail, cycle: index.cycle)}"
                            id="powermail_field_{field.marker}_{index.cycle}"
                            additionalAttributes="{vh:validation.validationDataAttribute(field: field, iteration: index)}"
                            class="{f:render(partial: 'Form/ShadcnClass', arguments: {slot: 'radioInput'}) -> f:format.trim()}" />
                        <span class="{f:render(partial: 'Form/ShadcnClass', arguments: {slot: 'radioDot'}) -> f:format.trim()}"></span>
                    </span>
                    <span data-slot="label" class="{f:render(partial: 'Form/ShadcnClass', arguments: {slot: 'optionText'}) -> f:format.trim()}">
                        <vh:string.escapeLabels>{setting.label}</vh:string.escapeLabels>
                        <f:if condition="{field.mandatory}">
                            <span class="ms-1 text-destructive" aria-hidden="true">*</span>
                        </f:if>
                    </span>
                </label>
            </div>
        </f:for>
    </div>
    <f:if condition="{settings.validation.client}">
        <div class="powermail_field_error_container_{field.marker} text-xs text-destructive"></div>
    </f:if>
</fieldset>
</html>
