name: desiderio/feature-bento
typeName: desiderio_featurebento
title: 'Bento Feature Grid'
description: 'A bento-box grid of feature cards in mixed sizes (small, wide, tall), each with title, rich-text description, and optional background image, under a section heading and subheadline. Use it for: feature sets with uneven importance, visual highlight collages, modern landing-page capability sections with at least three items. Prefer ''3-Column Feature Grid'' for uniform weight; use ''Feature Cards Grid'' for a calm, balanced layout.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_bento_items
    prefixField: true
    label: 'Bento Items'
    minItems: 3
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: size
        type: Select
        renderType: selectSingle
        label: 'Card Size'
        items:
          -
            label: 'Small (1x1)'
            value: small
          -
            label: 'Wide (2x1)'
            value: wide
          -
            label: 'Tall (1x2)'
            value: tall
        default: small
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:background_image'
        allowed: common-image-types
        maxitems: 1
