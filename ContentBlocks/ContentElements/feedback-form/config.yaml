name: desiderio/feedback-form
typeName: desiderio_feedbackform
title: 'Feedback Form'
description: 'A card-wrapped feedback form rendered through the TYPO3 Form Framework, introduced by a headline and rich-text description. Use it to collect visitor opinions, ratings, or quick survey responses on a contact or product page. Key fields are the headline and rich-text description; the form action, submit-button text, and rating toggle are legacy editor fields kept for migrated records while the Form Framework now owns rendering.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: submit_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:submit_text'
    default: 'Send feedback'
  -
    identifier: show_rating
    type: Checkbox
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:show_rating'
    default: 1
