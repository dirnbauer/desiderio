<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-case-study-grid" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="case-study-grid">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="case-study-grid__intro">
                <f:if condition="{data.eyebrow}">
                    <p class="case-study-grid__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="case-study-grid__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <div class="case-study-grid__items case-study-grid__items--cols-{data.columns -> f:or(alternative: '3')}">
            <f:for each="{data.cases}" as="item">
                <article class="case-study-grid__card">
                    <f:if condition="{item.image}">
                        <div class="case-study-grid__media">
                            <f:for each="{item.image}" as="fileReference">
                                <f:image image="{fileReference}" maxWidth="480" alt="{f:if(condition: fileReference.alternative, then: fileReference.alternative, else: '{item.client_name} case study')}" class="case-study-grid__image" loading="lazy" decoding="async"/>
                            </f:for>
                        </div>
                    </f:if>
                    <div class="case-study-grid__body">
                        <h3 class="case-study-grid__client">{item -> f:render.text(field: 'client_name')}</h3>
                        <f:if condition="{item.summary}">
                            <div class="case-study-grid__summary d-richtext">{item -> f:render.text(field: 'summary')}</div>
                        </f:if>
                        <f:if condition="{item.result}">
                            <p class="case-study-grid__result">{item -> f:render.text(field: 'result')}</p>
                        </f:if>
                        <f:if condition="{item.link.url}">
                            <d:atom.link href="{item.link.url}" target="{item.link.target}" variant="muted" class="case-study-grid__link">
                                <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:read_case_study" default="Read case study"/><span class="sr-only"> {item -> f:render.text(field: 'client_name')}</span><span aria-hidden="true"> &rarr;</span>
                            </d:atom.link>
                        </f:if>
                    </div>
                </article>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
