name: desiderio/video-embed
typeName: desiderio_videoembed
title: 'Video Embed'
description: 'Renders a responsive video figure with optional heading and caption, embedding a YouTube or Vimeo iframe or playing an uploaded video file natively, with selectable 16:9, 4:3, or 1:1 aspect ratio. Use it for: standalone product demos, explainer and tutorial videos, recorded talks or webinars, image films a document references. Prefer ''Video Feature Section'' when marketing copy surrounds the video, ''Video Hero'' at the page top, and ''Video Testimonial'' for filmed customer quotes.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: video_url
    type: Text
    label: 'Video Embed URL'
    description: 'YouTube or Vimeo embed URL'
  -
    identifier: video_file
    type: File
    label: 'Video File'
    allowed: common-media-types
    maxitems: 1
  -
    identifier: caption
    type: Textarea
    rows: 1
    label: Caption
  -
    identifier: aspect_ratio
    type: Select
    renderType: selectSingle
    label: 'Aspect Ratio'
    items:
      -
        label: '16:9'
        value: 16-9
      -
        label: '4:3'
        value: 4-3
      -
        label: '1:1'
        value: 1-1
    default: 16-9
