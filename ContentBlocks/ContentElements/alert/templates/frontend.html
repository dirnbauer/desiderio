<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-alert" href="{cb:assetPath()}/frontend.css"/>

<f:variable name="alertRole" value="{f:if(condition: '{data.variant} == \'destructive\'', then: 'alert', else: 'note')}"/>

<f:variable name="alertInner">
    <f:if condition="{data.icon}">
        <span class="alert__icon" aria-hidden="true">
            <d:atom.icon name="{data.icon}" size="lg"/>
        </span>
    </f:if>
    <div class="alert__content">
        <f:if condition="{data.header}">
            <h2 class="alert__title">{data -> f:render.text(field: 'header')}</h2>
        </f:if>
        <div class="alert__description">
            {data -> f:render.text(field: 'description')}
        </div>
    </div>
    <f:if condition="{data.show_close_button}">
        <button type="button" class="alert__close" data-d-dismiss aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:aria.dismiss', default: 'Dismiss this notice')}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
    </f:if>
</f:variable>

<d:layout.section class="alert-section">
    <d:layout.container size="lg">
        <f:if condition="{data.show_close_button}">
            <f:then>
                <div class="alert alert--{data.variant -> f:or(alternative: 'default')}" role="{alertRole}" data-d-dismissible>
                    {alertInner -> f:format.raw()}
                </div>
            </f:then>
            <f:else>
                <div class="alert alert--{data.variant -> f:or(alternative: 'default')}" role="{alertRole}">
                    {alertInner -> f:format.raw()}
                </div>
            </f:else>
        </f:if>
    </d:layout.container>
</d:layout.section>

</html>
