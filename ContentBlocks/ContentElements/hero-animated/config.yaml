name: desiderio/hero-animated
typeName: desiderio_heroanimated
title: 'Animated Hero'
description: 'A full-width page opener whose headline animates into view, backed by a subheadline and up to two call-to-action buttons. Place it at the very top of a landing or campaign page to set the mood with motion. Drives an eyebrow badge, headline, subheadline, a choice of animation style (fade-up, fade-in or slide-in) and primary plus secondary button labels with links.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
  -
    identifier: animation
    type: Select
    renderType: selectSingle
    label: Animation
    items:
      -
        label: 'Fade Up'
        value: fade-up
      -
        label: 'Fade In'
        value: fade-in
      -
        label: 'Slide In'
        value: slide-in
    default: fade-up
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
