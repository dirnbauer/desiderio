<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-feature-carousel" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="feature-carousel">
    <d:layout.container>
        <div class="feature-carousel__viewport" role="region" aria-label="{data.header -> f:or(alternative: 'Feature highlights')}">
            <f:if condition="{data.header}">
                <header class="feature-carousel__intro">
                    <d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography>
                    <f:if condition="{data.subheadline}"><d:atom.typography variant="lead" class="feature-carousel__subheadline">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
                </header>
            </f:if>

            <ul class="feature-carousel__track" tabindex="0" role="group" aria-label="Feature slides, scrollable">
                <f:for each="{data.items}" as="item">
                    <li class="feature-carousel__cell">
                        <d:molecule.card class="feature-carousel__slide">
                            <f:if condition="{item.icon}">
                                <span class="feature-carousel__icon" aria-hidden="true"><d:atom.icon name="{item.icon}" size="lg"/></span>
                            </f:if>
                            <d:atom.typography tag="h3" variant="large" class="feature-carousel__title">
                                <f:if condition="{item.link.url}">
                                    <f:then><f:link.typolink parameter="{item.link}">{item -> f:render.text(field: 'title')}</f:link.typolink></f:then>
                                    <f:else>{item -> f:render.text(field: 'title')}</f:else>
                                </f:if>
                            </d:atom.typography>
                            <f:if condition="{item.description}">
                                <p class="feature-carousel__description">{item -> f:render.text(field: 'description')}</p>
                            </f:if>
                        </d:molecule.card>
                    </li>
                </f:for>
            </ul>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
