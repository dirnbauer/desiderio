<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:di="http://typo3.org/ns/Webconsulting/Desiderio/ViewHelpers"
    xmlns:friendlycaptcha="http://typo3.org/ns/StudioMitte/FriendlyCaptcha/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<f:variable name="captchaConfiguration" value="{friendlycaptcha:configuration()}" />
<f:variable name="friendlyCaptchaTestMode" value="{di:friendlyCaptchaTestModeEnabled()}" />
<f:variable name="fieldErrorClass"><d:atom.controlClass slot="fieldError" /></f:variable>

<f:if condition="{friendlyCaptchaTestMode}">
    <f:then>
        <d:molecule.field class="powermail_fieldwrap_{field.marker} {field.css}">
            <f:render partial="Form/FieldLabel" arguments="{field: field}" />
            <f:form.hidden property="{field.marker}" value="1" id="powermail_field_{field.marker}" respectSubmittedDataValue="false" />
            <div class="frc-captcha frc-captcha--placeholder flex w-fit max-w-full flex-wrap items-center gap-x-3 gap-y-1 rounded-md border border-input bg-muted px-3 py-2">
                <button type="button" disabled class="inline-flex shrink-0 items-center gap-2 whitespace-nowrap rounded-md border border-input bg-background px-3 py-1.5 text-sm font-medium text-foreground shadow-xs">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 text-primary" aria-hidden="true" focusable="false">
                        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1 1 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
                        <path d="m9 12 2 2 4-4"/>
                    </svg>
                    <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:captcha.placeholder.button" />
                </button>
                <span class="min-w-0 text-xs leading-snug text-muted-foreground">
                    <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:captcha.placeholder.note" />
                </span>
            </div>
        </d:molecule.field>
    </f:then>
    <f:else>
        <d:molecule.field class="powermail_fieldwrap_{field.marker} {field.css}">
            <f:render partial="Form/FieldLabel" arguments="{field: field}" />
            <f:form.hidden property="{field.marker}" value="1" id="powermail_field_{field.marker}" respectSubmittedDataValue="false" />
            <f:if condition="{captchaConfiguration.enabled}">
                <f:then>
                    <f:asset.script defer="1" async="1" identifier="friendlycaptcha" src="{captchaConfiguration.jsPath}" useNonce="true" />
                    <div class="frc-captcha" data-sitekey="{captchaConfiguration.siteKey}" {f:if(condition: '{captchaConfiguration.useEuPuzzleEndpoint}', then: 'data-api-endpoint="eu"')}></div>
                </f:then>
                <f:else>
                    <p class="{fieldErrorClass -> f:format.trim()}">
                        <f:translate key="LLL:EXT:friendlycaptcha_official/Resources/Private/Language/locallang.xlf:configuration_missing" />
                    </p>
                </f:else>
            </f:if>
        </d:molecule.field>
    </f:else>
</f:if>
</html>
