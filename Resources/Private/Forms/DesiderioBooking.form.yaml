identifier: desiderio-booking
label: 'Desiderio booking'
type: Form
renderingOptions:
  translation:
    translationFiles:
      20: 'EXT:desiderio/Resources/Private/Language/forms.xlf'
  submitButtonLabel: 'Book appointment'
finishers:
  -
    identifier: EmailToReceiver
    options:
      subject: 'Booking request: {preferredDate}'
      recipients:
        hello@example.com: 'Website team'
      senderAddress: no-reply@example.com
      senderName: 'Website forms'
      replyToRecipients:
        '{email}': '{name}'
      addHtmlPart: true
      attachUploads: false
      title: 'Booking request'
  -
    identifier: Confirmation
    options:
      message: 'Thank you. Your booking request has been sent.'
renderables:
  -
    identifier: page-1
    label: ''
    type: Page
    renderables:
      -
        identifier: name
        label: 'Name'
        type: Text
        properties:
          fluidAdditionalAttributes:
            autocomplete: name
            required: required
        validators:
          - identifier: NotEmpty
      -
        identifier: email
        label: 'Email'
        type: Email
        properties:
          fluidAdditionalAttributes:
            autocomplete: email
            required: required
        validators:
          - identifier: NotEmpty
          - identifier: EmailAddress
      -
        identifier: phone
        label: 'Phone'
        type: Telephone
        properties:
          fluidAdditionalAttributes:
            autocomplete: tel
      -
        identifier: preferredDate
        label: 'Preferred date'
        type: Date
      -
        identifier: message
        label: 'Message'
        type: Textarea
        properties:
          fluidAdditionalAttributes:
            rows: 3
