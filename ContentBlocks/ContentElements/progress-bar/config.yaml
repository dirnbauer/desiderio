name: desiderio/progress-bar
typeName: desiderio_progressbar
title: 'Progress Bar'
description: 'Renders one horizontal progress bar filled to a numeric value from 0 to 100, with default, labeled and striped styles, an optional percentage readout, and primary, success, warning or destructive colors, exposed through a progressbar ARIA role. Use it for: a single percentage or goal metric - fundraising targets, project completion, capacity used, satisfaction scores. Prefer ''Bar Stats Progress'' for several labeled bars; ''Counter Stats'' for plain animated numbers.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'Progress Style'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: Labeled
        value: labeled
      -
        label: Striped
        value: striped
    default: default
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: progress_value
    type: Number
    label: 'Progress Value (0-100)'
    required: true
  -
    identifier: show_percentage
    type: Checkbox
    label: 'Show Percentage'
    default: 1
  -
    identifier: color
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:color_field'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
      -
        label: Success
        value: success
      -
        label: Warning
        value: warning
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.destructive'
        value: destructive
    default: primary
