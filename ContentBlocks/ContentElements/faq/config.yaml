name: desiderio/faq
typeName: desiderio_faq
title: 'FAQ Accordion'
description: 'An accordion of expandable question–answer pairs built on native details/summary, with heading, subheadline, and FAQPage schema.org markup for rich search results. Use it for: FAQ sections, question–answer pairs, objection-handling copy, support and help passages, ''common questions'' lists in any source document. Prefer ''Accordion'' for non-question collapsible content, ''Pricing FAQ Accordion'' on pricing pages, and ''Definition List'' for glossary terms.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: faq_items
    prefixField: true
    label: Questions
    minItems: 1
    fields:
      -
        identifier: question
        type: Textarea
        rows: 1
        label: Question
        required: true
      -
        identifier: answer
        type: Textarea
        label: Answer
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
        required: true
