name: desiderio/navbar-minimal
typeName: desiderio_navbarminimal
title: 'Minimal Navigation Bar'
description: 'Minimal Navigation Bar helps visitors find their way through links, menus, anchors, or search entry points. Editors can manage headline and copy fields and link and CTA controls.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand'
    required: true
  -
    identifier: brand_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand_link'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
