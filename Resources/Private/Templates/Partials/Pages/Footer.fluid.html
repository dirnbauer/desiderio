<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:variable name="siteTitle" value="{site.configuration.websiteTitle ?: site.identifier}"/>
<f:variable name="siteTitle" value="{siteTitle ?: breadcrumb.0.title}"/>
<f:variable name="brandWordmark" value="{site.configuration.settings.desiderio.brand.wordmark ?: siteTitle}"/>
<f:variable name="brandTagline" value="{site.configuration.settings.desiderio.brand.tagline}"/>
<f:variable name="footerAttribution" value="" />
<f:if condition="{brandTagline}">
    <f:variable name="footerAttribution" value="{brandTagline -> f:format.trim(characters: '.') -> f:format.case(mode: 'lower')}" />
</f:if>

<footer class="desiderio-footer">
    <d:layout.container>
        <div class="desiderio-footer__inner">
            <div class="desiderio-footer__brand">
                <f:link.typolink parameter="{breadcrumb.0.link}" class="desiderio-footer__wordmark desiderio-footer__title">
                    {brandWordmark}
                </f:link.typolink>
            </div>

            <div class="desiderio-footer__meta">
                <p class="desiderio-footer__copyright">
                    <f:if condition="{site.configuration.settings.desiderio.footer.copyrightText}">
                        <f:then>{site.configuration.settings.desiderio.footer.copyrightText}</f:then>
                        <f:else>
                            © <f:format.date date="now" format="Y" /> {brandWordmark}<f:if condition="{footerAttribution}"> ({footerAttribution})</f:if>
                        </f:else>
                    </f:if>
                </p>
            </div>

            <nav class="desiderio-footer__legal" aria-label="{f:translate(extensionName: 'desiderio', key: 'a11y.nav.legal', default: 'Legal navigation')}">
                <ul class="desiderio-footer__legal-list" role="list">
                    <f:if condition="{legalMenu}">
                        <f:then>
                            <f:for each="{legalMenu}" as="item">
                                <li>
                                    <f:link.typolink parameter="{item.link}" class="desiderio-footer__legal-link">
                                        {item.title}
                                    </f:link.typolink>
                                </li>
                            </f:for>
                        </f:then>
                        <f:else>
                            <li>
                                <a class="desiderio-footer__legal-link" href="{breadcrumb.0.link}imprint">
                                    <f:translate extensionName="desiderio" key="footer.legal.imprint">Imprint</f:translate>
                                </a>
                            </li>
                            <li>
                                <a class="desiderio-footer__legal-link" href="{breadcrumb.0.link}privacy">
                                    <f:translate extensionName="desiderio" key="footer.legal.privacy">Privacy</f:translate>
                                </a>
                            </li>
                            <li>
                                <a class="desiderio-footer__legal-link" href="{breadcrumb.0.link}accessibility">
                                    <f:translate extensionName="desiderio" key="footer.legal.accessibility">Accessibility</f:translate>
                                </a>
                            </li>
                        </f:else>
                    </f:if>
                </ul>
            </nav>
        </div>
    </d:layout.container>
</footer>

</html>
