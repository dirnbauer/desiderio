name: desiderio/breadcrumb
typeName: desiderio_breadcrumb
title: 'Breadcrumb Trail'
description: 'Renders a horizontal breadcrumb navigation from a manually maintained list of entries, each with label and optional link; the last entry shows as the plain-text current page, with schema.org BreadcrumbList markup and an accessible nav label. Use it for: orientation on deep subpages, hierarchical paths like Home > Section > Page. Prefer ''Steps Navigation'' for progress through a process, ''Table of Contents Navigation'' for in-page anchors.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: breadcrumb_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:items'
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
