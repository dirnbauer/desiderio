<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-changelog" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="changelog-section">
    <d:layout.container size="md">
        <f:if condition="{data.header}">
            <d:atom.typography tag="h2" variant="h2" class="changelog__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
        </f:if>
        <ol class="changelog__list" role="list">
            <f:for each="{data.items}" as="item">
                <li class="changelog__entry">
                    <div class="changelog__meta">
                        <span class="changelog__version">{item -> f:render.text(field: 'version')}</span>
                        <f:if condition="{item.date}">
                            <time class="changelog__date" datetime="{item.date}">{item -> f:render.text(field: 'date')}</time>
                        </f:if>
                        <f:variable name="tagKey">{item.tag -> f:or(alternative: 'new')}</f:variable>
                        <span class="changelog__tag changelog__tag--{tagKey}">
                            <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:changelog.tag.{tagKey}">{tagKey}</f:translate>
                        </span>
                    </div>
                    <f:if condition="{item.title}">
                        <h3 class="changelog__title">{item -> f:render.text(field: 'title')}</h3>
                    </f:if>
                    <f:if condition="{item.description}">
                        <div class="changelog__description">
                            {item -> f:render.text(field: 'description')}
                        </div>
                    </f:if>
                </li>
            </f:for>
        </ol>
    </d:layout.container>
</d:layout.section>

</html>
