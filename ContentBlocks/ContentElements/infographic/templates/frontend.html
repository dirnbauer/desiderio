<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-infographic" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="infographic">
    <d:layout.container>
        <f:if condition="{data.header} || {data.description}">
            <header class="infographic__intro">
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h2" class="infographic__headline">
                        <span id="infographic-title-{data.uid}">{data -> f:render.text(field: 'header')}</span>
                    </d:atom.typography>
                </f:if>
                <f:if condition="{data.description}">
                    <d:atom.typography variant="muted" class="infographic__description">{data -> f:render.text(field: 'description')}</d:atom.typography>
                </f:if>
            </header>
        </f:if>

        <ol class="infographic__steps infographic__steps--{data.shadcn_layout -> f:or(alternative: 'horizontal')}">
            <f:for each="{data.items}" as="item" iteration="iter">
                <li class="infographic__step">
                    <figure class="infographic__visual">
                        <span class="infographic__number" aria-hidden="true">{item.number -> f:or(alternative: iter.cycle)}</span>
                        <f:if condition="{item.image}">
                            <f:then>
                                <f:for each="{item.image}" as="file">
                                    <f:image image="{file}" alt="" maxWidth="720" loading="lazy" decoding="async"/>
                                </f:for>
                            </f:then>
                            <f:else>
                                <span class="infographic__placeholder" aria-hidden="true">
                                    <d:atom.icon name="arrow-right" size="lg"/>
                                </span>
                            </f:else>
                        </f:if>
                    </figure>
                    <div class="infographic__body">
                        <d:atom.typography tag="h3" variant="large" class="infographic__step-title">{item -> f:render.text(field: 'title')}</d:atom.typography>
                        <f:if condition="{item.description}">
                            <d:atom.typography variant="muted" class="infographic__step-description">{item -> f:render.text(field: 'description')}</d:atom.typography>
                        </f:if>
                    </div>
                </li>
            </f:for>
        </ol>
    </d:layout.container>
</d:layout.section>

</html>
