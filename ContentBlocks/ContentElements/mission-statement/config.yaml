name: desiderio/mission-statement
typeName: desiderio_missionstatement
title: 'Mission Statement'
description: 'A focused quote block that presents the company mission as one strong, centered statement set in a blockquote. Use it on About, company, or culture pages to express purpose and values in a single memorable line. Fields include an optional eyebrow label, a headline, the statement quote itself, and an attribution credit.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: statement
    type: Textarea
    label: 'Mission Statement'
    rows: 4
  -
    identifier: attribution
    type: Textarea
    rows: 1
    label: Attribution
