name: desiderio/feature-accordion
typeName: desiderio_featureaccordion
title: 'Accordion Feature Section'
description: 'A two-column feature section: heading, subheadline, and collapsible feature rows (title plus rich-text content, first item open, one open at a time) beside a single supporting image. Use it for: feature lists with expandable detail paragraphs, capability overviews sharing one product visual, ''what''s included'' sections. Prefer ''Tabbed Feature Section'' when each feature has its own image; use ''FAQ Accordion'' for question–answer content.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: items
    type: Collection
    table: feature_accordion_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: content
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:content'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
