name: desiderio/demo-request
typeName: desiderio_demorequest
title: 'Demo Request'
description: 'Place the Demo Request content element as a focused page section.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: submit_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:submit_text'
    default: 'Request demo'
  -
    identifier: reassurance
    type: Textarea
    rows: 1
    label: 'Reassurance Microcopy'
    description: 'Short trust line shown under the heading, e.g. "30-minute call. No commitment."'
  -
    identifier: image
    type: File
    label: 'Side Image'
    allowed: common-image-types
    maxitems: 1
