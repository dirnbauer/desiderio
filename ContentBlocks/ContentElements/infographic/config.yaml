name: desiderio/infographic
typeName: desiderio_infographic
title: 'Infographic Steps'
description: 'Renders a horizontal or vertical sequence of numbered steps, each combining a step number (custom or automatic), an icon or image, a title, and a short description, introduced by a heading and description. Use it for: how-it-works overviews, process and workflow visualizations, service pipelines, lifecycle or phase models described in a document. Prefer ''How-to Steps'' for actionable instructions with SEO HowTo schema; ''Timeline'' for dated milestones.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: shadcn_layout
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:shadcn_layout'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.horizontal'
        value: horizontal
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.vertical'
        value: vertical
    default: horizontal
  -
    identifier: items
    type: Collection
    table: infographic_items
    prefixField: true
    label: Steps
    minItems: 1
    fields:
      -
        identifier: number
        type: Textarea
        rows: 1
        label: 'Step Number'
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: image
        type: File
        label: Icon/Image
        allowed: common-image-types
        maxitems: 1
