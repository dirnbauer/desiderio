<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Default" />

<f:section name="Content">
    <f:if condition="{author}">
        <f:then>
            <header class="mb-8 flex flex-col gap-4">
                <div class="flex flex-wrap items-center gap-3">
                    <d:atom.typography tag="h1" variant="h1">
                        <f:translate extensionName="Blog" key="headline.author.simple">Author</f:translate>:
                        {author.name}
                    </d:atom.typography>
                    <blogvh:link.author class="inline-flex h-9 items-center gap-2 rounded-lg border border-border px-3 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground" rss="true" author="{author}">
                        <f:render partial="General/SocialIcons" section="Rss" optional="true" />
                        <span><f:translate extensionName="Blog" key="link.rss" default="RSS"/></span>
                    </blogvh:link.author>
                </div>
                <f:if condition="{author.bio}">
                    <p class="text-base leading-7 text-muted-foreground">{author.bio}</p>
                </f:if>
                <f:if condition="{author.allTags}">
                    <ul class="flex flex-wrap gap-2">
                        <f:for each="{author.allTags}" as="tag">
                            <li>
                                <blogvh:link.tag tag="{tag}">
                                    <d:atom.badge variant="secondary">{tag.title}</d:atom.badge>
                                </blogvh:link.tag>
                            </li>
                        </f:for>
                    </ul>
                </f:if>
            </header>
            <f:render partial="List" arguments="{_all}" />
            <f:if condition="{settings.authorUid}">
                <footer class="mt-8 border-t border-border pt-6">
                    <f:link.page pageUid="{settings.authorUid}" class="inline-flex h-9 items-center rounded-lg border border-border px-3 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground">
                        &larr; <f:translate extensionName="Blog" key="list.backlink.authors">Back to all authors</f:translate>
                    </f:link.page>
                </footer>
            </f:if>
        </f:then>
        <f:else>
            <header class="mb-8">
                <d:atom.typography tag="h1" variant="h1"><f:translate extensionName="Blog" key="headline.authors">Authors</f:translate></d:atom.typography>
            </header>
            <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                <f:for each="{authors}" as="author">
                    <f:render partial="List/Author" arguments="{_all}" />
                </f:for>
            </div>
        </f:else>
    </f:if>
</f:section>

</html>
