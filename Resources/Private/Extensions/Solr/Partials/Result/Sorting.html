<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="resultSet" type="object" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>

<f:section name="Sorting">
    <div id="tx-solr-sorting" class="secondaryContentSection flex flex-wrap items-center gap-2">
        <span class="text-sm text-muted-foreground"><f:translate key="sorting_sortBy" extensionName="solr">Sorting</f:translate></span>
        <f:for each="{resultSet.sortings}" as="sorting">
            <f:if condition="{sorting.isResetOption}">
                <f:then>
                    <a class="solr-ajaxified inline-flex h-8 items-center rounded-lg border border-border px-2.5 text-sm transition-colors hover:bg-muted {f:if(condition: sorting.selected, then: 'bg-primary text-primary-foreground', else: 'text-muted-foreground')}" href="{s:uri.sorting.removeSorting()}">{sorting.label}</a>
                </f:then>
                <f:else>
                    <f:if condition="{sorting.selected}">
                        <f:then>
                            <a class="solr-ajaxified inline-flex h-8 items-center gap-1 rounded-lg bg-primary px-2.5 text-sm font-medium text-primary-foreground" href="{s:uri.sorting.setSorting(sortingName: sorting.name, sortingDirection: sorting.oppositeDirection)}">
                                {sorting.label}
                                <span>{f:if(condition: sorting.isAscDirection, then: '&uarr;', else: '&darr;') -> f:format.raw()}</span>
                            </a>
                        </f:then>
                        <f:else>
                            <a class="solr-ajaxified inline-flex h-8 items-center rounded-lg border border-border px-2.5 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground" href="{s:uri.sorting.setSorting(sortingName: sorting.name, sortingDirection: sorting.direction)}">{sorting.label}</a>
                        </f:else>
                    </f:if>
                </f:else>
            </f:if>
        </f:for>
    </div>
</f:section>

</html>
