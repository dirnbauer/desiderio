name: desiderio/testimonial
typeName: desiderio_testimonial
title: 'Single Testimonial'
description: 'Renders one customer quote in a simple, bordered-card, or large-display variant, with author name, title, company, avatar photo, and an optional 1-5 star rating. Use it for: a single customer quote or endorsement inside a document, a review excerpt with star rating, a reference statement backing a claim. Prefer ''Quote'' for editorial or literary quotations without review framing; use ''Featured Testimonial'' when one quote should fill a full-width section.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'Simple Quote'
        value: simple
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:card_style'
        value: card
      -
        label: 'Large Quote'
        value: large
    default: simple
  -
    identifier: quote
    type: Textarea
    label: 'Quote Text'
    rows: 4
    required: true
  -
    identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
    required: true
  -
    identifier: author_title
    type: Textarea
    rows: 1
    label: 'Author Title / Role'
  -
    identifier: author_company
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:company_name'
  -
    identifier: author_image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_photo'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: rating
    type: Select
    renderType: selectSingle
    label: 'Star Rating'
    items:
      -
        label: 'No Rating'
        value: '0'
      -
        label: '1 Star'
        value: '1'
      -
        label: '2 Stars'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_stars'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_stars'
        value: '4'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.5_stars'
        value: '5'
    default: '0'
