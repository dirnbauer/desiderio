<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-accordion" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="accordion-section">
    <d:layout.container>
        <f:if condition="{data.header}">
            <d:atom.typography tag="h2" variant="h2" class="accordion-section__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
        </f:if>

        <d:molecule.accordion class="accordion"
                                type="{f:if(condition: data.allow_multiple, then: 'multiple', else: 'single')}">
            <f:for each="{data.items}" as="item" iteration="iter">
                <details class="accordion__item" {f:if(condition: item.open_by_default, then: 'open')}>
                    <summary class="accordion__trigger">
                        <span class="accordion__title">{item -> f:render.text(field: 'title')}</span>
                        <span class="accordion__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m6 9 6 6 6-6"/>
                            </svg>
                        </span>
                    </summary>
                    <div class="accordion__content">
                        {item -> f:render.text(field: 'content')}
                    </div>
                </details>
            </f:for>
        </d:molecule.accordion>
    </d:layout.container>
</d:layout.section>

</html>
