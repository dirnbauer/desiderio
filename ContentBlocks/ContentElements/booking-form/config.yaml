name: desiderio/booking-form
typeName: desiderio_bookingform
title: 'Booking Form'
description: 'A boxed appointment-request card that pairs an intro heading with an embedded TYPO3 form for capturing booking details. Place it on service, scheduling, or contact pages where visitors reserve a slot or meeting. Key fields are the heading, a rich-text description, and a short reassurance microcopy line (e.g. "30-minute call, no commitment") shown with a check icon above the form.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: reassurance
    type: Textarea
    rows: 1
    label: 'Reassurance Microcopy'
    description: 'Short trust line shown under the heading, e.g. "30-minute call. No commitment."'
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: submit_text
    type: Textarea
    rows: 1
    label: 'Submit Button Text'
    default: 'Book appointment'
  -
    identifier: show_phone
    type: Checkbox
    label: 'Show Phone Field'
    default: 1
  -
    identifier: show_date
    type: Checkbox
    label: 'Show Date Field'
    default: 1
