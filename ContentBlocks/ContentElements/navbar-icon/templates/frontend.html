<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-navbar-icon" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="navbar-icon">
    <d:layout.container>
        <nav class="navbar-icon__inner" aria-label="{data.header -> f:or(alternative: 'Icon navigation')}">
            <div class="navbar-icon__brand">
                <f:if condition="{data.brand_link.url}">
                    <f:then><f:link.typolink parameter="{data.brand_link}" class="navbar-icon__brand-link">{data -> f:render.text(field: 'brand')}</f:link.typolink></f:then>
                    <f:else><span class="navbar-icon__brand-link">{data -> f:render.text(field: 'brand')}</span></f:else>
                </f:if>
            </div>
            <ul class="navbar-icon__nav">
                <f:for each="{data.nav_items}" as="item">
                    <li>
                        <f:if condition="{item.link.url}">
                            <f:link.typolink parameter="{item.link}" class="navbar-icon__link" title="{item -> f:render.text(field: 'label')}">
                                <span class="navbar-icon__icon" aria-hidden="true"><d:atom.icon name="{item.icon}" size="sm"/></span>
                                <span class="navbar-icon__label">{item -> f:render.text(field: 'label')}</span>
                            </f:link.typolink>
                        </f:if>
                    </li>
                </f:for>
            </ul>
            <f:if condition="{data.button_text} && {data.button_link.url}">
                <d:atom.button href="{data.button_link.url}" target="{data.button_link.target}" size="sm">{data -> f:render.text(field: 'button_text')}</d:atom.button>
            </f:if>
        </nav>
    </d:layout.container>
</d:layout.section>

</html>
