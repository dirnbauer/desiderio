name: desiderio/nav-toc
typeName: desiderio_navtoc
title: 'Table of Contents Navigation'
description: 'Renders a compact sidebar panel with a table of contents: each item has a label, a manually entered anchor ID, and an h2/h3 level that controls indentation, beneath an optional panel title. Use it for: long articles, documentation, legal texts, guides, whitepapers — any source document with many headings readers should jump between. Anchors are maintained by hand; prefer ''Menu: Section Index'' to generate the list automatically from page content.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: nav_toc_items
    prefixField: true
    label: 'TOC Items'
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: anchor
        type: Textarea
        rows: 1
        label: 'Anchor ID'
      -
        identifier: level
        type: Select
        renderType: selectSingle
        label: Level
        items:
          -
            label: 'Heading 2'
            value: h2
          -
            label: 'Heading 3'
            value: h3
        default: h2
