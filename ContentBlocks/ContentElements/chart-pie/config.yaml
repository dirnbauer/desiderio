name: desiderio/chart-pie
typeName: desiderio_chartpie
title: 'Pie Chart'
description: 'A shadcn/ui styled TYPO3 content element for data visualization, using theme tokens for light and dark mode.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:chart_data_json'
    description: |
      Enter data as JSON array, e.g.:
      [{"label": "Segment A", "value": 40}, {"label": "Segment B", "value": 30}]
    rows: 6
    required: true
  -
    identifier: show_legend
    type: Checkbox
    label: 'Show Legend'
    default: 1
  -
    identifier: chart_size
    type: Select
    renderType: selectSingle
    label: 'Chart Size'
    items:
      -
        label: Small
        value: small
      -
        label: Medium
        value: medium
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.large'
        value: large
    default: medium
