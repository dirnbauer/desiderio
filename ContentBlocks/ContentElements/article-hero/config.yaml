name: desiderio/article-hero
typeName: desiderio_articlehero
title: 'Article Hero'
description: 'A bold lead-article hero with a large headline, summary text, byline metadata and a full-bleed cover image that opens in a lightbox. Use it at the top of a feature article or news story to set the scene and draw readers in. Key fields: eyebrow kicker, headline, summary (dek), topic, publish date, reading time, author name and the cover image.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: dek
    type: Textarea
    label: Summary
    rows: 3
  -
    identifier: topic
    type: Textarea
    rows: 1
    label: Topic
  -
    identifier: publish_date
    type: Textarea
    rows: 1
    label: 'Publish Date'
  -
    identifier: reading_time
    type: Textarea
    rows: 1
    label: 'Dauer in min'
  -
    identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
  -
    identifier: cover_image
    type: File
    label: 'Cover Image'
    allowed: common-image-types
    maxitems: 1
