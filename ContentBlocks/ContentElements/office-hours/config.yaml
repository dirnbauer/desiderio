name: desiderio/office-hours
typeName: desiderio_officehours
title: 'Office Hours'
description: 'A card listing opening times as a clean day-and-hours table with a clock icon. Place it on a contact, location, or footer page so visitors instantly know when you are open or closed. Add a heading and short description, then one row per day or day range, each with a day label and an hours value (use "Closed" for non-opening days).'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
  -
    identifier: hours_items
    type: Collection
    table: office_hours_hours_items
    prefixField: true
    label: Hours
    description: 'One row per day or day range. Use "Closed" in the Hours field for days you are not open.'
    minItems: 1
    fields:
      -
        identifier: day
        type: Textarea
        rows: 1
        label: Day
        required: true
      -
        identifier: time
        type: Textarea
        rows: 1
        label: Hours
        required: true
