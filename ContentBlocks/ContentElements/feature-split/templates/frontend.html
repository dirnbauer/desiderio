<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-feature-split" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="feature-split">
    <d:layout.container>
        <div class="feature-split__grid">
            <div class="feature-split__copy">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.description}">
                    <d:atom.typography variant="lead" class="feature-split__description">{data -> f:render.text(field: 'description')}</d:atom.typography>
                </f:if>
                <ul class="feature-split__list" role="list">
                    <f:for each="{data.items}" as="item">
                        <li class="feature-split__item">
                            <d:atom.typography tag="h3" variant="large" class="feature-split__title">{item -> f:render.text(field: 'title')}</d:atom.typography>
                            <f:if condition="{item.description_text}">
                                <d:atom.typography variant="muted" class="feature-split__detail">{item -> f:render.text(field: 'description_text')}</d:atom.typography>
                            </f:if>
                        </li>
                    </f:for>
                </ul>
            </div>
            <f:if condition="{data.image.0}">
                <div class="feature-split__media">
                    <f:image image="{data.image.0}" alt="{data.image.0.alternative -> f:or(alternative: data.header)}" maxWidth="640" loading="lazy" class="feature-split__image"/>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
