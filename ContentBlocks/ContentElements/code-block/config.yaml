name: desiderio/code-block
typeName: desiderio_codeblock
title: 'Code Block'
description: 'Renders source code in a scrollable, keyboard-focusable panel with an optional filename header and language label, syntax-highlighted on the frontend (language detected from the label, filename extension, or the code itself). Use it for: code samples, terminal commands, configuration snippets, API examples, or log excerpts in technical documents and tutorials. Prefer ''Plain HTML'' to execute markup rather than display it; use ''Text'' with inline code for short in-sentence snippets.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: language
    type: Text
    label: 'Language Label'
    description: 'e.g. JavaScript, PHP, HTML, Fluid, TypoScript, TSconfig, YAML'
  -
    identifier: code
    type: Textarea
    label: Code
    rows: 12
    required: true
  -
    identifier: filename
    type: Text
    label: Filename
    description: 'Optional filename shown above the code'
