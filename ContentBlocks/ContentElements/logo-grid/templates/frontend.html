<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-logo-grid" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="logo-grid">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="logo-grid__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="logo-grid__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="logo-grid__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <ul class="logo-grid__items logo-grid__items--cols-{data.columns -> f:or(alternative: '4')}" aria-label="{data.header -> f:or(alternative: 'Our partners')}">
            <f:for each="{data.logo_items}" as="logo">
                <li class="logo-grid__item">
                    <f:if condition="{logo.link.url}">
                        <f:then>
                            <d:atom.link href="{logo.link.url}" target="{logo.link.target}" variant="muted" class="logo-grid__link">
                                <f:for each="{logo.image}" as="fileReference">
                                    <f:image image="{fileReference}" maxWidth="120" alt="{logo.name}" class="logo-grid__image" loading="lazy"/>
                                </f:for>
                                <f:if condition="{data.show_names}">
                                    <span class="logo-grid__name">{logo -> f:render.text(field: 'name')}</span>
                                </f:if>
                            </d:atom.link>
                        </f:then>
                        <f:else>
                            <div class="logo-grid__link">
                                <f:for each="{logo.image}" as="fileReference">
                                    <f:image image="{fileReference}" maxWidth="120" alt="{logo.name}" class="logo-grid__image" loading="lazy"/>
                                </f:for>
                                <f:if condition="{data.show_names}">
                                    <span class="logo-grid__name">{logo -> f:render.text(field: 'name')}</span>
                                </f:if>
                            </div>
                        </f:else>
                    </f:if>
                </li>
            </f:for>
        </ul>
    </d:layout.container>
</d:layout.section>
</html>
