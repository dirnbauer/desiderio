name: desiderio/cta-minimal
typeName: desiderio_ctaminimal
title: 'Minimal Call to Action'
description: 'A stripped-back conversion prompt rendering a heading, a short muted line of supporting text, and a single arrow-suffixed text link. Use it inline within content or near the end of a section where a heavy button block would feel too loud. Key fields are the headline, the one-line description, and the link text paired with its target link.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
  -
    identifier: cta_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link_text'
  -
    identifier: cta_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
