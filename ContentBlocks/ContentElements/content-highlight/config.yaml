name: desiderio/content-highlight
typeName: desiderio_contenthighlight
title: 'Content Highlight'
description: 'Content Highlight provides a focused editorial building block for a recognizable page task. Editors can manage headline and copy fields, link and CTA controls and layout or variant options.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:content'
    enableRichtext: true
    rows: 6
    required: true
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'Background Style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.muted'
        value: muted
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.bordered'
        value: bordered
    default: muted
  -
    identifier: alignment
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:text_alignment'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.center'
        value: center
    default: left
  -
    identifier: link
    type: Link
    label: 'Call to Action Link'
  -
    identifier: link_text
    type: Textarea
    rows: 1
    label: 'Call to Action Text'
