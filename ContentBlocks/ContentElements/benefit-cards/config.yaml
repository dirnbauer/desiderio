name: desiderio/benefit-cards
typeName: desiderio_benefitcards
title: 'Benefit Cards'
description: 'Renders an intro of eyebrow, heading, and subheadline above a two- or three-column card grid; each card pairs an icon with a title, rich-text description, and optional link. Use it for: benefit and advantage lists, ''why choose us'' sections, value propositions, customer-outcome selling points from brochures or landing copy. Prefer ''3-Column Feature Grid'' or ''Icon Feature Grid'' for product capabilities, ''Company Perks'' for employee benefits.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
    default: '3'
  -
    identifier: items
    type: Collection
    table: benefit_cards_items
    prefixField: true
    label: Benefits
    minItems: 1
    fields:
      -
        identifier: icon
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:icon_emoji'
        description: 'Semantic icon key rendered through the active shadcn icon library.'
        itemsProcessors:
          10:
            class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
