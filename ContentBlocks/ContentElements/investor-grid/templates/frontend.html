<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-investor-grid" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="investor-grid">
    <d:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="investor-grid__intro">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="lead">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <d:layout.grid cols="4" gap="lg" class="investor-grid__items">
            <f:for each="{data.investors}" as="inv">
                <div class="investor-grid__item">
                    <div class="investor-grid__logo-wrap">
                        <f:if condition="{inv.logo}">
                            <f:then>
                                <f:for each="{inv.logo}" as="fileReference">
                                    <f:image image="{fileReference}" maxWidth="160" alt="" loading="lazy" decoding="async" class="investor-grid__logo"/>
                                </f:for>
                            </f:then>
                            <f:else>
                                <span class="investor-grid__logo-fallback" aria-hidden="true">{inv.name -> f:format.crop(maxCharacters: 1)}</span>
                            </f:else>
                        </f:if>
                    </div>
                    <h3 class="investor-grid__name">{inv -> f:render.text(field: 'name')}</h3>
                    <f:if condition="{inv.type}"><p class="investor-grid__type">{inv -> f:render.text(field: 'type')}</p></f:if>
                    <f:if condition="{inv.link.url}">
                        <d:atom.link href="{f:uri.typolink(parameter: inv.link.url)}" target="{inv.link.target}" variant="muted" class="investor-grid__link focus-visible:ring-2 focus-visible:ring-ring focus-visible:outline-none">
                            <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:investor.visit"/>
                            <span class="sr-only">{inv -> f:render.text(field: 'name')}</span>
                        </d:atom.link>
                    </f:if>
                </div>
            </f:for>
        </d:layout.grid>
    </d:layout.container>
</d:layout.section>

</html>
