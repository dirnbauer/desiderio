name: desiderio/hero-logo-cloud
typeName: desiderio_herologocloud
title: 'Logo Cloud Hero'
description: 'Hero with eyebrow line, large headline, subheadline, one primary button, and a trust strip listing customer or partner names as styled text (no logo image uploads). Use it for: homepage or landing openers whose source leads with trusted-by claims, client rosters, or partner references beside the pitch. Prefer ''Logo Cloud'', ''Logo Grid'', or ''Logo Carousel'' for standalone image-logo sections; ''SaaS Hero'' when a dashboard screenshot is also available.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: logo_items
    type: Collection
    table: hero_logo_cloud_logo_items
    prefixField: true
    label: Logos
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
