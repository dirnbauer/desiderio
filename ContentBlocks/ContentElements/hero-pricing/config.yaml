name: desiderio/hero-pricing
typeName: desiderio_heropricing
title: 'Pricing Hero'
description: 'Two-column hero placing headline and lead text beside a price card with amount, billing period, checkmark feature list, and call-to-action button. Use it for: single-offer pages that state one price up front — course fees, memberships, flat-rate services, starting-at offers with included features. Prefer ''Three Tier Pricing'' or ''Pricing Section'' for multiple plans; ''Single-Price Card'' for a plain price card further down the page.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
  -
    identifier: price_period
    type: Textarea
    rows: 1
    label: 'Price Period'
  -
    identifier: feature_items
    type: Collection
    table: hero_pricing_feature_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: Feature
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
