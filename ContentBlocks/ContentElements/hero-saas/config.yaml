name: desiderio/hero-saas
typeName: desiderio_herosaas
title: 'SaaS Hero'
description: 'A centered hero that pitches a software product with a dashboard screenshot and a row of trust logos. Use it on a SaaS landing page to convert visitors with a clear value statement and proof. Key fields are headline, sub-headline, a badge, the dashboard screenshot, two CTA buttons (primary and outline secondary), and a list of trust company names.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
  -
    identifier: dashboard_image
    type: File
    label: 'Dashboard Screenshot'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
  -
    identifier: logo_items
    type: Collection
    table: hero_saas_logo_items
    prefixField: true
    label: 'Trust Logos'
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:company_name'
