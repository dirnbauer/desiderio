<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Post" />

<f:section name="Content">
    <header class="overflow-hidden rounded-xl border border-border bg-card shadow-[var(--d-surface-shadow)]">
        <f:if condition="{post.featuredImage}">
            <div class="group/card">
                <f:render partial="General/FeaturedImage" arguments="{image: post.featuredImage, settings: settings.post.featuredImage, featured: 1}" />
            </div>
        </f:if>
        <div class="flex flex-col gap-6 p-5 sm:p-8 lg:p-10">
            <d:atom.typography tag="h1" variant="h1" class="max-w-4xl text-balance leading-tight" itemprop="headline">{post.title}</d:atom.typography>
            <f:if condition="{post.abstract} || {post.description}">
                <p class="max-w-3xl text-pretty text-base leading-7 text-muted-foreground sm:text-lg sm:leading-8" itemprop="description">
                    <f:if condition="{post.abstract}">
                        <f:then>{post.abstract}</f:then>
                        <f:else>{post.description}</f:else>
                    </f:if>
                </p>
            </f:if>
            <f:if condition="{settings.meta.postheader.enable}">
                <f:render partial="Meta/PostHeader" arguments="{_all}" />
            </f:if>
        </div>
    </header>
</f:section>

</html>
