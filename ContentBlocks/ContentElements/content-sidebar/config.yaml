name: desiderio/content-sidebar
typeName: desiderio_contentsidebar
title: 'Content with Sidebar'
description: 'A two-column layout pairing a wide main text column with a narrower sidebar card. Use it for articles or guides where supporting notes, links or context belong beside the main copy. Fill in the headline, the rich-text main content and the rich-text sidebar content, and choose whether the sidebar sits to the right or left.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'Main Content'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 8
  -
    identifier: sidebar_content
    type: Textarea
    label: 'Sidebar Content'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 6
  -
    identifier: sidebar_position
    type: Select
    renderType: selectSingle
    label: 'Sidebar Position'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.right'
        value: right
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
    default: right
