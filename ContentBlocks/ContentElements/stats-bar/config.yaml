name: desiderio/stats-bar
typeName: desiderio_statsbar
title: 'Bar Stats Progress'
description: 'Renders a stacked list of metrics where each row places a label and display value above a horizontal progress bar filled to a set percentage from 0 to 100. Use it for: skill or competency levels, survey result percentages, capacity or completion rates, budget utilization, satisfaction scores — wherever the proportion says more than the raw number. Prefer ''Bar Chart'' for comparing many categories in a real chart; use ''Progress Bar'' for a single goal value.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: stats_bar_items
    prefixField: true
    label: 'Stat Bars'
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'Display Value'
        required: true
      -
        identifier: percentage
        type: Number
        label: 'Bar Percentage (0-100)'
        required: true
