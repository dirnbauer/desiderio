name: desiderio/pricing-calculator
typeName: desiderio_pricingcalculator
title: 'Pricing Tier Table'
description: 'A static volume-pricing table with one row per quantity tier — optional tier label, an up-to quantity paired with a configurable unit such as users or API calls, and the price per unit — introduced by an eyebrow, headline, and rich-text description. Use it for: graduated or volume price lists, per-seat and usage rate schedules, quantity-discount tables. Prefer ''Pricing Slider'' for an interactive tier picker; use ''Usage-Based Pricing'' for per-unit rate cards without quantity brackets.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: unit_label
    type: Textarea
    rows: 1
    label: 'Unit Label'
    description: 'e.g. users, API calls, seats'
    default: users
  -
    identifier: tiers
    type: Collection
    table: pricing_calculator_tiers
    prefixField: true
    label: 'Pricing Tiers'
    minItems: 1
    fields:
      -
        identifier: up_to
        type: Textarea
        rows: 1
        label: 'Up To (quantity)'
        required: true
      -
        identifier: price_per_unit
        type: Textarea
        rows: 1
        label: 'Price Per Unit'
        required: true
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'Tier Label'
