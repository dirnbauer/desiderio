name: desiderio/nav-pagination
typeName: desiderio_navpagination
title: 'Pagination Navigation'
description: 'A horizontal pager that lists numbered page links flanked by previous and next arrow links. Use it under long article lists, archives, or search results so visitors can move through pages in sequence. Each page entry has a label, a link, and an active flag for the current page, plus separate previous and next links.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: nav_pagination_items
    prefixField: true
    label: Pages
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
      -
        identifier: active
        type: Checkbox
        label: Active
  -
    identifier: previous_link
    type: Link
    label: 'Previous Link'
  -
    identifier: next_link
    type: Link
    label: 'Next Link'
