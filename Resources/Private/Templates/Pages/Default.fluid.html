<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:comment>
    Fallback page template. Mirrors DesiderioContentpage: a single page-level h1
    with the page title (Pages/PageTitle partial — visible by default,
    screen-reader-only when the page flags tx_desiderio_h1_sronly).
</f:comment>

<f:section name="Main">
    <f:render partial="Pages/PageTitle" arguments="{_all}"/>
    <!--TYPO3SEARCH_begin-->
    <f:if condition="{content.main}">
        <f:render.contentArea contentArea="{content.main}"/>
    </f:if>
    <!--TYPO3SEARCH_end-->
</f:section>

</html>
