name: desiderio/feature-grid-4
typeName: desiderio_featuregrid4
title: '4-Column Feature Grid'
description: 'Renders a dense four-column grid of open tiles (no card frames), each with an icon, a title, and one short plain-text line (minimum four items). Use it for: long, scannable feature inventories — small capabilities, integrations, or spec highlights listed without full sentences. Prefer ''3-Column Feature Grid'' when descriptions are longer rich text or need links; ''Icon Feature Grid'' when the column count should be switchable between 3, 4, and 6.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_grid_4_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    minItems: 4
    fields:
      -
        identifier: icon
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:icon_emoji'
        description: 'Semantic icon key rendered through the active shadcn icon library.'
        itemsProcessors:
          10:
            class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:short_description'
