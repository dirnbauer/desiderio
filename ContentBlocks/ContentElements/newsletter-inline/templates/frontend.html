<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-newsletter-inline" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="newsletter-inline">
    <d:layout.container>
        <div class="newsletter-inline__bar">
            <div class="newsletter-inline__text">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h4" class="newsletter-inline__headline">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.description_text}"><d:atom.typography variant="muted" class="newsletter-inline__description">{data -> f:render.text(field: 'description_text')}</d:atom.typography></f:if>
            </div>

            <d:molecule.formRenderer persistenceIdentifier="EXT:desiderio/Resources/Private/Forms/DesiderioNewsletter.form.yaml" class="newsletter-inline__form"/>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
