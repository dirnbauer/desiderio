<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-logo-cloud" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="logo-cloud">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="logo-cloud__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="logo-cloud__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="logo-cloud__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="logo-cloud__description">{data -> f:render.text(field: 'subheadline')}</p>
                </f:if>
            </header>
        </f:if>

        <ul class="logo-cloud__grid logo-cloud__grid--cols-{data.columns -> f:or(alternative: '5')}" aria-label="{data.header -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:logoCloud.aria\', default: \'Trusted by leading teams\')}')}">
            <f:for each="{data.logo_items}" as="logo">
                <li class="logo-cloud__item">
                    <f:if condition="{logo.link.url}">
                        <f:then>
                            <d:atom.link href="{f:uri.typolink(parameter: logo.link.url)}" target="{logo.link.target}" variant="muted" class="logo-cloud__link">
                                <div class="logo-cloud__media">
                                    <f:for each="{logo.image}" as="fileReference">
                                        <f:image image="{fileReference}" maxWidth="520" alt="{logo.name}" class="logo-cloud__image logo-cloud__image--{fileReference.originalFile.nameWithoutExtension -> f:format.case(mode: 'lower')}" loading="lazy" decoding="async"/>
                                    </f:for>
                                </div>
                                <span class="logo-cloud__name">{logo -> f:render.text(field: 'name')}</span>
                            </d:atom.link>
                        </f:then>
                        <f:else>
                            <div class="logo-cloud__link">
                                <div class="logo-cloud__media">
                                    <f:for each="{logo.image}" as="fileReference">
                                        <f:image image="{fileReference}" maxWidth="520" alt="{logo.name}" class="logo-cloud__image logo-cloud__image--{fileReference.originalFile.nameWithoutExtension -> f:format.case(mode: 'lower')}" loading="lazy" decoding="async"/>
                                    </f:for>
                                </div>
                                <span class="logo-cloud__name">{logo -> f:render.text(field: 'name')}</span>
                            </div>
                        </f:else>
                    </f:if>
                </li>
            </f:for>
        </ul>
    </d:layout.container>
</d:layout.section>
</html>
