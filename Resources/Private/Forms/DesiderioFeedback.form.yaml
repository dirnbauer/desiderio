identifier: desiderio-feedback
label: 'Desiderio feedback'
type: Form
renderingOptions:
  translation:
    translationFiles:
      20: 'EXT:desiderio/Resources/Private/Language/forms.xlf'
  submitButtonLabel: 'Send feedback'
finishers:
  -
    identifier: EmailToReceiver
    options:
      subject: 'Website feedback'
      recipients:
        hello@example.com: 'Website team'
      senderAddress: no-reply@example.com
      senderName: 'Website forms'
      replyToRecipients:
        '{email}': '{email}'
      addHtmlPart: true
      attachUploads: false
      title: 'Website feedback'
  -
    identifier: BrevoContact
    options:
      emailField: email
  -
    identifier: Confirmation
    options:
      message: 'Thank you. Your feedback has been sent.'
renderables:
  -
    identifier: page-1
    label: ''
    type: Page
    renderables:
      -
        identifier: rating
        label: 'How would you rate your experience?'
        type: RadioButton
        properties:
          options:
            1: '1 - I could not complete the task without help from someone on the team'
            2: '2 - Several steps were unclear and slowed me down while I tried to continue'
            3: '3 - I finished the task, but the flow still needs clearer guidance'
            4: '4 - Most of the experience worked well, with only small moments of friction'
            5: '5 - The flow was clear, efficient, and easy to complete with confidence'
            6: '6 - Excellent experience; I would use this flow again without hesitation'
      -
        identifier: feedback
        label: 'Your feedback'
        type: Textarea
        properties:
          fluidAdditionalAttributes:
            rows: 4
            required: required
        validators:
          - identifier: NotEmpty
      -
        identifier: email
        label: 'Email (optional)'
        type: Email
        properties:
          fluidAdditionalAttributes:
            autocomplete: email
        validators:
          - identifier: EmailAddress
      -
        identifier: friendlycaptcha
        label: 'Spam protection'
        type: Friendlycaptcha
        validators:
          - identifier: Friendlycaptcha
