<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="content" type="mixed" optional="{true}"/>

<!--TYPO3SEARCH_begin-->
<f:if condition="{content}">
    <f:render.contentArea contentArea="{content}"/>
</f:if>
<!--TYPO3SEARCH_end-->

</html>
