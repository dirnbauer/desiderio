name: desiderio/cta-split
typeName: desiderio_ctasplit
title: 'Split Call to Action'
description: 'A conversion block with an optional intro heading above two side-by-side cards, each holding its own title, rich-text description, and button (the right one styled as outline). Use it for: documents offering two distinct next steps — contact sales vs. start a trial, download vs. read the docs, two audiences or product lines. Prefer ''Dual CTA Hero'' at the very top of a page; ''Compare Two Options'' when the two panels compare rather than convert.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: left_title
    type: Textarea
    rows: 1
    label: 'Left Title'
  -
    identifier: left_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Left Description'
    rows: 2
  -
    identifier: left_button_text
    type: Textarea
    rows: 1
    label: 'Left Button Text'
  -
    identifier: left_button_link
    type: Link
    label: 'Left Button Link'
  -
    identifier: right_title
    type: Textarea
    rows: 1
    label: 'Right Title'
  -
    identifier: right_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Right Description'
    rows: 2
  -
    identifier: right_button_text
    type: Textarea
    rows: 1
    label: 'Right Button Text'
  -
    identifier: right_button_link
    type: Link
    label: 'Right Button Link'
