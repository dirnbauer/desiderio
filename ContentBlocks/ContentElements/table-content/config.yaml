name: desiderio/table-content
typeName: desiderio_tablecontent
title: 'Data Comparison Table'
description: 'A responsive, scrollable data table with a heading and optional caption that lays out column headers and rows of cells. Use it on feature, pricing, or spec pages to compare options or values side by side. Key fields are the heading, an optional table caption, the column-header collection (min. two), and the row collection with up to four cells (Column 1-4) each.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: caption
    type: Textarea
    rows: 1
    label: 'Table Caption'
  -
    identifier: column_items
    type: Collection
    table: table_content_column_items
    prefixField: true
    label: 'Column Headers'
    minItems: 2
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'Column Header'
        required: true
  -
    identifier: rows
    type: Collection
    table: table_content_rows
    prefixField: true
    label: 'Table Rows'
    minItems: 1
    fields:
      -
        identifier: col1
        type: Textarea
        rows: 1
        label: 'Column 1'
      -
        identifier: col2
        type: Textarea
        rows: 1
        label: 'Column 2'
      -
        identifier: col3
        type: Textarea
        rows: 1
        label: 'Column 3'
      -
        identifier: col4
        type: Textarea
        rows: 1
        label: 'Column 4'
