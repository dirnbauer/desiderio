name: desiderio/trust-badges
typeName: desiderio_trustbadges
title: 'Trust Badges'
description: 'Renders a heading, optional subline, and a horizontal row of badge tiles, each combining a logo image, label, and short description. Use it for: security seals, payment-method logos, money-back guarantees, certification marks with a one-line explanation, membership or association seals near checkout or calls to action. Prefer ''Compliance Badges'' for a plain checkmark-seal row, ''Certifications'' when the issuing body matters, and ''Logo Grid'' for logos without text.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: badge_items
    type: Collection
    table: trust_badges_badge_items
    prefixField: true
    label: Badges
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'Badge Label'
        required: true
      -
        identifier: image
        type: File
        label: 'Badge Image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:short_description'
