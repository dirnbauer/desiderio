<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-chart-pie" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="chart-pie-section">
    <d:layout.container>
        <div class="chart-pie"
             data-chart-data="{data.chart_data -> f:format.htmlspecialchars()}"
             data-show-legend="{f:if(condition: data.show_legend, then: 'true', else: 'false')}"
             data-chart-id="chart-pie-{data.uid}">
            <div class="chart-pie__card">
                <f:if condition="{data.header} || {data.description}">
                    <div class="chart-pie__header">
                        <f:if condition="{data.header}">
                            <h3 class="chart-pie__title">{data -> f:render.text(field: 'header')}</h3>
                        </f:if>
                        <f:if condition="{data.description}">
                            <p class="chart-pie__description">{data -> f:render.text(field: 'description')}</p>
                        </f:if>
                    </div>
                </f:if>
                <div class="chart-pie__content chart-pie__content--{data.chart_size -> f:or(alternative: 'medium')}">
                    <svg class="chart-pie__canvas" id="chart-pie-{data.uid}"></svg>
                </div>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>

<script>
(function () {
  const svg = document.getElementById('chart-pie-' + {data.uid});
  const root = svg && svg.closest('.chart-pie');
  if (!svg || !root) return;
  let rows;
  try { rows = JSON.parse(root.getAttribute('data-chart-data') || '[]'); } catch (e) { return; }
  if (!Array.isArray(rows) || !rows.length) return;
  const values = rows.map(function (row) {
    return {
      label: row && row.label ? String(row.label) : '',
      value: row && row.value != null ? Number(row.value) : NaN
    };
  }).filter(function (row) { return !isNaN(row.value) && row.value > 0; });
  if (!values.length) return;
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const w = 360, h = 360, cx = 180, cy = 180, r = 118;
  const total = values.reduce(function (sum, row) { return sum + row.value; }, 0) || 1;
  const colors = [
    'var(--primary)',
    'var(--d-info)',
    'var(--d-success)',
    'var(--d-warning)',
    'var(--destructive)'
  ];
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  function point(angle, radius) {
    return [cx + radius * Math.cos(angle), cy + radius * Math.sin(angle)];
  }
  let start = -Math.PI / 2;
  values.forEach(function (row, index) {
    const angle = (row.value / total) * Math.PI * 2;
    const end = start + angle;
    const startPoint = point(start, r);
    const endPoint = point(end, r);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const largeArc = angle > Math.PI ? 1 : 0;
    path.setAttribute('d', [
      'M', cx, cy,
      'L', startPoint[0].toFixed(2), startPoint[1].toFixed(2),
      'A', r, r, 0, largeArc, 1, endPoint[0].toFixed(2), endPoint[1].toFixed(2),
      'Z'
    ].join(' '));
    path.setAttribute('fill', colors[index % colors.length]);
    const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
    title.textContent = row.label + ': ' + row.value;
    path.appendChild(title);
    svg.appendChild(path);
    if (root.getAttribute('data-show-legend') === 'true') {
      const mid = start + angle / 2;
      const labelPoint = point(mid, 154);
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', labelPoint[0].toFixed(2));
      label.setAttribute('y', labelPoint[1].toFixed(2));
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('dominant-baseline', 'middle');
      label.setAttribute('fill', 'currentColor');
      label.setAttribute('opacity', '0.78');
      label.textContent = row.label;
      svg.appendChild(label);
    }
    start = end;
  });
})();
</script>

</html>
