<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers" data-namespace-typo3-fluid="true">
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<div class="powermail_fieldwrap powermail_fieldwrap_type_radio powermail_fieldwrap_{field.marker} {field.css} space-y-3 sm:col-span-2">
    <f:render partial="Form/FieldLabel" arguments="{field: field}" />
    <div class="grid gap-2 sm:grid-cols-2">
        <f:for each="{field.modifiedSettings}" as="setting" iteration="index">
            <div class="flex items-center gap-2 rounded-none border border-border bg-background p-3 {vh:validation.errorClass(field: field, class: 'border-destructive')}">
                <f:form.radio
                    property="{field.marker}"
                    value="{setting.value}"
                    checked="{vh:misc.prefillMultiField(field: field, mail: mail, cycle: index.cycle)}"
                    id="powermail_field_{field.marker}_{index.cycle}"
                    additionalAttributes="{vh:validation.validationDataAttribute(field: field, iteration: index)}"
                    class="powermail_radio size-4 rounded-full border border-input bg-transparent text-primary accent-primary outline-none focus-visible:ring-1 focus-visible:ring-ring/50 dark:bg-input/30" />
                <label for="powermail_field_{field.marker}_{index.cycle}" class="text-sm text-foreground">
                    <vh:string.escapeLabels>{setting.label}</vh:string.escapeLabels>
                </label>
            </div>
        </f:for>
    </div>
    <f:if condition="{settings.validation.client}">
        <div class="powermail_field_error_container powermail_field_error_container_{field.marker} text-xs text-destructive"></div>
    </f:if>
</div>
</html>
