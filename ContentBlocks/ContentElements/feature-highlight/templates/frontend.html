<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-feature-highlight" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="feature-highlight feature-highlight--{data.variant -> f:or(alternative: 'muted')}">
    <d:layout.container>
        <div class="feature-highlight__grid{f:if(condition: '{data.image.0}', then: '', else: ' feature-highlight__grid--single')}">
            <div class="feature-highlight__copy">
                <f:if condition="{data.eyebrow}"><span class="feature-highlight__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span></f:if>
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.description}">
                    <d:atom.typography tag="div" class="feature-highlight__description d-richtext">{data -> f:render.text(field: 'description')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.link.url} && {data.link_text}">
                    <div class="feature-highlight__actions">
                        <d:atom.button href="{f:uri.typolink(parameter: data.link.url)}" target="{data.link.target}" size="lg" variant="{f:if(condition: '{data.variant} == \'primary\'', then: 'secondary', else: 'default')}">{data -> f:render.text(field: 'link_text')}</d:atom.button>
                    </div>
                </f:if>
            </div>
            <f:if condition="{data.image.0}">
                <div class="feature-highlight__media">
                    <f:image image="{data.image.0}" alt="{data.image.0.alternative -> f:or(alternative: '{data.header}')}" maxWidth="640" class="feature-highlight__image" loading="lazy" decoding="async"/>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
