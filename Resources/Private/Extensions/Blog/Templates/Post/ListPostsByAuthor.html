<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Default" />

<f:section name="Content">
    <f:if condition="{author}">
        <f:then>
            <header class="mb-8">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
                    <div class="flex flex-col gap-3">
                        <d:atom.badge variant="secondary" class="w-fit gap-1">
                            <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="user" size="xs"/></span>
                            <span><f:translate extensionName="Blog" key="headline.author.simple">Author</f:translate></span>
                        </d:atom.badge>
                        <d:atom.typography tag="h1" variant="h1" class="text-balance">{author.name}</d:atom.typography>
                        <f:if condition="{author.bio}">
                            <p class="max-w-3xl text-base leading-7 text-muted-foreground">{author.bio}</p>
                        </f:if>
                    </div>
                    <blogvh:link.author class="inline-flex h-9 items-center gap-2 rounded-md border border-border bg-background px-3 text-sm font-medium text-foreground !no-underline transition-colors hover:bg-muted" rss="true" author="{author}">
                        <d:atom.icon name="rss" size="xs"/>
                        <span><f:translate extensionName="Blog" key="link.rss" default="RSS"/></span>
                    </blogvh:link.author>
                </div>
                <f:if condition="{author.allTags}">
                    <ul role="list" class="mt-5 flex flex-wrap gap-2">
                        <f:for each="{author.allTags}" as="tag">
                            <li>
                                <blogvh:link.tag tag="{tag}" class="!no-underline">
                                    <d:atom.badge variant="outline">
                                        <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="tag" size="xs"/></span>
                                        <span>{tag.title}</span>
                                    </d:atom.badge>
                                </blogvh:link.tag>
                            </li>
                        </f:for>
                    </ul>
                </f:if>
            </header>
            <f:render partial="List" arguments="{_all}" />
            <f:if condition="{settings.authorUid}">
                <footer class="mt-8">
                    <f:link.page pageUid="{settings.authorUid}" class="inline-flex h-9 items-center gap-2 rounded-md border border-border bg-background px-3 text-sm font-medium text-foreground !no-underline transition-colors hover:bg-muted">
                        <d:atom.icon name="arrow-left" size="xs"/>
                        <span><f:translate extensionName="Blog" key="list.backlink.authors">Back to all authors</f:translate></span>
                    </f:link.page>
                </footer>
            </f:if>
        </f:then>
        <f:else>
            <header class="mb-8 flex flex-col gap-3">
                <d:atom.badge variant="secondary" class="w-fit gap-1">
                    <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="users" size="xs"/></span>
                    <span><f:translate extensionName="Blog" key="headline.authors">Authors</f:translate></span>
                </d:atom.badge>
                <d:atom.typography tag="h1" variant="h1"><f:translate extensionName="Blog" key="headline.authors">Authors</f:translate></d:atom.typography>
            </header>
            <d:layout.grid cols="3" gap="md">
                <f:for each="{authors}" as="author">
                    <f:render partial="List/Author" arguments="{_all}" />
                </f:for>
            </d:layout.grid>
        </f:else>
    </f:if>
</f:section>

</html>
