<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:section name="Stage">
    <f:render partial="Presets/Stage" arguments="{content: content.stage, class: 'desiderio-dashboard-template__stage desiderio-dashboard-start__stage', containerSize: 'full'}"/>
</f:section>

<f:section name="Main">
    <f:variable name="dashboardTitle" value="{site.configuration.websiteTitle -> f:or(alternative: breadcrumb.0.title)}"/>
    <div class="desiderio-dashboard-template desiderio-dashboard-start">
        <d:layout.container size="full" class="desiderio-dashboard-template__container">
            <f:render partial="Presets/DashboardRail" arguments="{title: dashboardTitle, mainMenu: mainMenu, homeLink: breadcrumb.0.link}"/>
            <section class="desiderio-dashboard-template__content desiderio-dashboard-start__content" aria-label="{f:translate(extensionName: 'desiderio', key: 'dashboard.region.content', default: 'Dashboard content')}">
                <div class="desiderio-dashboard-template__canvas desiderio-dashboard-start__canvas">
                    <f:render partial="Presets/ContentArea" arguments="{content: content.main}"/>
                </div>
            </section>
        </d:layout.container>
    </div>
</f:section>

</html>
