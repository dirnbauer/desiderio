<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:argument name="facet" type="object" optional="true"/>
<f:argument name="resultSet" type="object" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>

<f:variable name="facetOptionLimit">{f:if(condition: '{settings.faceting.limit}', then: '{settings.faceting.limit}', else: 10)}</f:variable>

<d:molecule.card size="sm" class="facet-card">
    <d:molecule.cardHeader class="facet-label">
        <d:atom.typography tag="h3" variant="small">{facet.label}</d:atom.typography>
    </d:molecule.cardHeader>
    <d:molecule.cardContent>
        <ul class="facet-option-list facet-type-options fluidfacet divide-y divide-border" data-facet-name="{facet.name}" data-facet-label="{facet.label}" id="facet{facet.name}">
            <f:for each="{facet.options}" as="option" iteration="iteration">
                <li class="facet-option {f:if(condition: '!({iteration.index} < {facetOptionLimit})', then: ' tx-solr-facet-hidden')}" data-facet-item-value="{option.value}">
                    <a class="facet solr-ajaxified flex items-center justify-between gap-3 py-2 text-sm text-muted-foreground transition-colors hover:text-primary" href="{s:uri.facet.setFacetItem(facet: facet, facetItem: option)}">
                        <span>{option.label}</span>
                        <d:atom.badge variant="secondary" class="facet-result-count">{option.documentCount}</d:atom.badge>
                    </a>
                </li>
            </f:for>

            <f:if condition="{facet.options -> f:count()} > {facetOptionLimit}">
                <li>
                    <a href="#" class="tx-solr-facet-show-all block py-2 text-sm font-medium text-primary underline-offset-4 hover:underline" data-label-more="{f:translate(key: 'faceting_showMore', extensionName: 'solr')}" data-label-less="{f:translate(key: 'faceting_showFewer', extensionName: 'solr')}">
                        <f:translate key="faceting_showMore" extensionName="solr">Show more</f:translate>
                    </a>
                </li>
            </f:if>
        </ul>
    </d:molecule.cardContent>
</d:molecule.card>

</html>
