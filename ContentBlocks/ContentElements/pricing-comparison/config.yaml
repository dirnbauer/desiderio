name: desiderio/pricing-comparison
typeName: desiderio_pricingcomparison
title: 'Plan Comparison Matrix'
description: 'An accessible comparison table aligning two to four plans as columns — plan name and optional price in the header — against feature rows whose cells hold free-text values like Unlimited, 10 GB, or a check mark. Use it for: feature-availability matrices, what-each-plan-includes tables, limits-per-plan grids below a pricing section. Prefer card-based elements like ''Pricing Section'' for selling plans; use ''Feature Comparison Table'' for two options and ''Comparison Table'' outside pricing.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: plans
    type: Collection
    table: pricing_comparison_plans
    prefixField: true
    label: 'Plan Names'
    labelField: name
    minItems: 2
    maxItems: 4
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Plan Name'
        required: true
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
  -
    identifier: pricing_feature_items
    type: Collection
    table: pricing_comparison_feature_items
    prefixField: true
    label: 'Feature Rows'
    labelField: feature_name
    minItems: 1
    fields:
      -
        identifier: feature_name
        type: Textarea
        rows: 1
        label: 'Feature Name'
        required: true
      -
        identifier: tier_values
        type: Collection
        table: pricing_comparison_tier_values
        label: 'Plan Values'
        labelField: value
        minItems: 1
        maxItems: 4
        fields:
          -
            identifier: value
            type: Textarea
            rows: 1
            label: Value
            required: true
