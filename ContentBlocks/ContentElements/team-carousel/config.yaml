name: desiderio/team-carousel
typeName: desiderio_teamcarousel
title: 'Team Carousel'
description: 'Renders an optional intro (eyebrow badge, heading, subheadline) above a horizontally scrollable track of team-member cards, each with a square portrait, name, optional role, and a view-profile button. Use it for: large teams where a grid would grow too long, people sections meant to be swiped on mobile, staff overviews with many similar entries. Prefer ''Team Section'' for a static grid or list; use ''Content Carousel'' for generic image slides.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: members
    type: Collection
    table: team_carousel_members
    prefixField: true
    label: 'Team Members'
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: role
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:role'
      -
        identifier: profile_link
        type: Link
        label: 'Profile Link'
