name: desiderio/gdpr-banner
typeName: desiderio_gdprbanner
title: 'GDPR Consent Banner'
description: 'Renders a consent region with a heading, rich-text message, a checkbox list of cookie categories (each with name, description, and a required flag), Accept-all and Save-preferences buttons, plus a privacy policy link. Use it for: cookie consent copy, consent category lists (essential, analytics, marketing), tracking opt-in text from privacy or legal documents. Prefer ''Cookie Consent Banner'' for a simple dismissible notice without per-category checkboxes; use ''Privacy Notice'' for full policy summaries.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'Banner Message'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 3
    required: true
  -
    identifier: cookie_categories
    type: Collection
    table: gdpr_banner_cookie_categories
    prefixField: true
    label: 'Cookie Categories'
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Category Name'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
      -
        identifier: required
        type: Checkbox
        label: 'Required (cannot be disabled)'
        default: 0
  -
    identifier: accept_text
    type: Textarea
    rows: 1
    label: 'Accept All Text'
    default: 'Accept All'
  -
    identifier: save_text
    type: Textarea
    rows: 1
    label: 'Save Preferences Text'
    default: 'Save Preferences'
  -
    identifier: privacy_link
    type: Link
    label: 'Privacy Policy Link'
