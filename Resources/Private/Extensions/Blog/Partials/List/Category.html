<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:argument name="category" type="T3G\AgencyPack\Blog\Domain\Model\Category" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>

<div class="h-full" data-blog-category="{category.uid}">
<d:molecule.card class="h-full border-border bg-card transition-colors hover:border-primary/40">
    <d:molecule.cardContent class="flex h-full flex-col gap-4">
        <div class="flex items-center justify-between gap-3">
            <h2 class="text-lg font-semibold text-foreground" itemprop="name">
                <blogvh:link.category category="{category}" class="!no-underline outline-none transition-colors hover:text-link focus-visible:ring-3 focus-visible:ring-ring/40" />
            </h2>
            <span class="inline-flex size-8 items-center justify-center rounded-md bg-muted text-muted-foreground" aria-hidden="true">
                <d:atom.icon name="folder" size="sm"/>
            </span>
        </div>
        <f:if condition="{category.description}">
            <p class="text-sm leading-6 text-muted-foreground" itemprop="description">
                <f:format.crop maxCharacters="220" append="&nbsp;[…]">{category.description}</f:format.crop>
            </p>
        </f:if>
        <p class="mt-auto">
            <blogvh:link.category category="{category}" class="inline-flex items-center gap-1 text-sm font-medium text-link !no-underline outline-none transition-colors hover:text-link focus-visible:ring-3 focus-visible:ring-ring/40">
                <span><f:translate extensionName="Blog" key="list.show.category">All posts</f:translate></span>
                <d:atom.icon name="arrow-right" size="xs"/>
            </blogvh:link.category>
        </p>
    </d:molecule.cardContent>
</d:molecule.card>
</div>

</html>
