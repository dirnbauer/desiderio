name: desiderio/faq
typeName: desiderio_faq
title: 'FAQ Accordion'
description: 'An accordion of expandable question-and-answer pairs, marked up with FAQPage schema for rich search results. Use it on support, product, or pricing pages to answer recurring questions and reduce inquiries. Add an optional headline and sub-headline, then list each entry as a question with a rich-text answer that opens on click.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: faq_items
    prefixField: true
    label: Questions
    minItems: 1
    fields:
      -
        identifier: question
        type: Textarea
        rows: 1
        label: Question
        required: true
      -
        identifier: answer
        type: Textarea
        label: Answer
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
        required: true
