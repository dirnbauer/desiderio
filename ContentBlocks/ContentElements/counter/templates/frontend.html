<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-counter" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="counter-section">
    <d:layout.container>
        <f:if condition="{data.header}">
            <h2 class="counter__headline">{data -> f:render.text(field: 'header')}</h2>
        </f:if>
        <div class="counter__grid counter__grid--cols-{data.columns -> f:or(alternative: '3')}">
            <f:for each="{data.items}" as="item">
                <div class="counter__item">
                    <div class="counter__value">
                        <f:if condition="{item.prefix}">
                            <span class="counter__prefix">{item -> f:render.text(field: 'prefix')}</span>
                        </f:if>
                        <span class="counter__number" data-d-counter data-target="{item.target_value}">{item.target_value}</span>
                        <f:if condition="{item.suffix}">
                            <span class="counter__suffix">{item -> f:render.text(field: 'suffix')}</span>
                        </f:if>
                    </div>
                    <div class="counter__label">{item -> f:render.text(field: 'label')}</div>
                </div>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
