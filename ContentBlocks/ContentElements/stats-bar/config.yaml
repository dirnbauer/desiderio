name: desiderio/stats-bar
typeName: desiderio_statsbar
title: 'Bar Stats Progress'
description: 'A stacked list of metrics where each row shows a label and value above a horizontal progress bar filled to a set percentage. Use it to visualize proportions, completion, or benchmark scores where the relative fill communicates more than the number alone. Each item holds a label, display value, and a 0 to 100 bar percentage, with an optional eyebrow, headline, and sub-headline intro.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: stats_bar_items
    prefixField: true
    label: 'Stat Bars'
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'Display Value'
        required: true
      -
        identifier: percentage
        type: Number
        label: 'Bar Percentage (0-100)'
        required: true
