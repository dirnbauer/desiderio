name: desiderio/infographic
typeName: desiderio_infographic
title: 'Infographic Steps'
description: 'A horizontal or vertical sequence of numbered steps, each pairing an icon or image with a step number, title, and short description into a visual story. Use it on process, explainer, or about pages to present a workflow or concept at a glance. Key fields are the heading, intro description, the horizontal/vertical layout switch, and a repeatable item collection with step number, title, description, and icon or image.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: shadcn_layout
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:shadcn_layout'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.horizontal'
        value: horizontal
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.vertical'
        value: vertical
    default: horizontal
  -
    identifier: items
    type: Collection
    table: infographic_items
    prefixField: true
    label: Steps
    minItems: 1
    fields:
      -
        identifier: number
        type: Textarea
        rows: 1
        label: 'Step Number'
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: image
        type: File
        label: Icon/Image
        allowed: common-image-types
        maxitems: 1
