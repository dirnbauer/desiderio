<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
<f:comment>
    Generated by Build/Scripts/sync-shadcn-fluid-primitives.php (Powermail set).
    Edit Build/Scripts/powermail-fluid-templates.php and re-run the sync; do not hand-edit.
    Control and surface classes follow the configured shadcn preset recipes.
</f:comment>
<f:argument name="page" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="iterationPages" type="object" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<fieldset class="powermail_fieldset powermail_fieldset_{page.uid} {page.css} space-y-5 rounded-none border border-border bg-background/60 p-4">
    <f:if condition="{page.css} != 'nolabel'">
        <legend class="px-2 text-sm font-medium text-foreground">{page.title}</legend>
    </f:if>

    <div class="grid gap-4 sm:grid-cols-2">
        <f:for each="{page.fields}" as="field" iteration="iteration">
            <f:render partial="Form/Field/{vh:string.upper(string: field.type)}" arguments="{field: field, settings: settings, mail: mail}" />
        </f:for>
    </div>

    <f:if condition="{settings.main.moresteps}">
        <div class="powermail_fieldwrap powermail_tab_navigation flex justify-between gap-2 border-t border-border pt-4">
            <f:if condition="!{iterationPages.isFirst}">
                <button type="button" class="group/button inline-flex shrink-0 items-center justify-center rounded-none border border-transparent bg-clip-padding text-xs font-medium whitespace-nowrap transition-all outline-none select-none focus-visible:border-ring focus-visible:ring-1 focus-visible:ring-ring/50 active:not-aria-[haspopup]:translate-y-px disabled:pointer-events-none disabled:opacity-50 aria-invalid:border-destructive aria-invalid:ring-1 aria-invalid:ring-destructive/20 dark:aria-invalid:border-destructive/50 dark:aria-invalid:ring-destructive/40 [&amp;_svg]:pointer-events-none [&amp;_svg]:shrink-0 [&amp;_svg:not([class*='size-'])]:size-4 border-border bg-background hover:bg-muted hover:text-foreground aria-expanded:bg-muted aria-expanded:text-foreground dark:border-input dark:bg-input/30 dark:hover:bg-input/50 h-8 gap-1.5 px-2.5 has-data-[icon=inline-end]:pr-2 has-data-[icon=inline-start]:pl-2" data-powermail-morestep-show="{iterationPages.index}">
                    <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.multistep.previous" />
                </button>
            </f:if>
            <f:if condition="!{iterationPages.isLast}">
                <button type="button" class="ms-auto group/button inline-flex shrink-0 items-center justify-center rounded-none border border-transparent bg-clip-padding text-xs font-medium whitespace-nowrap transition-all outline-none select-none focus-visible:border-ring focus-visible:ring-1 focus-visible:ring-ring/50 active:not-aria-[haspopup]:translate-y-px disabled:pointer-events-none disabled:opacity-50 aria-invalid:border-destructive aria-invalid:ring-1 aria-invalid:ring-destructive/20 dark:aria-invalid:border-destructive/50 dark:aria-invalid:ring-destructive/40 [&amp;_svg]:pointer-events-none [&amp;_svg]:shrink-0 [&amp;_svg:not([class*='size-'])]:size-4 bg-primary text-primary-foreground hover:bg-primary/80 h-8 gap-1.5 px-2.5 has-data-[icon=inline-end]:pr-2 has-data-[icon=inline-start]:pl-2" data-powermail-morestep-validate="{settings.validation.morestep.fieldset}" data-powermail-morestep-show="{iterationPages.cycle}" data-powermail-morestep-previous>
                    <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.multistep.next" />
                </button>
            </f:if>
        </div>
    </f:if>
</fieldset>
</html>
