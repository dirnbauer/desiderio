name: desiderio/counter
typeName: desiderio_counter
title: 'Animated Stat Counter'
description: 'An animated statistics grid where each number counts up to its target value as it scrolls into view. Use it to showcase key metrics, milestones, or results on landing and about pages. Each entry has a target value, optional prefix and suffix (such as currency, plus, or percent), and a caption label; an optional headline sits above a 2-, 3-, or 4-column layout.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: counter_items
    prefixField: true
    label: Counters
    minItems: 1
    fields:
      -
        identifier: target_value
        type: Number
        label: 'Target Value'
        required: true
      -
        identifier: prefix
        type: Textarea
        rows: 1
        label: Prefix
        description: 'e.g. $ or +'
      -
        identifier: suffix
        type: Textarea
        rows: 1
        label: Suffix
        description: 'e.g. %, K, M'
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '3'
