<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-chart" href="{cb:assetPath()}/frontend.css"/>

<f:variable name="chartId" value="chart-{data.uid}"/>

<d:layout.section class="chart-section">
    <d:layout.container>
        <div class="chart chart--{data.color_variant -> f:or(alternative: 'primary')}"
             data-chart-data="{data.chart_data -> f:format.htmlspecialchars()}"
             data-show-grid="{f:if(condition: data.show_grid, then: 'true', else: 'false')}"
             data-fill-type="{data.fill_type -> f:or(alternative: 'gradient')}"
             data-chart-id="{chartId}">

            <div class="chart__card">
                <f:if condition="{data.header} || {data.description}">
                    <div class="chart__header">
                        <f:if condition="{data.header}">
                            <h3 class="chart__title">{data -> f:render.text(field: 'header')}</h3>
                        </f:if>
                        <f:if condition="{data.description}">
                            <p class="chart__description">{data -> f:render.text(field: 'description')}</p>
                        </f:if>
                    </div>
                </f:if>

                <div class="chart__content">
                    <svg class="chart__canvas chart__canvas--{data.chart_height -> f:or(alternative: 'medium')}"
                         id="{chartId}"></svg>
                    <div class="chart__tooltip" style="display: none;">
                        <div class="chart__tooltip-label"></div>
                        <div class="chart__tooltip-value"></div>
                    </div>
                </div>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>

<script>
(function () {
  const svg = document.getElementById('chart-' + {data.uid});
  const root = svg && svg.closest('.chart');
  if (!svg || !root) return;
  let rows;
  try { rows = JSON.parse(root.getAttribute('data-chart-data') || '[]'); } catch (e) { return; }
  if (!Array.isArray(rows) || !rows.length) return;
  const values = rows.map(function (row) {
    return {
      label: row && row.label ? String(row.label) : '',
      value: row && row.value != null ? Number(row.value) : NaN
    };
  }).filter(function (row) { return !isNaN(row.value); });
  if (!values.length) return;
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const w = 640, h = 300, padX = 42, padY = 28, bottom = 42;
  const chartW = w - padX * 2;
  const chartH = h - padY - bottom;
  const max = Math.max.apply(null, values.map(function (row) { return row.value; }));
  const min = Math.min.apply(null, values.map(function (row) { return row.value; }));
  const range = max - min || 1;
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  function point(row, index) {
    const x = padX + (values.length === 1 ? chartW / 2 : (index / (values.length - 1)) * chartW);
    const y = padY + chartH - ((row.value - min) / range) * chartH;
    return [x, y];
  }
  if (root.getAttribute('data-show-grid') === 'true') {
    for (let i = 0; i <= 4; i++) {
      const y = padY + (chartH / 4) * i;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', padX);
      line.setAttribute('x2', w - padX);
      line.setAttribute('y1', y);
      line.setAttribute('y2', y);
      line.setAttribute('stroke', 'currentColor');
      line.setAttribute('stroke-opacity', '0.12');
      svg.appendChild(line);
    }
  }
  const points = values.map(point);
  const pointList = points.map(function (p) { return p[0].toFixed(2) + ' ' + p[1].toFixed(2); }).join(' ');
  if (root.getAttribute('data-fill-type') !== 'none') {
    const area = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    area.setAttribute('points', padX + ' ' + (h - bottom) + ' ' + pointList + ' ' + (w - padX) + ' ' + (h - bottom));
    area.setAttribute('fill', 'var(--chart-color, var(--primary))');
    area.setAttribute('opacity', '0.14');
    svg.appendChild(area);
  }
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  line.setAttribute('points', pointList);
  line.setAttribute('fill', 'none');
  line.setAttribute('stroke', 'var(--chart-color, var(--primary))');
  line.setAttribute('stroke-width', '3');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(line);
  points.forEach(function (p, index) {
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', p[0]);
    dot.setAttribute('cy', p[1]);
    dot.setAttribute('r', '4');
    dot.setAttribute('fill', 'var(--chart-color, var(--primary))');
    const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
    title.textContent = values[index].label + ': ' + values[index].value;
    dot.appendChild(title);
    svg.appendChild(dot);
  });
})();
</script>

</html>
