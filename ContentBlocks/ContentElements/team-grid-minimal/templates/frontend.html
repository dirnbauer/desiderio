<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-team-grid-minimal" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="team-grid-minimal">
    <d:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="team-grid-minimal__intro">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="lead" class="team-grid-minimal__subheadline">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <d:layout.grid cols="{data.columns -> f:or(alternative: '4')}" gap="lg" class="team-grid-minimal__grid">
            <f:for each="{data.members}" as="member">
                <article class="team-grid-minimal__member">
                    <f:if condition="{member.image}">
                        <f:then>
                            <f:for each="{member.image}" as="fileReference">
                                <d:atom.avatar size="xl" class="team-grid-minimal__avatar">
                                    <f:image image="{fileReference}" width="192" height="192" cropVariant="default" alt="{fileReference.alternative -> f:or(alternative: member.name)}" loading="lazy" decoding="async" class="team-grid-minimal__image"/>
                                </d:atom.avatar>
                            </f:for>
                        </f:then>
                        <f:else>
                            <d:atom.avatar size="xl" class="team-grid-minimal__avatar" fallback="{member.name -> f:format.crop(maxCharacters: 1, append: '')}" />
                        </f:else>
                    </f:if>
                    <h3 class="team-grid-minimal__name">{member -> f:render.text(field: 'name')}</h3>
                    <f:if condition="{member.role}"><p class="team-grid-minimal__role">{member -> f:render.text(field: 'role')}</p></f:if>
                </article>
            </f:for>
        </d:layout.grid>
    </d:layout.container>
</d:layout.section>

</html>
