name: desiderio/founder-quote
typeName: desiderio_founderquote
title: 'Founder Quote'
description: 'Renders a highlighted quote card with an optional portrait, the statement as a blockquote, and name plus role as attribution, under an optional section heading. Use it for: personal statements by founders, CEOs, or leadership — letters from the founder, vision statements, welcome words in company documents. Prefer ''Single Testimonial'' for customer voices, ''Mission Statement'' for an unattributed company credo, and ''Quote'' for generic quotations.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: quote
    type: Textarea
    label: Quote
    rows: 4
  -
    identifier: name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
  -
    identifier: title
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
    allowed: common-image-types
    maxitems: 1
