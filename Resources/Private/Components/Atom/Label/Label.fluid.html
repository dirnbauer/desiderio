<f:argument name="for" type="string" optional="{true}" />
<f:argument name="class" type="string" optional="{true}" default="" />

<label for="{for}" data-slot="label" class="flex items-center gap-2 text-sm leading-none font-medium select-none group-data-[disabled=true]:pointer-events-none group-data-[disabled=true]:opacity-50 peer-disabled:cursor-not-allowed peer-disabled:opacity-50 {class}">
    <f:slot />
</label>
