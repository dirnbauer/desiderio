<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Preview"/>

<f:section name="Header"></f:section>

<f:section name="Content">
    <f:asset.css identifier="desiderio-content-preview" href="EXT:desiderio/Resources/Public/Css/content-preview.css" />
    <div class="d-ce-preview" data-slot="card">
        <div class="d-ce-preview__meta">
            <span class="d-ce-preview__type" data-slot="badge">Dark Footer</span>
            <f:if condition="{settings._content_block_name}"><span class="d-ce-preview__ctype">{settings._content_block_name}</span></f:if>
            <span class="d-ce-preview__ctype"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:preview.uid"/>: {data.uid}</span>
            <span class="d-ce-preview__ctype"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:preview.page"/>: {data.pid}</span>
        </div>
        <f:if condition="{data.header}">
            <h3 class="d-ce-preview__title">{data.header}</h3>
        </f:if>
        <f:if condition="{data.description}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Description</span>
                <span class="d-ce-preview__value">{data.description}</span>
            </div>
        </f:if>
        <f:if condition="{data.copyright}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Copyright</span>
                <span class="d-ce-preview__value">{data.copyright}</span>
            </div>
        </f:if>
        <f:if condition="{data.brand}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Brand</span>
                <span class="d-ce-preview__value">{data.brand}</span>
            </div>
        </f:if>
        <f:if condition="{data.column_items}">
            <div class="d-ce-preview__collection">
                <span class="d-ce-preview__label">Column Items</span>
                <ul class="d-ce-preview__list">
                    <f:for each="{data.column_items}" as="item">
                        <li>
                            <f:if condition="{item.link_1_label}"><span>{item.link_1_label}</span></f:if>
                            <f:if condition="{item.link_2_label}"><span>{item.link_2_label}</span></f:if>
                            <f:if condition="{item.link_3_label}"><span>{item.link_3_label}</span></f:if>
                        </li>
                    </f:for>
                </ul>
            </div>
        </f:if>
    </div>
</f:section>

</html>
