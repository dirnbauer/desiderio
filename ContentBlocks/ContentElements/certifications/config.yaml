name: desiderio/certifications
typeName: desiderio_certifications
title: 'Certifications'
description: 'Renders an intro (eyebrow, heading, subheadline) above a grid of certification entries, each with badge image, certification name, issuing body, short rich-text description, and an optional ''Verify'' link. Use it for: ISO/SOC/GDPR certification lists, quality seals, memberships and accreditations found on trust or compliance pages. Prefer ''Compliance Badges'' for a slim badge row without descriptions, ''Awards'' for prizes with year, and ''Trust Badges'' for generic logo tiles.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: certifications
    type: Collection
    table: certifications_certifications
    prefixField: true
    label: Certifications
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Certification Name'
        required: true
      -
        identifier: issuer
        type: Textarea
        rows: 1
        label: 'Issuing Body'
      -
        identifier: badge_image
        type: File
        label: 'Badge Image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: link
        type: Link
        label: 'Verification Link'
