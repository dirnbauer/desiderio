<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-hero-animated" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="hero-animated hero-animated--{data.animation -> f:or(alternative: 'fade-up')}">
    <d:layout.container>
        <div class="hero-animated__content">
            <f:if condition="{data.badge_text}">
                <d:atom.badge variant="secondary">{data -> f:render.text(field: 'badge_text')}</d:atom.badge>
            </f:if>
            <f:if condition="{data.header}">
                <d:atom.typography tag="h2" variant="h1" class="hero-animated__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
            </f:if>
            <f:if condition="{data.subheadline}">
                <d:atom.typography variant="lead" class="hero-animated__subheadline">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
            </f:if>
            <f:if condition="{data.primary_button_text} || {data.secondary_button_text}">
                <div class="hero-animated__actions">
                    <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                        <d:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</d:atom.button>
                    </f:if>
                    <f:if condition="{data.secondary_button_text} && {data.secondary_button_link.url}">
                        <d:atom.button href="{data.secondary_button_link.url}" target="{data.secondary_button_link.target}" variant="outline" size="lg">{data -> f:render.text(field: 'secondary_button_text')}</d:atom.button>
                    </f:if>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
