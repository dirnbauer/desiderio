name: desiderio/cta-minimal
typeName: desiderio_ctaminimal
title: 'Minimal Call to Action'
description: 'A stripped-back prompt stacking a heading, a muted supporting line, and a single arrow-suffixed text link — no button at all. Use it for: quiet next steps at a section''s end, ''learn more'' pointers in editorial or documentation pages, low-pressure references to related pages. Prefer ''Inline CTA Prompt'' when a real button is warranted; ''Full-Width CTA Banner'' when the appeal deserves full visual weight.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
  -
    identifier: cta_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link_text'
  -
    identifier: cta_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
