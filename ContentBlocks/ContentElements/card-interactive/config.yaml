name: desiderio/card-interactive
typeName: desiderio_cardinteractive
title: 'Interactive Card'
description: 'Renders a single card with hover and click styling: icon and optional badge in the header, heading and rich-text description in the body, and a fixed arrow call-to-action link in the footer. Use it for: one clickable teaser pointing to a guide, tool, or resource, or a feature highlight that invites a click-through. Prefer ''Content Card'' when you need image variants or a custom button label, ''Content Grid'' for several cards at once.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: icon_style
    type: Select
    renderType: selectSingle
    label: Icon
    description: 'Semantic icon key rendered through the active shadcn icon library.'
    itemsProcessors:
      10:
        class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
    default: star
  -
    identifier: link
    type: Link
    label: 'Card Link'
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
