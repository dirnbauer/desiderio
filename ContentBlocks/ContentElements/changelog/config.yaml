name: desiderio/changelog
typeName: desiderio_changelog
title: 'Changelog Data View'
description: 'Changelog Data View makes sequences, progress, history, or process steps easier to understand. Editors can manage headline and copy fields and repeatable entries.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: changelog_items
    label: Releases
    minItems: 1
    fields:
      -
        identifier: version
        type: Textarea
        rows: 1
        label: Version
        required: true
      -
        identifier: date
        type: Textarea
        rows: 1
        label: Date
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Release Title'
      -
        identifier: description
        type: Textarea
        label: 'Release Notes'
        enableRichtext: true
        rows: 4
      -
        identifier: tag
        type: Select
        renderType: selectSingle
        label: Tag
        items:
          -
            label: New
            value: new
          -
            label: Fix
            value: fix
          -
            label: Improvement
            value: improvement
          -
            label: Breaking
            value: breaking
        default: new
