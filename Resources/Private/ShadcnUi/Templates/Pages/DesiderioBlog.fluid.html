<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:section name="Stage">
    <!--TYPO3SEARCH_begin-->
    <f:if condition="{content.stage}">
        <d:layout.section spacing="md" class="border-b bg-muted/30">
            <d:layout.container size="lg" class="max-w-5xl">
                <div class="max-w-3xl">
                    <f:render.contentArea contentArea="{content.stage}"/>
                </div>
            </d:layout.container>
        </d:layout.section>
    </f:if>
    <!--TYPO3SEARCH_end-->
</f:section>

<f:section name="Main">
    <!--TYPO3SEARCH_begin-->
    <d:layout.section spacing="md">
        <d:layout.container size="xl">
            <f:variable name="hasSidebar" value="{content.sidebar.records}"/>
            <f:if condition="{hasSidebar}">
                <f:then>
                    <d:layout.grid cols="3" gap="lg">
                        <d:layout.stack gap="xl" class="md:col-span-2">
                            <f:render section="BlogListHeading" arguments="{_all}"/>
                            <f:render section="BlogPostHeading" arguments="{_all}"/>
                            <f:if condition="{content.main}">
                                <f:render.contentArea contentArea="{content.main}"/>
                            </f:if>
                        </d:layout.stack>

                        <aside class="md:col-span-2 lg:col-span-1" aria-label="Sidebar">
                            <d:layout.stack gap="lg">
                                <f:render.contentArea contentArea="{content.sidebar}"/>
                            </d:layout.stack>
                        </aside>
                    </d:layout.grid>
                </f:then>
                <f:else>
                    <d:layout.stack gap="xl">
                        <f:render section="BlogListHeading" arguments="{_all}"/>
                        <f:render section="BlogPostHeading" arguments="{_all}"/>
                        <f:if condition="{content.main}">
                            <f:render.contentArea contentArea="{content.main}"/>
                        </f:if>
                    </d:layout.stack>
                </f:else>
            </f:if>
        </d:layout.container>
    </d:layout.section>
    <!--TYPO3SEARCH_end-->
</f:section>

<f:section name="BlogListHeading">
    <f:if condition="{page.pageRecord.pid} != {site.configuration.settings.plugin.tx_blog.settings.storagePid}">
        <header class="max-w-3xl">
            <d:layout.stack gap="sm">
                <d:atom.badge variant="secondary" class="min-h-6 w-fit">Blog</d:atom.badge>
                <d:atom.typography tag="h1" variant="h1" class="tracking-normal">{page.pageRecord.title}</d:atom.typography>
                <f:if condition="{page.pageRecord.subtitle}">
                    <d:atom.typography variant="lead">{page.pageRecord.subtitle}</d:atom.typography>
                </f:if>
                <f:if condition="{page.pageRecord.description} || {page.pageRecord.abstract}">
                    <d:atom.typography variant="muted">
                        <f:if condition="{page.pageRecord.abstract}">
                            <f:then>{page.pageRecord.abstract}</f:then>
                            <f:else>{page.pageRecord.description}</f:else>
                        </f:if>
                    </d:atom.typography>
                </f:if>
            </d:layout.stack>
        </header>
    </f:if>
</f:section>

<f:section name="BlogPostHeading">
    <f:if condition="{page.pageRecord.pid} == {site.configuration.settings.plugin.tx_blog.settings.storagePid}">
        <d:molecule.card>
            <d:molecule.cardHeader>
                <d:layout.stack gap="md">
                    <d:atom.badge variant="secondary">Blog</d:atom.badge>
                    <d:atom.typography tag="h1" variant="h1" itemprop="headline">{page.pageRecord.title}</d:atom.typography>
                    <f:if condition="{page.pageRecord.subtitle}">
                        <d:atom.typography variant="lead">{page.pageRecord.subtitle}</d:atom.typography>
                    </f:if>
                </d:layout.stack>
            </d:molecule.cardHeader>

            <f:if condition="{page.pageRecord.description} || {page.pageRecord.abstract}">
                <d:molecule.cardContent>
                    <d:atom.typography variant="muted" itemprop="description">
                        <f:if condition="{page.pageRecord.abstract}">
                            <f:then>{page.pageRecord.abstract}</f:then>
                            <f:else>{page.pageRecord.description}</f:else>
                        </f:if>
                    </d:atom.typography>
                </d:molecule.cardContent>
            </f:if>
        </d:molecule.card>
    </f:if>
</f:section>

</html>
