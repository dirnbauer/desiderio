<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-case-study-card" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="case-study-card">
    <d:layout.container>
        <f:if condition="{data.header}">
            <h2 class="case-study-card__heading">{data -> f:render.text(field: 'header')}</h2>
        </f:if>

        <article class="case-study-card__wrapper">
            <f:if condition="{data.image}">
                <div class="case-study-card__media">
                    <f:for each="{data.image}" as="fileReference">
                        <f:image image="{fileReference}" maxWidth="640" alt="{f:if(condition: fileReference.alternative, then: fileReference.alternative, else: '{data.client_name} case study')}" class="case-study-card__image" loading="lazy" decoding="async"/>
                    </f:for>
                </div>
            </f:if>

            <div class="case-study-card__body">
                <f:if condition="{data.client_logo}">
                    <div class="case-study-card__logo">
                        <f:for each="{data.client_logo}" as="fileReference">
                            <f:image image="{fileReference}" maxWidth="180" alt="{f:if(condition: fileReference.alternative, then: fileReference.alternative, else: '{data.client_name} logo')}" class="case-study-card__logo-image" loading="lazy" decoding="async"/>
                        </f:for>
                    </div>
                </f:if>
                <span class="case-study-card__eyebrow"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:case_study" default="Case study"/></span>
                <h3 class="case-study-card__client">{data -> f:render.text(field: 'client_name')}</h3>
                <p class="case-study-card__summary">{data -> f:render.text(field: 'summary')}</p>

                <f:if condition="{data.result_value}">
                    <p class="case-study-card__result">
                        <span class="case-study-card__result-value">{data -> f:render.text(field: 'result_value')}</span>
                        <f:if condition="{data.result_label}">
                            <span class="case-study-card__result-label">{data -> f:render.text(field: 'result_label')}</span>
                        </f:if>
                    </p>
                </f:if>

                <f:if condition="{data.link.url}">
                    <d:atom.link href="{data.link.url}" target="{data.link.target}" variant="muted" class="case-study-card__link">
                        <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:read_case_study" default="Read case study"/><span class="sr-only"> {data -> f:render.text(field: 'client_name')}</span><span aria-hidden="true"> &rarr;</span>
                    </d:atom.link>
                </f:if>
            </div>
        </article>
    </d:layout.container>
</d:layout.section>
</html>
