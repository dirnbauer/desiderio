name: desiderio/partner-grid
typeName: desiderio_partnergrid
title: 'Partner Logo Grid'
description: 'A uniform grid of partner tiles, each with a logo (or initial-letter fallback), partner name, an optional category badge, and an optional website link, under a heading and subheadline. Use it for: partner and ecosystem listings, sponsor or alliance rosters, collaborator lists where each logo needs a visible name and label. Prefer ''Logo Grid'' or ''Logo Carousel'' for pure logo strips; use ''Client List'' for client rosters with industry details.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: partners
    type: Collection
    table: partner_grid_partners
    prefixField: true
    label: Partners
    minItems: 1
    fields:
      -
        identifier: logo
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:logo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:partner.name'
        required: true
      -
        identifier: kind
        type: Text
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:partner.kind'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:partner.link'
