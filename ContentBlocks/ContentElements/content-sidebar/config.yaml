name: desiderio/content-sidebar
typeName: desiderio_contentsidebar
title: 'Content with Sidebar'
description: 'A two-column layout pairing a wide rich-text main column with a narrow sidebar card, switchable left or right, plus an optional heading. Use it for: article bodies with side notes, guides with a fact or contact box, service pages with related links — any long text where supporting context belongs beside the copy. Prefer ''Split Text & Media'' when the second column is an image; ''Content Columns'' splits one text into equal columns instead.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'Main Content'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 8
  -
    identifier: sidebar_content
    type: Textarea
    label: 'Sidebar Content'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 6
  -
    identifier: sidebar_position
    type: Select
    renderType: selectSingle
    label: 'Sidebar Position'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.right'
        value: right
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
    default: right
