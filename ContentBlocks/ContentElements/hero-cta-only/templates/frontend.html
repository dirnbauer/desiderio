<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-hero-cta-only" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="hero-cta-only" spacing="md">
    <d:layout.container>
        <div class="hero-cta-only__content">
            <f:if condition="{data.header}">
                <d:atom.typography tag="h1" variant="h2" class="hero-cta-only__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
            </f:if>
            <f:if condition="{data.primary_button_text} || {data.secondary_button_text}">
                <div class="hero-cta-only__actions">
                    <f:if condition="{data.primary_button_text}">
                        <f:link.typolink parameter="{data.primary_button_link}">
                            <d:atom.button variant="default" size="lg">{data -> f:render.text(field: 'primary_button_text')}</d:atom.button>
                        </f:link.typolink>
                    </f:if>
                    <f:if condition="{data.secondary_button_text}">
                        <f:link.typolink parameter="{data.secondary_button_link}">
                            <d:atom.button variant="outline" size="lg">{data -> f:render.text(field: 'secondary_button_text')}</d:atom.button>
                        </f:link.typolink>
                    </f:if>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
