name: desiderio/testimonial-video
typeName: desiderio_testimonialvideo
title: 'Video Testimonial'
description: 'Renders an embedded YouTube or Vimeo video (with optional poster image) beside a pull quote and the author''s name, title, and company. Use it for: filmed customer stories, recorded interview endorsements, case-study videos accompanied by a short quote. Requires a video embed URL. Prefer ''Video Embed'' for plain videos without endorsement framing; use ''Single Testimonial'' when only text quotes are available.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: quote
    type: Textarea
    label: 'Pull Quote'
    rows: 3
  -
    identifier: video_url
    type: Text
    label: 'Video URL'
    description: 'YouTube or Vimeo embed URL'
    required: true
  -
    identifier: poster_image
    type: File
    label: 'Poster Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
    required: true
  -
    identifier: author_title
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_title'
  -
    identifier: author_company
    type: Textarea
    rows: 1
    label: Company
