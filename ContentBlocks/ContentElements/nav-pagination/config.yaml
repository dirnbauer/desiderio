name: desiderio/nav-pagination
typeName: desiderio_navpagination
title: 'Pagination Navigation'
description: 'Renders a horizontal pager: an editor-maintained list of numbered page links, one flagged active with aria-current, flanked by optional previous and next arrow links. Use it for: splitting long listings, archives, galleries, or multi-part articles across hand-linked pages — the numbers are static links, not auto-generated. Prefer ''Steps Navigation'' for ordered wizard progress, ''Tabs Navigation'' to switch between sibling views.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: nav_pagination_items
    prefixField: true
    label: Pages
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
      -
        identifier: active
        type: Checkbox
        label: Active
  -
    identifier: previous_link
    type: Link
    label: 'Previous Link'
  -
    identifier: next_link
    type: Link
    label: 'Next Link'
