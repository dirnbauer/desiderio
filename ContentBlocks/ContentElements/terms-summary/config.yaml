name: desiderio/terms-summary
typeName: desiderio_termssummary
title: 'Terms Summary'
description: 'Condense your terms of service into key bullet points.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: intro
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Introduction
    rows: 3
  -
    identifier: items
    type: Collection
    table: terms_summary_items
    prefixField: true
    label: 'Key Terms'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Term Title'
        required: true
      -
        identifier: summary
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Summary
        rows: 3
  -
    identifier: full_terms_link
    type: Link
    label: 'Full Terms Link'
  -
    identifier: last_updated
    type: Textarea
    rows: 1
    label: 'Last Updated'
