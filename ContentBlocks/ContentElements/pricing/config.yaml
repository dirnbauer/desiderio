name: desiderio/pricing
typeName: desiderio_pricing
title: 'Pricing Section'
description: 'The standard pricing section: plan cards in a selectable two-, three-, or four-column grid, each with name, price, billing period, rich-text description, check-mark feature list, and button; one plan can carry a featured badge. Use it for: price lists, subscription tiers, service packages, and membership plans. Default choice for plan pricing; use ''Single-Price Card'' for one plan, ''Plan Comparison Matrix'' for feature-by-feature tables, ''Annual vs Monthly Pricing'' when two billing prices appear.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'Plan Columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '3'
  -
    identifier: plans
    type: Collection
    table: pricing_plans
    prefixField: true
    label: 'Pricing Plans'
    labelField: name
    minItems: 1
    maxItems: 4
    fields:
      -
        identifier: badge_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Plan Name'
        required: true
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
        required: true
      -
        identifier: billing_period
        type: Textarea
        rows: 1
        label: 'Billing Period'
        description: 'e.g. per month or per seat'
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: features
        type: Collection
        table: pricing_plan_features
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
        labelField: text
        minItems: 1
        maxItems: 8
        fields:
          -
            identifier: text
            type: Textarea
            rows: 1
            label: Feature
      -
        identifier: is_featured
        type: Checkbox
        label: 'Featured Plan'
        default: 0
      -
        identifier: button_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
        default: 'Get Started'
      -
        identifier: button_link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
