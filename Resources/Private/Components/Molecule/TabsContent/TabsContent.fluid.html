<f:argument name="value" type="string" />
<f:argument name="class" type="string" optional="{true}" default="" />

<div
    role="tabpanel"
    x-show="active === '{value}'"
    x-bind:data-state="active === '{value}' ? 'active' : 'inactive'"
    class="flex-1 text-sm outline-none {class}"
    data-slot="tabs-content"
    data-d-tabs-content
    data-value="{value}"
>
    <f:slot />
</div>
