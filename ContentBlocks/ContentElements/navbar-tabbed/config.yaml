name: desiderio/navbar-tabbed
typeName: desiderio_navbartabbed
title: 'Tabbed Navigation Bar'
description: 'Renders a navigation bar with a brand name and menu links styled as a row of tab buttons, one of which can be flagged active and is highlighted with aria-current; an optional call-to-action button sits at the end. Use it for: section or view switchers, app-like page navigation, category links where the current page must stay visible. Prefer ''Tabbed Content Panels'' when content switches in place; this element links to separate pages.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand'
    required: true
  -
    identifier: tabs
    type: Collection
    table: navbar_tabbed_tabs
    prefixField: true
    label: Tabs
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'Tab Label'
      -
        identifier: link
        type: Link
        label: 'Tab Link'
      -
        identifier: active
        type: Checkbox
        label: Active
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
