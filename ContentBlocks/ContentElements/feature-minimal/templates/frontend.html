<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-feature-minimal" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="feature-minimal">
    <d:layout.container>
        <div class="feature-minimal__layout">
            <header class="feature-minimal__intro">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="lead" class="feature-minimal__subheadline">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
            <ul class="feature-minimal__list" role="list">
                <f:for each="{data.items}" as="item">
                    <li class="feature-minimal__item">
                        <d:atom.typography tag="h3" variant="large" class="feature-minimal__title">{item -> f:render.text(field: 'title')}</d:atom.typography>
                        <f:if condition="{item.description_text}">
                            <d:atom.typography variant="muted" class="feature-minimal__description">{item -> f:render.text(field: 'description_text')}</d:atom.typography>
                        </f:if>
                    </li>
                </f:for>
            </ul>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
