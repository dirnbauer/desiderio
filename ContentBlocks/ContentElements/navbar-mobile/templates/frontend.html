<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-navbar-mobile" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="navbar-mobile">
    <d:layout.container>
        <nav class="navbar-mobile__inner" aria-label="{data.header -> f:or(alternative: 'Mobile navigation')}">
            <div class="navbar-mobile__brand">
                <f:if condition="{data.brand_link.url}">
                    <f:then><f:link.typolink parameter="{data.brand_link}" class="navbar-mobile__brand-link">{data -> f:render.text(field: 'brand')}</f:link.typolink></f:then>
                    <f:else><span class="navbar-mobile__brand-link">{data -> f:render.text(field: 'brand')}</span></f:else>
                </f:if>
            </div>
            <button class="navbar-mobile__toggle" aria-expanded="false" aria-controls="navbar-mobile-menu" type="button">
                <span class="navbar-mobile__toggle-bar"></span>
                <span class="navbar-mobile__toggle-bar"></span>
                <span class="navbar-mobile__toggle-bar"></span>
            </button>
            <div class="navbar-mobile__menu" id="navbar-mobile-menu">
                <ul class="navbar-mobile__nav">
                    <f:for each="{data.nav_items}" as="item">
                        <li>
                            <f:if condition="{item.link.url}">
                                <f:link.typolink parameter="{item.link}" class="navbar-mobile__link">{item -> f:render.text(field: 'label')}</f:link.typolink>
                            </f:if>
                        </li>
                    </f:for>
                </ul>
                <f:if condition="{data.button_text} && {data.button_link.url}">
                    <d:atom.button href="{data.button_link.url}" target="{data.button_link.target}" class="navbar-mobile__cta">{data -> f:render.text(field: 'button_text')}</d:atom.button>
                </f:if>
            </div>
        </nav>
    </d:layout.container>
</d:layout.section>

</html>
