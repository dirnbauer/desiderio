name: desiderio/terms-summary
typeName: desiderio_termssummary
title: 'Terms Summary'
description: 'Renders a plain-language legal summary: heading with a ''Last updated'' line, rich-text introduction, a definition list of titled key points, and a link to the full terms document. Use it for: condensed terms of service or conditions, contract and policy overviews, ''in short'' key-point sections at the top of legal documents. Use ''Privacy Notice'' for privacy policies, ''Imprint'' for provider identification, ''Legal Disclaimer Notice'' for a single short disclaimer.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: intro
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Introduction
    rows: 3
  -
    identifier: items
    type: Collection
    table: terms_summary_items
    prefixField: true
    label: 'Key Terms'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Term Title'
        required: true
      -
        identifier: summary
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Summary
        rows: 3
  -
    identifier: full_terms_link
    type: Link
    label: 'Full Terms Link'
  -
    identifier: last_updated
    type: Textarea
    rows: 1
    label: 'Last Updated'
