name: desiderio/footer-social
typeName: desiderio_footersocial
title: 'Social Footer'
description: 'A compact footer that showcases your social media profiles as a row of accessible icon links. Use it to keep brand presence and social follow buttons visible at the bottom of any page. Key fields are the brand name, a repeatable list of social links each choosing a platform (Facebook, X, Instagram, LinkedIn, YouTube, GitHub) with its profile URL, and a copyright line.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand_name'
  -
    identifier: items
    type: Collection
    table: footer_social_items
    prefixField: true
    label: 'Social Links'
    minItems: 1
    fields:
      -
        identifier: platform_name
        type: Select
        renderType: selectSingle
        label: Platform
        items:
          -
            label: Facebook
            value: facebook
          -
            label: 'X / Twitter'
            value: twitter
          -
            label: Instagram
            value: instagram
          -
            label: LinkedIn
            value: linkedin
          -
            label: YouTube
            value: youtube
          -
            label: GitHub
            value: github
        default: facebook
      -
        identifier: link
        type: Link
        label: 'Profile URL'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
