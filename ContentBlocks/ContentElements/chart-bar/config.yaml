name: desiderio/chart-bar
typeName: desiderio_chartbar
title: 'Bar Chart'
description: 'Renders categories as vertical or horizontal bars from ''Label | Value'' rows, with color variant, a summary stats row (top category, total, lowest, top share), and a hidden accessible data table. Use it for: category comparisons and rankings — sales by region, results by department, survey answer counts, top-10 lists. Prefer ''Stacked Bar Chart'' to split totals into series segments, ''Pie Chart'' for shares of a whole, ''Area Chart'' for trends over time.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: bars
    type: Textarea
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.bars'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.bars.description'
    rows: 6
    required: true
  -
    identifier: unit
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.unit'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.unit.description'
  -
    identifier: series_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.series_name'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.series_name.description'
  -
    identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:chart_data_json'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.chart_data.description'
    rows: 6
    required: true
  -
    identifier: orientation
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.orientation'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.vertical'
        value: vertical
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.horizontal'
        value: horizontal
    default: vertical
  -
    identifier: color_variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.color_variant'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.color_variant.description'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.blue'
        value: blue
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.green'
        value: green
    default: primary
  -
    identifier: show_grid
    type: Checkbox
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-bar/language/labels.xlf:field.show_grid'
    default: 1
