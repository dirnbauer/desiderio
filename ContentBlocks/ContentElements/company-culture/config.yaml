name: desiderio/company-culture
typeName: desiderio_companyculture
title: 'Company Culture'
description: 'A shadcn/ui styled TYPO3 content element for team presentation, using theme tokens for light and dark mode.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    label: 'Culture Highlights'
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: description
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
