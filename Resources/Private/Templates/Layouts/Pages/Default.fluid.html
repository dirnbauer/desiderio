<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:page.meta property="viewport">width=device-width, initial-scale=1.0</f:page.meta>
<f:comment>
    Hugeicons stroke font is loaded over a Subresource-Integrity-pinned CDN URL.
    The hash matches the v1.0.7 build that ships with this Desiderio cut and
    must be regenerated whenever the icon font is upgraded.
</f:comment>
<f:asset.css
    identifier="hugeicons"
    href="https://cdn.hugeicons.com/font/v1.0.7/hgi-stroke-rounded.css"
    priority="1"
    additionalAttributes="{integrity: 'sha384-cFbB/EdtqpeNNB1pP5EbnLFHFLsvtAW7FxnPaDe5+UDJSb+IPWvP4MRijF6KCFL8', crossorigin: 'anonymous', referrerpolicy: 'no-referrer'}"
/>

<a href="#main-content" class="d-skip-link">
    <f:translate extensionName="desiderio" key="a11y.skipToContent">Skip to main content</f:translate>
</a>

<f:render partial="Pages/Header" arguments="{_all}"/>

<f:render section="Stage" optional="true">
    <!--TYPO3SEARCH_begin-->
    <f:if condition="{content.stage}">
        <f:render.contentArea contentArea="{content.stage}"/>
    </f:if>
    <!--TYPO3SEARCH_end-->
</f:render>

<main id="main-content" tabindex="-1" class="desiderio-main {f:if(condition: '{site.configuration.settings.desiderio.header.fixedPosition}', then: 'desiderio-main--fixed')}">
    <f:render section="Main" optional="true">
        <!--TYPO3SEARCH_begin-->
        <f:if condition="{content.main}">
            <f:render.contentArea contentArea="{content.main}"/>
        </f:if>
        <!--TYPO3SEARCH_end-->
    </f:render>
</main>

<f:render partial="Pages/Footer" arguments="{_all}"/>

</html>
