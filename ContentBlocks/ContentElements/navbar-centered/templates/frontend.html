<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-navbar-centered" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="navbar-centered">
    <d:layout.container>
        <nav class="navbar-centered__inner" aria-label="{data.header -> f:or(alternative: 'Centered navigation')}">
            <div class="navbar-centered__brand">{data -> f:render.text(field: 'brand')}</div>
            <ul class="navbar-centered__nav">
                <f:for each="{data.nav_items}" as="item">
                    <li>
                        <f:if condition="{item.link.url}">
                            <f:link.typolink parameter="{item.link}" class="navbar-centered__link">{item -> f:render.text(field: 'label')}</f:link.typolink>
                        </f:if>
                    </li>
                </f:for>
            </ul>
            <f:if condition="{data.button_text} && {data.button_link.url}">
                <d:atom.button href="{data.button_link.url}" target="{data.button_link.target}" size="sm">{data -> f:render.text(field: 'button_text')}</d:atom.button>
            </f:if>
        </nav>
    </d:layout.container>
</d:layout.section>

</html>
