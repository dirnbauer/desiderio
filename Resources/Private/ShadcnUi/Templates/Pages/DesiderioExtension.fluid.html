<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:section name="Stage">
    <!--TYPO3SEARCH_begin-->
    <f:if condition="{content.stage}">
        <d:layout.section spacing="md" class="border-b bg-card">
            <d:layout.container size="xl">
                <div class="max-w-4xl">
                    <f:render.contentArea contentArea="{content.stage}"/>
                </div>
            </d:layout.container>
        </d:layout.section>
    </f:if>
    <!--TYPO3SEARCH_end-->
</f:section>

<f:section name="Main">
    <!--TYPO3SEARCH_begin-->
    <d:layout.section spacing="md" class="desiderio-template-extension">
        <d:layout.container size="xl">
            <div class="grid gap-10 lg:grid-cols-[18rem_minmax(0,1fr)]">
                <f:if condition="{content.sidebar}">
                    <aside class="min-w-0 border-b pb-6 lg:border-b-0 lg:border-r lg:pb-0 lg:pr-8" aria-label="Sidebar">
                        <div class="lg:sticky lg:top-24">
                            <d:layout.stack gap="lg">
                                <f:render.contentArea contentArea="{content.sidebar}"/>
                            </d:layout.stack>
                        </div>
                    </aside>
                </f:if>

                <d:layout.stack gap="xl" class="min-w-0">
                    <f:if condition="{content.main}">
                        <f:render.contentArea contentArea="{content.main}"/>
                    </f:if>
                </d:layout.stack>
            </div>
        </d:layout.container>
    </d:layout.section>
    <!--TYPO3SEARCH_end-->
</f:section>

</html>
