name: desiderio/brand-story
typeName: desiderio_brandstory
title: 'Brand Story'
description: 'Renders a two-column block with eyebrow badge, heading, lead paragraph, and rich-text body beside one supporting image. Use it for: origin and founding stories, ''our story'' and heritage sections, narrative mission-driven copy from about pages or brand brochures. Prefer ''About the Company'' for a plain company introduction, ''Company History Timeline'' for dated milestones, ''Mission Statement'' for a single standalone statement.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: lead
    type: Textarea
    label: 'Lead Paragraph'
    rows: 3
  -
    identifier: body
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Body Text'
    rows: 6
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
    allowed: common-image-types
    maxitems: 1
