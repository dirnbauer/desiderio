<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:section name="Stage">
    <!-- no stage on styleguide -->
</f:section>

<f:section name="Main">
    <div class="desiderio-styleguide">

        <header class="desiderio-styleguide__header">
            <div class="desiderio-styleguide__header-left">
                <h1 class="desiderio-styleguide__title">Content Elements</h1>
                <span class="desiderio-styleguide__version">desiderio</span>
            </div>
            <button type="button" class="desiderio-theme-toggle btn btn--ghost btn--icon" data-s2f-theme-toggle="true" aria-label="Toggle dark mode">
                <svg class="desiderio-theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                <svg class="desiderio-theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
        </header>

        <d:styleguideGroups as="styleguideGroups">
            <nav class="desiderio-styleguide__nav" aria-label="Content element navigation">
                <div class="desiderio-styleguide__nav-group">
                    <p class="desiderio-styleguide__nav-heading">Categories</p>
                    <ul class="desiderio-styleguide__nav-list">
                        <f:for each="{styleguideGroups}" as="group">
                            <li>
                                <a href="#{group.groupId}" class="desiderio-styleguide__nav-link">{group.groupTitle}</a>
                            </li>
                        </f:for>
                    </ul>
                </div>
            </nav>

            <div class="desiderio-styleguide__content">
                <f:for each="{styleguideGroups}" as="group">
                    <f:render
                        partial="Pages/StyleguideGroup"
                        arguments="{
                            groupId: group.groupId,
                            groupTitle: group.groupTitle,
                            elements: group.elements
                        }"
                    />
                </f:for>
            </div>
        </d:styleguideGroups>

    </div>

    <d:fixtureJson />
</f:section>

</html>
