<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-feature-grid-4" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="feature-grid-4">
    <d:layout.container>
        <f:if condition="{data.header}">
            <header class="feature-grid-4__intro">
                <d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <div class="feature-grid-4__grid">
            <f:for each="{data.items}" as="item">
                <div class="feature-grid-4__item">
                    <f:if condition="{item.icon}">
                        <span class="feature-grid-4__icon" aria-hidden="true">{item -> f:render.text(field: 'icon')}</span>
                    </f:if>
                    <h3 class="feature-grid-4__title">{item -> f:render.text(field: 'title')}</h3>
                    <f:if condition="{item.description_text}">
                        <p class="feature-grid-4__description">{item -> f:render.text(field: 'description_text')}</p>
                    </f:if>
                </div>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
