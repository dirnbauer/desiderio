name: desiderio/product-reviews
typeName: desiderio_productreviews
title: 'Product Reviews Pricing'
description: 'Use when the product reviews pricing should present costs or plan choices close to a decision.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: average_score
    type: Textarea
    rows: 1
    label: 'Average Score'
    description: 'e.g. 4.7'
  -
    identifier: total_reviews
    type: Textarea
    rows: 1
    label: 'Total Reviews'
    description: 'e.g. 1,284 reviews'
  -
    identifier: reviews
    type: Collection
    table: product_reviews_reviews
    prefixField: true
    label: Reviews
    minItems: 1
    fields:
      -
        identifier: author
        type: Textarea
        rows: 1
        label: 'Reviewer Name'
        required: true
      -
        identifier: rating
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:rating'
        items:
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.5_stars'
            value: '5'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_stars'
            value: '4'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_stars'
            value: '3'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_stars'
            value: '2'
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.1_stars'
            value: '1'
        default: '5'
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Review Title'
      -
        identifier: review_text
        type: Textarea
        label: 'Review Text'
        rows: 3
        required: true
      -
        identifier: date
        type: Textarea
        rows: 1
        label: Date
