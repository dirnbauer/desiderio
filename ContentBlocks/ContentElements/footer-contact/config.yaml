name: desiderio/footer-contact
typeName: desiderio_footercontact
title: 'Contact Footer'
description: 'A footer that surfaces your key contact details as an icon-prefixed list. Use it at the bottom of pages where visitors need to reach or visit you, such as service or location pages. Key fields are the heading, the postal address, a clickable email and phone number, and business hours, plus a copyright line.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: address
    type: Textarea
    label: Address
    rows: 3
  -
    identifier: email
    type: Text
    label: Email
  -
    identifier: phone
    type: Text
    label: Phone
  -
    identifier: hours
    type: Textarea
    rows: 1
    label: 'Business Hours'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
