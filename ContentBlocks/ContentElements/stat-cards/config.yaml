name: desiderio/stat-cards
typeName: desiderio_statcards
title: 'Stat Cards Data View'
description: 'Renders a responsive two- to four-column grid of cards, each holding one metric as a counting value with label plus an optional change figure and up/down trend arrow. Use it for: KPI summaries, quarterly or annual report highlights, dashboard-style figures with period-over-period deltas, performance overviews. Prefer ''KPI Cards'' for similar trend tiles, ''Stats Section'' for marketing proof numbers without deltas, and ''Sparkline KPI Card'' when a mini trend line matters.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '4'
  -
    identifier: items
    type: Collection
    table: stat_cards_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:stats'
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        required: true
      -
        identifier: change
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:change'
        description: 'Delta vs previous period, e.g. +12.5% or -3 pts.'
      -
        identifier: trend
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:trend'
        items:
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.up'
            value: up
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.down'
            value: down
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.neutral'
            value: neutral
        default: neutral
