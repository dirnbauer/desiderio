<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-chart-sparkline" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="chart-sparkline-section">
    <d:layout.container>
        <figure class="chart-sparkline chart-sparkline--{data.color_variant -> f:or(alternative: 'primary')}"
             data-chart-json="{data.chart_data -> f:format.htmlspecialchars()}">
            <div class="chart-sparkline__card">
                <div class="chart-sparkline__head">
                    <div class="chart-sparkline__titles">
                        <f:if condition="{data.header}">
                            <h3 class="chart-sparkline__title">{data -> f:render.text(field: 'header')}</h3>
                        </f:if>
                        <f:if condition="{data.description}">
                            <p class="chart-sparkline__description">{data -> f:render.text(field: 'description')}</p>
                        </f:if>
                    </div>
                    <f:if condition="{data.trend_badge}">
                        <span class="chart-sparkline__badge">{data -> f:render.text(field: 'trend_badge')}</span>
                    </f:if>
                </div>
                <div class="chart-sparkline__plot">
                    <svg class="chart-sparkline__svg" id="chart-sparkline-svg-{data.uid}" role="img"
                         aria-label="{f:if(condition: data.header, then: '{data.header} trend', else: 'Trend over time')}{f:if(condition: data.trend_badge, then: ', {data.trend_badge}')}"></svg>
                </div>
            </div>
            <f:if condition="{data.trend_badge}">
                <figcaption class="chart-sparkline__caption sr-only">{data -> f:render.text(field: 'trend_badge')}</figcaption>
            </f:if>
        </figure>
    </d:layout.container>
</d:layout.section>

</html>
