name: desiderio/logo-grid
typeName: desiderio_logogrid
title: 'Logo Grid'
description: 'A clean, evenly aligned grid that arranges client logos in uniform cells. Use it as a structured trust section where consistent sizing and tidy alignment matter, such as a partners or customers page. Fields include an optional eyebrow and headline, a column count (3 to 5), a toggle to show company names, and a logo collection with image, name, and optional link.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
      -
        label: '5 Columns'
        value: '5'
    default: '4'
  -
    identifier: show_names
    type: Checkbox
    label: 'Show Company Names'
    default: 0
  -
    identifier: logo_items
    type: Collection
    table: logo_grid_logo_items
    prefixField: true
    label: Logos
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'Logo Image'
        allowed: common-image-types
        maxitems: 1
        required: true
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:company_name'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:optional_link'
