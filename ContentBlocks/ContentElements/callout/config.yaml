name: desiderio/callout
typeName: desiderio_callout
title: 'Callout Box'
description: 'A boxed, color-coded message that highlights a notice, warning, or tip apart from the surrounding text. Use it within articles or documentation to draw attention to important asides. Key fields are an optional heading, the required rich-text content, and a variant selector for the visual style (info, warning, success, danger, or note).'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:content'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 4
    required: true
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.info'
        value: info
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.warning'
        value: warning
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.success'
        value: success
      -
        label: Danger
        value: danger
      -
        label: Note
        value: note
    default: info
