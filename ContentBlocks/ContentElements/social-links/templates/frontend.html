<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-social-links" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="social-links">
    <d:layout.container>
        <div class="social-links__content">
            <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
            <f:if condition="{data.description_text}"><d:atom.typography variant="muted" class="social-links__description">{data -> f:render.text(field: 'description_text')}</d:atom.typography></f:if>
            <nav class="social-links__nav" aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:social_links.aria')}">
                <ul class="social-links__list">
                    <f:for each="{data.link_items}" as="item">
                        <f:if condition="{item.url.url}">
                            <li class="social-links__entry">
                                <d:atom.link href="{f:uri.typolink(parameter: item.url.url)}" target="{item.url.target}" variant="muted" class="social-links__item">
                                    <f:if condition="{item.icon}">
                                        <f:switch expression="{item.icon}">
                                            <f:case value="none"/>
                                            <f:defaultCase>
                                                <span class="social-links__icon" aria-hidden="true"><d:atom.icon name="{item.icon}" size="sm"/></span>
                                            </f:defaultCase>
                                        </f:switch>
                                    </f:if>
                                    <span class="social-links__label">{item -> f:render.text(field: 'platform')}</span>
                                </d:atom.link>
                            </li>
                        </f:if>
                    </f:for>
                </ul>
            </nav>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
