name: desiderio/partner-grid
typeName: desiderio_partnergrid
title: 'Partner Logo Grid'
description: 'A logo grid that showcases partners and collaborators in a tidy, uniform layout. Use it on about, partnership, or ecosystem pages to signal trusted relationships at a glance. Each item holds a partner logo, the partner name, an optional kind badge for the relationship type, and an optional link to the partner''s site, all under a shared headline and sub-headline.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: partners
    type: Collection
    table: partner_grid_partners
    prefixField: true
    label: Partners
    minItems: 1
    fields:
      -
        identifier: logo
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:logo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:partner.name'
        required: true
      -
        identifier: kind
        type: Text
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:partner.kind'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:partner.link'
