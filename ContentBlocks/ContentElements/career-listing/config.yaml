name: desiderio/career-listing
typeName: desiderio_careerlisting
title: 'Career Listing'
description: 'Renders an intro (eyebrow, heading, subheadline) above a row list of job openings, each with title, department, location, an employment-type badge, and an outline Apply button linking to the application. Use it for: job vacancy lists, open-position sections, ''join our team'' listings extracted from careers pages or HR documents. Prefer ''Job Card'' to spotlight a single role; use ''Team Hiring CTA'' for a general hiring banner without concrete positions.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: jobs
    type: Collection
    table: career_listing_jobs
    prefixField: true
    label: 'Job Openings'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Job Title'
        required: true
      -
        identifier: department
        type: Textarea
        rows: 1
        label: Department
      -
        identifier: location
        type: Textarea
        rows: 1
        label: Location
      -
        identifier: type
        type: Text
        label: Type
      -
        identifier: apply_link
        type: Link
        label: 'Apply Link'
