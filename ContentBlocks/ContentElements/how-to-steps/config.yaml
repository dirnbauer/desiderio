name: desiderio/how-to-steps
typeName: desiderio_howtosteps
title: 'How-to Steps'
description: 'A numbered, ordered list of instructional steps with Schema.org HowTo markup, each step shown with its sequence number, title, and details. Use it on guide, tutorial, or onboarding pages to walk readers through a task in clear sequence. Key fields are the heading, rich-text introduction, and a repeatable step collection holding a step title, instructions, and an optional step image.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Introduction
    rows: 3
  -
    identifier: items
    type: Collection
    table: how_to_steps_items
    prefixField: true
    label: Steps
    minItems: 2
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Step Title'
        required: true
      -
        identifier: content
        type: Textarea
        label: 'Step Instructions'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
      -
        identifier: image
        type: File
        label: 'Step Image'
        allowed: common-image-types
        maxitems: 1
