name: desiderio/hero-dual-cta
typeName: desiderio_herodualcta
title: 'Dual Call to Action Hero'
description: 'Dual Call to Action Hero opens landing pages, campaigns, or product pages with a strong first message. Editors can manage headline and copy fields and link and CTA controls.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: left_title
    type: Textarea
    rows: 1
    label: 'Left CTA Title'
  -
    identifier: left_description
    type: Textarea
    label: 'Left CTA Description'
    rows: 2
  -
    identifier: left_button_text
    type: Textarea
    rows: 1
    label: 'Left Button Text'
  -
    identifier: left_button_link
    type: Link
    label: 'Left Button Link'
  -
    identifier: right_title
    type: Textarea
    rows: 1
    label: 'Right CTA Title'
  -
    identifier: right_description
    type: Textarea
    label: 'Right CTA Description'
    rows: 2
  -
    identifier: right_button_text
    type: Textarea
    rows: 1
    label: 'Right Button Text'
  -
    identifier: right_button_link
    type: Link
    label: 'Right Button Link'
