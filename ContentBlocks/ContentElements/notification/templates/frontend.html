<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-notification" href="{cb:assetPath()}/frontend.css"/>

<f:variable name="notificationVariant" value="{data.variant -> f:or(alternative: 'info')}"/>
<f:variable name="notificationRole" value="{f:if(condition: '{notificationVariant} == \'warning\' || {notificationVariant} == \'error\'', then: 'alert', else: 'status')}"/>
<f:variable name="notificationIcon">
    <f:switch expression="{notificationVariant}">
        <f:case value="success">check-circle</f:case>
        <f:case value="warning">alert-triangle</f:case>
        <f:case value="error">x-circle</f:case>
        <f:defaultCase>info</f:defaultCase>
    </f:switch>
</f:variable>

<f:variable name="notificationInner">
    <span class="notification__icon" aria-hidden="true"><d:atom.icon name="{notificationIcon -> f:format.trim()}" size="sm"/></span>
    <div class="notification__body">
        <f:if condition="{data.header}">
            <h2 class="notification__title">{data -> f:render.text(field: 'header')}</h2>
        </f:if>
        <div class="notification__message d-richtext">{data -> f:render.text(field: 'content')}</div>
        <f:if condition="{data.action_text}">
            <div class="notification__actions">
                <d:atom.link href="{data.action_link.url}" target="{data.action_link.target}" variant="muted" class="notification__action">{data -> f:render.text(field: 'action_text')}</d:atom.link>
            </div>
        </f:if>
    </div>
    <f:if condition="{data.dismissible}">
        <button type="button" class="notification__close" data-d-dismiss aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:aria.dismiss', default: 'Dismiss this notice')}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
    </f:if>
</f:variable>

<d:layout.section class="notification-section">
    <d:layout.container>
        <f:if condition="{data.dismissible}">
            <f:then>
                <div class="notification notification--{notificationVariant}" role="{notificationRole}" data-d-dismissible>
                    {notificationInner -> f:format.raw()}
                </div>
            </f:then>
            <f:else>
                <div class="notification notification--{notificationVariant}" role="{notificationRole}">
                    {notificationInner -> f:format.raw()}
                </div>
            </f:else>
        </f:if>
    </d:layout.container>
</d:layout.section>

</html>
