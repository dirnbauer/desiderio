<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-team-cta" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="team-cta">
    <d:layout.container>
        <div class="team-cta__card">
            <f:if condition="{data.image}">
                <f:for each="{data.image}" as="fileReference">
                    <img src="{f:uri.image(image: fileReference, maxWidth: 1200)}" alt="" class="team-cta__bg"/>
                </f:for>
            </f:if>
            <div class="team-cta__content">
                <f:if condition="{data.open_count}"><span class="team-cta__count">{data -> f:render.text(field: 'open_count')} open positions</span></f:if>
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.description}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'description')}</d:atom.typography></f:if>
                <f:if condition="{data.cta_text} && {data.cta_link.url}">
                    <div class="team-cta__actions">
                        <d:atom.button href="{data.cta_link.url}" target="{data.cta_link.target}" size="lg">{data -> f:render.text(field: 'cta_text')}</d:atom.button>
                    </div>
                </f:if>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
