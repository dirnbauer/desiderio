name: desiderio/newsletter-signup
typeName: desiderio_newslettersignup
title: 'Newsletter Signup'
description: 'Renders a full newsletter section with eyebrow, headline, and subheadline above a card containing the embedded subscription form and an optional privacy reassurance line, plus an optional checklist of benefit bullets beside it. Use it for: newsletter pitches that list what subscribers get, ''join our mailing list'' sections with value propositions, email lead-capture blocks. Prefer ''Newsletter Inline'' for a slim mid-page strip; ''Newsletter Footer'' at the page end.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: privacy_text
    type: Textarea
    label: 'Privacy Reassurance'
    description: 'Short reassurance under the button, e.g. "No spam, unsubscribe anytime".'
    rows: 2
  -
    identifier: points
    type: Collection
    table: newsletter_signup_points
    prefixField: true
    label: 'Supporting Points'
    description: 'Optional benefit bullets shown beside the form. Keep each to a short, scannable phrase.'
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Point
