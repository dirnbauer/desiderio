name: desiderio/footer
typeName: desiderio_footer
title: 'Site Footer'
description: 'A semantic page footer with brand name, rich-text description, a footer-links list, a utility and legal links list, and a copyright line, switchable between full-width, two-column, and stacked layouts. Use it for: the closing block of a page combining a company blurb, navigation, and legal links from a document''s footer area. Prefer ''Multi-Column Link Footer'' for many grouped link columns; ''Minimal Footer'' when only copyright and a few links remain.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: shadcn_layout
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:shadcn_layout'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.full_width'
        value: full-width
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.two_columns'
        value: two-columns
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.stacked'
        value: stacked
    default: two-columns
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand'
    required: true
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
  -
    identifier: footer_links
    type: Collection
    table: footer_footer_links
    prefixField: true
    label: 'Footer Links'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: utility_links
    type: Collection
    table: footer_utility_links
    prefixField: true
    label: 'Utility Links'
    fields:
      -
        identifier: label
        type: Text
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
