name: desiderio/directions
typeName: desiderio_directions
title: Directions
description: 'A shadcn/ui styled TYPO3 content element for conversion flow, using theme tokens for light and dark mode.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: routes
    type: Collection
    label: Routes
    minItems: 1
    fields:
      -
        identifier: mode
        type: Textarea
        rows: 1
        label: 'Transport Mode'
        required: true
      -
        identifier: description
        type: Textarea
        label: Directions
        rows: 3
