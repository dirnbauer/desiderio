<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-resource-library" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="resource-library">
    <d:layout.container>
        <header class="resource-library__intro">
            <f:if condition="{data.eyebrow}"><span class="resource-library__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span></f:if>
            <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
        </header>
        <div class="resource-library__grid">
            <f:for each="{data.items}" as="item">
                <d:molecule.card class="resource-library__item">
                    <f:if condition="{item.type_label}"><p class="resource-library__type">{item -> f:render.text(field: 'type_label')}</p></f:if>
                    <h3 class="resource-library__title">{item -> f:render.text(field: 'title')}</h3>
                    <p class="resource-library__description">{item -> f:render.text(field: 'description')}</p>
                    <f:if condition="{item.link.url}">
                        <f:link.typolink parameter="{item.link}" class="resource-library__link">Open resource</f:link.typolink>
                    </f:if>
                </d:molecule.card>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
