name: desiderio/product-grid
typeName: desiderio_productgrid
title: 'Product Grid Pricing'
description: 'Product Grid Pricing supports buying decisions with prices, plans, packages, or calculated options. Editors can manage headline and copy fields, repeatable entries and layout or variant options.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '3'
  -
    identifier: products
    type: Collection
    table: product_grid_products
    label: Products
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Product Name'
        required: true
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:product_image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:short_description'
      -
        identifier: link
        type: Link
        label: 'Product Link'
