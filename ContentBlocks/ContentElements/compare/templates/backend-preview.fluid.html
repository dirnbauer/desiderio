<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Preview"/>

<f:section name="Header">
    <f:if condition="{data.header}">
        <f:then><cb:link.editRecord uid="{data.uid}" table="{data.mainType}">{data.header}</cb:link.editRecord></f:then>
        <f:else><cb:link.editRecord uid="{data.uid}" table="{data.mainType}">Compare</cb:link.editRecord></f:else>
    </f:if>
</f:section>

<f:section name="Content">
    <f:asset.css identifier="desiderio-content-preview" href="EXT:desiderio/Resources/Public/Css/content-preview.css" />
    <div class="d-ce-preview" data-slot="card">
        <div class="d-ce-preview__meta">
            <span class="d-ce-preview__type" data-slot="badge">Compare</span>
            <f:if condition="{settings._content_block_name}"><span class="d-ce-preview__ctype">{settings._content_block_name}</span></f:if>
        </div>
        <f:if condition="{data.header}">
            <h3 class="d-ce-preview__title">{data.header}</h3>
        </f:if>
        <f:if condition="{data.eyebrow}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Eyebrow</span>
                <span class="d-ce-preview__value">{data.eyebrow}</span>
            </div>
        </f:if>
        <f:if condition="{data.right_badge}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Right Badge</span>
                <span class="d-ce-preview__value">{data.right_badge}</span>
            </div>
        </f:if>
        <f:if condition="{data.subheadline}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Subheadline</span>
                <span class="d-ce-preview__value">{data.subheadline}</span>
            </div>
        </f:if>
        <f:if condition="{data.left_description}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Left Description</span>
                <span class="d-ce-preview__value">{data.left_description}</span>
            </div>
        </f:if>
        <f:if condition="{data.right_description}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Right Description</span>
                <span class="d-ce-preview__value">{data.right_description}</span>
            </div>
        </f:if>
        <f:if condition="{data.left_button_text}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Left Button Text</span>
                <span class="d-ce-preview__value">{data.left_button_text}</span>
            </div>
        </f:if>
    </div>
</f:section>

</html>
