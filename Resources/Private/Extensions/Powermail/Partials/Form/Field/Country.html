<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers"
    xmlns:di="http://typo3.org/ns/Webconsulting/Desiderio/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<div role="group" data-slot="field" data-orientation="vertical" class="powermail_fieldwrap_{field.marker} {field.css} {f:render(partial: 'Form/ShadcnClass', arguments: {slot: 'field'}) -> f:format.trim()}">
    <f:render partial="Form/FieldLabel" arguments="{field: field}" />
    <span data-slot="native-select" class="{f:render(partial: 'Form/ShadcnClass', arguments: {slot: 'selectWrapper'}) -> f:format.trim()}">
        <vh:form.selectField
            options="{field.modifiedSettings}"
            property="{field.marker}"
            class="{f:render(partial: 'Form/ShadcnClass', arguments: {slot: 'selectNative'}) -> f:format.trim()} {vh:validation.errorClass(field: field, class: 'border-destructive ring-1 ring-destructive/20')}"
            id="powermail_field_{field.marker}"
            autocomplete="{vh:string.autocomplete(field: field)}"
            additionalAttributes="{vh:validation.validationDataAttribute(field: field)}"
            value="{vh:misc.prefillField(field: field, mail: mail)}" />
        <di:icon name="chevron-down" size="sm" class="{f:render(partial: 'Form/ShadcnClass', arguments: {slot: 'selectIcon'}) -> f:format.trim()}" />
    </span>
</div>
</html>
