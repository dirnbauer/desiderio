name: desiderio/chart-contribution
typeName: desiderio_chartcontribution
title: 'Contribution Chart'
description: 'Contribution Chart provides a focused editorial building block for a recognizable page task. Editors can manage headline and copy fields and link and CTA controls.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'Badge (e.g. +12% vs last month)'
  -
    identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:chart_data_json'
    description: |
      JSON array of bars: [{"label":"Dec","value":40},{"label":"Jan","value":52}]
    rows: 6
    required: true
  -
    identifier: left_stat_label
    type: Textarea
    rows: 1
    label: 'Left tile label (uppercase)'
  -
    identifier: left_stat_value
    type: Textarea
    rows: 1
    label: 'Left tile headline'
  -
    identifier: left_stat_detail
    type: Textarea
    rows: 1
    label: 'Left tile detail'
  -
    identifier: right_stat_label
    type: Textarea
    rows: 1
    label: 'Right tile label (uppercase)'
  -
    identifier: right_stat_value
    type: Textarea
    rows: 1
    label: 'Right tile headline'
  -
    identifier: right_stat_detail
    type: Textarea
    rows: 1
    label: 'Right tile detail'
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
