name: desiderio/hero-minimal
typeName: desiderio_herominimal
title: 'Minimal Hero'
description: 'Pared-back centered hero rendering only a headline, one supporting subheadline, and a single button. Use it for: short openers with one message and one action — coming-soon lines, simple campaign intros, sources that provide just a claim and a link. Prefer ''Stacked Hero'' when the source adds a badge, image, or second action; ''Hero Section'' when centered and split layout variants are needed.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
