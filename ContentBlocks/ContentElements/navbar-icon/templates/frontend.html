<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-navbar-icon" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="navbar-icon">
    <d:layout.container>
        <nav class="navbar-icon__inner" aria-label="{data.header -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:navbar.icon.aria\', default: \'Icon navigation\')}')}">
            <div class="navbar-icon__brand">
                <f:if condition="{data.brand_link.url}">
                    <f:then><d:atom.link href="{data.brand_link.url}" target="{data.brand_link.target}" variant="default" class="navbar-icon__brand-link">{data -> f:render.text(field: 'brand')}</d:atom.link></f:then>
                    <f:else><span class="navbar-icon__brand-link">{data -> f:render.text(field: 'brand')}</span></f:else>
                </f:if>
            </div>
            <ul class="navbar-icon__nav">
                <f:for each="{data.nav_items}" as="item">
                    <li>
                        <f:if condition="{item.link.url}">
                            <d:atom.link href="{item.link.url}" target="{item.link.target}" variant="muted" class="navbar-icon__link">
                                <span class="navbar-icon__icon" aria-hidden="true"><d:atom.icon name="{item.icon}" size="sm"/></span>
                                <span class="navbar-icon__label">{item -> f:render.text(field: 'label')}</span>
                            </d:atom.link>
                        </f:if>
                    </li>
                </f:for>
            </ul>
            <f:if condition="{data.button_text} && {data.button_link.url}">
                <d:atom.button href="{data.button_link.url}" target="{data.button_link.target}" size="sm">{data -> f:render.text(field: 'button_text')}</d:atom.button>{data -> f:render.link(field: 'button_link')}
            </f:if>
        </nav>
    </d:layout.container>
</d:layout.section>

</html>
