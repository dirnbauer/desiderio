name: desiderio/chart-area
typeName: desiderio_chartarea
title: 'Area Chart'
description: 'Renders one time series as a JS-drawn area chart (line with shaded fill, adjustable opacity and color), plus computed summary stats (first, latest, peak, net change) and a hidden accessible data table from ''Period | Value'' rows. Use it for: metrics tracked over time — revenue growth, user numbers, traffic per month. Prefer ''Line Chart'' for an unfilled line, ''Bar Chart'' for category comparisons, and ''Data Chart'' when the chart type should stay switchable.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: points
    type: Textarea
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.points'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.points.description'
    rows: 8
    required: true
  -
    identifier: unit
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.unit'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.unit.description'
  -
    identifier: series_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.series_name'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.series_name.description'
  -
    identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:chart_data_json'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.chart_data.description'
    rows: 6
    required: true
  -
    identifier: color_variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.color_variant'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.color_variant.description'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.blue'
        value: blue
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.green'
        value: green
    default: primary
  -
    identifier: fill_opacity
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.fill_opacity'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:field.fill_opacity.description'
    items:
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:fill_opacity.light'
        value: light
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:fill_opacity.medium'
        value: medium
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-area/language/labels.xlf:fill_opacity.strong'
        value: strong
    default: medium
