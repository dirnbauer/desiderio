name: desiderio/features
typeName: desiderio_features
title: 'Feature Overview Grid'
description: 'A responsive feature grid with heading and subheadline: 2, 3, or 4 columns in icon-top, icon-left, or card style; each item has an icon, title, rich-text description, and optional link. Use it for: core capability or service overviews, benefit lists of three or more parallel items, what-we-offer sections. The most flexible feature grid; prefer ''3-Column Feature Grid'' or ''4-Column Feature Grid'' only when that fixed layout is wanted.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '3'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:feature_style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.icon_top'
        value: icon-top
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.icon_left'
        value: icon-left
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:card_style'
        value: card
    default: icon-top
  -
    identifier: feature_items
    type: Collection
    table: features_feature_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    minItems: 3
    fields:
      -
        identifier: icon_name
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:icon'
        description: 'Semantic icon key rendered through the active shadcn icon library.'
        itemsProcessors:
          10:
            class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
        default: star
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:feature_title'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:feature_description'
        rows: 2
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:feature_link'
