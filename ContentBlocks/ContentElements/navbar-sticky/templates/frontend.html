<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-navbar-sticky" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="navbar-sticky" spacing="none">
    <d:layout.container>
        <nav class="navbar-sticky__inner" aria-label="{data.header -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:navbar.sticky.aria\', default: \'Sticky navigation\')}')}">
            <span class="navbar-sticky__brand">{data -> f:render.text(field: 'brand')}</span>
            <ul class="navbar-sticky__nav">
                <f:for each="{data.nav_items}" as="item">
                    <li>
                        <f:if condition="{item.link.url}">
                            <d:atom.link href="{item.link.url}" target="{item.link.target}" variant="muted" class="navbar-sticky__link">{item -> f:render.text(field: 'label')}</d:atom.link>
                        </f:if>
                    </li>
                </f:for>
            </ul>
            <f:if condition="{data.button_text} && {data.button_link.url}">
                <d:atom.button href="{data.button_link.url}" target="{data.button_link.target}" size="sm">{data -> f:render.text(field: 'button_text')}</d:atom.button>{data -> f:render.link(field: 'button_link')}
            </f:if>
        </nav>
    </d:layout.container>
</d:layout.section>

</html>
