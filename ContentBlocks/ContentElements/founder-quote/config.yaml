name: desiderio/founder-quote
typeName: desiderio_founderquote
title: 'Founder Quote'
description: 'A single highlighted quote card pairing a personal statement with the speaker''s portrait and attribution. Use it on about or team pages to add a human, credible voice from the founder or a leader. Key fields are an optional section heading, the quote text, the person''s name, their title, and a portrait image.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: quote
    type: Textarea
    label: Quote
    rows: 4
  -
    identifier: name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
  -
    identifier: title
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
    allowed: common-image-types
    maxitems: 1
