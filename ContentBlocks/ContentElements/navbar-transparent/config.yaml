name: desiderio/navbar-transparent
typeName: desiderio_navbartransparent
title: 'Transparent Navigation Bar'
description: 'A see-through navigation bar meant to float over a hero or full-width background image. Use it at the top of image-led landing pages where the header should blend into the visual rather than sit on a solid strip. Key fields are the brand with its link, a repeatable list of navigation items (label plus link), and an outlined call-to-action button text and link.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand'
    required: true
  -
    identifier: brand_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand_link'
  -
    identifier: nav_items
    type: Collection
    table: navbar_transparent_nav_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:navigation_items'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
