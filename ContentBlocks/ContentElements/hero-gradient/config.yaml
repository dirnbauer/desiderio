name: desiderio/hero-gradient
typeName: desiderio_herogradient
title: 'Gradient Hero'
description: 'A hero with a bold color-gradient background built from two theme tokens, holding a centered headline and call-to-action. Use it to open pages with an on-brand, image-free backdrop when you want energy without photography. Pick the from and to gradient tokens (primary, accent, secondary, muted) and add a badge, headline, sub-headline, and two buttons.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
  -
    identifier: gradient_from
    type: Select
    renderType: selectSingle
    label: 'Gradient From Token'
    description: 'Theme token used as the first gradient stop.'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.accent'
        value: accent
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.secondary'
        value: secondary
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.muted'
        value: muted
    default: primary
  -
    identifier: gradient_to
    type: Select
    renderType: selectSingle
    label: 'Gradient To Token'
    description: 'Theme token used as the second gradient stop.'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.accent'
        value: accent
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.secondary'
        value: secondary
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.muted'
        value: muted
    default: accent
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
