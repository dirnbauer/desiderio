name: desiderio/card-overlay
typeName: desiderio_cardoverlay
title: 'Card Overlay Data View'
description: 'A shadcn/ui styled TYPO3 content element for data visualization, using theme tokens for light and dark mode.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:background_image'
    allowed: common-image-types
    maxitems: 1
    required: true
  -
    identifier: link
    type: Link
    label: 'Card Link'
  -
    identifier: overlay_opacity
    type: Select
    renderType: selectSingle
    label: 'Overlay Darkness'
    items:
      -
        label: Light
        value: light
      -
        label: Medium
        value: medium
      -
        label: Dark
        value: dark
    default: medium
