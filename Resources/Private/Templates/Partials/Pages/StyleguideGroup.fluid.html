<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="groupId" type="string" description="HTML id for the group section"/>
<f:argument name="groupTitle" type="string" description="Display title for the group"/>
<f:argument name="elements" type="array" description="Content elements with name and ctype keys"/>

<section class="desiderio-sg__group" id="{groupId}">
    <div class="desiderio-sg__group-header">
        <div class="stack stack--horizontal stack--align-center stack--gap-sm">
            <h2 class="typography typography--h3" style="margin:0;">{groupTitle}</h2>
            <span class="badge badge--secondary">{elements -> f:count()}</span>
        </div>
        <button type="button" class="btn btn--outline btn--sm desiderio-sg__show-all" data-group="{groupId}">
            Show All
        </button>
    </div>
    <div class="desiderio-sg__element-list">
        <f:for each="{elements}" as="element">
            <div class="desiderio-sg__element-card"
                 data-ctype="{element.ctype}"
                 tabindex="0"
                 role="button"
                 aria-expanded="false">
                <p class="desiderio-sg__card-name">{element.name}</p>
                <p class="desiderio-sg__card-ctype">{element.ctype}</p>
            </div>
        </f:for>
    </div>
</section>

</html>
