<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="image" type="object" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>
<f:argument name="featured" type="bool" optional="true"/>
<f:argument name="layout" type="string" optional="true" default="card"/>

<f:if condition="{image}">
    <f:variable name="maxWidth" value="{f:if(condition: settings.maxWidth, then: settings.maxWidth, else: '960')}" />
    <f:variable name="imageSizes" value="{f:if(condition: settings.sizes, then: settings.sizes, else: '(min-width: 1024px) 960px, (min-width: 768px) 80vw, 100vw')}" />
    <f:variable name="imageAttributes" value="{sizes: imageSizes, decoding: 'async'}" />

    <f:if condition="{layout} == 'inline'">
        <f:then>
            <figure class="desiderio-blog-media desiderio-blog-media--inline m-0 w-full min-w-0">
                <f:image
                    loading="lazy"
                    image="{image}"
                    alt="{image.alternative}"
                    title="{image.title}"
                    maxWidth="{maxWidth}"
                    additionalAttributes="{imageAttributes}"
                    class="desiderio-blog-media__image block h-auto w-full max-w-full"
                />
            </figure>
        </f:then>
        <f:else>
            <f:variable name="coverLayout" value="{layout}" />
            <f:if condition="{featured}">
                <f:variable name="coverLayout" value="hero" />
            </f:if>
            <f:variable name="aspectClass">
                <f:switch expression="{coverLayout}">
                    <f:case value="hero">desiderio-blog-media--hero</f:case>
                    <f:defaultCase>desiderio-blog-media--card</f:defaultCase>
                </f:switch>
            </f:variable>
            <figure class="desiderio-blog-media desiderio-blog-media--cover m-0 w-full min-w-0 overflow-hidden bg-muted {aspectClass -> f:format.trim()}">
                <f:image
                    loading="lazy"
                    image="{image}"
                    alt="{image.alternative}"
                    title="{image.title}"
                    maxWidth="{maxWidth}"
                    additionalAttributes="{imageAttributes}"
                    class="desiderio-blog-media__image size-full object-cover transition-transform duration-300 group-hover/card:scale-[1.03]"
                />
            </figure>
        </f:else>
    </f:if>
</f:if>

</html>
