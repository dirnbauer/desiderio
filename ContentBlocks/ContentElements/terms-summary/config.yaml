name: desiderio/terms-summary
typeName: desiderio_termssummary
title: 'Terms Summary'
description: 'A plain-language summary that condenses lengthy terms of service into a definition-list of titled key points. Use it in the footer or on legal pages to give visitors a quick, readable overview before they dive into the full document. It offers a heading, a rich-text introduction, a last-updated date, term entries with title and rich-text summary, and a link to the full terms.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: intro
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Introduction
    rows: 3
  -
    identifier: items
    type: Collection
    table: terms_summary_items
    prefixField: true
    label: 'Key Terms'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Term Title'
        required: true
      -
        identifier: summary
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Summary
        rows: 3
  -
    identifier: full_terms_link
    type: Link
    label: 'Full Terms Link'
  -
    identifier: last_updated
    type: Textarea
    rows: 1
    label: 'Last Updated'
