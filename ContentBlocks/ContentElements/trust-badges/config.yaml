name: desiderio/trust-badges
typeName: desiderio_trustbadges
title: 'Trust Badges'
description: 'Trust Badges builds credibility through voices, logos, ratings, awards, or references. Editors can manage headline and copy fields and repeatable entries.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: badge_items
    type: Collection
    label: Badges
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'Badge Label'
        required: true
      -
        identifier: image
        type: File
        label: 'Badge Image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:short_description'
