name: desiderio/stats-inline
typeName: desiderio_statsinline
title: 'Inline Stats Row'
description: 'Renders a slim single-row strip of at least two value-and-label pairs, optionally divided by separators, with an optional heading above. Use it for: compact supporting figures beneath a paragraph or hero, quick fact rows from brochures, key data lines in section intros — user counts, uptime, response times. Prefer ''Stats Section'' for a full-width animated stats block; use ''Social Proof Counter'' for headline figures with intro text.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: show_separator
    type: Checkbox
    label: 'Show Separators'
    default: 1
  -
    identifier: stats
    type: Collection
    table: stats_inline_stats
    prefixField: true
    label: Stats
    minItems: 2
    fields:
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        required: true
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
