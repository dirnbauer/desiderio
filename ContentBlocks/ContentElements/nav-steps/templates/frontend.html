<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-nav-steps" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="nav-steps nav-steps--{data.variant -> f:or(alternative: 'numbered')}">
    <d:layout.container>
        <nav class="nav-steps__inner" aria-label="{data.header -> f:or(alternative: 'Progress steps')}">
            <ol class="nav-steps__list">
                <f:for each="{data.step_items}" as="step" iteration="iterator">
                    <f:variable name="stepStatus">{step.status -> f:or(alternative: 'pending')}</f:variable>
                    <li class="nav-steps__item nav-steps__item--{stepStatus}"<f:if condition="{stepStatus} == 'current'"> aria-current="step"</f:if>>
                        <span class="nav-steps__indicator" aria-hidden="true">
                            <f:if condition="{stepStatus} == 'completed'">
                                <f:then>&#10003;</f:then>
                                <f:else>{iterator.cycle}</f:else>
                            </f:if>
                        </span>
                        <f:if condition="{step.link.url}">
                            <f:then>
                                <d:atom.link href="{step.link.url}" target="{step.link.target}" variant="muted" class="nav-steps__label nav-steps__link">{step -> f:render.text(field: 'label')}<f:if condition="{stepStatus} == 'completed'"><span class="sr-only"> (completed)</span></f:if><f:if condition="{stepStatus} == 'current'"><span class="sr-only"> (current step)</span></f:if></d:atom.link>
                            </f:then>
                            <f:else>
                                <span class="nav-steps__label">{step -> f:render.text(field: 'label')}<f:if condition="{stepStatus} == 'current'"><span class="sr-only"> (current step)</span></f:if></span>
                            </f:else>
                        </f:if>
                    </li>
                </f:for>
            </ol>
        </nav>
    </d:layout.container>
</d:layout.section>

</html>
