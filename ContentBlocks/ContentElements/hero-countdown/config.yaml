name: desiderio/hero-countdown
typeName: desiderio_herocountdown
title: 'Countdown Hero'
description: 'Renders a centered hero with optional badge, headline, subheadline, a live timer counting down days, hours, minutes, and seconds to a set target date, and one CTA button. Use it for: content anchored to a date — product launches, event or webinar start dates, sale endings, registration deadlines (''doors open on…''). Prefer ''Startup Waitlist Hero'' for waitlist sign-ups without a fixed date; ''Announcement Hero'' for dateless news.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: target_date
    type: DateTime
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:target_date'
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
