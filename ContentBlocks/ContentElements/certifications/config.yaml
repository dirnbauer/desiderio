name: desiderio/certifications
typeName: desiderio_certifications
title: 'Certifications'
description: 'A grid of certifications and standards that your work meets, each entry showing a badge image, the certification name, its issuing body, and a short note. Use it on about, trust, or compliance pages to signal credibility and verified expertise. Fields include an intro of eyebrow, headline, and sub-headline, plus a repeatable certification collection with name, issuing body, badge image, rich-text description, and a verification link.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: certifications
    type: Collection
    table: certifications_certifications
    prefixField: true
    label: Certifications
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Certification Name'
        required: true
      -
        identifier: issuer
        type: Textarea
        rows: 1
        label: 'Issuing Body'
      -
        identifier: badge_image
        type: File
        label: 'Badge Image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: link
        type: Link
        label: 'Verification Link'
