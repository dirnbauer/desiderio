<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-card-overlay" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="card-overlay-section">
    <d:layout.container>
        <article class="card-overlay card-overlay--{data.overlay_intensity -> f:or(alternative: 'medium')}">
            <f:if condition="{data.image.0}">
                <div class="card-overlay__media">
                    <f:image image="{data.image.0}" alt="{data.image.0.alternative -> f:or(alternative: data.header)}" maxWidth="1200" loading="lazy" decoding="async" class="card-overlay__image"/>
                </div>
            </f:if>
            <d:layout.stack gap="sm" class="card-overlay__content">
                <f:if condition="{data.eyebrow}">
                    <d:atom.badge variant="secondary" class="card-overlay__eyebrow w-fit">{data -> f:render.text(field: 'eyebrow')}</d:atom.badge>
                </f:if>
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h3" class="card-overlay__title">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.description}">
                    <d:atom.typography tag="p" variant="p" class="card-overlay__description">{data -> f:render.text(field: 'description')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.link.url}">
                    <f:variable name="cardOverlayLinkLabel">{data.header -> f:format.stripTags() -> f:format.trim()}</f:variable>
                    <d:atom.button href="{data.link.url}" class="card-overlay__cta" target="{data.link.target}">
                        <span class="card-overlay__cta-text">{data -> f:render.text(field: 'link_text')}</span>
                        <span class="card-overlay__cta-arrow" aria-hidden="true">&rarr;</span>
                    </d:atom.button>
                </f:if>
            </d:layout.stack>
        </article>
    </d:layout.container>
</d:layout.section>

</html>
