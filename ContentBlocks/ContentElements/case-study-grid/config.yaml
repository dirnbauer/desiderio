name: desiderio/case-study-grid
typeName: desiderio_casestudygrid
title: 'Case Study Grid'
description: 'A two- or three-column grid of several case studies, each card showing a cover image, client name, short summary, and a key result. Use it on a references or portfolio page to let visitors browse multiple success stories at a glance. Fields include an intro eyebrow and headline, a column selector, and a repeatable case collection with client name, rich-text summary, key result, cover image, and a read-more link.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
    default: '3'
  -
    identifier: cases
    type: Collection
    table: case_study_grid_cases
    prefixField: true
    label: 'Case Studies'
    minItems: 1
    fields:
      -
        identifier: client_name
        type: Textarea
        rows: 1
        label: 'Client Name'
        required: true
      -
        identifier: summary
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Summary
        rows: 2
      -
        identifier: result
        type: Textarea
        rows: 1
        label: 'Key Result'
        description: 'e.g. 3x growth'
      -
        identifier: image
        type: File
        label: 'Cover Image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: link
        type: Link
        label: 'Read More Link'
