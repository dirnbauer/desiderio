name: desiderio/advisor-grid
typeName: desiderio_advisorgrid
title: 'Advisor Grid'
description: 'A three-column grid of cards presenting advisors or mentors with their portraits. Use it on an about, board, or startup page to lend credibility through notable backers. Each card carries a portrait image (with initial fallback), a name, an area of expertise, and a company, above an optional intro headline and sub-headline.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: advisors
    type: Collection
    table: advisor_grid_advisors
    prefixField: true
    label: Advisors
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: expertise
        type: Textarea
        rows: 1
        label: 'Area of Expertise'
      -
        identifier: company
        type: Textarea
        rows: 1
        label: Company
