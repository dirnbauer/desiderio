name: desiderio/org-chart
typeName: desiderio_orgchart
title: 'Organization Chart'
description: 'Visualize the reporting structure as an org chart.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: levels
    type: Collection
    table: org_chart_levels
    prefixField: true
    label: Levels
    labelField: level_label
    description: 'Each level is one horizontal tier, top to bottom. Add the most senior tier first.'
    minItems: 1
    fields:
      -
        identifier: level_label
        type: Textarea
        rows: 1
        label: 'Level Label'
        description: 'Short tier name, e.g. "Leadership" or "Department leads". Optional.'
      -
        identifier: people
        type: Collection
        table: org_chart_people
        label: People
        labelField: name
        minItems: 1
        maxItems: 12
        fields:
          -
            identifier: name
            type: Textarea
            rows: 1
            label: Name
            required: true
          -
            identifier: role
            type: Textarea
            rows: 1
            label: Role
