<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-footer" href="{cb:assetPath()}/frontend.css"/>

<footer class="footer footer--{data.shadcn_layout -> f:or(alternative: 'two-columns')}" aria-label="{data.header -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:footer.aria\', default: \'Footer\')}')}">
    <d:layout.container>
        <div class="footer__inner">
            <div class="footer__brand">
                <d:atom.typography tag="h2" variant="large" class="footer__title">{data -> f:render.text(field: 'brand')}</d:atom.typography>
                <f:if condition="{data.description}">
                    <div class="footer__description d-richtext">{data -> f:render.text(field: 'description')}</div>
                </f:if>
            </div>

            <f:if condition="{data.footer_links}">
                <nav class="footer__nav" aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:footer.nav.aria', default: 'Footer navigation')}">
                    <ul class="footer__links">
                        <f:for each="{data.footer_links}" as="item">
                            <li>
                                <f:if condition="{item.link}">
                                    <f:then>
                                        <d:atom.link href="{f:uri.typolink(parameter: item.link.url)}" target="{item.link.target}" variant="muted" class="footer__link">{item -> f:render.text(field: 'label')}</d:atom.link>
                                    </f:then>
                                    <f:else>
                                        <span class="footer__link">{item -> f:render.text(field: 'label')}</span>
                                    </f:else>
                                </f:if>
                            </li>
                        </f:for>
                    </ul>
                </nav>
            </f:if>

            <f:if condition="{data.utility_links}">
                <nav class="footer__utilities" aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:footer.utility.aria', default: 'Legal and utility links')}">
                    <ul class="footer__links">
                        <f:for each="{data.utility_links}" as="item">
                            <li>
                                <f:if condition="{item.link}">
                                    <f:then>
                                        <d:atom.link href="{f:uri.typolink(parameter: item.link.url)}" target="{item.link.target}" variant="muted" class="footer__link">{item -> f:render.text(field: 'label')}</d:atom.link>
                                    </f:then>
                                    <f:else>
                                        <span class="footer__link">{item -> f:render.text(field: 'label')}</span>
                                    </f:else>
                                </f:if>
                            </li>
                        </f:for>
                    </ul>
                </nav>
            </f:if>
        </div>

        <f:if condition="{data.copyright}">
            <div class="footer__bottom">
                <p class="footer__copyright">{data -> f:render.text(field: 'copyright')}</p>
            </div>
        </f:if>
    </d:layout.container>
</footer>

</html>
