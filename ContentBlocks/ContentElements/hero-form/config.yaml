name: desiderio/hero-form
typeName: desiderio_heroform
title: 'Form Capture Hero'
description: 'Centered hero with optional badge, large headline, lead subheadline, an embedded newsletter form rendered via the TYPO3 Form Framework, and a small privacy note underneath. Use it for: landing or campaign openers whose primary goal is an email address — newsletter invitations, sign-up pitches with a consent line. Prefer ''Startup Waitlist Hero'' when the source adds avatars or user-count proof; ''Newsletter Signup'' for sign-up sections further down the page.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: privacy_notice
    type: Textarea
    rows: 1
    label: 'Privacy Text'
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
