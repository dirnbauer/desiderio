<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:section name="Document">
    <article
        class="search-result results-entry rounded-xl border border-border bg-card p-4 text-card-foreground shadow-sm transition-colors hover:border-primary/40 {f:if(condition: document.isElevated, then: ' results-elevated')}"
        data-document-score="{document.score}"
        data-document-id="{document.id}"
        data-document-url="{document.url}"
    >
        <div class="flex flex-col gap-3">
            <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">
                <div class="min-w-0">
                    <f:if condition="{document.isElevated}">
                        <d:atom.badge variant="secondary" class="results-elevated-label mb-2">
                            <f:translate key="sponsored" extensionName="solr"/>
                        </d:atom.badge>
                    </f:if>
                    <h3 class="results-topic text-lg font-semibold tracking-normal">
                        <a href="{s:uri.result.addSearchWordList(url: document.url, searchWords: resultSet.usedQuery.query)}" class="text-foreground underline-offset-4 hover:text-primary hover:underline">
                            {document.title}
                        </a>
                    </h3>
                </div>
                <div class="shrink-0">
                    <f:render partial="Result/RelevanceBar" section="RelevanceBar" arguments="{resultSet: resultSet, document: document}" />
                </div>
            </div>

            <div class="results-teaser text-sm leading-6 text-muted-foreground">
                <p class="result-content">{s:document.highlightResult(resultSet: resultSet, document: document, fieldName: 'content')}</p>
                <f:if condition="{document.type} == 'tx_solr_file'">
                    <div class="mt-3 rounded-lg border border-border bg-muted/30 p-3">
                        <p class="text-xs font-medium text-foreground">
                            <f:translate key="file_mimetype" extensionName="solr"/>: {document.fileMimeType}
                        </p>
                        <p class="mt-2 text-xs font-medium text-foreground">
                            <f:translate key="file_referenced" extensionName="solr"/>:
                        </p>
                        <ul class="references mt-1 list-disc space-y-1 pl-4">
                            <f:if condition="{document.fileReferenceUrl}">
                                <li><f:link.typolink title="{document.fileReferenceTitle}" parameter="{document.fileReferenceUrl}" class="text-primary underline underline-offset-4">{document.fileReferenceTitle}</f:link.typolink></li>
                            </f:if>
                            <f:if condition="{document.variants}">
                                <f:for each="{document.variants}" as="variant">
                                    <li><f:link.typolink title="{variant.fileReferenceTitle}" parameter="{variant.fileReferenceUrl}" class="text-primary underline underline-offset-4">{variant.fileReferenceTitle}</f:link.typolink></li>
                                </f:for>
                            </f:if>
                        </ul>
                    </div>
                </f:if>

                <f:if condition="{settings.logging.debugOutput} || {logging.debugOutput}">
                    <f:variable name="documentScoreAnalyze"><f:render partial="Debug/Explain" section="Explain" arguments="{document: document, resultSet: resultSet}" /></f:variable>
                    <f:if condition="{documentScoreAnalyze}">
                        <d:molecule.alert class="query-debug mt-3">
                            <d:molecule.alertDescription><f:format.raw>{documentScoreAnalyze}</f:format.raw></d:molecule.alertDescription>
                        </d:molecule.alert>
                    </f:if>
                </f:if>
            </div>
        </div>
    </article>
</f:section>

</html>
