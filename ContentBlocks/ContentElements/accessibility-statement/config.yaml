name: desiderio/accessibility-statement
typeName: desiderio_accessibilitystatement
title: 'Accessibility Statement'
description: 'Renders a legal-style section with heading, a WCAG 2.2 conformance-level badge (A, AA, or AAA), a rich-text statement body, an optional last-updated date, and a feedback channel with a linked contact email. Use it for: accessibility statements, WCAG or EAA/BITV conformance declarations, barrier-reporting contact sections found in legal source documents. Prefer ''Imprint'' for company legal notices and ''Privacy Notice'' for data-protection text.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: conformance_level
    type: Select
    renderType: selectSingle
    label: 'Conformance Level'
    items:
      -
        label: 'WCAG 2.2 Level A'
        value: a
      -
        label: 'WCAG 2.2 Level AA'
        value: aa
      -
        label: 'WCAG 2.2 Level AAA'
        value: aaa
    default: aa
  -
    identifier: content
    type: Textarea
    label: 'Statement Content'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 8
    required: true
  -
    identifier: contact_email
    type: Text
    label: 'Contact Email'
  -
    identifier: last_updated
    type: Textarea
    rows: 1
    label: 'Last Updated'
