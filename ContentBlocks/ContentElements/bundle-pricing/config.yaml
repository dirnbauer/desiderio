name: desiderio/bundle-pricing
typeName: desiderio_bundlepricing
title: 'Bundle Pricing'
description: 'Renders a single pricing card that itemizes bundled products — each with name, short description, and individual price — then shows the combined bundle price, a savings badge, and a call-to-action button. Use it for: package deals, product or service bundles, ''better together'' offers, kit prices with itemized contents and total savings. Prefer ''Special Offer Pricing'' for one discounted item, ''Three Tier Pricing'' for plan choices, ''Order Summary'' for checkout carts.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: bundle_price
    type: Textarea
    rows: 1
    label: 'Bundle Price'
    required: true
  -
    identifier: savings_text
    type: Textarea
    rows: 1
    label: 'Savings Text'
    description: 'e.g. Save 30%'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: items
    type: Collection
    table: bundle_pricing_items
    prefixField: true
    label: 'Bundle Items'
    minItems: 2
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Item Name'
        required: true
      -
        identifier: individual_price
        type: Textarea
        rows: 1
        label: 'Individual Price'
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:short_description'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Get the Bundle'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
