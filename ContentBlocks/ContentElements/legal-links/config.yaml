name: desiderio/legal-links
typeName: desiderio_legallinks
title: 'Legal Links Row'
description: 'A horizontal navigation row listing legal pages such as privacy, terms, and imprint, with a configurable visual separator. Use it in the footer to give visitors quick access to mandatory legal pages. Fields include an optional header, a collection of link items (each with a label and link target), and the separator style (dot, pipe, slash, or none).'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: link_items
    type: Collection
    table: legal_links_link_items
    prefixField: true
    label: 'Legal Links'
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: separator
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:separator'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.dot'
        value: dot
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.pipe'
        value: pipe
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.slash'
        value: slash
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.none'
        value: none
    default: dot
