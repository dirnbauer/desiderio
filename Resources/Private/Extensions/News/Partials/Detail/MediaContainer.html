<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:argument name="media" type="iterable" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>

<f:if condition="{media}">
    <div class="news-img-wrap grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <f:for each="{media}" as="mediaElement">
            <figure class="outer">
                <d:molecule.card class="h-full overflow-hidden border-border bg-card p-0">
                    <f:if condition="{mediaElement.originalResource.type} == 2">
                        <f:render partial="Detail/MediaImage" arguments="{mediaElement: mediaElement, settings: settings}"/>
                    </f:if>
                    <f:if condition="{mediaElement.originalResource.type} == 3">
                        <f:render partial="Detail/MediaVideo" arguments="{mediaElement: mediaElement, settings: settings}"/>
                    </f:if>
                    <f:if condition="{mediaElement.originalResource.type} == 4">
                        <f:render partial="Detail/MediaVideo" arguments="{mediaElement: mediaElement, settings: settings}"/>
                    </f:if>
                    <f:if condition="{mediaElement.originalResource.type} == 5">
                        <f:render partial="Detail/MediaImage" arguments="{mediaElement: mediaElement, settings: settings}"/>
                    </f:if>
                </d:molecule.card>
            </figure>
        </f:for>
    </div>
</f:if>

</html>
