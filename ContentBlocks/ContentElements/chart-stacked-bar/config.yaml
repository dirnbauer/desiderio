name: desiderio/chart-stacked-bar
typeName: desiderio_chartstackedbar
title: 'Stacked Bar Chart'
description: 'A stacked bar chart that breaks each category''s total into coloured segments per series, with a named legend, palette options and a screen-reader table carrying row totals and a grand total. Use it to compare totals and their composition across categories such as revenue by channel or budget by department. Key fields are the comma-separated series labels, the Category | value | value chart-data rows, an optional unit, a colour palette, and a legend toggle.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: series_labels
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:field.series_labels'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:field.series_labels.description'
    required: true
  -
    identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:field.chart_data'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:field.chart_data.description'
    rows: 8
    required: true
  -
    identifier: unit
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:field.unit'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:field.unit.description'
  -
    identifier: palette
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:field.palette'
    items:
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:item.palette.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:item.palette.brand'
        value: brand
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:item.palette.cool'
        value: cool
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:item.palette.warm'
        value: warm
    default: default
  -
    identifier: show_legend
    type: Checkbox
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-stacked-bar/language/labels.xlf:field.show_legend'
    default: 1
