name: desiderio/compare
typeName: desiderio_compare
title: 'Compare Two Options'
description: 'Places two titled panels side by side, each with a rich-text description, up to eight bullet points and an optional button; the right panel is accented with a badge as the preferred choice, its points marked as included, the left points as not included. Use it for: before-and-after contrasts, without-vs-with scenarios, old way versus new way, basic-vs-premium decisions. Prefer ''Comparison Table'' for feature-by-feature matrices with several columns; use ''Two Tier Pricing'' when both options are priced plans.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'Section Subheadline'
    rows: 2
  -
    identifier: left_title
    type: Textarea
    rows: 1
    label: 'Left Title'
    required: true
  -
    identifier: left_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Left Description'
    rows: 3
  -
    identifier: left_points
    type: Collection
    table: compare_left_points
    prefixField: true
    label: 'Left Points'
    labelField: text
    minItems: 1
    maxItems: 8
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Point
  -
    identifier: left_button_text
    type: Textarea
    rows: 1
    label: 'Left Button Text'
  -
    identifier: left_button_link
    type: Link
    label: 'Left Button Link'
  -
    identifier: right_badge
    type: Textarea
    rows: 1
    label: 'Right Badge'
  -
    identifier: right_title
    type: Textarea
    rows: 1
    label: 'Right Title'
    required: true
  -
    identifier: right_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Right Description'
    rows: 3
  -
    identifier: right_points
    type: Collection
    table: compare_right_points
    prefixField: true
    label: 'Right Points'
    labelField: text
    minItems: 1
    maxItems: 8
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Point
  -
    identifier: right_button_text
    type: Textarea
    rows: 1
    label: 'Right Button Text'
  -
    identifier: right_button_link
    type: Link
    label: 'Right Button Link'
