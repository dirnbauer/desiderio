name: desiderio/hero-pricing
typeName: desiderio_heropricing
title: 'Hero Pricing'
description: 'A shadcn/ui styled TYPO3 content element for hero section, using theme tokens for light and dark mode.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
  -
    identifier: price_period
    type: Textarea
    rows: 1
    label: 'Price Period'
  -
    identifier: feature_items
    type: Collection
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: Feature
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
