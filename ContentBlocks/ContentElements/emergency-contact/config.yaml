name: desiderio/emergency-contact
typeName: desiderio_emergencycontact
title: 'Emergency Contact'
description: 'A compact highlighted notice card with an alert icon, heading, short plain-text description, a click-to-call phone number, and an availability line with clock icon. Use it for: emergency hotlines, on-call and after-hours numbers, urgent service, breakdown, or crisis contacts, ''24/7 support'' passages. Prefer ''Contact Info'' for regular contact details; use ''Inline Alert Notice'' for warnings without a phone number.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
  -
    identifier: phone
    type: Text
    label: 'Phone Number'
  -
    identifier: phone_link
    type: Link
    label: 'Phone Link'
  -
    identifier: available
    type: Textarea
    rows: 1
    label: Availability
