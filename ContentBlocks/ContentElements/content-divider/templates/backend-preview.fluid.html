<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Preview"/>

<f:section name="Header">
    <cb:link.editRecord uid="{data.uid}" table="{data.mainType}">Content Divider</cb:link.editRecord>
</f:section>

<f:section name="Content">
    <f:asset.css identifier="desiderio-content-preview" href="EXT:desiderio/Resources/Public/Css/content-preview.css" />
    <div class="d-ce-preview" data-slot="card">
        <div class="d-ce-preview__meta">
            <span class="d-ce-preview__type" data-slot="badge">Content Divider</span>
            <f:if condition="{settings._content_block_name}"><span class="d-ce-preview__ctype">{settings._content_block_name}</span></f:if>
        </div>
        <f:if condition="{data.variant}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Variant</span>
                <span class="d-ce-preview__value">{data.variant}</span>
            </div>
        </f:if>
        <f:if condition="{data.divider_text}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Divider Text</span>
                <span class="d-ce-preview__value">{data.divider_text}</span>
            </div>
        </f:if>
        <f:if condition="{data.spacing}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Spacing</span>
                <span class="d-ce-preview__value">{data.spacing}</span>
            </div>
        </f:if>
        <f:if condition="{data.color}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Color</span>
                <span class="d-ce-preview__value">{data.color}</span>
            </div>
        </f:if>
    </div>
</f:section>

</html>
