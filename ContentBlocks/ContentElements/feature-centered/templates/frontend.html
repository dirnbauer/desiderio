<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-feature-centered" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="feature-centered">
    <d:layout.container>
        <header class="feature-centered__intro">
            <f:if condition="{data.eyebrow}"><span class="feature-centered__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span></f:if>
            <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
            <f:if condition="{data.subheadline}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
        </header>

        <div class="feature-centered__items">
            <f:for each="{data.items}" as="item">
                <div class="feature-centered__item">
                    <f:if condition="{item.icon}">
                        <span class="feature-centered__icon" aria-hidden="true"><d:atom.icon name="{item.icon}" size="xl"/></span>
                    </f:if>
                    <h3 class="feature-centered__title">{item -> f:render.text(field: 'title')}</h3>
                    <f:if condition="{item.description}">
                        <p class="feature-centered__description">{item -> f:render.text(field: 'description')}</p>
                    </f:if>
                </div>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
