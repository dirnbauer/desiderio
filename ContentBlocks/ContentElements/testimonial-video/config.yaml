name: desiderio/testimonial-video
typeName: desiderio_testimonialvideo
title: 'Video Testimonial'
description: 'A two-part layout pairing an embedded YouTube or Vimeo video with a written pull quote and author details. Use it when a customer''s spoken endorsement is more convincing than text alone, on case-study or product pages. It takes a video URL, an optional poster image and pull quote, plus the author name, title and company, with a section heading.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: quote
    type: Textarea
    label: 'Pull Quote'
    rows: 3
  -
    identifier: video_url
    type: Text
    label: 'Video URL'
    description: 'YouTube or Vimeo embed URL'
    required: true
  -
    identifier: poster_image
    type: File
    label: 'Poster Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
    required: true
  -
    identifier: author_title
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_title'
  -
    identifier: author_company
    type: Textarea
    rows: 1
    label: Company
