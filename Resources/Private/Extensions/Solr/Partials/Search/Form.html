<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:argument name="additionalFilters" type="array" optional="true"/>
<f:argument name="existingParameters" type="array" optional="true"/>
<f:argument name="pluginNamespace" type="string" optional="true"/>

<f:section name="Form">
    <div class="tx-solr-search-form">
        <s:searchForm id="tx-solr-search-form-pi-results" additionalFilters="{additionalFilters}" suggestHeader="{f:translate(key: 'suggest_header', default: 'Top Results', extensionName: 'solr')}">
            <f:for each="{existingParameters}" key="name" as="value">
                <f:form.hidden name="{pluginNamespace}{name}" value="{value}" />
            </f:for>

            <div class="flex flex-col gap-2 sm:flex-row">
                <label for="tx-solr-q" class="sr-only">
                    <f:translate key="search" default="Search" extensionName="solr">Search</f:translate>
                </label>
                <input
                    id="tx-solr-q"
                    type="search"
                    class="tx-solr-q js-solr-q tx-solr-suggest tx-solr-suggest-focus h-10 min-w-0 flex-1 rounded-lg border border-input bg-background px-3 py-2 text-base text-foreground outline-none transition-colors placeholder:text-muted-foreground focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 md:text-sm"
                    name="{pluginNamespace}[q]"
                    value="{q}"
                    maxlength="50"
                    autocomplete="off"
                />
                <d:atom.button type="submit" size="lg" class="tx-solr-submit">
                    <f:translate key="submit" extensionName="solr">Search</f:translate>
                </d:atom.button>
            </div>
        </s:searchForm>
    </div>
</f:section>

</html>
