<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:argument name="author" type="T3G\AgencyPack\Blog\Domain\Model\Author" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>

<div class="h-full" data-blog-author="{author.uid}">
<d:molecule.card class="h-full border-border bg-card transition-colors hover:border-primary/40">
    <d:molecule.cardContent class="flex h-full flex-col gap-4">
        <div class="flex items-center gap-3">
            <f:variable name="avatarsize" value="{settings.authors.avatar.provider.size as integer}" />
            <f:if condition="{avatarsize}"><f:else><f:variable name="avatarsize" value="56" /></f:else></f:if>
            <img
                loading="lazy"
                class="size-14 rounded-full border border-border object-cover"
                height="{avatarsize}"
                width="{avatarsize}"
                src="{blogvh:uri.avatar(author: author, size: avatarsize)}"
                alt="{author.name}"
            >
            <div class="min-w-0">
                <h2 class="text-lg font-semibold text-foreground" itemprop="name">
                    <blogvh:link.author author="{author}" class="!no-underline outline-none transition-colors hover:text-primary focus-visible:ring-3 focus-visible:ring-ring/40" />
                </h2>
                <f:if condition="{author.title}">
                    <p class="text-sm text-muted-foreground">{author.title}</p>
                </f:if>
            </div>
        </div>
        <f:if condition="{author.bio}">
            <p class="text-sm leading-6 text-muted-foreground" itemprop="description">
                <f:format.crop maxCharacters="220" append="&nbsp;[…]">{author.bio}</f:format.crop>
            </p>
        </f:if>
        <p class="mt-auto">
            <blogvh:link.author author="{author}" class="inline-flex items-center gap-1 text-sm font-medium text-primary !no-underline outline-none transition-colors hover:text-primary focus-visible:ring-3 focus-visible:ring-ring/40">
                <span><f:translate extensionName="Blog" key="list.show.author">All posts</f:translate></span>
                <d:atom.icon name="arrow-right" size="xs"/>
            </blogvh:link.author>
        </p>
    </d:molecule.cardContent>
</d:molecule.card>
</div>

</html>
