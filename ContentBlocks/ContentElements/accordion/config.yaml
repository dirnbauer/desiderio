name: desiderio/accordion
typeName: desiderio_accordion
title: 'Accordion'
description: 'A stack of expandable panels that reveal their content when a header is clicked. Use it for FAQs or detailed sections where you want to keep the page compact and let readers scan titles first. Each item has a question or title plus rich-text answer; options control whether multiple panels can stay open and which open by default.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: allow_multiple
    type: Checkbox
    label: 'Allow Multiple Open'
    description: 'Allow multiple accordion items to be open at once'
    default: 0
  -
    identifier: items
    type: Collection
    table: accordion_items
    prefixField: true
    label: 'Accordion Items'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Question / Title'
        required: true
      -
        identifier: content
        type: Textarea
        label: 'Answer / Content'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 5
      -
        identifier: open_by_default
        type: Checkbox
        label: 'Open by Default'
        default: 0
