<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-social-proof-counter" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="social-proof-counter">
    <d:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="social-proof-counter__intro">
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h3" class="social-proof-counter__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <d:atom.typography variant="muted" class="social-proof-counter__description">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
                </f:if>
            </header>
        </f:if>

        <dl class="social-proof-counter__row social-proof-counter__row--{data.shadcn_layout -> f:or(alternative: 'inline')}"
            aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:stats.aria')}">
            <f:for each="{data.counters}" as="counter">
                <div class="social-proof-counter__item" data-astro-reveal="slide-up">
                    <f:if condition="{counter.icon_name} != 'none'">
                        <span class="social-proof-counter__icon" aria-hidden="true"><d:atom.icon name="{counter.icon_name}" size="xl"/></span>
                    </f:if>
                    <dt class="social-proof-counter__label">{counter -> f:render.text(field: 'label')}</dt>
                    <dd class="social-proof-counter__value" data-astro-counter data-astro-duration="2800">{counter -> f:render.text(field: 'value')}</dd>
                </div>
            </f:for>
        </dl>
    </d:layout.container>
</d:layout.section>
</html>
