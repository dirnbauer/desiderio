name: desiderio/footer-newsletter
typeName: desiderio_footernewsletter
title: 'Newsletter Footer'
description: 'Renders a footer that pairs a heading and rich-text intro with an embedded newsletter signup form (TYPO3 Form Framework), an optional privacy note beneath the form, and a copyright line. Use it for: subscribe prompts, mailing-list invitations, and stay-updated sections that close a page. Prefer ''Newsletter Signup'' or ''Newsletter Inline'' for mid-page capture; ''Mega Footer'' when link columns must accompany the form.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: privacy_notice
    type: Textarea
    rows: 1
    label: 'Privacy Note'
    description: 'Small text below the form'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
