<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-hero-video" href="{cb:assetPath()}/frontend.css"/>
<f:variable name="videoLabel">{data.video_title -> f:or(alternative: '{data.header}')}</f:variable>

<d:layout.section class="hero-video">
    <d:layout.container>
        <div class="hero-video__grid">
            <div class="hero-video__copy">
                <f:if condition="{data.eyebrow}">
                    <p class="hero-video__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h1" class="hero-video__headline" itemprop="">
                        <span id="hero-video-title-{data.uid}">{data -> f:render.text(field: 'header')}</span>
                    </d:atom.typography>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <d:atom.typography variant="lead" class="hero-video__description">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.primary_button_text} && {data.primary_button_link}">
                    <div class="hero-video__actions">
                        <d:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</d:atom.button>{data -> f:render.link(field: 'primary_button_link')}
                    </div>
                </f:if>
            </div>
            <figure class="hero-video__panel">
                <div class="hero-video__poster">
                    <f:if condition="{data.video_url}">
                        <f:then>
                            <iframe class="hero-video__iframe"
                                    src="{data.video_url}"
                                    title="{videoLabel -> f:format.trim()}"
                                    loading="lazy"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                    allowfullscreen></iframe>
                        </f:then>
                        <f:else>
                            <span class="hero-video__play" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="hero-video__play-icon">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </span>
                        </f:else>
                    </f:if>
                </div>
                <f:if condition="{data.video_title} || {data.video_description}">
                    <figcaption class="hero-video__caption">
                        <f:if condition="{data.video_title}">
                            <d:atom.typography variant="large" class="hero-video__panel-title">{data -> f:render.text(field: 'video_title')}</d:atom.typography>
                        </f:if>
                        <f:if condition="{data.video_description}">
                            <d:atom.typography tag="div" variant="muted" class="hero-video__panel-copy d-richtext">{data -> f:render.text(field: 'video_description')}</d:atom.typography>
                        </f:if>
                    </figcaption>
                </f:if>
            </figure>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
