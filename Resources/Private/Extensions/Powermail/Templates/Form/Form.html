<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>
<f:layout name="Default" />

<f:argument name="form" type="object" optional="{true}" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="ttContentData" type="array" optional="{true}" />
<f:argument name="action" type="string" optional="{true}" default="create" />
<f:argument name="mail" type="object" optional="{true}" />

<f:section name="main">
    <f:variable name="flashMessageClass"><d:atom.controlClass slot="flashDestructive" /></f:variable>
    <f:alias map="{flashMessageClass: flashMessageClass}">
        <f:render partial="Misc/FlashMessages" arguments="{_all}" />
    </f:alias>

    <f:if condition="{form}">
        <f:then>
            <f:variable name="formCardClass"><d:atom.controlClass slot="card" /></f:variable>
            <f:variable name="cardHeaderClass"><d:atom.controlClass slot="cardHeaderBordered" /></f:variable>
            <f:variable name="cardTitleClass"><d:atom.controlClass slot="cardTitle" /></f:variable>
            <f:variable name="cardDescriptionClass"><d:atom.controlClass slot="cardDescription" /></f:variable>
            <div class="mt-8 w-full max-w-2xl">
                <f:form
                    action="{action}"
                    section="c{ttContentData.uid}"
                    name="field"
                    enctype="multipart/form-data"
                    autocomplete="{form.autocompleteToken}"
                    additionalAttributes="{vh:validation.enableJavascriptValidationAndAjax(form: form)}"
                    addQueryString="{settings.misc.addQueryString}"
                    data-powermail-message-number="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.validation.number')}"
                    data-powermail-message-required="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.validation.required')}"
                    data-powermail-message-integer="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.validation.integer')}"
                    data-powermail-message-min="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.validation.min')}"
                    data-powermail-message-max="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.validation.max')}"
                    class="{form.css} {vh:misc.morestepClass(activate: settings.main.moresteps)} {formCardClass -> f:format.trim()}">

                    <f:if condition="{form.css} != 'nolabel'">
                        <header data-slot="card-header" class="{cardHeaderClass -> f:format.trim()}">
                            <h2 data-slot="card-title" class="{cardTitleClass -> f:format.trim()}">{form.title}</h2>
                            <p data-slot="card-description" class="{cardDescriptionClass -> f:format.trim()}">
                                <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.form.requiredHint.before" /><span class="text-destructive">*</span><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.form.requiredHint.after" />
                            </p>
                        </header>
                    </f:if>

                    <f:render partial="Misc/FormError" arguments="{_all}" />

                    <div class="d-powermail-client-errors hidden mb-6" data-powermail-error-summary hidden role="alert" aria-live="assertive" aria-atomic="true" tabindex="-1">
                        <h3 class="mb-2 font-medium text-destructive" data-powermail-error-summary-title>
                            <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.validation.summary.title" />
                        </h3>
                        <p class="mb-3 text-sm text-muted-foreground" data-powermail-error-summary-description>
                            <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.validation.summary.description" />
                        </p>
                        <ol class="list-decimal space-y-1 ps-4 text-sm" data-powermail-error-summary-list></ol>
                    </div>

                    <f:if condition="{settings.main.moresteps}">
                        <f:variable name="tabsListClass"><d:atom.controlClass slot="tabsList" /></f:variable>
                        <f:variable name="tabsTriggerClass"><d:atom.controlClass slot="tabsTrigger" /></f:variable>
                        <f:variable name="stepIndexClass"><d:atom.controlClass slot="stepIndex" /></f:variable>
                        <f:variable name="stepCount">{form.pages -> f:count()}</f:variable>
                        <f:variable name="currentStepSuffix"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.multistep.currentSuffix" /></f:variable>
                        <!-- One horizontal row on every viewport: below sm the inactive
                             steps collapse to number chips (labels stay sr-only for AT)
                             and only the active step shows its label. -->
                        <nav class="{tabsListClass -> f:format.trim()} d-powermail-steps flex w-full items-stretch gap-1 sm:gap-2" data-variant="default" aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.multistep.label')}">
                            <f:for each="{form.pages}" as="page" iteration="iterationPages">
                                <button class="{tabsTriggerClass -> f:format.trim()} d-powermail-step group/steptab min-w-0 flex-none max-sm:data-[active=true]:flex-1 sm:flex-1"
                                        type="button"
                                        data-active="{f:if(condition: iterationPages.isFirst, then: 'true', else: 'false')}"
                                        data-state="{f:if(condition: iterationPages.isFirst, then: 'active', else: 'inactive')}"
                                        data-powermail-morestep-validate="{settings.validation.morestep.fieldset}"
                                        data-powermail-fieldset="{page.uid}"
                                        data-powermail-morestep-current="{iterationPages.index}"
                                        data-powermail-morestep-show="{iterationPages.index}"
                                        data-powermail-step-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.multistep.stepLabel', arguments: {0: iterationPages.cycle, 1: stepCount, 2: page.title})}"
                                        data-powermail-step-current-suffix="{currentStepSuffix}"
                                        aria-controls="powermail_fieldset_{page.uid}"
                                        aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/powermail.xlf:powermail.multistep.stepLabel', arguments: {0: iterationPages.cycle, 1: stepCount, 2: page.title})}{f:if(condition: iterationPages.isFirst, then: currentStepSuffix, else: '')}"
                                        aria-current="{f:if(condition: iterationPages.isFirst, then: 'step', else: 'false')}">
                                    <!-- pointer-events-none: powermail's MoreStepForm reads its
                                         data attributes from event.target — a click landing on an
                                         inner span would resolve to no target step, hide every
                                         fieldset and skip validation. Keep the button the target. -->
                                    <span class="{stepIndexClass -> f:format.trim()} pm-step-num pointer-events-none">{iterationPages.cycle}</span>
                                    <span class="pointer-events-none min-w-0 truncate max-sm:sr-only max-sm:group-data-[active=true]/steptab:not-sr-only">{page.title}</span>
                                </button>
                            </f:for>
                        </nav>
                    </f:if>

                    <d:molecule.cardContent>
                        <f:for each="{form.pages}" as="page" iteration="iterationPages">
                            <f:render partial="Form/Page" arguments="{_all}" />
                        </f:for>
                    </d:molecule.cardContent>

                    <f:form.hidden name="mail[form]" value="{form.uid}" class="powermail_form_uid" respectSubmittedDataValue="false" />
                    <f:render partial="Misc/HoneyPod" arguments="{form: form}" />
                </f:form>
            </div>
        </f:then>
        <f:else>
            <f:variable name="alertClass"><d:atom.controlClass slot="alertDestructive" /></f:variable>
            <div class="{alertClass -> f:format.trim()}">
                <f:translate key="error_no_form" extensionName="Powermail" />
            </div>
        </f:else>
    </f:if>
</f:section>
</html>
