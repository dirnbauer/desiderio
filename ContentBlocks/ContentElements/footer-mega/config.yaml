        identifier: link_3_label
        type: Textarea
        rows: 1
        label: 'Link 3 Label'
      -
        identifier: link_3
        type: Link
        label: 'Link 3'
      -
        identifier: link_4_label
        type: Textarea
        rows: 1
        label: 'Link 4 Label'
      -
        identifier: link_4
        type: Link
        label: 'Link 4'
      -
        identifier: link_5_label
        type: Textarea
        rows: 1
        label: 'Link 5 Label'
      -
        identifier: link_5
        type: Link
        label: 'Link 5'
