name: desiderio/press-mentions
typeName: desiderio_pressmentions
title: 'Press Mentions'
description: 'Use when the press mentions should turn proof points into visible trust signals.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: mentions
    type: Collection
    table: press_mentions_mentions
    prefixField: true
    label: 'Press Mentions'
    minItems: 1
    fields:
      -
        identifier: publication
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:publication'
        required: true
      -
        identifier: logo
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:publication_logo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: quote
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:quote_excerpt'
        rows: 2
      -
        identifier: date
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:date'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:article_link'
