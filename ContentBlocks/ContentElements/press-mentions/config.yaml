name: desiderio/press-mentions
typeName: desiderio_pressmentions
title: 'Press Mentions Grid'
description: 'A grid of press cards, each combining an outlet logo, a short pull-quote as a blockquote, the publication name, an optional date, and a read-article link, beneath an eyebrow and headline. Use it for: as-seen-in and in-the-news sections, media coverage roundups, press review lists quoting articles about the company. Prefer ''Logo Grid'' for logo-only press strips; use ''Grid Testimonial'' when quotes come from customers rather than journalists.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: mentions
    type: Collection
    table: press_mentions_mentions
    prefixField: true
    label: 'Press Mentions'
    minItems: 1
    fields:
      -
        identifier: publication
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:publication'
        required: true
      -
        identifier: logo
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:publication_logo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: quote
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:quote_excerpt'
        rows: 2
      -
        identifier: date
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:date'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:article_link'
