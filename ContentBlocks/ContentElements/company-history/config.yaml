name: desiderio/company-history
typeName: desiderio_companyhistory
title: 'Company History Timeline'
description: 'An ordered vertical timeline of milestone events, each marked with a year, a title and an optional rich-text description. Use it on about or company pages to trace the organisation''s journey and key moments chronologically. Key fields are a heading and subheadline intro plus a repeatable Events collection where each entry holds a year, title and description.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: events
    type: Collection
    table: company_history_events
    prefixField: true
    label: Events
    minItems: 1
    fields:
      -
        identifier: year
        type: Textarea
        rows: 1
        label: Year
        required: true
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
