name: desiderio/tabs
typeName: desiderio_tabs
title: 'Tabbed Content Panels'
description: 'An interactive tab group that switches between multiple rich-text panels behind labeled, optionally icon-prefixed tabs. Use it to organize related content compactly, such as product details, FAQs, or step-by-step instructions, without overwhelming the page. Key fields are the tab style (default or line), an optional heading, the default active tab index, and a panel collection with tab label, rich-text content, and an optional icon per tab.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'Tab Style'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: Line
        value: line
    default: default
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: default_tab
    type: Number
    label: 'Default Active Tab'
    description: 'Index of the tab to show by default (0 = first)'
    default: 0
  -
    identifier: items
    type: Collection
    table: tabs_items
    prefixField: true
    label: 'Tab Panels'
    minItems: 2
    fields:
      -
        identifier: tab_label
        type: Textarea
        rows: 1
        label: 'Tab Label'
        required: true
      -
        identifier: tab_content
        type: Textarea
        label: 'Tab Content'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 6
        required: true
      -
        identifier: tab_icon
        type: Select
        renderType: selectSingle
        label: 'Tab Icon'
        description: 'Optional semantic Desiderio icon key; rendering follows the configured icon library.'
        itemsProcessors:
          10:
            class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
