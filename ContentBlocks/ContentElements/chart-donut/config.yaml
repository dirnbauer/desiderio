name: desiderio/chart-donut
typeName: desiderio_chartdonut
title: 'Donut Chart'
description: 'Renders a JavaScript-drawn donut ring from two to five labelled value segments, with an optional headline figure and label in the center, a color-keyed legend, and a hidden accessible data table. Use it for: part-of-whole breakdowns — budget splits, revenue by segment, market share, portfolio allocation, survey answer distribution — especially when one headline total belongs in the center. Prefer ''Pie Chart'' when no center figure is needed; ''Stacked Bar Chart'' compares composition across categories.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: segments
    type: Collection
    table: chart_donut_segments
    prefixField: true
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.segments'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.segments.description'
    minItems: 2
    maxItems: 5
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.segment.label'
        required: true
      -
        identifier: value
        type: Number
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.segment.value'
        required: true
      -
        identifier: unit
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.segment.unit'
  -
    identifier: center_value
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.center_value'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.center_value.description'
  -
    identifier: center_label
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.center_label'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.center_label.description'
  -
    identifier: show_legend
    type: Checkbox
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-donut/language/labels.xlf:field.show_legend'
    default: 1
