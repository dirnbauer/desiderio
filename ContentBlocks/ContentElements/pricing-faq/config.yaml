name: desiderio/pricing-faq
typeName: desiderio_pricingfaq
title: 'Pricing FAQ Accordion'
description: 'A collapsible accordion that answers common pricing and billing questions to remove buying friction. Place it below pricing tables to handle objections about plans, refunds, or contracts before checkout. Each item pairs a question with a rich-text answer, framed by an eyebrow, headline, and sub-headline.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: question_items
    type: Collection
    table: pricing_faq_question_items
    prefixField: true
    label: Questions
    minItems: 1
    fields:
      -
        identifier: question
        type: Textarea
        rows: 1
        label: Question
        required: true
      -
        identifier: answer
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Answer
        rows: 3
        required: true
