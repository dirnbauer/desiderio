<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="General" />

<f:section name="content">
    <!--TYPO3SEARCH_end-->
    <f:if condition="{news}">
        <f:then>
            <div class="news-list-view flex flex-col gap-6" id="news-container-{contentObjectData.uid}">
                <f:if condition="{settings.list.useLoadMore}">
                    <f:then>
                        <f:render partial="List/LoadMore" arguments="{newsList: news, settings: settings, contentObjectData: contentObjectData}"/>
                    </f:then>
                    <f:else>
                        <f:if condition="{settings.hidePagination}">
                            <f:then>
                                <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                                    <f:for each="{news}" as="newsItem" iteration="iterator">
                                        <f:render partial="List/Item" arguments="{newsItem: newsItem, settings: settings, iterator: iterator}" />
                                    </f:for>
                                </div>
                            </f:then>
                            <f:else>
                                <f:if condition="{settings.list.paginate.insertAbove}">
                                    <f:render partial="List/Pagination" arguments="{pagination: pagination.pagination, paginator: pagination.paginator}" />
                                </f:if>
                                <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                                    <f:for each="{pagination.paginator.paginatedItems}" as="newsItem" iteration="iterator">
                                        <f:render partial="List/Item" arguments="{newsItem: newsItem, settings: settings, iterator: iterator}" />
                                    </f:for>
                                </div>
                                <f:if condition="{settings.list.paginate.insertBelow}">
                                    <f:render partial="List/Pagination" arguments="{pagination: pagination.pagination, paginator: pagination.paginator}" />
                                </f:if>
                            </f:else>
                        </f:if>
                    </f:else>
                </f:if>
            </div>
        </f:then>
        <f:else>
            <d:molecule.alert>
                <d:molecule.alertDescription><f:translate key="list_nonewsfound" /></d:molecule.alertDescription>
            </d:molecule.alert>
        </f:else>
    </f:if>
    <!--TYPO3SEARCH_begin-->
</f:section>

</html>
