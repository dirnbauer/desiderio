name: desiderio/definition-list
typeName: desiderio_definitionlist
title: 'Definition List'
description: 'List terms with their definitions in a stacked, inline, or grid glossary layout.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: shadcn_layout
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:layout'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.stacked'
        value: stacked
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.inline'
        value: inline
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.grid'
        value: grid
    default: stacked
  -
    identifier: items
    type: Collection
    table: definition_list_items
    prefixField: true
    label: Definitions
    minItems: 1
    fields:
      -
        identifier: term
        type: Textarea
        rows: 1
        label: Term
        required: true
      -
        identifier: definition
        type: Textarea
        label: Definition
        rows: 2
        required: true
