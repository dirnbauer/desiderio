name: desiderio/sitemap-grid
typeName: desiderio_sitemapgrid
title: 'Sitemap Grid'
description: 'A multi-column footer block that lays out grouped page links as a navigable sitemap. Use it in the footer to give visitors a structured overview of every section and improve site-wide navigation. Add named link groups (e.g. Product, Company, Resources), each with up to twelve labeled links, and choose a three- or four-column layout under an optional heading.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '4'
  -
    identifier: groups
    type: Collection
    table: sitemap_grid_groups
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:page_groups'
    labelField: title
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:group_title'
        description: 'Column heading, e.g. Product, Company, Resources. 1-2 words.'
        required: true
      -
        identifier: pages
        type: Collection
        table: sitemap_grid_pages
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:links'
        labelField: label
        minItems: 1
        maxItems: 12
        fields:
          -
            identifier: label
            type: Textarea
            rows: 1
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:page_label'
            description: 'Link text, meaningful out of context. Front-load the topic word.'
            required: true
          -
            identifier: link
            type: Link
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:page_link'
