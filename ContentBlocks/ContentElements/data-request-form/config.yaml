name: desiderio/data-request-form
typeName: desiderio_datarequestform
title: 'Data Request Form'
description: 'A privacy-focused block that pairs an intro heading and rich-text description with a TYPO3 Form Framework form so visitors can request, export, or delete their personal data. Use it in the footer or on a privacy or GDPR page where users exercise their data rights. Key fields are the heading, the rich-text description, and the privacy notice text shown below the form.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: request_types
    type: Collection
    table: data_request_form_request_types
    prefixField: true
    label: 'Request Types'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'Request Type Label'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'Form Value'
  -
    identifier: privacy_text
    type: Textarea
    label: 'Privacy Notice Text'
    rows: 2
  -
    identifier: submit_text
    type: Textarea
    rows: 1
    label: 'Submit Button Text'
    default: 'Submit Request'
