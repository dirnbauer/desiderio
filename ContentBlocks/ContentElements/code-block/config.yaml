name: desiderio/code-block
typeName: desiderio_codeblock
title: 'Code Block'
description: 'A shadcn/ui styled TYPO3 content element for content presentation, using theme tokens for light and dark mode.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: language
    type: Text
    label: 'Language Label'
    description: 'e.g. JavaScript, PHP, HTML'
  -
    identifier: code
    type: Textarea
    label: Code
    rows: 12
    required: true
  -
    identifier: filename
    type: Text
    label: Filename
    description: 'Optional filename shown above the code'
