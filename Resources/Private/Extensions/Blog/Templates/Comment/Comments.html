<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Post" />

<f:section name="Content">
    <f:if condition="{settings.comments.active}">
        <f:variable name="commentCount" value="{comments -> f:count()}"/>
        <section class="flex flex-col gap-5 border-t border-border pt-8" id="comments" aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/blog.xlf:comments.heading', arguments: {count: commentCount})}">
            <d:atom.typography tag="h2" variant="h2">
                <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/blog.xlf:comments.heading" arguments="{count: commentCount}" />
            </d:atom.typography>
            <f:if condition="{settings.comments.disqus.enable} !== '1'">
                <f:if condition="{comments}">
                    <ol role="list" class="flex flex-col gap-4">
                        <f:for each="{comments}" as="comment">
                            <li><f:render partial="Comments/Comment" arguments="{comment: comment, settings: settings}"/></li>
                        </f:for>
                    </ol>
                </f:if>
            </f:if>
        </section>
    </f:if>
</f:section>

</html>
