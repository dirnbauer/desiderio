name: desiderio/changelog
typeName: desiderio_changelog
title: 'Changelog Data View'
description: 'A dated, ordered history that lists product releases or updates as a chronological timeline. Place it on release-notes, what''s-new, or product-update pages so visitors can scan recent changes at a glance. Each release entry carries a version, date, release title, rich-text release notes, and a colored tag (New, Fix, Improvement, or Breaking).'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: changelog_items
    prefixField: true
    label: Releases
    minItems: 1
    fields:
      -
        identifier: version
        type: Textarea
        rows: 1
        label: Version
        required: true
      -
        identifier: date
        type: Textarea
        rows: 1
        label: Date
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Release Title'
      -
        identifier: description
        type: Textarea
        label: 'Release Notes'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
      -
        identifier: tag
        type: Select
        renderType: selectSingle
        label: Tag
        items:
          -
            label: New
            value: new
          -
            label: Fix
            value: fix
          -
            label: Improvement
            value: improvement
          -
            label: Breaking
            value: breaking
        default: new
