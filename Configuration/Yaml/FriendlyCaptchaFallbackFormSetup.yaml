# Fallback form setup, only registered when studiomitte/friendlycaptcha is
# NOT installed (see ext_localconf.php). Keeps the bundled Desiderio forms
# renderable by mapping the "Friendlycaptcha" element to a decorative
# placeholder widget and an always-passing validator.
TYPO3:
  CMS:
    Form:
      prototypes:
        standard:
          formElementsDefinition:
            Form:
              renderingOptions:
                partialRootPaths:
                  1777100143: 'EXT:desiderio/Resources/Private/Form/Partials'
            Friendlycaptcha:
              implementationClassName: 'TYPO3\CMS\Form\Domain\Model\FormElements\GenericFormElement'
              formEditor:
                label: 'Friendly Captcha (placeholder)'
                group: custom
                groupSorting: 1010
                iconIdentifier: 'form-checkbox'
                predefinedDefaults:
                  validators:
                    -
                      identifier: 'Friendlycaptcha'
                editors:
                  100:
                    identifier: label
                    templateName: Inspector-TextEditor
                    label: formEditor.elements.FormElement.editor.label.label
                    propertyPath: label
          validatorsDefinition:
            Friendlycaptcha:
              implementationClassName: 'Webconsulting\Desiderio\Domain\Validator\FriendlyCaptchaFallbackValidator'
              formEditor:
                iconIdentifier: 'form-validator'
                label: 'Friendly Captcha (placeholder, always passes)'
