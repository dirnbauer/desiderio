# Preset — Dashboard App
# Sticky header, compact density, violet accent.

desiderio:
  brand:
    wordmark: Desiderio Dashboard
    tagline: Operational app template for dense internal workflows.
  layout:
    density: compact
    container: full
    radius: md
  header:
    style: sticky
    fixedPosition: true
  footer:
    style: minimal
  theme:
    accent: violet
    darkModeDefault: dark
    darkModeToggle: true
  typography:
    fontSans: geist
