<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:section name="Stage">
    <f:render partial="Presets/Stage" arguments="{content: content.stage, class: 'desiderio-saas-start__stage', containerSize: 'xl', innerClass: 'desiderio-saas-template__stage-inner'}"/>
</f:section>

<f:section name="Main">
    <div class="desiderio-saas-template desiderio-saas-start">
        <d:layout.container size="xl">
            <header class="desiderio-saas-start__hero">
                <p>{breadcrumb.0.title}</p>
                <h1>{site.configuration.websiteTitle -> f:or(alternative: page.pageRecord.title)}</h1>
                <f:if condition="{page.pageRecord.abstract}">
                    <span>{page.pageRecord.abstract}</span>
                </f:if>
            </header>
            <div class="desiderio-saas-template__content desiderio-saas-start__content">
                <f:render partial="Presets/ContentArea" arguments="{content: content.main}"/>
            </div>
        </d:layout.container>
    </div>
</f:section>

</html>
