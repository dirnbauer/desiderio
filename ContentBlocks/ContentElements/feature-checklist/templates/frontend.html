<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-feature-checklist" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="feature-checklist">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="feature-checklist__intro">
                <f:if condition="{data.eyebrow}"><span class="feature-checklist__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span></f:if>
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
            </header>
        </f:if>
        <div class="feature-checklist__body">
            <d:molecule.card class="feature-checklist__list">
                <ul class="feature-checklist__items" role="list">
                    <f:for each="{data.items}" as="item">
                        <li class="feature-checklist__item">
                            <span class="feature-checklist__marker" aria-hidden="true">
                                <d:atom.icon name="check" size="sm" aria-hidden="true"/>
                            </span>
                            <div class="feature-checklist__text">
                                <h3 class="feature-checklist__title">{item -> f:render.text(field: 'title')}</h3>
                                <f:if condition="{item.description_text}">
                                    <p class="feature-checklist__description">{item -> f:render.text(field: 'description_text')}</p>
                                </f:if>
                            </div>
                        </li>
                    </f:for>
                </ul>
            </d:molecule.card>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
