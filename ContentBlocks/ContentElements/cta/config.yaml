name: desiderio/cta
typeName: desiderio_cta
title: 'Call to Action'
description: 'A flexible conversion block that switches between centered, split, banner, and minimal layouts to prompt one clear next step. Use it anywhere you need a focused headline-and-button moment, from page ends to mid-content breaks. Key fields are the headline, sub-headline, a primary and secondary button each with text and link, a background style, the layout variant, and an optional image shown only in the split layout.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.centered'
        value: centered
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.split'
        value: split
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.banner'
        value: banner
      -
        label: Minimal
        value: minimal
    default: centered
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
  -
    identifier: background_style
    type: Select
    renderType: selectSingle
    label: 'Background Style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: Muted
        value: muted
      -
        label: Primary
        value: primary
    default: default
  -
    identifier: cta_image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
    allowed: common-image-types
    maxitems: 1
    displayCond: 'FIELD:variant:=:split'
