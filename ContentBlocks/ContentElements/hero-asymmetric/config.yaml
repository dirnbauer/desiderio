name: desiderio/hero-asymmetric
typeName: desiderio_heroasymmetric
title: 'Asymmetric Hero'
description: 'An off-center hero with text and image set in an unbalanced grid for a dynamic, modern look. Use it at the top of a landing page where you want visual energy plus a supporting product or lifestyle image. Carries a badge, headline, subheadline, hero image, two call-to-action buttons and a short reassurance line under them (e.g. "No credit card required").'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
  -
    identifier: hero_image
    type: File
    label: 'Hero Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
  -
    identifier: reassurance_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:reassurance_text'
    description: 'Short trust line under the buttons (e.g. "No credit card required")'
