name: desiderio/badge-grid
typeName: desiderio_badgegrid
title: 'Badge Grid'
description: 'A scannable grid of small badges or tags, optionally linked, with a shared visual style and per-badge color. Use it to display skills, topics, categories or keywords compactly on a page. Key fields: heading and rich-text description, a style variant (default, outline, secondary), and per-badge text, optional link and color (default, blue, green, red, yellow).'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.outline'
        value: outline
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.secondary'
        value: secondary
    default: default
  -
    identifier: items
    type: Collection
    table: badge_grid_items
    prefixField: true
    label: Badges
    minItems: 1
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
      -
        identifier: color
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:color'
        items:
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
            value: default
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.blue'
            value: blue
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.green'
            value: green
          -
            label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.red'
            value: red
          -
            label: Yellow
            value: yellow
        default: default
