<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-company-perks" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="company-perks">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="company-perks__intro">
                <f:if condition="{data.eyebrow}"><span class="company-perks__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span></f:if>
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <div class="company-perks__grid">
            <f:for each="{data.perks}" as="perk">
                <d:molecule.card class="company-perks__item">
                    <f:if condition="{perk.icon}"><span class="company-perks__icon">{perk -> f:render.text(field: 'icon')}</span></f:if>
                    <h3 class="company-perks__title">{perk -> f:render.text(field: 'title')}</h3>
                    <f:if condition="{perk.description}"><p class="company-perks__description">{perk -> f:render.text(field: 'description')}</p></f:if>
                </d:molecule.card>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
