<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-cta-card" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="cta-card">
    <d:layout.container>
        <d:molecule.card class="cta-card__card">
            <f:if condition="{data.badge}"><span class="cta-card__badge">{data -> f:render.text(field: 'badge')}</span></f:if>
            <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
            <f:if condition="{data.description}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'description')}</d:atom.typography></f:if>
            <f:if condition="{data.cta_text} && {data.cta_link.url}">
                <div class="cta-card__actions">
                    <d:atom.button href="{data.cta_link.url}" target="{data.cta_link.target}" size="lg">{data -> f:render.text(field: 'cta_text')}</d:atom.button>
                </div>
            </f:if>
        </d:molecule.card>
    </d:layout.container>
</d:layout.section>

</html>
