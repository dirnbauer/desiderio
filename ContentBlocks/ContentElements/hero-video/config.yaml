name: desiderio/hero-video
typeName: desiderio_herovideo
title: 'Video Hero'
description: 'Open a page with message, value, and the next action.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: video_title
    type: Textarea
    rows: 1
    label: 'Video Title'
  -
    identifier: video_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Video Description'
    rows: 2
  -
    identifier: video_url
    type: Text
    label: 'Video URL'
    description: 'Use an embeddable video URL, for example a YouTube nocookie or Vimeo player URL.'
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
