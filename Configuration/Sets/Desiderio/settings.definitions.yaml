    label: 'Header'
    parent: desiderio
  desiderio.footer:
    label: 'Footer'
    parent: desiderio
  desiderio.search:
    label: 'Search'
    parent: desiderio
  desiderio.seo:
    label: 'SEO'
    parent: desiderio
  desiderio.tracking:
    label: 'Tracking'
    parent: desiderio
  desiderio.consent:
    label: 'Consent'
    parent: desiderio
  desiderio.theme:
    label: 'Theme'
    parent: desiderio
