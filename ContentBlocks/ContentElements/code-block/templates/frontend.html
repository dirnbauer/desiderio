<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-code-block" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="code-block-section">
    <d:layout.container>
        <f:if condition="{data.header}">
            <d:atom.typography tag="h2" variant="h2" class="code-block-section__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
        </f:if>

        <div class="code-block">
            <f:if condition="{data.filename}">
                <div class="code-block__header">
                    <span class="code-block__filename">{data -> f:render.text(field: 'filename')}</span>
                </div>
            </f:if>
            <f:comment><!--
                Visual editor: the code field is a plain Textarea (no RTE). In edit
                mode we route it through f:render.text so it becomes an inline
                <ve-editable-text allowNewlines> (plain-text editing). The syntax
                highlighter is intentionally dropped there (no data-astro-* attrs)
                so it never fights the editable. The frontend keeps the raw,
                highlight-ready <pre><code> (f:render.text would nl2br inside <pre>).
            --></f:comment>
            <f:editMode>
                <f:then><pre class="code-block__pre code-block__pre--editing" role="region" aria-label="{data.filename -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:code.aria\', default: \'Code sample\')}')}"><code class="code-block__code">{data -> f:render.text(field: 'code')}</code></pre></f:then>
                <f:else><pre class="code-block__pre" tabindex="0" role="region" aria-label="{data.filename -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:code.aria\', default: \'Code sample\')}')}"><code id="code-block-{data.uid}" class="code-block__code" data-astro-highlight data-astro-language="{data.language}" data-astro-filename="{data.filename}">{data.code -> f:format.htmlspecialchars()}</code></pre></f:else>
            </f:editMode>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
