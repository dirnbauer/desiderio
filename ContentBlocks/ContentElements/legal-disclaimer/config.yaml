name: desiderio/legal-disclaimer
typeName: desiderio_legaldisclaimer
title: 'Legal Disclaimer Notice'
description: 'Renders a compact aside with an optional heading and a required rich-text body, in default, boxed, or bordered style. Use it for: short liability disclaimers, no-guarantee and no-advice notes, risk warnings, affiliate or sponsorship disclosures, copyright caveats below content. Prefer ''Imprint'' for the full statutory legal notice; ''Terms Summary'' for condensed terms of service; ''Callout Box'' for non-legal highlighted notes.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:disclaimer_text'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 6
    required: true
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.boxed'
        value: boxed
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.bordered'
        value: bordered
    default: default
