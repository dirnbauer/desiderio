name: desiderio/compliance-badges
typeName: desiderio_compliancebadges
title: 'Compliance Badges'
description: 'Renders an optional small uppercase heading above a horizontal row of outlined badges, each showing a check-circle icon plus a text label with an optional link; alignment is left, center or right. Use it for: lists of certification and standard names — ISO 27001, SOC 2, GDPR compliant, TÜV — near footers, checkouts or forms. Labels are text only; prefer ''Certifications'' or ''Trust Badges'' when logo images and descriptions are available.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: alignment
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:alignment'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.center'
        value: center
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.right'
        value: right
    default: center
  -
    identifier: items
    type: Collection
    table: compliance_badges_items
    prefixField: true
    label: Badges
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
