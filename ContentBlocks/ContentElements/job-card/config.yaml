name: desiderio/job-card
typeName: desiderio_jobcard
title: 'Job Card'
description: 'Renders a single card for one vacancy: employment-type badge, job title, department and location meta line, rich-text role description, and a prominent apply button. Use it for: a single job posting, a featured or urgent vacancy pulled from a document, a role spotlight on a team or careers page. Prefer ''Career Listing'' when the source lists several open positions; ''Team Hiring CTA'' for a general we-are-hiring prompt.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:job.title'
  -
    identifier: department
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:job.department'
  -
    identifier: location
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:job.location'
  -
    identifier: type
    type: Text
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:job.employment_type'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 4
  -
    identifier: apply_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:apply_link'
