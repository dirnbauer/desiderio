name: desiderio/office-locations
typeName: desiderio_officelocations
title: 'Office Locations'
description: 'A grid of location cards, each showing a required city plus optional address, phone, email, and a map link rendered as a directions button, with an intro heading and subheadline above. Use it for: contact sections listing several offices, branch or store directories, find-us blocks with addresses and phone numbers per site. Prefer ''Contact Info'' for one location''s details, ''Office Hours'' for opening times, and ''Map Embed'' for an interactive map.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: location_items
    type: Collection
    table: office_locations_location_items
    prefixField: true
    label: Locations
    description: 'One card per office. City is required; address, phone, email, and map link are optional.'
    minItems: 1
    fields:
      -
        identifier: city
        type: Textarea
        rows: 1
        label: City
        required: true
      -
        identifier: address
        type: Textarea
        label: Address
        rows: 3
      -
        identifier: phone
        type: Text
        label: Phone
      -
        identifier: email
        type: Text
        label: Email
      -
        identifier: map_link
        type: Link
        label: 'Map Link'
