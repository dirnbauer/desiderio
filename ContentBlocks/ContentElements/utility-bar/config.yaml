name: desiderio/utility-bar
typeName: desiderio_utilitybar
title: 'Utility Bar'
description: 'Utility Bar helps visitors find their way through links, menus, anchors, or search entry points. Editors can manage headline and copy fields and link and CTA controls.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: left_text
    type: Textarea
    rows: 1
    label: 'Left Text'
  -
    identifier: link_items
    type: Collection
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:links'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
