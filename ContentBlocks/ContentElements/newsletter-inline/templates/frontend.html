<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-newsletter-inline" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="newsletter-inline">
    <d:layout.container>
        <div class="newsletter-inline__bar">
            <div class="newsletter-inline__text">
                <f:if condition="{data.header}"><h3 class="newsletter-inline__headline">{data -> f:render.text(field: 'header')}</h3></f:if>
                <f:if condition="{data.description_text}"><p class="newsletter-inline__description">{data -> f:render.text(field: 'description_text')}</p></f:if>
            </div>
            <form class="newsletter-inline__form" action="{data.form_action.url}" method="post">
                <input class="newsletter-inline__input" type="email" name="email" placeholder="{data.placeholder -> f:or(alternative: 'Enter your email')}"/>
                <d:atom.button type="submit">{data.button_text -> f:or(alternative: 'Subscribe')}</d:atom.button>
            </form>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
