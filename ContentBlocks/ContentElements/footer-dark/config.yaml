name: desiderio/footer-dark
typeName: desiderio_footerdark
title: 'Dark Footer'
description: 'A shadcn/ui styled TYPO3 content element for footer area, using theme tokens for light and dark mode.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand_name'
  -
    identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: column_items
    type: Collection
    label: 'Link Groups'
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Group Title'
      -
        identifier: links
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:links_one_per_line'
        rows: 5
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
