name: desiderio/article-grid
typeName: desiderio_articlegrid
title: 'Article Grid'
description: 'A responsive grid of article cards, each with a category, linked title, and short teaser. Use it on a blog, news, or resources page to present multiple posts in a scannable layout. Fields include an eyebrow and headline for the intro, plus repeatable article items with a title, category, rich-text description, and a link that adds a Read article action.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: items
    type: Collection
    table: article_grid_items
    prefixField: true
    label: Articles
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: category
        type: Textarea
        rows: 1
        label: Category
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
