name: desiderio/feature-numbered
typeName: desiderio_featurenumbered
title: 'Numbered Feature Steps'
description: 'Renders a heading and subheadline above an ordered grid of steps, each with a zero-padded counter (01, 02, 03), a title, and a rich-text description. Use it for: how-it-works sections, numbered process or onboarding steps, ordered lists of advantages or phases found in a document. Prefer ''How-to Steps'' for true instructions that need HowTo schema; ''Timeline Feature Section'' when steps read chronologically along a connecting line.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_numbered_items
    prefixField: true
    label: Steps
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
