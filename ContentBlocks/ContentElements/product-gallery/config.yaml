name: desiderio/product-gallery
typeName: desiderio_productgallery
title: 'Product Gallery Buy Panel'
description: 'Place the Product Gallery Buy Panel content element as a focused page section.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: images
    type: File
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:images'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:images.description'
    allowed: common-image-types
    maxitems: 8
    minitems: 1
  -
    identifier: caption
    type: Textarea
    rows: 2
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:caption'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:caption.description'
  -
    identifier: price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:price.description'
    required: true
  -
    identifier: compare_at_price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:compare_at_price'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:compare_at_price.description'
  -
    identifier: availability
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:availability'
    items:
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:availability.in_stock'
        value: in_stock
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:availability.limited'
        value: limited
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:availability.preorder'
        value: preorder
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:availability.sold_out'
        value: sold_out
    default: in_stock
  -
    identifier: highlights
    type: Collection
    table: product_gallery_highlights
    prefixField: true
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:highlights'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:highlights.description'
    maxitems: 6
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:highlight.text'
        required: true
  -
    identifier: cta_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Add to cart'
  -
    identifier: cta_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:columns'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:columns.description'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:columns.5'
        value: '5'
      -
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/product-gallery/language/labels.xlf:columns.6'
        value: '6'
    default: '4'
