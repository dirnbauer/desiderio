name: desiderio/feature-cards
typeName: desiderio_featurecards
title: 'Feature Cards Grid'
description: 'Renders an intro (eyebrow, heading, subheadline) above a responsive grid of equal-sized cards, each with a title and rich-text description, without icons or images. Use it for: text-only lists of services, benefits, capabilities, or USPs where every point carries the same weight. Prefer ''3-Column Feature Grid'' or ''Icon Feature Grid'' when each point has an icon; use ''List Feature Section'' for a vertical rundown.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_cards_items
    prefixField: true
    label: 'Feature Cards'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
