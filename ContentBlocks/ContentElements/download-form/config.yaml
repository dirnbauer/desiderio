name: desiderio/download-form
typeName: desiderio_downloadform
title: 'Gated Download Form'
description: 'A two-column lead-capture block that pairs a preview card with a TYPO3 form to gate a file behind a short sign-up. Use it on resource or landing pages to collect contact details before handing over a PDF, whitepaper, or asset. Provide a headline, rich-text description, resource title, reassurance microcopy, and an optional preview image beside the form.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: resource_title
    type: Textarea
    rows: 1
    label: 'Resource Title'
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Download now'
  -
    identifier: reassurance
    type: Textarea
    rows: 1
    label: 'Reassurance Microcopy'
    description: 'Short trust line shown under the heading, e.g. "Free PDF. No sign-up required."'
  -
    identifier: image
    type: File
    label: 'Preview Image'
    allowed: common-image-types
    maxitems: 1
