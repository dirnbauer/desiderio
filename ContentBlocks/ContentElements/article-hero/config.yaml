name: desiderio/article-hero
typeName: desiderio_articlehero
title: 'Article Hero'
description: 'Article Hero opens landing pages, campaigns, or product pages with a strong first message. Editors can manage headline and copy fields and media pickers.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: dek
    type: Textarea
    label: Summary
    rows: 3
  -
    identifier: topic
    type: Textarea
    rows: 1
    label: Topic
  -
    identifier: publish_date
    type: Textarea
    rows: 1
    label: 'Publish Date'
  -
    identifier: reading_time
    type: Textarea
    rows: 1
    label: 'Reading Time'
  -
    identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
  -
    identifier: cover_image
    type: File
    label: 'Cover Image'
    allowed: common-image-types
    maxitems: 1
