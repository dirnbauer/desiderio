name: desiderio/hero-pricing
typeName: desiderio_heropricing
title: 'Pricing Hero'
description: 'A two-column hero that places the message next to a price card showing the amount, billing period, a checklist of features, and a call-to-action. Use it at the top of pricing or offer pages to bring the cost and decision together above the fold. Set the headline, sub-headline, price and price period, the repeatable feature list, and the button with its link.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
  -
    identifier: price_period
    type: Textarea
    rows: 1
    label: 'Price Period'
  -
    identifier: feature_items
    type: Collection
    table: hero_pricing_feature_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: Feature
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
