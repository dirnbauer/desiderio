<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-feature-alternating" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="feature-alternating">
    <d:layout.container>
        <f:if condition="{data.header}">
            <header class="feature-alternating__intro">
                <d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <div class="feature-alternating__rows">
            <f:for each="{data.items}" as="item" iteration="iter">
                <div class="feature-alternating__row {f:if(condition: iter.isEven, then: 'feature-alternating__row--reverse')}">
                    <div class="feature-alternating__copy">
                        <h3 class="feature-alternating__title">{item -> f:render.text(field: 'title')}</h3>
                        <f:if condition="{item.description}">
                            <p class="feature-alternating__description">{item -> f:render.text(field: 'description')}</p>
                        </f:if>
                        <f:if condition="{item.link.url}">
                            <f:link.typolink parameter="{item.link}" class="feature-alternating__link">Learn more</f:link.typolink>
                        </f:if>
                    </div>
                    <f:if condition="{item.image.0}">
                        <div class="feature-alternating__media">
                            <f:image image="{item.image.0}" alt="{item -> f:render.text(field: 'title')}" maxWidth="640" class="feature-alternating__image"/>
                        </div>
                    </f:if>
                </div>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
