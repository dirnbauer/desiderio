name: desiderio/footer-columns
typeName: desiderio_footercolumns
title: 'Multi-Column Link Footer'
description: 'A footer that arranges site links into tidy multi-column lists beside a brand block. Use it at the bottom of content-rich pages to organize navigation, legal, and resource links into clear groups. Key fields are the brand name, a rich-text brand description, repeatable link columns each with a column title and up to five labeled links, and a copyright line.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand_name'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Brand Description'
    rows: 3
  -
    identifier: column_items
    type: Collection
    table: footer_columns_column_items
    prefixField: true
    label: 'Link Columns'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Column Title'
        required: true
      -
        identifier: link_1_label
        type: Textarea
        rows: 1
        label: 'Link 1 Label'
      -
        identifier: link_1
        type: Link
        label: 'Link 1'
      -
        identifier: link_2_label
        type: Textarea
        rows: 1
        label: 'Link 2 Label'
      -
        identifier: link_2
        type: Link
        label: 'Link 2'
      -
        identifier: link_3_label
        type: Textarea
        rows: 1
        label: 'Link 3 Label'
      -
        identifier: link_3
        type: Link
        label: 'Link 3'
      -
        identifier: link_4_label
        type: Textarea
        rows: 1
        label: 'Link 4 Label'
      -
        identifier: link_4
        type: Link
        label: 'Link 4'
      -
        identifier: link_5_label
        type: Textarea
        rows: 1
        label: 'Link 5 Label'
      -
        identifier: link_5
        type: Link
        label: 'Link 5'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
