name: desiderio/investor-grid
typeName: desiderio_investorgrid
title: 'Investor Grid'
description: 'Renders a four-column grid of investors, each cell showing a logo (or initial-letter fallback), name, optional funding round or investor type, and an optional website link, under a heading and subheadline. Use it for: investor and backer lists, funding announcements naming VCs or business angels, press or about sections citing who financed the company. Prefer ''Logo Grid'' or ''Partner Logo Grid'' for plain logos without names or rounds.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: investors
    type: Collection
    table: investor_grid_investors
    prefixField: true
    label: Investors
    minItems: 1
    fields:
      -
        identifier: logo
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:logo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: type
        type: Text
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:investor_round'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
