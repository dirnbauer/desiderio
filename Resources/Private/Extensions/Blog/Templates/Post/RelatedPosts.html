<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Post" />

<f:section name="Content">
    <f:if condition="{posts}">
        <section class="flex flex-col gap-5" aria-label="{f:translate(extensionName: 'Blog', key: 'headline.relatedposts', default: 'Related posts')}">
            <div class="flex flex-wrap items-end justify-between gap-3">
                <div class="flex items-center gap-2">
                    <span class="inline-flex size-8 items-center justify-center rounded-md bg-muted text-muted-foreground" aria-hidden="true">
                        <d:atom.icon name="sparkles" size="sm"/>
                    </span>
                    <d:atom.typography tag="h2" variant="h3"><f:translate extensionName="Blog" key="headline.relatedposts">Related posts</f:translate></d:atom.typography>
                </div>
            </div>
            <f:render partial="TeaserList" arguments="{_all}" />
        </section>
    </f:if>
</f:section>

</html>
