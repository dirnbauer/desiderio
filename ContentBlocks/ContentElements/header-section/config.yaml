name: desiderio/header-section
typeName: desiderio_headersection
title: 'Section Header'
description: 'Renders a compact section heading with an optional eyebrow label, title, and short subheadline, left- or center-aligned. Use it for: headings that introduce the next content block — topic titles, chapter markers, short lead-ins before grids, lists, or galleries. Prefer ''Page Header'' for the page''s main title with intro and button; use the core ''Header'' element for a bare heading without eyebrow or subtitle.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:alignment'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.center'
        value: center
    default: center
