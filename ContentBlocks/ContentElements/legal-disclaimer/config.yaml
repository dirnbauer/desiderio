name: desiderio/legal-disclaimer
typeName: desiderio_legaldisclaimer
title: 'Legal Disclaimer Notice'
description: 'A compact, aside-styled block for a short legal disclaimer with an optional heading. Place it in the footer or below contractual content to state liability limits and legal caveats. Fields include an optional header, the rich-text disclaimer content, and a style variant (default, boxed, or bordered).'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:disclaimer_text'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 6
    required: true
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.boxed'
        value: boxed
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.bordered'
        value: bordered
    default: default
