<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-chart-heatmap" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="chart-heatmap-section">
    <d:layout.container>
        <div class="chart-heatmap" data-chart-json="{data.chart_data -> f:format.htmlspecialchars()}">
            <div class="chart-heatmap__card">
                <f:if condition="{data.header} || {data.description}">
                    <div class="chart-heatmap__header">
                        <f:if condition="{data.header}">
                            <h3 class="chart-heatmap__title">{data -> f:render.text(field: 'header')}</h3>
                        </f:if>
                        <f:if condition="{data.description}">
                            <p class="chart-heatmap__description">{data -> f:render.text(field: 'description')}</p>
                        </f:if>
                    </div>
                </f:if>
                <div class="chart-heatmap__plot" id="chart-heatmap-{data.uid}"></div>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
