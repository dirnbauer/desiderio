name: desiderio/directions
typeName: desiderio_directions
title: 'Directions Routes'
description: 'An intro heading and subheadline above a list of route cards, each with a map-pin icon, a transport-mode title, and rich-text directions. Use it for: ''how to reach us'' sections, arrival instructions by car, train, bus, or plane, parking notes, venue-access details on contact, location, or event pages. Prefer ''Map Embed'' for an interactive map; use ''Office Locations'' for listing multiple sites.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: routes
    type: Collection
    table: directions_routes
    prefixField: true
    label: Routes
    minItems: 1
    fields:
      -
        identifier: mode
        type: Textarea
        rows: 1
        label: 'Transport Mode'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Directions
        rows: 3
