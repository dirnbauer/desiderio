name: desiderio/resource-library
typeName: desiderio_resourcelibrary
title: 'Resource Library'
description: 'Renders a card grid introduced by eyebrow and heading, each card carrying a type badge such as Guide or Whitepaper, a title, a short rich-text description and an open-resource link. Use it for: download and link collections - whitepapers, guides, ebooks, templates or documentation hubs listed in a source document. Prefer ''File Download List'' when items are attached files with size and download button; ''Article Grid'' for editorial posts.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: items
    type: Collection
    table: resource_library_items
    prefixField: true
    label: Resources
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: type_label
        type: Textarea
        rows: 1
        label: Type
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
