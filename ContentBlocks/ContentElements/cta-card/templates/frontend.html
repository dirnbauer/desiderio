<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-cta-card" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="cta-card">
    <d:layout.container>
        <d:molecule.card class="cta-card__card">
            <f:if condition="{data.badge} || {data.header}">
                <d:molecule.cardHeader class="cta-card__header">
                    <f:if condition="{data.badge}">
                        <d:atom.badge variant="outline" class="cta-card__badge">{data -> f:render.text(field: 'badge')}</d:atom.badge>
                    </f:if>
                    <f:if condition="{data.header}">
                        <d:atom.typography tag="h2" variant="h2" class="cta-card__title">{data -> f:render.text(field: 'header')}</d:atom.typography>
                    </f:if>
                </d:molecule.cardHeader>
            </f:if>
            <f:if condition="{data.description}">
                <d:molecule.cardContent class="cta-card__content">
                    <d:atom.typography tag="div" variant="lead" class="cta-card__description d-richtext">{data -> f:render.text(field: 'description')}</d:atom.typography>
                </d:molecule.cardContent>
            </f:if>
            <f:if condition="{data.cta_text} && {data.cta_link.url}">
                <d:molecule.cardFooter class="cta-card__footer">
                    <d:atom.button href="{data.cta_link.url}" target="{data.cta_link.target}" size="lg">{data -> f:render.text(field: 'cta_text')}</d:atom.button>
                </d:molecule.cardFooter>
            </f:if>
        </d:molecule.card>
    </d:layout.container>
</d:layout.section>

</html>
