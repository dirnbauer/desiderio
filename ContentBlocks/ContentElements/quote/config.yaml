name: desiderio/quote
typeName: desiderio_quote
title: 'Quote'
description: 'Renders one quotation as a semantic blockquote inside a figure with a large decorative quote mark, optional author and role attribution, and bordered, large or card style variants. Use it for: pull quotes, notable statements, press or book citations, single memorable lines lifted from body text. Prefer ''Single Testimonial'' for customer voices, ''Founder Quote'' when a portrait belongs to the statement, and ''Mission Statement'' for the company mission.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: quote_text
    type: Textarea
    label: 'Quote Text'
    rows: 4
    required: true
  -
    identifier: author
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
  -
    identifier: role
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_role'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.bordered'
        value: bordered
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.large'
        value: large
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.card'
        value: card
    default: bordered
