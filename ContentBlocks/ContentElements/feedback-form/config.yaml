name: desiderio/feedback-form
typeName: desiderio_feedbackform
title: 'Feedback Form'
description: 'A card containing a heading, rich-text intro, and the built-in Desiderio feedback form rendered through the TYPO3 Form Framework. Use it for: give-us-your-feedback sections, satisfaction or opinion surveys, suggestion boxes, and post-event or support feedback prompts found in a document. Prefer ''Contact Form Block'' for general contact requests; use ''Form'' (Form Framework) to render a custom form definition of your choice.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
