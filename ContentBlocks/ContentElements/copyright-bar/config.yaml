name: desiderio/copyright-bar
typeName: desiderio_copyrightbar
title: 'Footer Copyright Bar'
description: 'A slim single-line bar for the very bottom of the page, pairing a copyright notice with a row of legal links. Use it to close the footer with imprint, privacy and terms references. Holds a copyright text line, a repeatable collection of label-plus-link items, and an alignment choice (left, centered, or space-between).'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
    required: true
  -
    identifier: link_items
    type: Collection
    table: copyright_bar_link_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:links'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: alignment
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:alignment'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.center'
        value: center
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.between'
        value: between
    default: between
