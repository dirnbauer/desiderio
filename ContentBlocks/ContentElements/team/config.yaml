name: desiderio/team
typeName: desiderio_team
title: 'Team Section'
description: 'Team Section introduces people, roles, culture, or hiring context with clear editorial structure. Editors can manage headline and copy fields, repeatable entries and layout or variant options.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'Layout Variant'
    items:
      -
        label: Grid
        value: grid
      -
        label: List
        value: list
      -
        label: Minimal
        value: minimal
    default: grid
    onChange: reload
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    displayCond: 'FIELD:variant:=:grid'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '3'
  -
    identifier: members
    type: Collection
    table: team_members
    label: 'Team Members'
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: role
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:role'
        required: true
      -
        identifier: bio
        type: Textarea
        label: Bio
        rows: 3
      -
        identifier: profile_link
        type: Link
        label: 'Profile Link'
