name: desiderio/company-milestones
typeName: desiderio_companymilestones
title: 'Company Milestones'
description: 'Renders an ordered grid of milestone entries, each showing a year (or an automatic running number), a title, and an optional rich-text description. Use it for: lists of dated achievements and highlights — awards won, funding rounds, expansion steps, growth records that read as discrete accomplishments rather than a flowing story. Prefer ''Company History Timeline'' for a chronological narrative on a vertical line; ''Counter Stats'' for headline numbers instead of events.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: milestones
    type: Collection
    table: company_milestones_milestones
    prefixField: true
    label: Milestones
    minItems: 1
    fields:
      -
        identifier: year
        type: Textarea
        rows: 1
        label: Year
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
