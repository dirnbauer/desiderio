name: desiderio/footer-contact
typeName: desiderio_footercontact
title: 'Footer Contact Footer'
description: 'A shadcn/ui styled TYPO3 content element for footer area, using theme tokens for light and dark mode.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: address
    type: Textarea
    label: Address
    rows: 3
  -
    identifier: email
    type: Text
    label: Email
  -
    identifier: phone
    type: Text
    label: Phone
  -
    identifier: hours
    type: Textarea
    rows: 1
    label: 'Business Hours'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
