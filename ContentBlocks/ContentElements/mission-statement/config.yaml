name: desiderio/mission-statement
typeName: desiderio_missionstatement
title: 'Mission Statement'
description: 'Renders one mission sentence as a centered blockquote in large lead type, framed by an optional eyebrow, heading, and cite-style attribution line. Use it for: mission and vision statements, mottos, manifestos, purpose declarations, a founder''s guiding sentence — the single strong statement found in about, culture, or career sections. Prefer ''Quote'' for general quotations, ''Founder Quote'' when a portrait belongs to the statement, ''Company Values'' for several principles as cards.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: statement
    type: Textarea
    label: 'Mission Statement'
    rows: 4
  -
    identifier: attribution
    type: Textarea
    rows: 1
    label: Attribution
