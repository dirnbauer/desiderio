name: desiderio/cta-floating
typeName: desiderio_ctafloating
title: 'Floating Call to Action'
description: 'Floating Call to Action provides a focused editorial building block for a recognizable page task. Editors can manage headline and copy fields, link and CTA controls and layout or variant options.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: cta_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: cta_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
  -
    identifier: position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:position'
    items:
      -
        label: Bottom
        value: bottom
      -
        label: Top
        value: top
    default: bottom
