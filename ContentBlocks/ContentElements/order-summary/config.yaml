name: desiderio/order-summary
typeName: desiderio_ordersummary
title: 'Order Summary'
description: 'A single checkout card that lists line items with name, optional quantity, and price, followed by a totals list with subtotal, an optional discount row, a bold total, and a proceed-to-checkout button. Use it for: order recaps, cart or basket summaries, itemized cost breakdowns, offer or invoice-style totals in a source document. Prefer ''Pricing Section'' for selling plans; use ''Data Table'' for general tabular data that is not a bill.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: order_summary_items
    prefixField: true
    label: 'Line Items'
    description: 'One row per product or plan. Enter the price as a formatted string, e.g. "€290.00".'
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Item Name'
        required: true
      -
        identifier: quantity
        type: Textarea
        rows: 1
        label: Quantity
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
        required: true
  -
    identifier: subtotal
    type: Textarea
    rows: 1
    label: Subtotal
  -
    identifier: discount_label
    type: Textarea
    rows: 1
    label: 'Discount Label'
  -
    identifier: discount_value
    type: Textarea
    rows: 1
    label: 'Discount Value'
  -
    identifier: total
    type: Textarea
    rows: 1
    label: Total
    required: true
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Proceed to checkout'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
