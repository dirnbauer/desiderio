<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-hero-carousel" href="{cb:assetPath()}/frontend.css"/>

<f:variable name="carouselLabel"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:carousel.region"/></f:variable>
<f:variable name="prevLabel"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:carousel.previous"/></f:variable>
<f:variable name="nextLabel"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:carousel.next"/></f:variable>
<f:variable name="dotLabel"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:carousel.goto"/></f:variable>
<f:variable name="slideLabel"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:carousel.slide"/></f:variable>

<d:layout.section class="hero-carousel">
    <d:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="hero-carousel__intro">
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h1" class="hero-carousel__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <d:atom.typography variant="lead" class="hero-carousel__subheadline">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
                </f:if>
            </header>
        </f:if>
        <div class="hero-carousel__track"
             role="group"
             aria-roledescription="carousel"
             aria-label="{carouselLabel}"
             data-astro-carousel
             data-astro-carousel-labels="{prevLabel}|{nextLabel}|{dotLabel}">
            <f:for each="{data.slides}" as="slide" iteration="iter">
                <div class="hero-carousel__slide{f:if(condition: iter.isFirst, then: ' hero-carousel__slide--active')}"
                     data-astro-carousel-slide
                     role="group"
                     aria-roledescription="{slideLabel}"
                     aria-label="{iter.cycle} / {iter.total}">
                    <div class="hero-carousel__content">
                        <f:if condition="{slide.title}">
                            <d:atom.typography tag="h3" variant="h2" class="hero-carousel__title">{slide -> f:render.text(field: 'title')}</d:atom.typography>
                        </f:if>
                        <f:if condition="{slide.lead}">
                            <d:atom.typography variant="lead" class="hero-carousel__lead">{slide -> f:render.text(field: 'lead')}</d:atom.typography>
                        </f:if>
                        <f:if condition="{slide.description}">
                            <d:atom.typography class="hero-carousel__description">{slide -> f:render.text(field: 'description')}</d:atom.typography>
                        </f:if>
                        <f:if condition="{slide.button_text}">
                            <d:atom.button href="{slide.button_link.url}" target="{slide.button_link.target}" variant="default" size="lg">{slide -> f:render.text(field: 'button_text')}</d:atom.button>
                        </f:if>
                    </div>
                    <f:if condition="{slide.image}">
                        <div class="hero-carousel__media">
                            <f:for each="{slide.image}" as="image">
                                <f:if condition="{iter.isFirst}">
                                    <f:then>
                                        <f:image image="{image}"
                                                 class="hero-carousel__image"
                                                 alt="{image.alternative -> f:or(alternative: slide.title)}"
                                                 maxWidth="800"
                                                 loading="eager"
                                                 fetchpriority="high"
                                                 decoding="async"/>
                                    </f:then>
                                    <f:else>
                                        <f:image image="{image}"
                                                 class="hero-carousel__image"
                                                 alt="{image.alternative -> f:or(alternative: slide.title)}"
                                                 maxWidth="800"
                                                 loading="lazy"
                                                 decoding="async"/>
                                    </f:else>
                                </f:if>
                            </f:for>
                        </div>
                    </f:if>
                </div>
            </f:for>
            <p class="sr-only" aria-live="polite" data-astro-carousel-status></p>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
