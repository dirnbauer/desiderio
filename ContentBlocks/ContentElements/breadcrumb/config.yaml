name: desiderio/breadcrumb
typeName: desiderio_breadcrumb
title: 'Breadcrumb Trail'
description: 'A horizontal navigation trail of clickable parent links separated by slashes, with the current page shown as plain text. Place it near the top of deeper pages so visitors can see their position in the site hierarchy and jump back up. Each item in the list holds a label and an optional link, and the markup adds schema.org BreadcrumbList data for search engines.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: breadcrumb_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:items'
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
