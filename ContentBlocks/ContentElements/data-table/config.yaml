name: desiderio/data-table
typeName: desiderio_datatable
title: 'Data Table'
description: 'A structured table that arranges precise data into defined columns and rows, with an optional header row, per-column alignment, optional row labels, and a caption. Use it for specifications, comparisons, pricing breakdowns, or any tabular figures that need clean alignment. Key fields are the heading, the column definitions with their alignment, the rows of cells with optional row labels, and the toggleable caption text.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: show_header_row
    type: Checkbox
    label: 'Show Header Row'
    default: 1
  -
    identifier: column_definitions
    type: Collection
    table: data_table_columns
    prefixField: true
    label: 'Column Definitions'
    minItems: 1
    fields:
      -
        identifier: column_label
        type: Textarea
        rows: 1
        label: 'Column Label'
        required: true
      -
        identifier: column_align
        type: Select
        renderType: selectSingle
        label: Alignment
        items:
          -
            label: Left
            value: left
          -
            label: Center
            value: center
          -
            label: Right
            value: right
        default: left
  -
    identifier: rows
    type: Collection
    table: data_table_rows
    prefixField: true
    label: 'Table Rows'
    labelField: row_label
    minItems: 1
    fields:
      -
        identifier: row_label
        type: Textarea
        rows: 1
        label: 'Row Label'
      -
        identifier: cells
        type: Collection
        table: data_table_cells
        label: Cells
        labelField: value
        minItems: 1
        fields:
          -
            identifier: value
            type: Textarea
            rows: 1
            label: Value
  -
    identifier: show_caption
    type: Checkbox
    label: 'Show Caption'
    default: 0
  -
    identifier: caption_text
    type: Textarea
    rows: 1
    label: 'Caption Text'
    displayCond: 'FIELD:show_caption:=:1'
