name: desiderio/accordion
typeName: desiderio_accordion
title: Accordion
description: 'A shadcn/ui styled TYPO3 content element for content presentation, using theme tokens for light and dark mode.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: Bordered
        value: bordered
      -
        label: Separated
        value: separated
    default: default
  -
    identifier: allow_multiple
    type: Checkbox
    label: 'Allow Multiple Open'
    description: 'Allow multiple accordion items to be open at once'
    default: 0
  -
    identifier: items
    type: Collection
    label: 'Accordion Items'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Question / Title'
        required: true
      -
        identifier: content
        type: Textarea
        label: 'Answer / Content'
        enableRichtext: true
        rows: 5
      -
        identifier: open_by_default
        type: Checkbox
        label: 'Open by Default'
        default: 0
