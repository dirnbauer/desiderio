<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="d-hero-illustration" href="{cb:assetPath()}/frontend.css"/>
<d:layout.section class="hero-illustration hero-illustration--image-{data.image_position -> f:or(alternative: 'right')}">
    <d:layout.container>
        <div class="hero-illustration__grid">
            <div class="hero-illustration__content">
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h1" class="hero-illustration__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.subheadline}"><p class="hero-illustration__subheadline">{data -> f:render.text(field: 'subheadline')}</p></f:if>
                <f:if condition="{data.primary_button_text} || {data.secondary_button_text}">
                    <div class="hero-illustration__actions">
                        <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                            <d:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</d:atom.button>
                        </f:if>
                        <f:if condition="{data.secondary_button_text} && {data.secondary_button_link.url}">
                            <d:atom.button href="{data.secondary_button_link.url}" target="{data.secondary_button_link.target}" variant="outline" size="lg">{data -> f:render.text(field: 'secondary_button_text')}</d:atom.button>
                        </f:if>
                    </div>
                </f:if>
            </div>
            <f:if condition="{data.illustration}">
                <div class="hero-illustration__media">
                    <f:for each="{data.illustration}" as="image">
                        <f:image image="{image}" class="hero-illustration__image" alt="" loading="eager" fetchpriority="high" decoding="async"/>
                    </f:for>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
