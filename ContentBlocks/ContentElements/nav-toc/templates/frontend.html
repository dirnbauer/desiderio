<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-nav-toc" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="nav-toc">
    <f:variable name="tocTitleId" value="nav-toc-title-{data.uid}"/>
    <aside class="nav-toc__panel">
        <f:if condition="{data.header}">
            <p class="nav-toc__title" id="{tocTitleId}">{data -> f:render.text(field: 'header')}</p>
        </f:if>
        <f:variable name="tocLabel"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:nav_toc.aria" default="Table of contents"/></f:variable>
        <nav class="nav-toc__nav" aria-labelledby="{f:if(condition: data.header, then: tocTitleId)}" aria-label="{f:if(condition: data.header, else: tocLabel)}">
            <ul class="nav-toc__list">
                <f:for each="{data.items}" as="item">
                    <li class="nav-toc__item nav-toc__item--{item.level -> f:or(alternative: 'h2')}">
                        <f:if condition="{item.anchor}">
                            <f:then>
                                <a href="#{item.anchor -> f:format.htmlspecialchars()}" class="nav-toc__link">{item -> f:render.text(field: 'label')}</a>
                            </f:then>
                            <f:else>
                                <span class="nav-toc__link nav-toc__link--static">{item -> f:render.text(field: 'label')}</span>
                            </f:else>
                        </f:if>
                    </li>
                </f:for>
            </ul>
        </nav>
    </aside>
</d:layout.section>

</html>
