<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="breadcrumb" type="iterable" optional="{true}"/>

<f:if condition="{breadcrumb}">
    <nav class="desiderio-dashboard-template__breadcrumb" aria-label="{f:translate(extensionName: 'desiderio', key: 'dashboard.breadcrumb.label', default: 'Breadcrumb')}">
        <ol class="desiderio-dashboard-template__breadcrumb-list" role="list">
            <f:for each="{breadcrumb}" as="item" iteration="iterator">
                <li class="desiderio-dashboard-template__breadcrumb-item">
                    <f:if condition="{iterator.isLast}">
                        <f:then>
                            <span class="desiderio-dashboard-template__breadcrumb-current" aria-current="page">{item.title}</span>
                        </f:then>
                        <f:else>
                            <f:link.typolink parameter="{item.link}" class="desiderio-dashboard-template__breadcrumb-link">{item.title}</f:link.typolink>
                            <span class="desiderio-dashboard-template__breadcrumb-sep" aria-hidden="true">/</span>
                        </f:else>
                    </f:if>
                </li>
            </f:for>
        </ol>
    </nav>
</f:if>

</html>
