name: desiderio/audio-player
typeName: desiderio_audioplayer
title: 'Audio Player'
description: 'Renders a card with title, rich-text description, and a native HTML audio element with controls for one uploaded audio file, plus an optional download link. Use it for: podcast episodes, interview or lecture recordings, audio guides, music samples, pronunciation clips — any single audio asset referenced in a source document. Prefer ''Video Embed'' for video content and ''File Download List'' for several downloadable files.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: audio_file
    type: File
    label: 'Audio File'
    allowed: common-media-types
    maxitems: 1
    required: true
  -
    identifier: show_download
    type: Checkbox
    label: 'Show Download Link'
    default: 0
