name: desiderio/feature-matrix
typeName: desiderio_featurematrix
title: 'Feature Comparison Matrix'
description: 'Renders a card-framed table mapping feature rows against two labeled value columns (defaults Plan A and Plan B); each cell holds free text such as limits, quotas, or counts. Use it for: spec and plan comparisons with textual values — storage sizes, user counts, support levels. Prefer ''Feature Comparison Table'' when cells are plain yes/no checkmarks; ''Plan Comparison Matrix'' for pricing pages with up to four plans; ''Product Specs Table'' for one product''s label-value specs.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: left_label
    type: Textarea
    rows: 1
    label: 'Left Column Label'
  -
    identifier: right_label
    type: Textarea
    rows: 1
    label: 'Right Column Label'
  -
    identifier: rows
    type: Collection
    table: feature_matrix_rows
    prefixField: true
    label: Rows
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: left_value
        type: Textarea
        rows: 1
        label: 'Left Value'
      -
        identifier: right_value
        type: Textarea
        rows: 1
        label: 'Right Value'
