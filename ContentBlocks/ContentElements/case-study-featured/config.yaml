name: desiderio/case-study-featured
typeName: desiderio_casestudyfeatured
title: 'Featured Case Study'
description: 'A spotlight block that presents one flagship case study in full, pairing a large hero image with the client name, detailed description, and a row of up to four key metrics. Use it as a centerpiece on a homepage or proof page to showcase your most compelling result. Fields include eyebrow, headline, client name and logo, rich-text description, hero image, a metrics collection of value and label pairs, and a link to the full case study.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: client_name
    type: Textarea
    rows: 1
    label: 'Client Name'
    required: true
  -
    identifier: client_logo
    type: File
    label: 'Client Logo'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Case Study Description'
    rows: 4
    required: true
  -
    identifier: image
    type: File
    label: 'Hero Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: metrics
    type: Collection
    table: case_study_featured_metrics
    prefixField: true
    label: 'Key Metrics'
    minItems: 1
    maxItems: 4
    fields:
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        required: true
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
  -
    identifier: link
    type: Link
    label: 'Read Full Case Study'
