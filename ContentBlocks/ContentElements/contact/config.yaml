name: desiderio/contact
typeName: desiderio_contact
title: 'Contact Form Block'
description: 'A card-based contact layout with an info panel beside a message form. Use it on a main contact page where visitors need both your details and a way to write you. Fill in the eyebrow, headline, sub-headline, an info-panel title and text, a repeatable list of contact items (label, value, optional link), and the form title.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: info_title
    type: Textarea
    rows: 1
    label: 'Info Panel Title'
  -
    identifier: info_text
    type: Textarea
    label: 'Info Panel Text'
    rows: 3
  -
    identifier: contact_items
    type: Collection
    table: contact_contact_items
    prefixField: true
    label: 'Contact Items'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:optional_link'
  -
    identifier: form_title
    type: Textarea
    rows: 1
    label: 'Form Title'
    default: 'Send us a message'
  -
    identifier: form_action
    type: Link
    label: 'Form Action URL'
