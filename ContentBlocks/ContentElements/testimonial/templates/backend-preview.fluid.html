<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Preview"/>

<f:section name="Header">
    <f:if condition="{data.header}">
        <f:then><cb:link.editRecord uid="{data.uid}" table="{data.mainType}">{data.header}</cb:link.editRecord></f:then>
        <f:else><cb:link.editRecord uid="{data.uid}" table="{data.mainType}">Testimonial</cb:link.editRecord></f:else>
    </f:if>
</f:section>

<f:section name="Content">
    <f:asset.css identifier="desiderio-content-preview" href="EXT:desiderio/Resources/Public/Css/content-preview.css" />
    <div class="d-ce-preview" data-slot="card">
        <div class="d-ce-preview__meta">
            <span class="d-ce-preview__type" data-slot="badge">Testimonial</span>
            <f:if condition="{settings._content_block_name}"><span class="d-ce-preview__ctype">{settings._content_block_name}</span></f:if>
        </div>
        <f:if condition="{data.header}">
            <h3 class="d-ce-preview__title">{data.header}</h3>
        </f:if>
        <f:if condition="{data.quote}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Quote</span>
                <span class="d-ce-preview__value">{data.quote}</span>
            </div>
        </f:if>
        <f:if condition="{data.rating}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Rating</span>
                <span class="d-ce-preview__value">{data.rating}</span>
            </div>
        </f:if>
        <f:if condition="{data.variant}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Variant</span>
                <span class="d-ce-preview__value">{data.variant}</span>
            </div>
        </f:if>
        <f:if condition="{data.author_name}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Author Name</span>
                <span class="d-ce-preview__value">{data.author_name}</span>
            </div>
        </f:if>
        <f:if condition="{data.author_title}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Author Title</span>
                <span class="d-ce-preview__value">{data.author_title}</span>
            </div>
        </f:if>
        <f:if condition="{data.author_company}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Author Company</span>
                <span class="d-ce-preview__value">{data.author_company}</span>
            </div>
        </f:if>
        <f:if condition="{data.author_image}">
            <div class="d-ce-preview__thumbs" aria-label="Author Image">
                <f:for each="{data.author_image}" as="file">
                    <f:if condition="{file.publicUrl}">
                        <img src="{file.publicUrl}" alt="{file.alternative}" class="d-ce-preview__thumb" loading="lazy" />
                    </f:if>
                </f:for>
            </div>
        </f:if>
    </div>
</f:section>

</html>
