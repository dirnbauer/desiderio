<html xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:argument name="pagination" type="T3G\AgencyPack\Blog\Pagination\BlogPagination" />

<f:render
    partial="Pagination"
    arguments="{
        pagination: pagination,
        pages: pagination.displayPageNumbers,
        currentPage: pagination.currentPageNumber
    }"
/>

</html>
