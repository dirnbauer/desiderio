name: desiderio/stats-counter
typeName: desiderio_statscounter
title: 'Counter Stats'
description: 'A grid of metrics whose numbers animate ticking up to a target value to draw the eye on scroll. Use it in a results or achievements section where animated figures grab attention and feel dynamic. Each counter holds a target value, an optional suffix such as plus, percent, or K, a label, and an optional rich-text description, shown in a 3 or 4 column layout with an eyebrow and headline.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '3'
  -
    identifier: counters
    type: Collection
    table: stats_counter_counters
    prefixField: true
    label: Counters
    minItems: 1
    fields:
      -
        identifier: counter_target
        type: Textarea
        rows: 1
        label: 'Target Value'
        required: true
      -
        identifier: suffix
        type: Textarea
        rows: 1
        label: Suffix
        description: 'e.g. +, %, K'
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
