name: desiderio/pricing-simple
typeName: desiderio_pricingsimple
title: 'Single-Price Card'
description: 'Renders one centered pricing card with heading, a large price with billing period, a short rich-text description, a check-marked feature list (up to eight items), and a CTA button. Use it for: source sections offering exactly one plan or flat rate — a single membership fee, one service package with a price, ''one plan, everything included'' copy. Prefer ''Three Tier Pricing'' or ''Two Tier Pricing'' for multiple plans; use ''Special Offer Pricing'' for discount promotions.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
    required: true
  -
    identifier: billing_period
    type: Textarea
    rows: 1
    label: 'Billing Period'
    description: 'e.g. per month'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: features
    type: Collection
    table: pricing_simple_features
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    labelField: text
    minItems: 1
    maxItems: 8
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Feature
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Get Started'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
