name: desiderio/newsletter-inline
typeName: desiderio_newsletterinline
title: 'Newsletter Inline'
description: 'A slim, single-bar newsletter sign-up strip that sits inline between content sections. Use it to capture email subscribers mid-page without interrupting the reading flow, for example after an article or feature block. You set a headline and a short description; the email field, button, and submission are handled by the TYPO3 Form Framework.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: placeholder
    type: Textarea
    rows: 1
    label: Placeholder
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
