<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-resource-library" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="resource-library">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="resource-library__intro">
                <f:if condition="{data.eyebrow}"><span class="resource-library__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span></f:if>
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2" class="resource-library__headline">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
            </header>
        </f:if>
        <ul class="resource-library__grid" role="list">
            <f:for each="{data.items}" as="item">
                <li class="resource-library__cell">
                    <d:molecule.card class="resource-library__item">
                        <f:if condition="{item.type_label}">
                            <d:atom.badge variant="secondary" class="resource-library__type">{item -> f:render.text(field: 'type_label')}</d:atom.badge>
                        </f:if>
                        <h3 class="resource-library__title">{item -> f:render.text(field: 'title')}</h3>
                        <f:if condition="{item.description}">
                            <p class="resource-library__description">{item -> f:render.text(field: 'description')}</p>
                        </f:if>
                        <f:if condition="{item.link.url}">
                            <d:atom.link href="{item.link.url}" target="{item.link.target}" variant="muted" class="resource-library__link">
                                <span aria-hidden="true">Open resource &rarr;</span>
                                <span class="sr-only">Open {item -> f:render.text(field: 'title')}</span>
                            </d:atom.link>
                        </f:if>
                    </d:molecule.card>
                </li>
            </f:for>
        </ul>
    </d:layout.container>
</d:layout.section>

</html>
