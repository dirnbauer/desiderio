name: desiderio/founder-quote
typeName: desiderio_founderquote
title: 'Founder Quote'
description: 'A shadcn/ui styled TYPO3 content element for team presentation, using theme tokens for light and dark mode.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: quote
    type: Textarea
    label: Quote
    rows: 4
  -
    identifier: name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
  -
    identifier: title
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
    allowed: common-image-types
    maxitems: 1
