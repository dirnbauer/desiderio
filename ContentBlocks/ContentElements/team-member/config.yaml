name: desiderio/team-member
typeName: desiderio_teammember
title: 'Team Member Spotlight'
description: 'Renders a single-person profile card: portrait beside a heading (typically the name), role line, rich-text biography, an email/phone contact list, and social profile links. Use it for: one-person profile sections, leadership or founder portraits with contact details, ''your contact person'' blocks, author or expert introductions. For several people use ''Team with Bios'' or ''Team Section''; prefer ''Profile Header'' when the person opens the page as its header.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: role
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:role'
  -
    identifier: bio
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Biography
    rows: 4
  -
    identifier: email
    type: Text
    label: Email
  -
    identifier: phone
    type: Text
    label: Phone
  -
    identifier: social_links
    type: Collection
    table: team_member_social_links
    prefixField: true
    label: 'Social Links'
    fields:
      -
        identifier: platform
        type: Textarea
        rows: 1
        label: Platform
      -
        identifier: url
        type: Link
        label: URL
