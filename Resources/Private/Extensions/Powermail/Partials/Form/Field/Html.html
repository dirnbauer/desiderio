<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:comment>
    Generated by Build/Scripts/sync-shadcn-fluid-primitives.php (Powermail set).
    Edit Build/Scripts/powermail-fluid-templates.php and re-run the sync; do not hand-edit.
    Control and surface classes follow the configured shadcn preset recipes.
</f:comment>
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />

<div class="powermail_fieldwrap powermail_fieldwrap_type_html powermail_fieldwrap_{field.marker} {field.css} sm:col-span-2">
    <div class="rounded-none border border-border bg-muted/30 p-4 text-sm text-muted-foreground">
        <f:if condition="{settings.misc.htmlForHtmlFields}">
            <f:then><f:sanitize.html>{field.text -> f:format.raw()}</f:sanitize.html></f:then>
            <f:else>{field.text}</f:else>
        </f:if>
    </div>
</div>
</html>
