name: desiderio/card-overlay
typeName: desiderio_cardoverlay
title: 'Overlay Image Card'
description: 'A full-bleed image card with text and a button laid over the picture and an adjustable dark overlay for readability. Use it as an eye-catching promo or feature tile on landing and campaign pages. Key fields are the required background image, an eyebrow badge, heading and description, a CTA link with its own button text, and an overlay-intensity selector (light, medium, or strong).'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:background_image'
    allowed: common-image-types
    maxitems: 1
    required: true
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: link_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link_text'
  -
    identifier: overlay_intensity
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.light'
        value: light
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.medium'
        value: medium
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.strong'
        value: strong
    default: medium
