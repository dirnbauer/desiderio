name: desiderio/download-form
typeName: desiderio_downloadform
title: 'Gated Download Form'
description: 'A two-column gated-download section: headline, rich-text description, a resource title with download icon, and a reassurance line beside a card holding a preview image and a fixed embedded TYPO3 download form. Use it for: whitepapers, e-books, brochures, reports, or checklists offered in exchange for contact details. Prefer ''File Download List'' for ungated files; use ''Resource Library'' for a browsable collection of assets.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: resource_title
    type: Textarea
    rows: 1
    label: 'Resource Title'
  -
    identifier: reassurance
    type: Textarea
    rows: 1
    label: 'Reassurance Microcopy'
    description: 'Short trust line shown under the heading, e.g. "Free PDF. No sign-up required."'
  -
    identifier: image
    type: File
    label: 'Preview Image'
    allowed: common-image-types
    maxitems: 1
