<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="d-hero-pricing" href="{cb:assetPath()}/frontend.css"/>
<d:layout.section class="hero-pricing">
    <d:layout.container>
        <div class="hero-pricing__grid">
            <div class="hero-pricing__content">
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h1" variant="h1" class="hero-pricing__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <d:atom.typography variant="lead" class="hero-pricing__subheadline">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
                </f:if>
            </div>
            <div class="hero-pricing__card" data-slot="card">
                <p class="hero-pricing__price-row">
                    <span class="hero-pricing__price">{data -> f:render.text(field: 'price')}</span>
                    <f:if condition="{data.price_period}"><span class="hero-pricing__period">/{data -> f:render.text(field: 'price_period')}</span></f:if>
                </p>
                <f:if condition="{data.feature_items}">
                    <ul class="hero-pricing__features">
                        <f:for each="{data.feature_items}" as="feature">
                            <li class="hero-pricing__feature">
                                <d:atom.icon name="check" class="hero-pricing__feature-icon" />
                                <span>{feature -> f:render.text(field: 'label')}</span>
                            </li>
                        </f:for>
                    </ul>
                </f:if>
                <f:if condition="{data.button_text} && {data.button_link.url}">
                    <d:atom.button href="{data.button_link.url}" target="{data.button_link.target}" size="lg" class="hero-pricing__cta">{data -> f:render.text(field: 'button_text')}</d:atom.button>
                </f:if>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
