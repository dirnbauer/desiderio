name: desiderio/alert
typeName: desiderio_alert
title: 'Inline Alert Notice'
description: 'Renders a compact color-coded notice box with optional icon and heading, a required rich-text message, five variants (default, info, success, warning, destructive), and an optional dismiss button. Use it for: warnings, important notes, deadlines, service disruptions, safety hints, or success confirmations embedded in a document''s flow. Prefer ''Callout Box'' for editorial tips inside articles, ''Announcement Bar'' for site-wide top-of-page messages, ''Notification'' for toast-style notices.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'Alert Type'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.destructive'
        value: destructive
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.info'
        value: info
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.success'
        value: success
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.warning'
        value: warning
    default: default
  -
    identifier: description
    type: Textarea
    label: 'Alert Description'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 3
    required: true
  -
    identifier: icon
    type: Select
    renderType: selectSingle
    label: 'Icon Name'
    description: 'Optional icon identifier (e.g. "info", "alert-triangle")'
    itemsProcessors:
      10:
        class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
    default: alert-triangle
  -
    identifier: show_close_button
    type: Checkbox
    label: 'Show Close Button'
    default: 0
