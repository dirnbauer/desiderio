name: desiderio/changelog
typeName: desiderio_changelog
title: 'Changelog Data View'
description: 'Renders a dated release history as an ordered chronological list: each entry shows version number, date, a colored tag (New, Fix, Improvement, Breaking), release title, and rich-text notes. Use it for: software release notes, version histories, ''what''s new'' update logs, patch notes from product documentation. Prefer ''Company History Timeline'' for corporate milestones and ''Timeline'' for generic step sequences; this element is for versioned product updates.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: changelog_items
    prefixField: true
    label: Releases
    minItems: 1
    fields:
      -
        identifier: version
        type: Textarea
        rows: 1
        label: Version
        required: true
      -
        identifier: date
        type: Textarea
        rows: 1
        label: Date
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Release Title'
      -
        identifier: description
        type: Textarea
        label: 'Release Notes'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
      -
        identifier: tag
        type: Select
        renderType: selectSingle
        label: Tag
        items:
          -
            label: New
            value: new
          -
            label: Fix
            value: fix
          -
            label: Improvement
            value: improvement
          -
            label: Breaking
            value: breaking
        default: new
