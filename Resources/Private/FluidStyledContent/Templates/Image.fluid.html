<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Default"/>

<f:section name="Main">
    <div class="ce-fsc-image">
        <f:render partial="Header" arguments="{record: record}"/>
        <f:render partial="Media" arguments="{files: record.image, position: 'gallery', maxWidth: 1440}"/>
    </div>
</f:section>

</html>
