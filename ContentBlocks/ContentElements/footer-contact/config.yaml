name: desiderio/footer-contact
typeName: desiderio_footercontact
title: 'Contact Footer'
description: 'Renders a footer listing postal address, email, phone, and business hours as icon-prefixed entries with clickable mailto and tel links, plus a copyright line. Use it for: contact details closing a document — addresses, phone numbers, opening hours, reachability notes. Prefer ''Contact Info'' for a mid-page card grid of contact details; use ''Multi-Column Link Footer'' when navigation links dominate the footer.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: address
    type: Textarea
    label: Address
    rows: 3
  -
    identifier: email
    type: Text
    label: Email
  -
    identifier: phone
    type: Text
    label: Phone
  -
    identifier: hours
    type: Textarea
    rows: 1
    label: 'Business Hours'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
