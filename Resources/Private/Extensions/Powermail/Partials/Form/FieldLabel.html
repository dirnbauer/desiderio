<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
<f:argument name="field" type="object" />

<f:if condition="{field.css} != 'nolabel'">
    <d:molecule.fieldLabel for="powermail_field_{field.marker}" mandatory="{field.mandatory}" title="{field.description}">
        <vh:string.escapeLabels>{field.title}</vh:string.escapeLabels>
    </d:molecule.fieldLabel>
</f:if>
</html>
