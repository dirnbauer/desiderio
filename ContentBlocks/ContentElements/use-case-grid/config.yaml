name: desiderio/use-case-grid
typeName: desiderio_usecasegrid
title: 'Use Case Grid'
description: 'Renders an optional eyebrow, heading, and subline above a responsive card grid where each card holds a title (optionally linked) and a rich-text description — no icons or images. Use it for: application scenarios, ''for teams / for agencies'' audience sections, industry examples, solution overviews, ''what you can build with it'' lists. Prefer ''Case Study Grid'' for real customer stories with images, and ''Feature Cards Grid'' or ''3-Column Feature Grid'' for icon-led capability lists.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: use_case_grid_items
    prefixField: true
    label: 'Use Cases'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
