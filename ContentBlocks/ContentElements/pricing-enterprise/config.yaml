name: desiderio/pricing-enterprise
typeName: desiderio_pricingenterprise
title: 'Enterprise Plan Callout'
description: 'One wide card pitching a custom enterprise plan: eyebrow, headline, rich-text description, a check-mark feature list, a contact-sales button, and an optional side image — no fixed price is displayed. Use it for: custom-pricing or talk-to-sales sections, enterprise tiers with price on request, bespoke offers for large customers, usually placed below a plan grid. Use ''Pricing Section'' for the priced plans themselves and ''Demo Request'' when a lead form is expected.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: features
    type: Collection
    table: pricing_enterprise_features
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    labelField: text
    minItems: 1
    maxItems: 8
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Feature
  -
    identifier: contact_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Contact Sales'
  -
    identifier: contact_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
    allowed: common-image-types
    maxitems: 1
