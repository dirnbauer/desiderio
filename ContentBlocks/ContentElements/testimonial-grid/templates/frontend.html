<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-testimonial-grid" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="testimonial-grid">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="testimonial-grid__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="testimonial-grid__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="testimonial-grid__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <ul class="testimonial-grid__items testimonial-grid__items--cols-{data.columns -> f:or(alternative: '3')}" role="list">
            <f:for each="{data.testimonials}" as="item">
                <li>
                    <figure class="testimonial-grid__card">
                        <blockquote class="testimonial-grid__quote">{item -> f:render.text(field: 'quote')}</blockquote>
                        <figcaption class="testimonial-grid__author">
                            <f:if condition="{item.author_image}">
                                <f:for each="{item.author_image}" as="fileReference">
                                    <f:image image="{fileReference}" width="48" height="48" alt="" loading="lazy" decoding="async" class="testimonial-grid__avatar" additionalAttributes="{srcset: '{f:uri.image(image: fileReference, width: \'48\', height: \'48\')} 1x, {f:uri.image(image: fileReference, width: \'96\', height: \'96\')} 2x'}"/>
                                </f:for>
                            </f:if>
                            <div class="testimonial-grid__meta">
                                <cite class="testimonial-grid__name">{item -> f:render.text(field: 'author_name')}</cite>
                                <f:if condition="{item.author_title}">
                                    <span class="testimonial-grid__role">{item -> f:render.text(field: 'author_title')}</span>
                                </f:if>
                            </div>
                        </figcaption>
                    </figure>
                </li>
            </f:for>
        </ul>
    </d:layout.container>
</d:layout.section>
</html>
