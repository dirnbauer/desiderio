name: desiderio/video-embed
typeName: desiderio_videoembed
title: 'Video Embed'
description: 'A responsive video figure that embeds either a YouTube/Vimeo iframe or an uploaded video file with native controls. Use it on content pages to present a demo, explainer, or recording in a fixed aspect ratio. Provide an embed URL or upload a video file, set a headline, add a caption shown below the player, and choose the aspect ratio of 16:9, 4:3, or 1:1.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: video_url
    type: Text
    label: 'Video Embed URL'
    description: 'YouTube or Vimeo embed URL'
  -
    identifier: video_file
    type: File
    label: 'Video File'
    allowed: common-media-types
    maxitems: 1
  -
    identifier: caption
    type: Textarea
    rows: 1
    label: Caption
  -
    identifier: aspect_ratio
    type: Select
    renderType: selectSingle
    label: 'Aspect Ratio'
    items:
      -
        label: '16:9'
        value: 16-9
      -
        label: '4:3'
        value: 4-3
      -
        label: '1:1'
        value: 1-1
    default: 16-9
