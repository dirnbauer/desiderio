name: desiderio/company-culture
typeName: desiderio_companyculture
title: 'Company Culture Grid'
description: 'Renders an intro header above a grid of culture cards, each pairing a photo with a title and rich-text description. Use it for: sections describing how a company works and what it values — workplace descriptions, ''life at the company'' passages, team rituals, employer-branding content with photos. Prefer ''Company Values'' for icon-led principles without photos, ''Company Perks'' for concrete employee benefits, and ''About the Company'' for a single narrative text-plus-image introduction.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: company_culture_items
    prefixField: true
    label: 'Culture Highlights'
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
