name: desiderio/notification
typeName: desiderio_notification
title: 'Notification'
description: 'Renders a toast-style notice box with a colored variant (info, success, warning, or error), matching icon, optional title, rich-text message, optional action link, and an optional dismiss button; warnings and errors announce as alerts to screen readers. Use it for: maintenance or downtime notices, status and confirmation messages, deprecation or policy warnings in a document. Prefer ''Inline Alert Notice'' for a simpler non-dismissible box; ''Announcement Bar'' for a page-top message.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Message
    rows: 3
    required: true
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: Type
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.info'
        value: info
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.success'
        value: success
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.warning'
        value: warning
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.destructive'
        value: error
    default: info
    description: 'Sets the colour, icon and screen-reader urgency. Warning and error announce as alerts; info and success as status.'
  -
    identifier: action_text
    type: Textarea
    rows: 1
    label: 'Action Button Text'
  -
    identifier: action_link
    type: Link
    label: 'Action Button Link'
  -
    identifier: dismissible
    type: Checkbox
    label: Dismissible
    default: 1
