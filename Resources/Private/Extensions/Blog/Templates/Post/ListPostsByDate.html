<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Default" />

<f:section name="Content">
    <f:if condition="!{archiveData}">
        <f:then>
            <header class="mb-8 flex flex-wrap items-center gap-3">
                <d:atom.typography tag="h1" variant="h1">
                    <f:if condition="{month}">{f:format.date(format: '{settings.widgets.archive.monthDateFormat}', date: timestamp)}</f:if> {year}
                </d:atom.typography>
                <blogvh:link.archive class="inline-flex h-9 items-center gap-2 rounded-lg border border-border px-3 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground" rss="true" year="{year}" month="{month}">
                    <f:render partial="General/SocialIcons" section="Rss" optional="true" />
                    <span><f:translate extensionName="Blog" key="link.rss" default="RSS"/></span>
                </blogvh:link.archive>
            </header>
            <f:render partial="List" arguments="{_all}" />
            <f:if condition="{settings.archiveUid}">
                <footer class="mt-8 border-t border-border pt-6">
                    <f:link.page pageUid="{settings.archiveUid}" class="inline-flex h-9 items-center rounded-lg border border-border px-3 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground">
                        &larr; <f:translate extensionName="Blog" key="list.backlink.archive">Back to archive</f:translate>
                    </f:link.page>
                </footer>
            </f:if>
        </f:then>
        <f:else>
            <header class="mb-8">
                <d:atom.typography tag="h1" variant="h1"><f:translate extensionName="Blog" key="headline.archive">Archive</f:translate></d:atom.typography>
            </header>
            <div class="grid gap-4">
                <f:for each="{archiveData}" as="months" key="year">
                    <f:render partial="List/Archive" arguments="{_all}" />
                </f:for>
            </div>
        </f:else>
    </f:if>
</f:section>

</html>
