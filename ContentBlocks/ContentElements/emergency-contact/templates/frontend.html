<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-emergency-contact" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="emergency-contact">
    <d:layout.container>
        <f:variable name="emergencyId" value="emergency-contact-{data.uid}"/>
        <f:variable name="regionLabel"><f:translate key="LLL:EXT:desiderio/ContentBlocks/ContentElements/emergency-contact/language/labels.xlf:region.label" default="Emergency contact"/></f:variable>
        <div class="emergency-contact__card" role="region" aria-labelledby="{f:if(condition: data.header, then: emergencyId, else: '')}" aria-label="{f:if(condition: data.header, then: '', else: regionLabel)}">
            <f:if condition="{data.header}">
                <h2 class="emergency-contact__headline" id="{emergencyId}">
                    <span class="emergency-contact__headline-icon" aria-hidden="true"><d:atom.icon name="alert-triangle" size="default"/></span>
                    <span>{data -> f:render.text(field: 'header')}</span>
                </h2>
            </f:if>
            <f:if condition="{data.description_text}"><p class="emergency-contact__description">{data -> f:render.text(field: 'description_text')}</p></f:if>
            <f:if condition="{data.phone}">
                <p class="emergency-contact__phone">
                    <f:if condition="{data.phone_link.url}">
                        <f:then>
                            <d:atom.link href="{data.phone_link.url}" target="{data.phone_link.target}" variant="muted" class="emergency-contact__number">
                                <span class="emergency-contact__number-icon" aria-hidden="true"><d:atom.icon name="phone" size="default"/></span>
                                <span>{data -> f:render.text(field: 'phone')}</span>
                            </d:atom.link>
                        </f:then>
                        <f:else>
                            <span class="emergency-contact__number">
                                <span class="emergency-contact__number-icon" aria-hidden="true"><d:atom.icon name="phone" size="default"/></span>
                                <span>{data -> f:render.text(field: 'phone')}</span>
                            </span>
                        </f:else>
                    </f:if>
                </p>
            </f:if>
            <f:if condition="{data.available}">
                <p class="emergency-contact__available">
                    <span class="emergency-contact__available-icon" aria-hidden="true"><d:atom.icon name="clock" size="sm"/></span>
                    <span>{data -> f:render.text(field: 'available')}</span>
                </p>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
