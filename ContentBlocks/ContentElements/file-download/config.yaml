name: desiderio/file-download
typeName: desiderio_filedownload
title: 'File Download List'
description: 'A list of downloadable files, each shown as a card with a download icon, title, description, file size, and a download button. Use it on resource, press, or documentation pages to offer PDFs, brochures, or assets for the visitor to grab. Key fields are the section headline and the file items, each with a title, short description, the attached file, and a file-size label such as 2.4 MB.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: file_download_items
    prefixField: true
    label: Files
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
      -
        identifier: file
        type: File
        label: File
        maxitems: 1
        required: true
      -
        identifier: file_size
        type: Textarea
        rows: 1
        label: 'File Size'
        description: 'e.g. 2.4 MB'
