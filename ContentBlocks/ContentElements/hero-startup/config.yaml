name: desiderio/hero-startup
typeName: desiderio_herostartup
title: 'Startup Waitlist Hero'
description: 'Hero combining badge, punchy headline, lead text, an embedded newsletter sign-up form (TYPO3 Form Framework), a stack of up to five user avatars, and a social-proof line such as join 2,000 others. Use it for: pre-launch and waitlist pages capturing early email sign-ups with join-the-crowd messaging. Prefer ''Form Capture Hero'' when there is no social proof but a privacy note; ''Waitlist Signup'' for a centered card further down the page.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
  -
    identifier: social_proof_text
    type: Textarea
    rows: 1
    label: 'Social Proof Text'
  -
    identifier: avatars
    type: File
    label: 'User Avatars'
    allowed: common-image-types
    maxitems: 5
