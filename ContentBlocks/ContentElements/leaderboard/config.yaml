name: desiderio/leaderboard
typeName: desiderio_leaderboard
title: 'Leaderboard'
description: 'A ranked, ordered list of entries shown top to bottom, each row combining an optional rank number, an avatar, a name with subtitle, and a score value. Use it on community, gaming, or results pages to rank participants or items by performance. Key fields are the heading, rich-text description, a show-rank toggle, and a repeatable entry collection with name, score, subtitle, an avatar URL, and an avatar image.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: items
    type: Collection
    table: leaderboard_items
    prefixField: true
    label: Entries
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.score'
        required: true
      -
        identifier: subtitle
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.subtitle'
      -
        identifier: avatar_url
        type: Text
        label: 'Avatar URL'
        description: 'Optional external portrait image URL. Used before the uploaded avatar file.'
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.avatar'
        allowed: common-image-types
        maxitems: 1
  -
    identifier: show_rank
    type: Checkbox
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.show_rank'
    default: 1
