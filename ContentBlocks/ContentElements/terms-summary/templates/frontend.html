<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-terms-summary" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="terms-summary-section">
    <d:layout.container>
        <div class="terms-summary">
            <header class="terms-summary__head">
                <f:if condition="{data.header}">
                    <h2 class="terms-summary__title">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.last_updated}">
                    <p class="terms-summary__updated"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:terms_summary.last_updated">Last updated</f:translate>: <time>{data -> f:render.text(field: 'last_updated')}</time></p>
                </f:if>
                <f:if condition="{data.intro}">
                    <p class="terms-summary__intro">{data -> f:render.text(field: 'intro')}</p>
                </f:if>
            </header>
            <dl class="terms-summary__list">
                <f:for each="{data.items}" as="item">
                    <div class="terms-summary__item">
                        <dt class="terms-summary__item-title">{item -> f:render.text(field: 'title')}</dt>
                        <dd class="terms-summary__item-text">{item -> f:render.text(field: 'summary')}</dd>
                    </div>
                </f:for>
            </dl>
            <f:if condition="{data.full_terms_link}">
                <div class="terms-summary__footer">
                    <d:atom.link href="{data.full_terms_link.url}" target="{data.full_terms_link.target}" variant="muted" class="terms-summary__link">
                        <f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:read_full_terms">Read full terms</f:translate>
                        <span aria-hidden="true"> &rarr;</span>
                    </d:atom.link>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
