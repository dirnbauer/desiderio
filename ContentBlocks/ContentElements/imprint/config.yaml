name: desiderio/imprint
typeName: desiderio_imprint
title: 'Imprint'
description: 'A structured legal-notice block that lays out company, contact, and legal details in labelled groups, with clickable email and phone links. Use it on the imprint or legal page in the footer area to meet statutory disclosure requirements. Key fields are the company name, address, contact email and phone, registry information, VAT ID, and a rich-text area for additional information.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: company_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:company_name'
    required: true
  -
    identifier: address
    type: Textarea
    label: Address
    rows: 3
  -
    identifier: contact_email
    type: Text
    label: Email
  -
    identifier: contact_phone
    type: Text
    label: Phone
  -
    identifier: registry_info
    type: Textarea
    label: 'Registry Information'
    rows: 3
  -
    identifier: vat_id
    type: Text
    label: 'VAT ID'
  -
    identifier: additional_info
    type: Textarea
    label: 'Additional Information'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 4
