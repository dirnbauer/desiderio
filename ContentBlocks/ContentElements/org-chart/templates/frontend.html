<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-org-chart" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="org-chart">
    <d:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="org-chart__intro">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="lead">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <div class="org-chart__levels">
            <f:for each="{data.levels}" as="level" iteration="levelIter">
                <div class="org-chart__level {f:if(condition: levelIter.isFirst, then: 'org-chart__level--root')}">
                    <f:if condition="{level.level_label}">
                        <d:atom.badge variant="secondary" class="org-chart__level-label">{level -> f:render.text(field: 'level_label')}</d:atom.badge>
                    </f:if>
                    <ul class="org-chart__row" role="list">
                        <f:for each="{level.people}" as="person">
                            <f:if condition="{person.name}">
                                <li class="org-chart__person">
                                    <d:molecule.card class="org-chart__card">
                                        <h3 class="org-chart__name">{person -> f:render.text(field: 'name')}</h3>
                                        <f:if condition="{person.role}">
                                            <p class="org-chart__role">{person -> f:render.text(field: 'role')}</p>
                                        </f:if>
                                    </d:molecule.card>
                                </li>
                            </f:if>
                        </f:for>
                    </ul>
                </div>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
