<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Widget" />

<f:section name="Title"><f:translate extensionName="Blog" key="headline.categories">Categories</f:translate></f:section>

<f:section name="Content">
    <f:if condition="{categories}">
        <f:then>
            <ul role="list" class="flex flex-wrap gap-2">
                <f:for each="{categories}" as="category">
                    <li id="category-{category.uid}" data-blog-category="{category.uid}" data-active="{f:if(condition: '{currentCategory} == {category.uid}', then: 'true', else: 'false')}">
                        <blogvh:link.category category="{category}" title="{category.title}" class="inline-flex min-h-6 rounded-md !no-underline outline-none focus-visible:ring-3 focus-visible:ring-ring/40">
                            <d:atom.badge variant="secondary" class="min-h-6">
                                <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="folder" size="xs"/></span>
                                <span>{category.title}</span>
                                <span class="text-muted-foreground">(<f:count>{category.posts}</f:count>)</span>
                            </d:atom.badge>
                        </blogvh:link.category>
                    </li>
                </f:for>
            </ul>
        </f:then>
        <f:else>
            <d:molecule.alert class="bg-muted/40">
                <d:atom.icon name="folder" size="sm"/>
                <d:molecule.alertDescription><f:translate extensionName="Blog" key="categories.empty">No categories yet.</f:translate></d:molecule.alertDescription>
            </d:molecule.alert>
        </f:else>
    </f:if>
</f:section>

</html>
