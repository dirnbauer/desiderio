name: desiderio/map-embed
typeName: desiderio_mapembed
title: 'Map Embed'
description: 'Embeds an interactive map from a Google Maps or OpenStreetMap embed URL in a responsive iframe with configurable pixel height, optionally introduced by a heading and a postal address block. Use it for: ''how to find us'' sections, office, store, or venue locations, event directions — any address in a source document that should appear as a map. Prefer ''Directions Routes'' for written travel instructions, ''Office Locations'' for several branches as cards.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: embed_url
    type: Text
    label: 'Map Embed URL'
  -
    identifier: address
    type: Textarea
    label: Address
    rows: 3
  -
    identifier: height
    type: Number
    label: 'Map Height (px)'
    default: 400
