name: desiderio/cta-card
typeName: desiderio_ctacard
title: 'CTA Card'
description: 'A contained card with optional badge, heading, rich-text body, and a footer button, staying inside the content column rather than spanning the page. Use it for: boxed offers and promotions within article flow, program or service teasers labeled ''New'' or ''Limited'', signup nudges inside longer pages. Prefer ''Full-Width CTA Banner'' for a page-spanning band, ''Gradient CTA Card'' for louder styling, ''Inline CTA Prompt'' for a slimmer in-text bar.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: cta_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: cta_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
  -
    identifier: badge
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
