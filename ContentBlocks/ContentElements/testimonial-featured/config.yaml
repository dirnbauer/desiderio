name: desiderio/testimonial-featured
typeName: desiderio_testimonialfeatured
title: 'Featured Testimonial'
description: 'Renders one standout quote as a full-width statement block, optionally over a background image, with company logo, author avatar, name, title, and company. Use it for: a flagship customer statement from a marquee client, a case-study pull quote worth its own section, brand-endorsement highlights. Prefer ''Single Testimonial'' for a quote inline in the content flow; use ''Testimonial Hero'' when the quote pairs with intro copy at the page top.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: quote
    type: Textarea
    label: 'Quote Text'
    rows: 4
    required: true
  -
    identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
    required: true
  -
    identifier: author_title
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_title'
  -
    identifier: author_company
    type: Textarea
    rows: 1
    label: Company
  -
    identifier: author_image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_photo'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: company_logo
    type: File
    label: 'Company Logo'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: background_image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:background_image'
    allowed: common-image-types
    maxitems: 1
