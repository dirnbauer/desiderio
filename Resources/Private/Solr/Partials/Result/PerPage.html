<html xmlns="http://www.w3.org/1999/xhtml" lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:section name="PerPage">
    <div id="results-per-page">
        <form method="post" action="{s:uri.search.currentSearch()}" class="flex items-center gap-2">
            <label class="text-sm font-medium text-muted-foreground">
                <f:translate key="solr.resultsPerPage" domain="desiderio.labels">Results per page:</f:translate>
            </label>
            <select name="{resultSet.usedSearchRequest.argumentNameSpace}[resultsPerPage]" onchange="this.form.submit()" class="h-8 rounded-lg border border-input bg-background px-3 text-sm text-foreground transition-colors focus-visible:outline-hidden focus-visible:ring-3 focus-visible:ring-ring">
                <f:for each="{resultSet.usedSearchRequest.contextTypoScriptConfiguration.searchResultsPerPageSwitchOptionsAsArray}" as="availablePerPage">
                    <f:if condition="{availablePerPage}=={resultSet.usedResultsPerPage}">
                        <f:then><option selected="selected" value="{availablePerPage}">{availablePerPage}</option></f:then>
                        <f:else><option value="{availablePerPage}">{availablePerPage}</option></f:else>
                    </f:if>
                </f:for>
            </select>
        </form>
    </div>
</f:section>

</html>
