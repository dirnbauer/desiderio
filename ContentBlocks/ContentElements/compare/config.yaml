name: desiderio/compare
typeName: desiderio_compare
title: 'Compare Two Options'
description: 'A two-panel layout that places two options side by side, with the right panel visually accented to mark the preferred choice. Use it to contrast plans, products, or before-and-after scenarios and steer visitors toward a decision. Each panel offers a title, rich-text description, a bullet list of points, and a call-to-action button, while the accent panel adds a highlight badge.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'Section Subheadline'
    rows: 2
  -
    identifier: left_title
    type: Textarea
    rows: 1
    label: 'Left Title'
    required: true
  -
    identifier: left_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Left Description'
    rows: 3
  -
    identifier: left_points
    type: Collection
    table: compare_left_points
    prefixField: true
    label: 'Left Points'
    labelField: text
    minItems: 1
    maxItems: 8
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Point
  -
    identifier: left_button_text
    type: Textarea
    rows: 1
    label: 'Left Button Text'
  -
    identifier: left_button_link
    type: Link
    label: 'Left Button Link'
  -
    identifier: right_badge
    type: Textarea
    rows: 1
    label: 'Right Badge'
  -
    identifier: right_title
    type: Textarea
    rows: 1
    label: 'Right Title'
    required: true
  -
    identifier: right_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Right Description'
    rows: 3
  -
    identifier: right_points
    type: Collection
    table: compare_right_points
    prefixField: true
    label: 'Right Points'
    labelField: text
    minItems: 1
    maxItems: 8
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Point
  -
    identifier: right_button_text
    type: Textarea
    rows: 1
    label: 'Right Button Text'
  -
    identifier: right_button_link
    type: Link
    label: 'Right Button Link'
