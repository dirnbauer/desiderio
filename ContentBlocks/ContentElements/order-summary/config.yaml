name: desiderio/order-summary
typeName: desiderio_ordersummary
title: 'Order Summary Pricing'
description: 'Order Summary Pricing supports buying decisions with prices, plans, packages, or calculated options. Editors can manage headline and copy fields, repeatable entries and link and CTA controls.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    label: 'Line Items'
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Item Name'
        required: true
      -
        identifier: quantity
        type: Textarea
        rows: 1
        label: Quantity
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
        required: true
  -
    identifier: subtotal
    type: Textarea
    rows: 1
    label: Subtotal
  -
    identifier: discount_label
    type: Textarea
    rows: 1
    label: 'Discount Label'
  -
    identifier: discount_value
    type: Textarea
    rows: 1
    label: 'Discount Value'
  -
    identifier: total
    type: Textarea
    rows: 1
    label: Total
    required: true
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Proceed to Checkout'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
