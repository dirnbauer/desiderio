<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-hero-minimal" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="hero-minimal">
    <d:layout.container>
        <div class="hero-minimal__content">
            <f:if condition="{data.header}">
                <h1 class="hero-minimal__headline">{data -> f:render.text(field: 'header')}</h1>
            </f:if>
            <f:if condition="{data.subheadline}">
                <p class="hero-minimal__subheadline">{data -> f:render.text(field: 'subheadline')}</p>
            </f:if>
            <f:if condition="{data.button_text} && {data.button_link.url}">
                <d:atom.button href="{data.button_link.url}" target="{data.button_link.target}" size="lg">{data -> f:render.text(field: 'button_text')}</d:atom.button>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
