<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-job-card" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="job-card">
    <d:layout.container>
        <d:molecule.card class="job-card__card">
            <div class="job-card__header">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <div class="job-card__meta">
                    <f:if condition="{data.department}"><span class="job-card__badge">{data -> f:render.text(field: 'department')}</span></f:if>
                    <f:if condition="{data.location}"><span class="job-card__badge">{data -> f:render.text(field: 'location')}</span></f:if>
                    <f:if condition="{data.type}"><span class="job-card__badge">{data -> f:render.text(field: 'type')}</span></f:if>
                </div>
            </div>
            <f:if condition="{data.description}"><p class="job-card__description">{data -> f:render.text(field: 'description')}</p></f:if>
            <f:if condition="{data.apply_link.url}">
                <div class="job-card__actions">
                    <d:atom.button href="{data.apply_link.url}" target="{data.apply_link.target}" size="lg">Apply now</d:atom.button>
                </div>
            </f:if>
        </d:molecule.card>
    </d:layout.container>
</d:layout.section>

</html>
