name: desiderio/audio-player
typeName: desiderio_audioplayer
title: 'Audio Player'
description: 'Use when the audio player should embed media or location content with context.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: audio_file
    type: File
    label: 'Audio File'
    allowed: common-media-types
    maxitems: 1
    required: true
  -
    identifier: show_download
    type: Checkbox
    label: 'Show Download Link'
    default: 0
