<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers" data-namespace-typo3-fluid="true">
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<div data-slot="form-item" class="powermail_fieldwrap_{field.marker} {field.css} space-y-2">
    <f:render partial="Form/FieldLabel" arguments="{field: field}" />
    <f:form.textarea
        cols="20"
        rows="5"
        id="powermail_field_{field.marker}"
        property="{field.marker}"
        placeholder="{field.placeholder}"
        value="{vh:misc.prefillField(field: field, mail: mail)}"
        autocomplete="{vh:string.autocomplete(field: field)}"
        additionalAttributes="{vh:validation.validationDataAttribute(field: field)}"
        class="flex min-h-24 w-full min-w-0 rounded-md border border-input bg-transparent px-3 py-2 text-sm text-foreground shadow-xs transition-[color,box-shadow] outline-none placeholder:text-muted-foreground selection:bg-primary selection:text-primary-foreground focus-visible:border-ring focus-visible:ring-[3px] focus-visible:ring-ring/50 disabled:cursor-not-allowed disabled:bg-input/50 disabled:opacity-50 aria-invalid:border-destructive aria-invalid:ring-destructive/20 dark:bg-input/30 dark:disabled:bg-input/80 dark:aria-invalid:border-destructive/50 dark:aria-invalid:ring-destructive/40 {vh:validation.errorClass(field: field, class: 'border-destructive ring-destructive/20')}" />
</div>
</html>
