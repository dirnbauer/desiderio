name: desiderio/feature-image
typeName: desiderio_featureimage
title: 'Image Feature Section'
description: 'Renders a two-column block pairing an eyebrow badge, heading, rich-text lead, and CTA button with one large lightbox-zoomable image, positioned left or right. Use it for: spotlighting a single feature, screenshot, or product visual with explanatory copy — one image, one pitch. Prefer ''Alternating Feature Section'' for several image-and-text rows in sequence; ''Feature Highlight Banner'' for the same pairing on a colored background; ''Split Text & Media'' for general editorial text with media.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: image_position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image_position'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.right'
        value: right
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
    default: right
  -
    identifier: link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: link_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link_text'
