name: desiderio/utility-bar
typeName: desiderio_utilitybar
title: 'Utility Bar'
description: 'Renders a slim full-width bar with a short text on the left and a right-aligned row of small utility links; the heading stays screen-reader-only. Use it for: meta content above the main navigation — hotline numbers, opening-hours notes, login or account links, language and contact shortcuts. Prefer ''Announcement Bar'' for a single promotional message, and ''Legal Links Row'' for privacy, terms, and imprint links in the footer.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: left_text
    type: Textarea
    rows: 1
    label: 'Left Text'
  -
    identifier: link_items
    type: Collection
    table: utility_bar_link_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:links'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
