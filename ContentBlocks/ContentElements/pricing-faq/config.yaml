name: desiderio/pricing-faq
typeName: desiderio_pricingfaq
title: 'Pricing FAQ Accordion'
description: 'An accordion of expandable question-and-answer items rendered as native details/summary rows with rich-text answers, beneath an eyebrow, headline, and subheadline. Use it for: pricing and billing questions — refunds, payment methods, contract terms, plan changes, trials — typically below pricing tables to clear buying objections. Prefer ''FAQ Accordion'' for general FAQs with FAQPage schema for rich search results; prefer ''Accordion'' for expandable content that is not question-driven.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: question_items
    type: Collection
    table: pricing_faq_question_items
    prefixField: true
    label: Questions
    minItems: 1
    fields:
      -
        identifier: question
        type: Textarea
        rows: 1
        label: Question
        required: true
      -
        identifier: answer
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Answer
        rows: 3
        required: true
