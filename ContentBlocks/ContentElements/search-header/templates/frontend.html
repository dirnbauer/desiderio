<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-search-header" href="{cb:assetPath()}/frontend.css"/>

<f:variable name="inputId" value="search-header-input-{data.uid}"/>
<f:variable name="labelText" value="{data.placeholder -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:solr.search.label\')}')}"/>

<d:layout.section class="search-header">
    <d:layout.container size="md">
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="search-header__intro">
                <f:if condition="{data.eyebrow}">
                    <span class="search-header__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
                </f:if>
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h1" class="search-header__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <d:atom.typography variant="lead" class="search-header__description">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
                </f:if>
            </header>
        </f:if>
        <div class="search-header__body">
            <form class="search-header__form" action="{f:uri.typolink(parameter: data.form_action.url)}" method="get" role="search" aria-labelledby="{inputId}-label">
                <label id="{inputId}-label" class="sr-only" for="{inputId}">{labelText}</label>
                <div class="search-header__field">
                    <svg class="search-header__icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.3-4.3"/>
                    </svg>
                    <input class="search-header__input" id="{inputId}" type="search" name="q" placeholder="{data.placeholder -> f:or(alternative: labelText)}" autocomplete="off"/>
                </div>
                <d:atom.button type="submit" size="lg" class="search-header__submit"><f:if condition="{data.button_text}"><f:then>{data -> f:render.text(field: 'button_text')}</f:then><f:else><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:solr.search.label"/></f:else></f:if></d:atom.button>
            </form>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
