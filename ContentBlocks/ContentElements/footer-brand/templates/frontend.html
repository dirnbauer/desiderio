<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-footer-brand" href="{cb:assetPath()}/frontend.css"/>

<footer class="footer-brand" aria-label="{data.header -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:footer.aria\', default: \'Footer\')}')}">
    <d:layout.container>
        <div class="footer-brand__inner">
            <div class="footer-brand__identity">
                <div class="footer-brand__lockup">
                    <f:if condition="{data.logo}">
                        <div class="footer-brand__logo">
                            <f:for each="{data.logo}" as="file">
                                <f:image image="{file}" alt="{data.brand}" width="72"/>
                            </f:for>
                        </div>
                    </f:if>
                    <f:if condition="{data.brand}">
                        <d:atom.typography tag="h2" variant="large" class="footer-brand__name">{data -> f:render.text(field: 'brand')}</d:atom.typography>
                    </f:if>
                </div>
                <f:if condition="{data.tagline}">
                    <p class="footer-brand__tagline">{data -> f:render.text(field: 'tagline')}</p>
                </f:if>
            </div>
            <f:if condition="{data.link_items}">
                <nav class="footer-brand__nav" aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:footer.links.aria', default: 'Footer links')}">
                    <ul class="footer-brand__links">
                        <f:for each="{data.link_items}" as="item">
                            <li>
                                <f:if condition="{item.link}">
                                    <f:then><d:atom.link href="{item.link.url}" target="{item.link.target}" variant="muted" class="footer-brand__link">{item -> f:render.text(field: 'label')}</d:atom.link></f:then>
                                    <f:else><span class="footer-brand__link">{item -> f:render.text(field: 'label')}</span></f:else>
                                </f:if>
                            </li>
                        </f:for>
                    </ul>
                </nav>
            </f:if>
        </div>
        <f:if condition="{data.copyright}">
            <div class="footer-brand__bottom">
                <p class="footer-brand__copyright">{data -> f:render.text(field: 'copyright')}</p>
            </div>
        </f:if>
    </d:layout.container>
</footer>

</html>
