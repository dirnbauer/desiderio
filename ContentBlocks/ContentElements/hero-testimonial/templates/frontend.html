<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="d-hero-testimonial" href="{cb:assetPath()}/frontend.css"/>
<d:layout.section class="hero-testimonial">
    <d:layout.container>
        <div class="hero-testimonial__grid">
            <div class="hero-testimonial__content">
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h1" class="hero-testimonial__headline" itemprop="">
                        <span id="hero-testimonial-title-{data.uid}">{data -> f:render.text(field: 'header')}</span>
                    </d:atom.typography>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <d:atom.typography variant="lead" class="hero-testimonial__subheadline">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.primary_button_text} && {data.primary_button_link}">
                    <div class="hero-testimonial__actions">
                        <d:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</d:atom.button>{data -> f:render.link(field: 'primary_button_link')}
                    </div>
                </f:if>
            </div>
            <f:if condition="{data.quote}">
                <figure class="hero-testimonial__quote-card">
                    <blockquote class="hero-testimonial__quote">
                        <p>{data -> f:render.text(field: 'quote')}</p>
                    </blockquote>
                    <figcaption class="hero-testimonial__author">
                        <f:if condition="{data.author_image}">
                            <span class="hero-testimonial__avatar">
                                <f:for each="{data.author_image}" as="image">
                                    <f:image image="{image}" width="48" height="48" class="hero-testimonial__avatar-image" alt="" additionalAttributes="{srcset: '{f:uri.image(image: image, width: \'48\', height: \'48\')} 1x, {f:uri.image(image: image, width: \'96\', height: \'96\')} 2x'}" loading="lazy" decoding="async"/>
                                </f:for>
                            </span>
                        </f:if>
                        <span class="hero-testimonial__author-info">
                            <f:if condition="{data.author_name}">
                                <cite class="hero-testimonial__author-name">{data -> f:render.text(field: 'author_name')}</cite>
                            </f:if>
                            <f:if condition="{data.author_role}">
                                <span class="hero-testimonial__author-role">{data -> f:render.text(field: 'author_role')}</span>
                            </f:if>
                        </span>
                    </figcaption>
                </figure>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
