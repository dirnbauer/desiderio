<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:argument name="post" type="T3G\AgencyPack\Blog\Domain\Model\Post" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>
<f:argument name="iterator" type="array" optional="true"/>

<article
    class="group/blog-post min-w-0 border-b border-border/70 pb-8 last:border-b-0 last:pb-0"
    data-blog-tag="{f:if(condition: post.tags, then: post.tags.0.uid, else: 0)}"
    data-blog-category="{f:if(condition: post.categories, then: post.categories.0.uid, else: 0)}"
    itemscope="itemscope"
    itemtype="https://schema.org/BlogPosting"
>
    <div class="grid min-w-0 gap-5 {f:if(condition: post.featuredImage, then: 'md:grid-cols-[minmax(12rem,16rem)_minmax(0,1fr)] md:items-start')}">
        <f:if condition="{post.featuredImage}">
            <blogvh:link.post post="{post}" class="group/media block overflow-hidden rounded-xl bg-muted !no-underline outline-none ring-1 ring-border transition-colors hover:ring-primary/40 focus-visible:ring-3 focus-visible:ring-ring/40" additionalAttributes="{aria-hidden: 'true', tabindex: '-1'}">
                <f:render partial="General/FeaturedImage" arguments="{image: post.featuredImage, settings: settings.lists.featuredImage}" />
            </blogvh:link.post>
        </f:if>

        <div class="min-w-0">
            <d:layout.stack gap="md">
                <header class="min-w-0">
                    <div class="flex min-w-0 flex-col gap-3">
                        <d:atom.typography tag="h2" variant="h3" class="min-w-0 max-w-3xl text-balance leading-tight tracking-normal" itemprop="headline">
                            <blogvh:link.post post="{post}" class="rounded-md text-foreground !no-underline outline-none transition-colors hover:text-primary focus-visible:ring-3 focus-visible:ring-ring/40">
                                {post.title}
                            </blogvh:link.post>
                        </d:atom.typography>
                    </div>
                </header>

                <f:if condition="{post.abstract} || {post.description}">
                    <d:atom.typography variant="muted" class="max-w-3xl text-pretty leading-7" itemprop="description">
                        <f:if condition="{post.abstract}">
                            <f:then>{post.abstract}</f:then>
                            <f:else>{post.description}</f:else>
                        </f:if>
                    </d:atom.typography>
                </f:if>

                <f:if condition="{settings.meta.listheader.enable}">
                    <f:render partial="Meta/ListHeader" arguments="{_all}" />
                </f:if>

                <div>
                    <blogvh:link.post post="{post}" class="inline-flex items-center gap-1.5 rounded-md text-sm font-medium text-primary !no-underline outline-none transition-colors hover:text-primary focus-visible:ring-3 focus-visible:ring-ring/40">
                        <span><f:translate extensionName="Blog" key="read_more" default="Read more"/></span>
                        <span data-icon="inline-end" aria-hidden="true"><d:atom.icon name="arrow-right" size="xs"/></span>
                    </blogvh:link.post>
                </div>
            </d:layout.stack>
        </div>
    </div>
</article>

</html>
