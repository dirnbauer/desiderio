name: desiderio/imprint
typeName: desiderio_imprint
title: 'Imprint'
description: 'Renders a structured legal-notice grid grouped into company, contact, and legal blocks: required company name, address, clickable email and phone links, registry information, VAT ID, and an additional rich-text section. Use it for: imprint or legal-notice pages (Impressum), statutory provider identification, company master data taken from letterheads or legal documents. Prefer ''Legal Disclaimer Notice'' for a short liability paragraph; ''Contact Info'' for general contact cards.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: company_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:company_name'
    required: true
  -
    identifier: address
    type: Textarea
    label: Address
    rows: 3
  -
    identifier: contact_email
    type: Text
    label: Email
  -
    identifier: contact_phone
    type: Text
    label: Phone
  -
    identifier: registry_info
    type: Textarea
    label: 'Registry Information'
    rows: 3
  -
    identifier: vat_id
    type: Text
    label: 'VAT ID'
  -
    identifier: additional_info
    type: Textarea
    label: 'Additional Information'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 4
