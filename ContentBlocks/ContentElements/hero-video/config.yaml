name: desiderio/hero-video
typeName: desiderio_herovideo
title: 'Video Hero'
description: 'Renders a two-column hero pairing eyebrow, headline, lead text, and a primary button with an embedded video panel (YouTube nocookie or Vimeo iframe URL) plus optional video title and rich-text caption. Use it for: page openers led by a product demo, trailer, keynote, or explainer video. Prefer ''Video Embed'' for a standalone video within page content; ''Video Feature Section'' for a mid-page feature built around a video.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: video_title
    type: Textarea
    rows: 1
    label: 'Video Title'
  -
    identifier: video_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Video Description'
    rows: 2
  -
    identifier: video_url
    type: Text
    label: 'Video URL'
    description: 'Use an embeddable video URL, for example a YouTube nocookie or Vimeo player URL.'
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
