name: desiderio/navbar-centered
typeName: desiderio_navbarcentered
title: 'Centered Navigation Bar'
description: 'Renders a slim header bar with the brand text on the left, a centered row of menu links in the middle, and one optional action button on the right; on small screens everything stacks centered. Use it for: minimal landing-page or microsite headers with a single call to action. Prefer ''Navigation Bar'' when you need two CTA buttons or layout variants, ''Split Navigation Bar'' for link groups flanking a centered brand.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand'
    required: true
  -
    identifier: nav_items
    type: Collection
    table: navbar_centered_nav_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:navigation_items'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
