<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:section name="Pagination">
    <nav class="solr-pagination" aria-label="Search result pagination">
        <ul class="pagination flex flex-wrap gap-1">
            <f:if condition="{pagination.previousPageNumber}">
                <li>
                    <a class="page-link solr-ajaxified inline-flex size-8 items-center justify-center rounded-lg border border-border text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground" href="{s:uri.paginate.resultPage(page: pagination.previousPageNumber)}" aria-label="Previous page">&laquo;</a>
                </li>
            </f:if>

            <f:if condition="{pagination.hasLessPages}">
                <li><span class="page-link inline-flex size-8 items-center justify-center text-sm text-muted-foreground">...</span></li>
            </f:if>

            <f:for each="{pagination.allPageNumbers}" as="page">
                <li>
                    <f:if condition="{page} == {currentPage}">
                        <f:then>
                            <span class="page-link inline-flex size-8 items-center justify-center rounded-lg bg-primary text-sm font-medium text-primary-foreground" aria-current="page">{page}</span>
                        </f:then>
                        <f:else>
                            <f:if condition="{page} > 1">
                                <f:then>
                                    <a class="page-link solr-ajaxified inline-flex size-8 items-center justify-center rounded-lg border border-border text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground" href="{s:uri.paginate.resultPage(page: page)}">{page}</a>
                                </f:then>
                                <f:else>
                                    <a class="page-link solr-ajaxified inline-flex size-8 items-center justify-center rounded-lg border border-border text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground" href="{s:uri.paginate.resultPage()}">{page}</a>
                                </f:else>
                            </f:if>
                        </f:else>
                    </f:if>
                </li>
            </f:for>

            <f:if condition="{pagination.hasMorePages}">
                <li><span class="page-link inline-flex size-8 items-center justify-center text-sm text-muted-foreground">...</span></li>
            </f:if>

            <f:if condition="{pagination.nextPageNumber}">
                <li>
                    <a class="page-link solr-ajaxified inline-flex size-8 items-center justify-center rounded-lg border border-border text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground" href="{s:uri.paginate.resultPage(page: pagination.nextPageNumber)}" aria-label="Next page">&raquo;</a>
                </li>
            </f:if>
        </ul>
    </nav>
</f:section>

</html>
