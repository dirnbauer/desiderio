name: desiderio/hero-announcement
typeName: desiderio_heroannouncement
title: 'Announcement Hero'
description: 'A page opener led by a slim banner that highlights news, a launch or an update above the main headline. Use it at the top of a homepage or campaign page when you want to surface a timely message before the pitch. Combines a linkable announcement line, headline, subheadline and two call-to-action buttons with their links.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: announcement_text
    type: Textarea
    rows: 1
    label: 'Announcement Text'
  -
    identifier: announcement_link
    type: Link
    label: 'Announcement Link'
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
