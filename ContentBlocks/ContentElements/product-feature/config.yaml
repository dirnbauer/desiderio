name: desiderio/product-feature
typeName: desiderio_productfeature
title: 'Product Feature Spotlight'
description: 'Renders a two-column spotlight pairing one product image with eyebrow, headline, rich-text description, a check-marked benefits list (up to eight), and a CTA button. Use it for: persuasive single-product or single-offer copy — ''why buy X'' sections, benefit-led product pitches with a supporting photo. It shows no price; prefer ''Shop Product Hero'' when price and buy button lead, or ''Split Feature Section'' for non-commerce feature copy.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:product_image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: features
    type: Collection
    table: product_feature_features
    prefixField: true
    label: 'Feature Benefits'
    labelField: text
    minItems: 1
    maxItems: 8
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Feature
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
