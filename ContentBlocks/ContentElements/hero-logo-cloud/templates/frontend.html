<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-hero-logo-cloud" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="hero-logo-cloud">
    <d:layout.container>
        <div class="hero-logo-cloud__content">
            <f:if condition="{data.eyebrow}">
                <span class="hero-logo-cloud__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span>
            </f:if>
            <f:if condition="{data.header}">
                <d:atom.typography tag="h2" variant="h1" class="hero-logo-cloud__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
            </f:if>
            <f:if condition="{data.subheadline}">
                <p class="hero-logo-cloud__description">{data -> f:render.text(field: 'subheadline')}</p>
            </f:if>
            <f:if condition="{data.primary_button_text} && {data.primary_button_link.url}">
                <div class="hero-logo-cloud__actions">
                    <d:atom.button href="{data.primary_button_link.url}" target="{data.primary_button_link.target}" size="lg">{data -> f:render.text(field: 'primary_button_text')}</d:atom.button>
                </div>
            </f:if>
        </div>
        <f:if condition="{data.logo_items}">
            <ul class="hero-logo-cloud__logos" aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:logoCloud.aria', default: 'Trusted by leading teams')}">
                <f:for each="{data.logo_items}" as="logo">
                    <li class="hero-logo-cloud__logo">{logo -> f:render.text(field: 'name')}</li>
                </f:for>
            </ul>
        </f:if>
    </d:layout.container>
</d:layout.section>

</html>
