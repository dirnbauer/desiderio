<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:argument name="author" type="T3G\AgencyPack\Blog\Domain\Model\Author" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>

<f:spaceless>
    <d:molecule.card class="flex flex-col gap-4 p-4 sm:flex-row sm:gap-6 sm:p-6" data-blog-author="{author.uid}" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person">
        <div class="shrink-0">
            <f:variable name="avatarsize" value="{settings.authors.avatar.provider.size as integer}" />
            <f:if condition="{avatarsize}"><f:else><f:variable name="avatarsize" value="64" /></f:else></f:if>
            <img
                loading="lazy"
                class="size-16 rounded-full border border-border object-cover"
                height="{avatarsize}"
                width="{avatarsize}"
                src="{blogvh:uri.avatar(author: author, size: avatarsize)}"
                alt="{author.name}"
                itemprop="image"
            >
        </div>
        <div class="flex flex-1 flex-col gap-2">
            <p class="text-xs font-medium uppercase tracking-wide text-muted-foreground"><f:translate extensionName="Blog" key="author.aboutTheAuthor">About the author</f:translate></p>
            <p class="text-base font-semibold text-foreground">
                <f:render section="ProfileLink" arguments="{_all}" contentAs="content">{author.name}</f:render>
            </p>
            <f:if condition="{author.title} || {author.location}">
                <p class="text-sm text-muted-foreground">
                    <f:if condition="{author.title}"><span itemprop="jobTitle">{author.title}</span></f:if>
                    <f:if condition="{author.title} && {author.location}"><span aria-hidden="true">·</span></f:if>
                    <f:if condition="{author.location}"><span itemprop="homeLocation">{author.location}</span></f:if>
                </p>
            </f:if>
            <f:if condition="{author.bio}">
                <div class="text-sm leading-6 text-muted-foreground" itemprop="description"><f:format.html>{author.bio}</f:format.html></div>
            </f:if>
            <f:if condition="{author.website} || {author.twitter} || {author.linkedin} || {author.xing} || {author.instagram}">
                <ul role="list" class="flex flex-wrap gap-2 text-sm">
                    <f:if condition="{author.website}">
                        <li>
                            <a href="{author.website}" class="inline-flex items-center gap-1 text-muted-foreground underline-offset-4 hover:text-primary hover:underline" target="_blank" rel="noopener" itemprop="url">
                                <f:render partial="General/SocialIcons" section="Website" optional="true" />
                                <span><f:translate extensionName="Blog" key="author.social.website">Website</f:translate></span>
                            </a>
                        </li>
                    </f:if>
                    <f:if condition="{author.twitter}">
                        <li>
                            <a href="https://twitter.com/{author.twitter -> f:format.htmlspecialchars()}" class="inline-flex items-center gap-1 text-muted-foreground underline-offset-4 hover:text-primary hover:underline" target="_blank" rel="noopener" itemprop="url">
                                <f:render partial="General/SocialIcons" section="Twitter" optional="true" />
                                <span><f:translate extensionName="Blog" key="author.social.twitter">Twitter</f:translate></span>
                            </a>
                        </li>
                    </f:if>
                    <f:if condition="{author.instagram}">
                        <li>
                            <a href="{author.instagram}" class="inline-flex items-center gap-1 text-muted-foreground underline-offset-4 hover:text-primary hover:underline" target="_blank" rel="noopener" itemprop="url">
                                <f:render partial="General/SocialIcons" section="Instagram" optional="true" />
                                <span><f:translate extensionName="Blog" key="author.social.instagram">Instagram</f:translate></span>
                            </a>
                        </li>
                    </f:if>
                    <f:if condition="{author.linkedin}">
                        <li>
                            <a href="{author.linkedin}" class="inline-flex items-center gap-1 text-muted-foreground underline-offset-4 hover:text-primary hover:underline" target="_blank" rel="noopener" itemprop="url">
                                <f:render partial="General/SocialIcons" section="LinkedIn" optional="true" />
                                <span><f:translate extensionName="Blog" key="author.social.linkedin">LinkedIn</f:translate></span>
                            </a>
                        </li>
                    </f:if>
                    <f:if condition="{author.xing}">
                        <li>
                            <a href="{author.xing}" class="inline-flex items-center gap-1 text-muted-foreground underline-offset-4 hover:text-primary hover:underline" target="_blank" rel="noopener" itemprop="url">
                                <f:render partial="General/SocialIcons" section="Xing" optional="true" />
                                <span><f:translate extensionName="Blog" key="author.social.xing">Xing</f:translate></span>
                            </a>
                        </li>
                    </f:if>
                </ul>
            </f:if>
            <f:if condition="{author.detailsPage} || {settings.authorUid}">
                <p class="mt-1">
                    <blogvh:link.author author="{author}" class="inline-flex items-center text-sm font-medium text-primary underline-offset-4 hover:underline">
                        <f:translate extensionName="Blog" key="author.more.posts">More posts by this author</f:translate> &rarr;
                    </blogvh:link.author>
                </p>
            </f:if>
        </div>
    </d:molecule.card>

    <f:section name="ProfileLink">
        <f:if condition="{author.detailsPage} || {settings.authorUid}">
            <f:then><blogvh:link.author rel="author" author="{author}" class="text-foreground underline-offset-4 hover:text-primary hover:underline"><span itemprop="name">{content}</span></blogvh:link.author></f:then>
            <f:else><span itemprop="name">{content}</span></f:else>
        </f:if>
    </f:section>
</f:spaceless>

</html>
