name: desiderio/product-card
typeName: desiderio_productcard
title: 'Single Product Card'
description: 'Renders one compact product card: image with optional status badge (New, Sale), title, price with optional struck-through original price, short rich-text description, and a buy button. Use it for: a single product mention with price in the source — one featured item, a promoted article with discount, a merch spotlight. Prefer ''Product Grid Listing'' for several products, ''Product Gallery Buy Panel'' for detail pages with multiple photos, and ''Shop Product Hero'' as a page opener.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:product_image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: badge
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
    description: 'e.g. New, Sale, Popular'
  -
    identifier: price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
    required: true
  -
    identifier: original_price
    type: Textarea
    rows: 1
    label: 'Original Price (strikethrough)'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Add to Cart'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
