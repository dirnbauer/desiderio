<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:section name="Main">
    <article class="desiderio-system-page desiderio-editorial-system desiderio-editorial-system--error">
        <d:layout.container size="md">
            <f:render partial="Presets/SystemHeader" arguments="{class: 'desiderio-editorial-system__header', eyebrow: breadcrumb.0.title, eyebrowClass: 'desiderio-editorial-template__eyebrow', title: page.pageRecord.title, summary: page.pageRecord.abstract}"/>
            <div class="desiderio-system-page__content desiderio-editorial-system__content">
                <f:render partial="Presets/ContentArea" arguments="{content: content.main}"/>
                <f:render partial="Presets/ErrorHomeLink" arguments="{homeLink: breadcrumb.0.link}"/>
            </div>
        </d:layout.container>
    </article>
</f:section>

</html>
