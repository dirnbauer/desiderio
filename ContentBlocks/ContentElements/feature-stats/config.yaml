name: desiderio/feature-stats
typeName: desiderio_featurestats
title: 'Stats Feature Section'
description: 'Renders an optional heading and description beside a definition-list grid of two to four metrics, each with a label, a large animated counter value (e.g. 99.9%, 4,200), and an optional one-line context. Use it for: facts-and-figures passages, achievement numbers, uptime, growth, or customer counts pulled from a document. Prefer ''Stats Section'' or ''Counter Stats'' for standalone number bands without intro copy; ''KPI Cards'' when values carry trend arrows.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: items
    type: Collection
    table: feature_stats_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:stats'
    minItems: 2
    maxItems: 4
    fields:
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        description: 'The large scannable figure, e.g. 99.9%, 40hrs, 4,200, 2x.'
        required: true
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label'
        description: 'Short 2-5 word name for what the figure measures.'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:supporting_text'
        description: 'Optional one line of context that anchors the number (who, where).'
