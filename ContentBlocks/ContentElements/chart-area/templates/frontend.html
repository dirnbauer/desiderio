<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-chart-area" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="chart-area-section">
    <d:layout.container>
        <div class="chart-area chart-area--{data.color_variant -> f:or(alternative: 'primary')}"
             data-chart-data="{data.chart_data -> f:format.htmlspecialchars()}"
             data-fill-opacity="{data.fill_opacity -> f:or(alternative: 'medium')}"
             data-chart-id="chart-area-{data.uid}">
            <div class="chart-area__card">
                <f:if condition="{data.header} || {data.description}">
                    <div class="chart-area__header">
                        <f:if condition="{data.header}">
                            <h3 class="chart-area__title">{data -> f:render.text(field: 'header')}</h3>
                        </f:if>
                        <f:if condition="{data.description}">
                            <p class="chart-area__description">{data -> f:render.text(field: 'description')}</p>
                        </f:if>
                    </div>
                </f:if>
                <div class="chart-area__content">
                    <svg class="chart-area__canvas" id="chart-area-{data.uid}"></svg>
                </div>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>

<script>
(function () {
  const svg = document.getElementById('chart-area-' + {data.uid});
  const root = svg && svg.closest('.chart-area');
  if (!svg || !root) return;
  let rows;
  try { rows = JSON.parse(root.getAttribute('data-chart-data') || '[]'); } catch (e) { return; }
  if (!Array.isArray(rows) || !rows.length) return;
  const values = rows.map(function (row) {
    return {
      label: row && row.label ? String(row.label) : '',
      value: row && row.value != null ? Number(row.value) : NaN
    };
  }).filter(function (row) { return !isNaN(row.value); });
  if (!values.length) return;
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const w = 640, h = 300, padX = 42, padY = 28, bottom = 42;
  const chartW = w - padX * 2;
  const chartH = h - padY - bottom;
  const max = Math.max.apply(null, values.map(function (row) { return row.value; }));
  const min = Math.min.apply(null, values.map(function (row) { return row.value; }));
  const range = max - min || 1;
  const opacityMap = { low: 0.08, medium: 0.18, high: 0.28 };
  const fillOpacity = opacityMap[root.getAttribute('data-fill-opacity')] || opacityMap.medium;
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  const points = values.map(function (row, index) {
    const x = padX + (values.length === 1 ? chartW / 2 : (index / (values.length - 1)) * chartW);
    const y = padY + chartH - ((row.value - min) / range) * chartH;
    return [x, y];
  });
  const pointList = points.map(function (p) { return p[0].toFixed(2) + ' ' + p[1].toFixed(2); }).join(' ');
  const area = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  area.setAttribute('points', padX + ' ' + (h - bottom) + ' ' + pointList + ' ' + (w - padX) + ' ' + (h - bottom));
  area.setAttribute('fill', 'var(--chart-color, var(--primary))');
  area.setAttribute('opacity', String(fillOpacity));
  svg.appendChild(area);
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  line.setAttribute('points', pointList);
  line.setAttribute('fill', 'none');
  line.setAttribute('stroke', 'var(--chart-color, var(--primary))');
  line.setAttribute('stroke-width', '3');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(line);
  values.forEach(function (row, index) {
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', points[index][0]);
    label.setAttribute('y', h - 10);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', 'currentColor');
    label.setAttribute('opacity', '0.72');
    label.textContent = row.label;
    svg.appendChild(label);
  });
})();
</script>

</html>
