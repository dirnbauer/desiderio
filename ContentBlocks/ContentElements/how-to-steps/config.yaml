name: desiderio/how-to-steps
typeName: desiderio_howtosteps
title: 'How-to Steps'
description: 'Help visitors move through sections or pages.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Introduction
    rows: 3
  -
    identifier: items
    type: Collection
    table: how_to_steps_items
    prefixField: true
    label: Steps
    minItems: 2
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Step Title'
        required: true
      -
        identifier: content
        type: Textarea
        label: 'Step Instructions'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
      -
        identifier: image
        type: File
        label: 'Step Image'
        allowed: common-image-types
        maxitems: 1
