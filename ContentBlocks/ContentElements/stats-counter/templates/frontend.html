<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-stats-counter" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="stats-counter">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="stats-counter__intro">
                <f:if condition="{data.eyebrow}">
                    <p class="stats-counter__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h2" class="stats-counter__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
            </header>
        </f:if>

        <dl class="stats-counter__grid stats-counter__grid--cols-{data.columns -> f:or(alternative: '3')}">
            <f:for each="{data.counters}" as="counter">
                <div class="stats-counter__item" data-astro-reveal="slide-up">
                    <dt class="stats-counter__label">{counter -> f:render.text(field: 'label')}</dt>
                    <dd class="stats-counter__value">
                        <span data-astro-counter data-astro-target="{counter.counter_target}" data-astro-duration="1400">{counter -> f:render.text(field: 'counter_target')}</span><f:if condition="{counter.suffix}"><span class="stats-counter__suffix">{counter -> f:render.text(field: 'suffix')}</span></f:if>
                    </dd>
                    <f:if condition="{counter.description}">
                        <dd class="stats-counter__description">{counter -> f:render.text(field: 'description')}</dd>
                    </f:if>
                </div>
            </f:for>
        </dl>
    </d:layout.container>
</d:layout.section>
</html>
