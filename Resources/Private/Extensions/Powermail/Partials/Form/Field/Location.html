<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers" data-namespace-typo3-fluid="true">
<f:argument name="field" type="object" />
<f:argument name="mail" type="object" optional="{true}" />

<div class="powermail_fieldwrap powermail_fieldwrap_type_location powermail_fieldwrap_{field.marker} {field.css} space-y-2">
    <f:render partial="Form/FieldLabel" arguments="{field: field}" />
    <f:form.textfield property="{field.marker}" value="{vh:misc.prefillField(field: field, mail: mail)}" class="powermail_location h-9 w-full rounded-md border border-input bg-background px-3 py-1 text-sm text-foreground shadow-sm focus-visible:border-ring focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring/50" id="powermail_field_{field.marker}" />
</div>
</html>
