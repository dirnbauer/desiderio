name: desiderio/chart-bar
typeName: desiderio_chartbar
title: Chart Bar
description: Bar chart with configurable orientation and colors
group: data
prefixFields: false
fields:
  - identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  - identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  - identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:chart_data_json'
    rows: 6
    required: true
  - identifier: orientation
    type: Select
    renderType: selectSingle
    label: Orientation
    items:
      - label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.vertical'
        value: vertical
      - label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.horizontal'
        value: horizontal
    default: vertical
  - identifier: color_variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:color_field'
    items:
      - label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
      - label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.blue'
        value: blue
      - label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.green'
        value: green
    default: primary
  - identifier: show_grid
    type: Checkbox
    label: Show Grid Lines
    default: 1
