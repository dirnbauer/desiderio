name: desiderio/company-milestones
typeName: desiderio_companymilestones
title: 'Company Milestones'
description: 'An ordered timeline that lists dated company achievements as numbered entries in a grid. Use it on About or company-history pages to show how the organization has grown over time. Each milestone holds a year, a title, and a rich-text description, framed by an optional section header and sub-headline.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: milestones
    type: Collection
    table: company_milestones_milestones
    prefixField: true
    label: Milestones
    minItems: 1
    fields:
      -
        identifier: year
        type: Textarea
        rows: 1
        label: Year
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
