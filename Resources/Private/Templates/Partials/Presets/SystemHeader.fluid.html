<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="class" type="string" optional="{true}" default=""/>
<f:argument name="eyebrow" type="string" optional="{true}" default=""/>
<f:argument name="eyebrowClass" type="string" optional="{true}" default=""/>
<f:argument name="title" type="string" optional="{true}" default=""/>
<f:argument name="summary" type="string" optional="{true}" default=""/>
<f:argument name="summaryTag" type="string" optional="{true}" default="p"/>

<header class="desiderio-system-page__header {class}">
    <f:if condition="{eyebrow}">
        <p class="{eyebrowClass}">{eyebrow}</p>
    </f:if>
    <h1>{title}</h1>
    <f:if condition="{summary}">
        <f:switch expression="{summaryTag}">
            <f:case value="span">
                <span>{summary}</span>
            </f:case>
            <f:defaultCase>
                <p>{summary}</p>
            </f:defaultCase>
        </f:switch>
    </f:if>
</header>

</html>
