name: desiderio/testimonial-wall
typeName: desiderio_testimonialwall
title: 'Testimonial Wall'
description: 'Renders a dense masonry wall of quote cards — each with quote, author avatar, name, and title — under an optional eyebrow, heading, and subheadline; needs at least three entries. Use it for: large collections of short customer quotes, ''wall of love'' or customers pages, aggregated praise from social posts or surveys. Prefer ''Grid Testimonial'' for an even, uniform grid of fewer quotes; use ''Carousel Testimonial'' to save vertical space.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: testimonials
    type: Collection
    table: testimonial_wall_testimonials
    prefixField: true
    label: Testimonials
    minItems: 3
    fields:
      -
        identifier: quote
        type: Textarea
        label: Quote
        rows: 3
        required: true
      -
        identifier: author_name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
        required: true
      -
        identifier: author_title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_title'
      -
        identifier: author_image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_photo'
        allowed: common-image-types
        maxitems: 1
