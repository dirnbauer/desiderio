<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="d-hero-search" href="{cb:assetPath()}/frontend.css"/>
<d:layout.section class="hero-search">
    <d:layout.container>
        <div class="hero-search__content">
            <f:if condition="{data.header}">
                <d:atom.typography tag="h1" variant="h1" class="hero-search__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
            </f:if>
            <f:if condition="{data.subheadline}">
                <d:atom.typography variant="lead" class="hero-search__subheadline">{data -> f:render.text(field: 'subheadline')}</d:atom.typography>
            </f:if>
            <form class="hero-search__form" action="{data.form_action.url}" method="get" role="search">
                <label class="sr-only" for="hero-search-input-{data.uid}">{data.placeholder -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:solr.search.label\', default: \'Search\')}')}</label>
                <input type="search" id="hero-search-input-{data.uid}" name="q" placeholder="{data.placeholder -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:solr.search.label\', default: \'Search\')}')}" class="hero-search__input"/>
                <d:atom.button type="submit" size="lg">
                    <d:atom.icon name="search" />
                    <span>{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:solr.search.submit', default: 'Search')}</span>
                </d:atom.button>
            </form>
            <f:if condition="{data.category_filters}">
                <nav class="hero-search__categories" aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:search.categories.aria', default: 'Popular categories')}">
                    <f:for each="{data.category_filters}" as="cat">
                        <f:if condition="{cat.link.url}">
                            <d:atom.link href="{cat.link.url}" target="{cat.link.target}" variant="muted" class="hero-search__category">{cat -> f:render.text(field: 'label')}</d:atom.link>
                        </f:if>
                    </f:for>
                </nav>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
