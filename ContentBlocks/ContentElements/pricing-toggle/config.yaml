name: desiderio/pricing-toggle
typeName: desiderio_pricingtoggle
title: 'Toggle Pricing'
description: 'A grid of plan cards that pairs a monthly price with an alternate yearly price billed annually. Use it on a pricing page when you bill on two cycles and want visitors to compare monthly versus annual cost. Each plan holds a title, monthly and yearly prices, a rich-text description, a checked feature list, and a call-to-action button with link.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: plans
    type: Collection
    table: pricing_toggle_plans
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:plans'
    labelField: title
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: monthly_price
        type: Textarea
        rows: 1
        label: 'Monthly Price'
        required: true
      -
        identifier: yearly_price
        type: Textarea
        rows: 1
        label: 'Yearly Price'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: features
        type: Collection
        table: pricing_toggle_plan_features
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
        labelField: text
        minItems: 1
        maxItems: 8
        fields:
          -
            identifier: text
            type: Textarea
            rows: 1
            label: Feature
      -
        identifier: button_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
        default: 'Choose Plan'
      -
        identifier: button_link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
