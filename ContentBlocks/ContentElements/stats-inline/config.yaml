name: desiderio/stats-inline
typeName: desiderio_statsinline
title: 'Inline Stats Row'
description: 'A slim single-row strip that lines up a few value-and-label pairs side by side, optionally divided by separators. Use it within or beneath running text to drop in a couple of supporting figures without breaking the reading flow. Each stat holds a value and a label, requires at least two entries, and a checkbox toggles the separators between items, with an optional headline above.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: show_separator
    type: Checkbox
    label: 'Show Separators'
    default: 1
  -
    identifier: stats
    type: Collection
    table: stats_inline_stats
    prefixField: true
    label: Stats
    minItems: 2
    fields:
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        required: true
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
