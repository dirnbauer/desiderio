<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-card-interactive" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="card-interactive-section">
    <d:layout.container>
        <div class="card-interactive">
            <f:if condition="{data.badge_text}">
                <span class="card-interactive__badge">{data -> f:render.text(field: 'badge_text')}</span>
            </f:if>
            <div class="card-interactive__icon">
                <d:atom.icon name="{data.icon_style}" size="xl"/>
            </div>
            <f:if condition="{data.header}">
                <h3 class="card-interactive__title">{data -> f:render.text(field: 'header')}</h3>
            </f:if>
            <f:if condition="{data.description}">
                <p class="card-interactive__description">{data -> f:render.text(field: 'description')}</p>
            </f:if>
            <f:if condition="{data.link}">
                <f:link.typolink parameter="{data.link}" class="card-interactive__link" additionalAttributes="{'aria-label': data.header}"/>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
