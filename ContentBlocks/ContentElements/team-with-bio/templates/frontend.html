<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-team-with-bio" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="team-with-bio">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.subheadline}">
            <header class="team-with-bio__intro">
                <f:if condition="{data.eyebrow}"><span class="team-with-bio__eyebrow">{data -> f:render.text(field: 'eyebrow')}</span></f:if>
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <div class="team-with-bio__list">
            <f:for each="{data.members}" as="member">
                <article class="team-with-bio__member">
                    <f:if condition="{member.image}">
                        <div class="team-with-bio__image-wrapper">
                            <f:for each="{member.image}" as="fileReference">
                                <img src="{f:uri.image(image: fileReference, maxWidth: 320)}" alt="{member.name}" class="team-with-bio__image"/>
                            </f:for>
                        </div>
                    </f:if>
                    <div class="team-with-bio__content">
                        <h3 class="team-with-bio__name">{member -> f:render.text(field: 'name')}</h3>
                        <f:if condition="{member.role}"><p class="team-with-bio__role">{member -> f:render.text(field: 'role')}</p></f:if>
                        <f:if condition="{member.bio}"><p class="team-with-bio__bio">{member -> f:render.text(field: 'bio')}</p></f:if>
                        <f:if condition="{member.profile_link.url}">
                            <d:atom.button href="{member.profile_link.url}" target="{member.profile_link.target}" variant="ghost" size="sm">Read more</d:atom.button>
                        </f:if>
                    </div>
                </article>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
