name: desiderio/team-grid-minimal
typeName: desiderio_teamgridminimal
title: 'Minimal Team Grid'
description: 'Renders a photo-forward grid of team members in three to five columns, each shown as a circular avatar (or initial fallback) with name and role beneath, under an optional heading and subheadline. Use it for: staff directory listings, ''our team'' name-and-title rosters, employee photo lists without biographies. Prefer ''Team with Bios'' when each person has descriptive text; use ''Team by Department'' when members are grouped by unit.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
      -
        label: '5 Columns'
        value: '5'
    default: '4'
  -
    identifier: members
    type: Collection
    table: team_grid_minimal_members
    prefixField: true
    label: Members
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: role
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:role'
