name: desiderio/client-list
typeName: desiderio_clientlist
title: 'Client List'
description: 'A tidy list of clients or partners, each shown with a name, optional logo image, industry label and a link to their website. Use it as social proof on homepages, about pages or pitch pages to name-drop the brands you work with. Key fields are an eyebrow, headline and subheadline intro plus a repeatable Clients collection holding each client''s name, industry, logo and website link.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: clients
    type: Collection
    table: client_list_clients
    prefixField: true
    label: Clients
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Client Name'
        required: true
      -
        identifier: industry
        type: Textarea
        rows: 1
        label: Industry
      -
        identifier: logo
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:logo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: link
        type: Link
        label: 'Website Link'
