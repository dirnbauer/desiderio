name: desiderio/announcement-bar
typeName: desiderio_announcementbar
title: 'Announcement Bar'
description: 'A slim, full-width bar that sits at the top of the page to broadcast a single short message. Use it to promote an offer, notice, or deadline so every visitor sees it immediately. Fields include a required message, optional supporting text, a style variant (default, accent, outline), and a linked call-to-action with its own link text.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.accent'
        value: accent
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.outline'
        value: outline
    default: default
  -
    identifier: message
    type: Textarea
    rows: 1
    label: Message
    required: true
  -
    identifier: supporting_text
    type: Textarea
    rows: 1
    label: 'Supporting Text'
  -
    identifier: link_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link_text'
  -
    identifier: link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
