<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Post" />

<f:section name="Content">
    <footer>
        <d:molecule.card size="sm" class="border-border bg-card">
            <d:molecule.cardHeader class="border-b border-border/70 pb-3">
                <div class="flex items-center gap-2 text-sm font-medium text-foreground">
                    <span class="inline-flex size-8 items-center justify-center rounded-md bg-muted text-muted-foreground" aria-hidden="true">
                        <d:atom.icon name="bookmark" size="sm"/>
                    </span>
                    <span><f:translate extensionName="Blog" key="post.footer.meta" default="Filed under"/></span>
                </div>
            </d:molecule.cardHeader>
            <d:molecule.cardContent class="pt-0">
                <f:if condition="{settings.meta.postfooter.enable}">
                    <f:render partial="Meta/PostFooter" arguments="{_all}" />
                </f:if>
            </d:molecule.cardContent>
        </d:molecule.card>
    </footer>
</f:section>

</html>
