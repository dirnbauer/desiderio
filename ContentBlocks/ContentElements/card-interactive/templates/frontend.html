<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-card-interactive" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="card-interactive-section">
    <d:layout.container>
        <div class="card-interactive">
            <div class="card-interactive__header">
                <div class="card-interactive__icon">
                    <d:atom.icon name="{data.icon_style}" size="lg"/>
                </div>
                <f:if condition="{data.badge_text}">
                    <span class="card-interactive__badge">{data -> f:render.text(field: 'badge_text')}</span>
                </f:if>
            </div>
            <div class="card-interactive__body">
                <f:if condition="{data.header}">
                    <h3 class="card-interactive__title">{data -> f:render.text(field: 'header')}</h3>
                </f:if>
                <f:if condition="{data.description}">
                    <p class="card-interactive__description">{data -> f:render.text(field: 'description')}</p>
                </f:if>
            </div>
            <div class="card-interactive__footer">
                <f:if condition="{data.link}">
                    <d:atom.link href="{data.link.url}" target="{data.link.target}" variant="muted" class="card-interactive__link">
                        View automation guide
                        <span class="card-interactive__link-icon" aria-hidden="true">
                            <d:atom.icon name="arrow-right" size="sm"/>
                        </span>
                    </d:atom.link>
                </f:if>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
