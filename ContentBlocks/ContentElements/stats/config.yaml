name: desiderio/stats
typeName: desiderio_stats
title: 'Stats Section'
description: 'A full-width section that presents key metrics in a column grid, each with a large counting figure, a short label, and an optional one-line description. Use it as a standalone proof or impact block on a homepage or about page to highlight headline numbers. Each stat holds a scannable value, a 2 to 5 word label, and an optional description, framed by an eyebrow, headline, and sub-headline in a 2, 3, or 4 column layout.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:stat_columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '4'
  -
    identifier: stats
    type: Collection
    table: stats_stats
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:stats'
    minItems: 1
    fields:
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        description: 'The large scannable figure, e.g. 99.9%, 2M+, 40hrs.'
        required: true
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        description: 'Short 2-5 word name for what the figure measures.'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:stat_description'
        description: 'Optional one line that anchors the number to who or where.'
        rows: 2
