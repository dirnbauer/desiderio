<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers" data-namespace-typo3-fluid="true">
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<div class="powermail_fieldwrap powermail_fieldwrap_type_file powermail_fieldwrap_{field.marker} {field.css} space-y-2 sm:col-span-2">
    <f:render partial="Form/FieldLabel" arguments="{field: field}" />
    <vh:form.multiUpload
        id="powermail_field_{field.marker}"
        property="{field.marker}"
        additionalAttributes="{vh:validation.uploadAttributes(field: field)}"
        class="powermail_file {f:render(partial: 'Form/ShadcnClass', arguments: {name: 'file'}) -> f:format.trim()} {vh:validation.errorClass(field: field, class: 'border-destructive ring-1 ring-destructive/20')}" />
    <f:if condition="{vh:misc.prefillField(field: field, mail: mail)}">
        <div class="{f:render(partial: 'Form/ShadcnClass', arguments: {name: 'radius'}) -> f:format.trim()} border border-border bg-background p-3 text-sm">
            <ul class="space-y-1 text-muted-foreground">
                <f:for each="{vh:misc.prefillField(field: field, mail: mail)}" as="file">
                    <li>{file}<f:form.hidden property="{field.marker}." value="{file}" /></li>
                </f:for>
            </ul>
            <button type="button" class="deleteAllFiles mt-3 inline-flex h-8 items-center justify-center {f:render(partial: 'Form/ShadcnClass', arguments: {name: 'radius'}) -> f:format.trim()} bg-destructive/10 px-2.5 text-xs font-medium text-destructive transition-all outline-none hover:bg-destructive/20 focus-visible:ring-1 focus-visible:ring-ring/50">
                <f:translate key="deleteAllFiles" extensionName="Powermail">Delete All Files</f:translate>
            </button>
        </div>
    </f:if>
</div>
</html>
