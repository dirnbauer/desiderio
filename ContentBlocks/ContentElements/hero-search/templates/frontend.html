<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">
<f:asset.css identifier="d-hero-search" href="{cb:assetPath()}/frontend.css"/>
<d:layout.section class="hero-search">
    <d:layout.container>
        <div class="hero-search__content">
            <f:if condition="{data.header}"><h1 class="hero-search__headline">{data -> f:render.text(field: 'header')}</h1></f:if>
            <f:if condition="{data.subheadline}"><p class="hero-search__subheadline">{data -> f:render.text(field: 'subheadline')}</p></f:if>
            <form class="hero-search__form" action="{data.form_action.url}" method="get">
                <input type="search" name="q" placeholder="{data.placeholder -> f:or(alternative: 'Search...')}" class="hero-search__input"/>
                <d:atom.button type="submit" size="lg">Search</d:atom.button>
            </form>
            <f:if condition="{data.categories}">
                <div class="hero-search__categories">
                    <f:for each="{data.categories}" as="cat">
                        <f:if condition="{cat.link.url}">
                            <f:link.typolink parameter="{cat.link}" class="hero-search__category">{cat -> f:render.text(field: 'label')}</f:link.typolink>
                        </f:if>
                    </f:for>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>
</html>
