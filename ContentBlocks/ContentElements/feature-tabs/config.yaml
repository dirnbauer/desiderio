name: desiderio/feature-tabs
typeName: desiderio_featuretabs
title: 'Tabbed Feature Section'
description: 'An interactive tab group of two to six panels: short tab labels in a bar, each panel pairing a content title and rich-text copy with an optional image. Use it for: document sections that describe several related capabilities, modules, or product areas one by one, or audience- and use-case-specific variants of one topic. Prefer ''Tabbed Content Panels'' for text-only panels; ''Accordion Feature Section'' when rows should collapse beside one image.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_tabs_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:tabs'
    minItems: 2
    maxItems: 6
    fields:
      -
        identifier: tab_label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:tab_label'
        description: 'Short 1-2 word trigger shown in the tab bar.'
        required: true
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:content_title'
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:content_description'
        rows: 3
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:tab_image'
        allowed: common-image-types
        maxitems: 1
