<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-product-card" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="product-card">
    <d:layout.container>
        <article class="product-card__wrapper">
            <f:if condition="{data.image}">
                <div class="product-card__media">
                    <f:if condition="{data.badge}">
                        <span class="product-card__badge">{data -> f:render.text(field: 'badge')}</span>
                    </f:if>
                    <f:image image="{data.image.0}" maxWidth="480" loading="lazy" alt="{data.image.0.alternative -> f:or(alternative: data.header)}" class="product-card__image" decoding="async"/>
                </div>
            </f:if>
            <div class="product-card__body">
                <f:if condition="{data.header}">
                    <h2 class="product-card__title">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <p class="product-card__price-row">
                    <span class="product-card__price">
                        <span class="sr-only"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:aria.price" default="Price:"/> </span>{data -> f:render.text(field: 'price')}
                    </span>
                    <f:if condition="{data.original_price}">
                        <s class="product-card__original-price"><span class="sr-only"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:aria.price_original" default="Original price:"/> </span>{data -> f:render.text(field: 'original_price')}</s>
                    </f:if>
                </p>
                <f:if condition="{data.description}">
                    <div class="product-card__description d-richtext">{data -> f:render.text(field: 'description')}</div>
                </f:if>
                <f:if condition="{data.button_text} && {data.button_link.url}">
                    <d:atom.button href="{data.button_link.url}" class="product-card__button" target="{data.button_link.target}">
                        {data -> f:render.text(field: 'button_text')}
                    </d:atom.button>
                </f:if>
            </div>
        </article>
    </d:layout.container>
</d:layout.section>
</html>
