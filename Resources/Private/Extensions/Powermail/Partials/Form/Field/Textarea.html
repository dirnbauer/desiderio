<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers" data-namespace-typo3-fluid="true">
<f:comment>
    Generated by Build/Scripts/sync-shadcn-fluid-primitives.php (Powermail set).
    Edit Build/Scripts/powermail-fluid-templates.php and re-run the sync; do not hand-edit.
    Control and surface classes follow the configured shadcn preset recipes.
</f:comment>
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<div class="powermail_fieldwrap powermail_fieldwrap_type_textarea powermail_fieldwrap_{field.marker} {field.css} space-y-2 sm:col-span-2">
    <f:render partial="Form/FieldLabel" arguments="{field: field}" />
    <f:form.textarea
        cols="20"
        rows="5"
        id="powermail_field_{field.marker}"
        property="{field.marker}"
        placeholder="{field.placeholder}"
        value="{vh:misc.prefillField(field: field, mail: mail)}"
        autocomplete="{vh:string.autocomplete(field: field)}"
        additionalAttributes="{vh:validation.validationDataAttribute(field: field)}"
        class="powermail_textarea flex field-sizing-content min-h-16 w-full rounded-none border border-input bg-transparent px-2.5 py-2 text-xs transition-colors outline-none placeholder:text-muted-foreground focus-visible:border-ring focus-visible:ring-1 focus-visible:ring-ring/50 disabled:cursor-not-allowed disabled:bg-input/50 disabled:opacity-50 aria-invalid:border-destructive aria-invalid:ring-1 aria-invalid:ring-destructive/20 md:text-xs dark:bg-input/30 dark:disabled:bg-input/80 dark:aria-invalid:border-destructive/50 dark:aria-invalid:ring-destructive/40 min-w-0 text-foreground {vh:validation.errorClass(field: field, class: 'border-destructive ring-1 ring-destructive/20')}" />
</div>
</html>
