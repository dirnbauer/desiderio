<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-compliance-badges" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="compliance-badges-section">
    <d:layout.container>
        <div class="compliance-badges compliance-badges--{data.alignment -> f:or(alternative: 'center')}">
            <f:if condition="{data.header}">
                <d:atom.typography tag="h2" variant="small" class="compliance-badges__title text-muted-foreground uppercase tracking-wide">{data -> f:render.text(field: 'header')}</d:atom.typography>
            </f:if>
            <ul class="compliance-badges__list" role="list">
                <f:for each="{data.items}" as="item">
                    <li class="compliance-badges__item">
                        <f:if condition="{item.link}">
                            <f:then>
                                <f:link.typolink parameter="{item.link}" target="_blank" rel="noopener noreferrer" class="compliance-badges__link rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
                                    <f:if condition="{item.image}">
                                        <f:then>
                                            <f:for each="{item.image}" as="file">
                                                <f:image image="{file}" alt="{item.label}" height="48" class="compliance-badges__image"/>
                                            </f:for>
                                            <span class="compliance-badges__label text-muted-foreground">{item -> f:render.text(field: 'label')}</span>
                                        </f:then>
                                        <f:else>
                                            <d:atom.badge variant="outline" class="compliance-badges__badge h-auto gap-1.5 px-3 py-1 text-sm">
                                                <svg class="size-3.5 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 12 2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
                                                {item -> f:render.text(field: 'label')}
                                            </d:atom.badge>
                                        </f:else>
                                    </f:if>
                                </f:link.typolink>
                            </f:then>
                            <f:else>
                                <f:if condition="{item.image}">
                                    <f:then>
                                        <span class="compliance-badges__link">
                                            <f:for each="{item.image}" as="file">
                                                <f:image image="{file}" alt="{item.label}" height="48" class="compliance-badges__image"/>
                                            </f:for>
                                            <span class="compliance-badges__label text-muted-foreground">{item -> f:render.text(field: 'label')}</span>
                                        </span>
                                    </f:then>
                                    <f:else>
                                        <d:atom.badge variant="outline" class="compliance-badges__badge h-auto gap-1.5 px-3 py-1 text-sm">
                                            <svg class="size-3.5 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 12 2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
                                            {item -> f:render.text(field: 'label')}
                                        </d:atom.badge>
                                    </f:else>
                                </f:if>
                            </f:else>
                        </f:if>
                    </li>
                </f:for>
            </ul>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
