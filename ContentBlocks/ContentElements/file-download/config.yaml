name: desiderio/file-download
typeName: desiderio_filedownload
title: 'File Download List'
description: 'A list of download cards under an optional heading; each card shows a download icon, title, one-line description, manually entered file size, and a download button linking the attached file. Use it for: document sections listing brochures, PDFs, forms, price lists, press kits, or manuals to download. Prefer ''File Links'' (core) for a plain link list from attached files; ''Gated Download Form'' when the file sits behind a form.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: file_download_items
    prefixField: true
    label: Files
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
      -
        identifier: file
        type: File
        label: File
        maxitems: 1
        required: true
      -
        identifier: file_size
        type: Textarea
        rows: 1
        label: 'File Size'
        description: 'e.g. 2.4 MB'
