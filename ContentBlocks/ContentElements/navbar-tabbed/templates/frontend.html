<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-navbar-tabbed" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="navbar-tabbed" spacing="none">
    <d:layout.container>
        <nav class="navbar-tabbed__inner" aria-label="{data.header -> f:or(alternative: 'Tabbed navigation')}">
            <span class="navbar-tabbed__brand">{data -> f:render.text(field: 'brand')}</span>
            <ul class="navbar-tabbed__tabs">
                <f:for each="{data.tabs}" as="tab">
                    <f:if condition="{tab.link.url}">
                        <li>
                            <f:if condition="{tab.active}">
                                <f:then><d:atom.link href="{tab.link.url}" target="{tab.link.target}" variant="muted" class="navbar-tabbed__tab navbar-tabbed__tab--active">{tab -> f:render.text(field: 'label')}</d:atom.link></f:then>
                                <f:else><d:atom.link href="{tab.link.url}" target="{tab.link.target}" variant="muted" class="navbar-tabbed__tab">{tab -> f:render.text(field: 'label')}</d:atom.link></f:else>
                            </f:if>
                        </li>
                    </f:if>
                </f:for>
            </ul>
            <f:if condition="{data.button_text} && {data.button_link.url}">
                <d:atom.button href="{data.button_link.url}" target="{data.button_link.target}" size="sm">{data -> f:render.text(field: 'button_text')}</d:atom.button>
            </f:if>
        </nav>
    </d:layout.container>
</d:layout.section>

</html>
