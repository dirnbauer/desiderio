name: desiderio/feature-numbered
typeName: desiderio_featurenumbered
title: 'Numbered Feature Steps'
description: 'An ordered list of features shown as numbered steps with zero-padded counters (01, 02, 03). Use it on how-it-works or onboarding pages where features follow a clear sequence or process. Key fields are the headline and subheadline intro plus repeatable steps, each with a required title and a rich-text description.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_numbered_items
    prefixField: true
    label: Steps
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
