# Preset — SaaS Landing
# Glassmorphic header, spacious rhythm, blue accent.

desiderio:
  brand:
    wordmark: Desiderio SaaS
    tagline: Product marketing template for trials, pricing, and sign-up.
  layout:
    density: spacious
    container: wide
    radius: lg
  header:
    style: glass
    fixedPosition: true
  footer:
    style: columns
  theme:
    accent: blue
    darkModeDefault: system
    darkModeToggle: true
  typography:
    fontSans: inter
