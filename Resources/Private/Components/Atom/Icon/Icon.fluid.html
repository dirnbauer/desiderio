<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:di="http://typo3.org/ns/Webconsulting/Desiderio/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:argument name="name" type="string" />
<f:argument name="size" type="string" optional="{true}" default="default" />
<f:argument name="class" type="string" optional="{true}" default="" />

<di:icon name="{name}" size="{size}" class="{class}" />
</html>
