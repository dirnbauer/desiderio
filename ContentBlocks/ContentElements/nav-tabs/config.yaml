name: desiderio/nav-tabs
typeName: desiderio_navtabs
title: 'Tabs Navigation'
description: 'A horizontal tab bar that links to separate content sections, with the active tab visually highlighted. Use it to let visitors switch between related views or page sections such as product details, specs, and reviews. Each tab carries a label, a link, and an active flag; a variant switch chooses between underline, pill, and boxed styling.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: Underline
        value: underline
      -
        label: Pill
        value: pill
      -
        label: Boxed
        value: boxed
    default: underline
  -
    identifier: tabs
    type: Collection
    table: nav_tabs_tabs
    prefixField: true
    label: Tabs
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
      -
        identifier: active
        type: Checkbox
        label: Active
