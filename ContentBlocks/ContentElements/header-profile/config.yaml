name: desiderio/header-profile
typeName: desiderio_headerprofile
title: 'Profile Header'
description: 'A person-focused header introducing someone with an avatar, name, role, and short bio alongside two action buttons. Use it atop team, author, or speaker pages to present an individual and link to related actions. Key fields are the name, the role or title, a rich-text bio, an avatar image, and primary and secondary buttons each with their own text and link.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
  -
    identifier: role
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:role'
    description: 'Role or title, e.g. VP of Engineering'
  -
    identifier: bio
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Bio
    rows: 3
    description: 'One or two sentences of context'
  -
    identifier: avatar
    type: File
    label: Avatar
    allowed: common-image-types
    maxitems: 1
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
