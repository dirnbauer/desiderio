name: desiderio/demo-request
typeName: desiderio_demorequest
title: 'Demo Request'
description: 'A two-column lead-capture section: eyebrow, headline, rich-text description, a check-marked reassurance line, and an optional side image next to a card with a fixed embedded TYPO3 lead form. Use it for: ''book a demo'' or ''talk to sales'' sections, product walkthrough requests, trial and consultation sign-up passages. Prefer ''Booking Form'' for appointment scheduling; use ''Contact Form Block'' for general messages.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: reassurance
    type: Textarea
    rows: 1
    label: 'Reassurance Microcopy'
    description: 'Short trust line shown under the heading, e.g. "30-minute call. No commitment."'
  -
    identifier: image
    type: File
    label: 'Side Image'
    allowed: common-image-types
    maxitems: 1
