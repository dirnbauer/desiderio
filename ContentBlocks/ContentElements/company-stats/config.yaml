name: desiderio/company-stats
typeName: desiderio_companystats
title: 'Company Stats'
description: 'A grid that showcases key figures as bold, animated count-up numbers, each paired with a label and optional description. Use it on About or landing pages to prove growth, scale, or results at a glance. Each stat holds a value, a label, and a short description, introduced by an optional heading and sub-headline.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: stats
    type: Collection
    table: company_stats_stats
    prefixField: true
    label: Statistics
    minItems: 1
    fields:
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:value'
        required: true
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
