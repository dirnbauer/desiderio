<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:variable name="name" value="comments" />
<f:variable name="icon"><f:render partial="General/BlogIcons" section="Comment" optional="true" /></f:variable>
<f:variable name="prefix"><f:translate extensionName="Blog" key="meta.comments.join_conversation" /></f:variable>
<f:variable name="text"><f:translate extensionName="Blog" key="meta.comments.comments" /></f:variable>

<f:if condition="{settings.comments.active} && {post.commentsActive}">
    <f:variable name="commentCount" value="{post.activeComments -> f:count()}" />
    <f:if condition="{settings.comments.disqus.enable} != 1">
        <f:if condition="{commentCount} == 0">
            <f:variable name="prefix"><f:translate extensionName="Blog" key="meta.comments.start_conversation" /></f:variable>
            <f:variable name="text"><f:translate extensionName="Blog" key="meta.comments.has_comments" arguments="{0: commentCount}" /></f:variable>
        </f:if>
        <f:if condition="{commentCount} == 1">
            <f:variable name="text"><f:translate extensionName="Blog" key="meta.comments.has_comment" arguments="{0: commentCount}" /></f:variable>
        </f:if>
        <f:if condition="{commentCount} >= 1">
            <f:variable name="text"><f:translate extensionName="Blog" key="meta.comments.has_comments" arguments="{0: commentCount}" /></f:variable>
        </f:if>
    </f:if>
    <f:render partial="Meta/Rendering/Item" arguments="{name: name, icon: icon, prefix: prefix}" contentAs="content">
        <blogvh:link.post post="{post}" section="comments" class="text-foreground underline-offset-4 hover:text-primary hover:underline">{text}</blogvh:link.post>
    </f:render>
</f:if>

</html>
