name: desiderio/waitlist-signup
typeName: desiderio_waitlistsignup
title: 'Waitlist Signup'
description: 'Capture sign-ups for an unreleased product, adding a count line as social proof of growing demand.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Join the waitlist'
  -
    identifier: count_text
    type: Textarea
    rows: 1
    label: 'Count Text'
