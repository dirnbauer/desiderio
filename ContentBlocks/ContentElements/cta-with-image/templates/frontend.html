<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-cta-with-image" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="cta-with-image cta-with-image--{data.image_position -> f:or(alternative: 'right')}">
    <d:layout.container>
        <div class="cta-with-image__layout">
            <div class="cta-with-image__content">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.description}"><d:atom.typography tag="div" variant="lead" class="cta-with-image__description d-richtext">{data -> f:render.text(field: 'description')}</d:atom.typography></f:if>
                <f:if condition="{data.cta_text} && {data.cta_link.url}">
                    <div class="cta-with-image__actions">
                        <d:atom.button href="{data.cta_link.url}" target="{data.cta_link.target}" size="lg">{data -> f:render.text(field: 'cta_text')}</d:atom.button>{data -> f:render.link(field: 'cta_link')}
                    </div>
                </f:if>
            </div>
            <f:if condition="{data.image}">
                <div class="cta-with-image__image-wrapper">
                    <f:for each="{data.image}" as="fileReference">
                        <f:image image="{fileReference}" maxWidth="640" alt="{fileReference.alternative}" loading="lazy" class="cta-with-image__image" decoding="async"/>
                    </f:for>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
