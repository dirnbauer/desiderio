name: desiderio/feature-checklist
typeName: desiderio_featurechecklist
title: 'Feature Checklist'
description: 'Renders one card containing a vertical list where every item gets a check-mark icon, a bold title, and an optional one-line description. Use it for: ''what''s included'' lists, plan benefits, deliverables, scope-of-service bullets, package contents, or requirement lists found in offers and pricing documents. Prefer ''Feature Comparison Table'' to contrast two plans row by row; use ''Numbered Feature Steps'' when item order matters.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: items
    type: Collection
    table: feature_checklist_items
    prefixField: true
    label: Checklist
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
