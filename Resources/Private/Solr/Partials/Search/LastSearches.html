<html xmlns="http://www.w3.org/1999/xhtml" lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:section name="LastSearches">
    <s:lastSearches>
        <f:if condition="{lastSearches}">
            <section id="tx-solr-lastsearches" class="overflow-hidden rounded-xl border border-border bg-card text-card-foreground shadow-sm">
                <header class="border-b border-border px-4 py-3">
                    <h2 class="text-sm font-semibold tracking-tight">
                        <f:translate key="solr.lastSearches" domain="desiderio.labels">Last searches</f:translate>
                    </h2>
                </header>

                <ul class="space-y-1 p-2">
                    <f:for each="{lastSearches}" as="searchedFor">
                        <li>
                            <a href="{s:uri.search.startNewSearch(queryString: searchedFor)}" class="solr-ajaxified block rounded-lg px-3 py-2 text-sm font-medium text-foreground transition-colors hover:bg-muted hover:text-foreground focus-visible:bg-muted focus-visible:text-foreground focus-visible:outline-hidden focus-visible:ring-3 focus-visible:ring-ring active:bg-muted active:text-foreground"><f:format.htmlentities>{searchedFor}</f:format.htmlentities></a>
                        </li>
                    </f:for>
                </ul>
            </section>
        </f:if>
    </s:lastSearches>
</f:section>

</html>
