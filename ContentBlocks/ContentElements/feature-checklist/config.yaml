name: desiderio/feature-checklist
typeName: desiderio_featurechecklist
title: 'Feature Checklist'
description: 'A vertical list of capabilities inside a card, each line prefixed with a green check-mark icon for quick scanning. Use it to reassure visitors with what is included, such as plan benefits or product capabilities, on pricing or feature pages. Above the list you can add an eyebrow and headline, and each list entry has a title plus an optional one-line description.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: items
    type: Collection
    table: feature_checklist_items
    prefixField: true
    label: Checklist
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
