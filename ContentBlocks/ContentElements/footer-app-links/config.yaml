name: desiderio/footer-app-links
typeName: desiderio_footerapplinks
title: 'App Links Footer'
description: 'A footer promoting a mobile app: heading, rich-text description, App Store and Google Play buttons, an optional QR code image, and a copyright line. Use it for: download-our-app sections, store badge rows, and QR-code install prompts at the end of a page. Prefer ''App Hero'' to pitch the app at the top of a page; use ''Site Footer'' when no app promotion is involved.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: appstore_link
    type: Link
    label: 'App Store Link'
  -
    identifier: playstore_link
    type: Link
    label: 'Google Play Link'
  -
    identifier: qr_image
    type: File
    label: 'QR Code Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
