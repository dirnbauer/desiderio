<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:variable name="tabsVariant">
    <f:switch expression="{data.variant}">
        <f:case value="line">line</f:case>
        <f:case value="underline">line</f:case>
        <f:defaultCase>default</f:defaultCase>
    </f:switch>
</f:variable>

<d:layout.section class="tabs-section">
    <d:layout.container>
        <f:if condition="{data.header}">
            <d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography>
        </f:if>

        <d:molecule.tabs defaultValue="tab-{data.uid}-{data.default_tab -> f:or(alternative: '0')}">
            <d:molecule.tabsList variant="{tabsVariant -> f:format.trim()}">
                <f:for each="{data.items}" as="item" iteration="iter">
                    <d:molecule.tabsTrigger value="tab-{data.uid}-{iter.index}">
                        <f:if condition="{item.tab_icon}">
                            <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="{item.tab_icon}" size="sm"/></span>
                        </f:if>
                        <span>{item -> f:render.text(field: 'tab_label')}</span>
                    </d:molecule.tabsTrigger>
                </f:for>
            </d:molecule.tabsList>

            <f:for each="{data.items}" as="item" iteration="iter">
                <div
                    role="tabpanel"
                    x-show="active === 'tab-{data.uid}-{iter.index}'"
                    x-bind:data-state="active === 'tab-{data.uid}-{iter.index}' ? 'active' : 'inactive'"
                    class="tabs__content flex-1 text-xs/relaxed outline-none"
                    data-slot="tabs-content"
                    data-d-tabs-content
                    data-value="tab-{data.uid}-{iter.index}"
                >
                    <f:if condition="{item.tab_content}">
                        <f:then>{item -> f:render.text(field: 'tab_content')}</f:then>
                        <f:else><f:format.html>{data.items.0.tab_content}</f:format.html></f:else>
                    </f:if>
                </div>
            </f:for>
        </d:molecule.tabs>
    </d:layout.container>
</d:layout.section>

</html>
