name: desiderio/pricing-four-tier
typeName: desiderio_pricingfourtier
title: 'Four Tier Pricing'
description: 'A row of four pricing cards that presents your plans side by side with one highlighted as recommended. Use it on pricing pages when you offer four distinct tiers and want to steer buyers toward a featured option. Each card holds a title, price, rich-text description, a checked feature list, a featured flag, and a call-to-action button.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: plans
    type: Collection
    table: pricing_four_tier_plans
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:plans'
    labelField: title
    minItems: 1
    maxItems: 4
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: features
        type: Collection
        table: pricing_four_tier_plan_features
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
        labelField: text
        minItems: 1
        maxItems: 8
        fields:
          -
            identifier: text
            type: Textarea
            rows: 1
            label: Feature
      -
        identifier: featured
        type: Checkbox
        label: Featured
      -
        identifier: button_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
        default: 'Get Started'
      -
        identifier: button_link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
