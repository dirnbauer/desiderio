name: desiderio/hero-carousel
typeName: desiderio_herocarousel
title: 'Carousel Hero'
description: 'Renders a rotating hero with an optional intro headline and subheadline above a slide collection; each slide holds a title, lead, rich-text description, image, and button, navigated via previous, next, and dot controls. Use it for: several equally weighted top-of-page messages — parallel campaigns, seasonal offers, multiple product highlights the source presents as a series. Prefer ''Hero Section'' for one message; ''Content Carousel'' for image slideshows further down the page.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: slides
    type: Collection
    table: hero_carousel_slides
    prefixField: true
    label: Slides
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: lead
        type: Textarea
        label: Lead
        rows: 2
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 4
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: button_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
      -
        identifier: button_link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
