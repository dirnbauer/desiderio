name: desiderio/alert
typeName: desiderio_alert
title: 'Inline Alert Notice'
description: 'A compact, color-coded notice box that flags an important message inline without taking a full section. Use it within content to surface warnings, errors, tips, or confirmations. Fields include an optional heading, a required rich-text description, an alert type (default, destructive, info, success, warning), an optional icon, and a toggle for a dismiss close button.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'Alert Type'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.destructive'
        value: destructive
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.info'
        value: info
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.success'
        value: success
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.warning'
        value: warning
    default: default
  -
    identifier: description
    type: Textarea
    label: 'Alert Description'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 3
    required: true
  -
    identifier: icon
    type: Select
    renderType: selectSingle
    label: 'Icon Name'
    description: 'Optional icon identifier (e.g. "info", "alert-triangle")'
    itemsProcessors:
      10:
        class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
    default: alert-triangle
  -
    identifier: show_close_button
    type: Checkbox
    label: 'Show Close Button'
    default: 0
