name: desiderio/back-to-top
typeName: desiderio_backtotop
title: 'Back to Top Button'
description: 'Renders a floating, initially hidden button with an up chevron that appears after roughly 300px of scrolling and returns the visitor to the page top; the label text is optional and the position selectable (bottom right, left, or center). Use it for: long documents, one-page sites, or article pages built from lengthy sources — it maps to no document content and is added as a usability aid. Prefer ''Table of Contents Navigation'' for links to sections.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: label
    type: Textarea
    rows: 1
    label: 'Button Label'
    default: 'Back to top'
  -
    identifier: show_label
    type: Checkbox
    label: 'Show Label Text'
    default: 0
  -
    identifier: position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:position'
    items:
      -
        label: 'Bottom Right'
        value: bottom-right
      -
        label: 'Bottom Left'
        value: bottom-left
      -
        label: 'Bottom Center'
        value: bottom-center
    default: bottom-right
