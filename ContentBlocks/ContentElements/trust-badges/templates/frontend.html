<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-trust-badges" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="trust-badges">
    <d:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="trust-badges__intro">
                <f:if condition="{data.header}">
                    <h2 class="trust-badges__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.subheadline}">
                    <p class="trust-badges__description">{data -> f:render.text(field: 'subheadline')}</p>
                </f:if>
            </header>
        </f:if>

        <ul class="trust-badges__row">
            <f:for each="{data.badge_items}" as="badge">
                <li class="trust-badges__item">
                    <f:if condition="{badge.image}">
                        <span class="trust-badges__icon">
                            <f:for each="{badge.image}" as="fileReference">
                                <f:image image="{fileReference}" width="240" height="160" alt="" class="trust-badges__icon-img" additionalAttributes="{srcset: '{f:uri.image(image: fileReference, width: \'240\', height: \'160\')} 1x, {f:uri.image(image: fileReference, width: \'480\', height: \'320\')} 2x'}" loading="lazy" decoding="async"/>
                            </f:for>
                        </span>
                    </f:if>
                    <span class="trust-badges__label">{badge -> f:render.text(field: 'label')}</span>
                    <f:if condition="{badge.description_text}">
                        <span class="trust-badges__desc">{badge -> f:render.text(field: 'description_text')}</span>
                    </f:if>
                </li>
            </f:for>
        </ul>
    </d:layout.container>
</d:layout.section>
</html>
