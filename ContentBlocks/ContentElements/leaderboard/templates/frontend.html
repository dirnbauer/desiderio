<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-leaderboard" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="leaderboard-section">
    <d:layout.container>
        <div class="leaderboard">
            <f:if condition="{data.header} || {data.description}">
                <div class="leaderboard__header">
                    <f:if condition="{data.header}">
                        <h2 class="leaderboard__title">{data -> f:render.text(field: 'header')}</h2>
                    </f:if>
                    <f:if condition="{data.description}">
                        <p class="leaderboard__description">{data -> f:render.text(field: 'description')}</p>
                    </f:if>
                </div>
            </f:if>
            <ol class="leaderboard__list">
                <f:for each="{data.items}" as="item" iteration="iter">
                    <li class="leaderboard__item">
                        <f:if condition="{data.show_rank}">
                            <span class="leaderboard__rank">{iter.cycle}</span>
                        </f:if>
                        <f:if condition="{item.image}">
                            <div class="leaderboard__avatar">
                                <f:for each="{item.image}" as="file">
                                    <f:image image="{file}" alt="{item.name}" width="40" height="40"/>
                                </f:for>
                            </div>
                        </f:if>
                        <div class="leaderboard__info">
                            <span class="leaderboard__name">{item -> f:render.text(field: 'name')}</span>
                            <f:if condition="{item.subtitle}">
                                <span class="leaderboard__subtitle">{item -> f:render.text(field: 'subtitle')}</span>
                            </f:if>
                        </div>
                        <span class="leaderboard__value">{item -> f:render.text(field: 'value')}</span>
                    </li>
                </f:for>
            </ol>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
