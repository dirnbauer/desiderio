<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:argument name="post" type="T3G\AgencyPack\Blog\Domain\Model\Post" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>
<f:argument name="iterator" type="array" optional="true"/>

<article
    class="group/blog-related min-w-0"
    data-blog-tag="{f:if(condition: post.tags, then: post.tags.0.uid, else: 0)}"
    data-blog-category="{f:if(condition: post.categories, then: post.categories.0.uid, else: 0)}"
    itemscope="itemscope"
    itemtype="https://schema.org/BlogPosting"
>
    <d:layout.stack gap="md" class="min-w-0">
        <header class="min-w-0">
            <d:layout.stack gap="sm" class="min-w-0">
                <d:atom.typography tag="h3" variant="h4" class="text-balance leading-tight tracking-normal" itemprop="headline">
                    <blogvh:link.post post="{post}" class="rounded-md text-foreground !no-underline outline-none transition-colors hover:text-primary focus-visible:ring-3 focus-visible:ring-ring/40">
                        {post.title}
                    </blogvh:link.post>
                </d:atom.typography>

                <f:if condition="{post.categories} || {post.tags}">
                    <ul role="list" class="flex max-w-full flex-wrap items-center gap-1.5">
                        <f:for each="{post.categories}" as="postCategory">
                            <li data-blog-category="{postCategory.uid}">
                                <meta itemprop="articleSection" content="{postCategory.title}"/>
                                <blogvh:link.category category="{postCategory}" class="!no-underline">
                                    <d:atom.badge variant="secondary">
                                        <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="folder" size="xs"/></span>
                                        <span>{postCategory.title}</span>
                                    </d:atom.badge>
                                </blogvh:link.category>
                            </li>
                        </f:for>
                        <f:for each="{post.tags}" as="postTag">
                            <li data-blog-tag="{postTag.uid}">
                                <meta itemprop="keywords" content="{postTag.title}"/>
                                <blogvh:link.tag tag="{postTag}" class="!no-underline">
                                    <d:atom.badge variant="outline">
                                        <span data-icon="inline-start" aria-hidden="true"><d:atom.icon name="tag" size="xs"/></span>
                                        <span>{postTag.title}</span>
                                    </d:atom.badge>
                                </blogvh:link.tag>
                            </li>
                        </f:for>
                    </ul>
                </f:if>
            </d:layout.stack>
        </header>

        <f:render partial="Meta/Rendering/Group" arguments="{metatype: 'teaserheader'}" contentAs="content">
            <f:render partial="Meta/Elements/Authors" arguments="{_all}" />
            <f:variable name="publishDateFormat" value="{settings.meta.teaserheader.elements.published.format}" />
            <f:render partial="Meta/Elements/Published" arguments="{_all}" />
            <f:render partial="Meta/Elements/Comments" arguments="{_all}" />
        </f:render>

        <f:if condition="{post.abstract} || {post.description}">
            <d:atom.typography variant="muted" class="line-clamp-4 text-pretty leading-6" itemprop="description">
                <f:if condition="{post.abstract}">
                    <f:then>{post.abstract}</f:then>
                    <f:else>{post.description}</f:else>
                </f:if>
            </d:atom.typography>
        </f:if>

        <div>
            <blogvh:link.post post="{post}" class="inline-flex items-center gap-1.5 rounded-md text-sm font-medium text-primary !no-underline outline-none transition-colors hover:text-primary focus-visible:ring-3 focus-visible:ring-ring/40">
                <span><f:translate extensionName="Blog" key="read_more" default="Read more"/></span>
                <span data-icon="inline-end" aria-hidden="true"><d:atom.icon name="arrow-right" size="xs"/></span>
            </blogvh:link.post>
        </div>
    </d:layout.stack>
</article>

</html>
