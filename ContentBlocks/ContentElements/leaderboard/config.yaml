name: desiderio/leaderboard
typeName: desiderio_leaderboard
title: 'Leaderboard'
description: 'Renders a ranked ordered list where each row combines an optional rank number, an avatar (external URL, uploaded file, or initial fallback), name, optional subtitle, and a required score value, under a heading and rich-text intro. Use it for: rankings and standings, competition or tournament results, top contributors or sellers, high-score tables. Prefer ''Data Table'' for multi-column tabular data; ''Stat Cards Data View'' for unranked standalone metrics.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: items
    type: Collection
    table: leaderboard_items
    prefixField: true
    label: Entries
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.score'
        required: true
      -
        identifier: subtitle
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.subtitle'
      -
        identifier: avatar_url
        type: Text
        label: 'Avatar URL'
        description: 'Optional external portrait image URL. Used before the uploaded avatar file.'
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.avatar'
        allowed: common-image-types
        maxitems: 1
  -
    identifier: show_rank
    type: Checkbox
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.show_rank'
    default: 1
