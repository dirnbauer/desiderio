name: desiderio/accordion
typeName: desiderio_accordion
title: 'Accordion'
description: 'Renders a stack of native details/summary panels, each with a title and rich-text body; panels open exclusively or several at once, and single items can start expanded. Use it for: long content that should collapse — help topics, glossary entries, terms sections, product details, step-by-step explanations. Prefer ''FAQ Accordion'' for question-answer pairs (it adds FAQPage schema); prefer ''Tabbed Content Panels'' for a few parallel alternatives.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: allow_multiple
    type: Checkbox
    label: 'Allow Multiple Open'
    description: 'Allow multiple accordion items to be open at once'
    default: 0
  -
    identifier: items
    type: Collection
    table: accordion_items
    prefixField: true
    label: 'Accordion Items'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Question / Title'
        required: true
      -
        identifier: content
        type: Textarea
        label: 'Answer / Content'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 5
      -
        identifier: open_by_default
        type: Checkbox
        label: 'Open by Default'
        default: 0
