name: desiderio/footer-newsletter
typeName: desiderio_footernewsletter
title: 'Newsletter Footer'
description: 'A footer that pairs a short intro with a newsletter signup form to capture email subscriptions. Use it at the bottom of pages where growing your mailing list is the primary goal. Key fields are the heading, a rich-text description, an optional privacy note below the form, and a copyright line; the signup form itself is rendered by the Form Framework.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: placeholder
    type: Textarea
    rows: 1
    label: 'Input Placeholder'
    default: 'Enter your email'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: Subscribe
  -
    identifier: privacy_notice
    type: Textarea
    rows: 1
    label: 'Privacy Note'
    description: 'Small text below the form'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
