<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-nav-pagination" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="nav-pagination">
    <d:layout.container>
        <nav class="nav-pagination__inner" aria-label="{data.header -> f:or(alternative: '{f:translate(key: \'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:pagination.aria\', default: \'Pagination\')}')}">
            <f:if condition="{data.previous_link.url}">
                <d:atom.link href="{f:uri.typolink(parameter: data.previous_link.url)}" target="{data.previous_link.target}" variant="muted" class="nav-pagination__prev nav-pagination__edge">
                    <span aria-hidden="true">&#8592;</span>
                    <span><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:pagination.previous" default="Previous"/></span>
                </d:atom.link>
            </f:if>
            <ul class="nav-pagination__list">
                <f:for each="{data.items}" as="item">
                    <li>
                        <f:if condition="{item.active}">
                            <f:then>
                                <span class="nav-pagination__page nav-pagination__page--active" aria-current="page">{item -> f:render.text(field: 'label')}</span>
                            </f:then>
                            <f:else>
                                <f:if condition="{item.link.url}">
                                    <d:atom.link href="{f:uri.typolink(parameter: item.link.url)}" target="{item.link.target}" variant="muted" class="nav-pagination__page">{item -> f:render.text(field: 'label')}</d:atom.link>
                                </f:if>
                            </f:else>
                        </f:if>
                    </li>
                </f:for>
            </ul>
            <f:if condition="{data.next_link.url}">
                <d:atom.link href="{f:uri.typolink(parameter: data.next_link.url)}" target="{data.next_link.target}" variant="muted" class="nav-pagination__next nav-pagination__edge">
                    <span><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:pagination.next" default="Next"/></span>
                    <span aria-hidden="true">&#8594;</span>
                </d:atom.link>
            </f:if>
        </nav>
    </d:layout.container>
</d:layout.section>

</html>
