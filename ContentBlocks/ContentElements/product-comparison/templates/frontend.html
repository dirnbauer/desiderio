<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-product-comparison" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="product-comparison">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="product-comparison__intro">
                <f:if condition="{data.eyebrow}">
                    <p class="product-comparison__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="product-comparison__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <ul class="product-comparison__grid" role="list">
            <f:for each="{data.products}" as="product" iteration="iter">
                <li class="product-comparison__item">
                    <article class="product-comparison__card {f:if(condition: product.is_recommended, then: 'product-comparison__card--recommended')}" aria-labelledby="product-comparison-{data.uid}-{iter.cycle}">
                        <f:if condition="{product.is_recommended}">
                            <span class="product-comparison__badge">Recommended</span>
                        </f:if>
                        <f:if condition="{product.image}">
                            <div class="product-comparison__media">
                                <f:image image="{product.image.0}" maxWidth="320" loading="lazy" alt="{product.image.0.alternative -> f:or(alternative: product.name)}" class="product-comparison__image"/>
                            </div>
                        </f:if>
                        <h3 class="product-comparison__name" id="product-comparison-{data.uid}-{iter.cycle}">{product -> f:render.text(field: 'name')}</h3>
                        <f:if condition="{product.price}">
                            <p class="product-comparison__price">{product -> f:render.text(field: 'price')}</p>
                        </f:if>
                        <f:if condition="{product.specs}">
                            <ul class="product-comparison__specs" role="list">
                                <f:for each="{product.specs}" as="spec">
                                    <f:if condition="{spec.text}">
                                        <li class="product-comparison__spec">{spec -> f:render.text(field: 'text')}</li>
                                    </f:if>
                                </f:for>
                            </ul>
                        </f:if>
                        <f:if condition="{product.link.url}">
                            <f:variable name="productCtaLabel">View {product.name} details</f:variable>
                            <d:atom.button href="{product.link.url}" variant="{f:if(condition: product.is_recommended, then: 'default', else: 'outline')}" class="product-comparison__button" target="{product.link.target}">
                                View details
                            </d:atom.button>
                        </f:if>
                    </article>
                </li>
            </f:for>
        </ul>
    </d:layout.container>
</d:layout.section>
</html>
