<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Post" />

<f:section name="Content">
    <f:if condition="{post.authors}">
        <section class="grid gap-4" aria-label="{f:translate(extensionName: 'Blog', key: 'author.aboutTheAuthor', default: 'About the author')}">
            <f:for each="{post.authors}" as="author">
                <f:render partial="Post/Author" arguments="{_all}" />
            </f:for>
        </section>
    </f:if>
</f:section>

</html>
