name: desiderio/cta-inline
typeName: desiderio_ctainline
title: 'Inline CTA Prompt'
description: 'A compact aside bar that slots into the content flow, pairing a heading and one-line description with a single button. Use it for: mid-article nudges — ''try it now'' prompts, related resources, webinar or download pointers embedded between paragraphs of a source document. Prefer ''Minimal Call to Action'' when a quiet text link should replace the button; ''Newsletter Inline'' when the goal is capturing an email address with a form.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
  -
    identifier: cta_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: cta_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
