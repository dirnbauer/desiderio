name: desiderio/callback-request
typeName: desiderio_callbackrequest
title: 'Callback Request'
description: 'A compact card with an embedded TYPO3 form that lets visitors ask to be called back at a convenient time. Place it on contact or lead-capture pages where a phone conversation is the goal. Key fields are the heading and a rich-text description that introduce the form rendered beneath them.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Request callback'
