name: desiderio/hero-testimonial
typeName: desiderio_herotestimonial
title: 'Testimonial Hero'
description: 'A two-column hero that places intro copy beside a featured customer quote card. Use it at the top of a landing or sales page to build instant trust through a real voice. Key fields are headline, sub-headline, a primary button, the testimonial quote, and the author''s name, role, and photo.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: quote
    type: Textarea
    label: 'Testimonial Quote'
    rows: 3
  -
    identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
  -
    identifier: author_role
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_role'
  -
    identifier: author_image
    type: File
    label: 'Author Image'
    allowed: common-image-types
    maxitems: 1
