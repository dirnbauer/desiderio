name: desiderio/card
typeName: desiderio_card
title: 'Content Card'
description: 'Renders one flexible content card in four variants — default, horizontal with image left or right, with-image, and overlay — combining an optional badge, linkable heading, rich-text description, image, and button. Use it for: single self-contained teasers, promo boxes, service or offer summaries, linked snippets standing alone in the page flow. Prefer ''Interactive Card'' for an icon-led click-through card, ''Overlay Image Card'' for a dedicated image-overlay treatment, ''Content Grid'' for several uniform cards.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:card_style'
    onChange: reload
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.horizontal'
        value: horizontal
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.with_image'
        value: with-image
      -
        label: Overlay
        value: overlay
    default: default
  -
    identifier: card_image
    type: File
    label: 'Card Image'
    allowed: common-image-types
    maxitems: 1
    displayCond: 'FIELD:variant:=:with-image,overlay,horizontal'
  -
    identifier: image_position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image_position'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.right'
        value: right
    default: left
    displayCond: 'FIELD:variant:=:horizontal'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Card Description'
    rows: 3
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
  -
    identifier: link
    type: Link
    label: 'Card Link'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
    displayCond: 'FIELD:button_text:!=:'
