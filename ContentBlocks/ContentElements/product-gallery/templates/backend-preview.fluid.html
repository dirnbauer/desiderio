<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Preview"/>

<f:section name="Header"></f:section>

<f:section name="Content">
    <f:asset.css identifier="desiderio-content-preview" href="EXT:desiderio/Resources/Public/Css/content-preview.css" />
    <div class="d-ce-preview" data-slot="card">
        <div class="d-ce-preview__meta">
            <span class="d-ce-preview__type" data-slot="badge">Product Gallery Pricing</span>
            <f:if condition="{settings._content_block_name}"><span class="d-ce-preview__ctype">{settings._content_block_name}</span></f:if>
            <span class="d-ce-preview__ctype"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:preview.uid"/>: {data.uid}</span>
            <span class="d-ce-preview__ctype"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:preview.page"/>: {data.pid}</span>
        </div>
        <f:if condition="{data.header}">
            <h3 class="d-ce-preview__title">{data.header}</h3>
        </f:if>
        <f:if condition="{data.price}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Price</span>
                <span class="d-ce-preview__value">{data.price}<f:if condition="{data.compare_at_price}"> (was {data.compare_at_price})</f:if></span>
            </div>
        </f:if>
        <f:if condition="{data.availability}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Availability</span>
                <span class="d-ce-preview__value">{data.availability}</span>
            </div>
        </f:if>
        <f:if condition="{data.highlights}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Highlights</span>
                <span class="d-ce-preview__value">{data.highlights -> f:count()}</span>
            </div>
        </f:if>
        <f:if condition="{data.cta_text}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">CTA</span>
                <span class="d-ce-preview__value">{data.cta_text}</span>
            </div>
        </f:if>
        <f:if condition="{data.caption}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Caption</span>
                <span class="d-ce-preview__value">{data.caption}</span>
            </div>
        </f:if>
        <f:if condition="{data.images}">
            <div class="d-ce-preview__thumbs" aria-label="Images">
                <f:for each="{data.images}" as="file">
                    <f:if condition="{file.publicUrl}">
                        <img src="{file.publicUrl}" alt="{file.alternative}" class="d-ce-preview__thumb" loading="lazy" />
                    </f:if>
                </f:for>
            </div>
        </f:if>
    </div>
</f:section>

</html>
