<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:variable name="siteTitle" value="{site.configuration.websiteTitle ?: site.identifier}"/>
<f:variable name="siteTitle" value="{siteTitle ?: breadcrumb.0.title}"/>
<f:variable name="brandWordmark" value="{site.configuration.settings.desiderio.brand.wordmark ?: siteTitle}"/>
<f:variable name="searchAction" value="{breadcrumb.0.link}"/>
<f:if condition="{site.configuration.settings.desiderio.search.targetPageId}">
    <f:variable name="searchAction" value="{f:uri.page(pageUid: site.configuration.settings.desiderio.search.targetPageId)}"/>
</f:if>

<header class="desiderio-header {f:if(condition: '{site.configuration.settings.desiderio.header.fixedPosition}', then: 'desiderio-header--fixed')}" data-d-site-header>
    <d:layout.container>
        <div class="desiderio-header__inner">
            <f:link.typolink parameter="{breadcrumb.0.link}" class="desiderio-header__logo">
                <span class="desiderio-header__brand-mark" aria-hidden="true">
                    <span class="desiderio-header__brand-mark-inner"></span>
                </span>
                <span class="desiderio-header__wordmark desiderio-header__logo-text">{brandWordmark}</span>
            </f:link.typolink>

            <button type="button" class="desiderio-header__menu-toggle btn btn--ghost btn--icon" data-d-menu-toggle data-d-menu-target="#desiderio-main-nav" aria-expanded="false" aria-controls="desiderio-main-nav" aria-label="{f:translate(extensionName: 'desiderio', key: 'a11y.menu.toggle', default: 'Toggle menu')}">
                <d:atom.icon name="menu" size="sm"/>
            </button>

            <nav id="desiderio-main-nav" class="desiderio-header__nav" data-d-primary-nav aria-label="{f:translate(extensionName: 'desiderio', key: 'a11y.nav.main', default: 'Main navigation')}">
                <f:if condition="{mainMenu}">
                    <ul class="desiderio-header__nav-list" role="list">
                        <f:for each="{mainMenu}" as="item">
                            <li class="desiderio-header__nav-item">
                                <f:link.typolink
                                    parameter="{item.link}"
                                    class="desiderio-header__nav-link {f:if(condition: '{item.active}', then: 'desiderio-header__nav-link--active')}"
                                    additionalAttributes="{f:if(condition: '{item.active}', then: '{aria-current: \'page\'}')}"
                                >
                                    {item.title}
                                </f:link.typolink>

                                <f:if condition="{item.hasSubpages}">
                                    <ul class="desiderio-header__subnav" role="list" aria-label="{item.title}">
                                        <f:for each="{item.children}" as="subitem">
                                            <li>
                                                <f:link.typolink parameter="{subitem.link}" class="desiderio-header__subnav-link" additionalAttributes="{f:if(condition: '{subitem.active}', then: '{aria-current: \'page\'}')}">
                                                    {subitem.title}
                                                </f:link.typolink>
                                            </li>
                                        </f:for>
                                    </ul>
                                </f:if>
                            </li>
                        </f:for>
                    </ul>
                </f:if>
            </nav>

            <div class="desiderio-header__actions">
                <f:if condition="{site.configuration.settings.desiderio.search.enabled}">
                    <form
                        class="desiderio-header__search"
                        action="{searchAction}"
                        method="get"
                        role="search"
                        data-suggest="{f:uri.page(pageType: 7384)}"
                        data-suggest-param="tx_solr[queryString]"
                        data-suggest-min-chars="2"
                        data-suggest-max-items="7"
                        data-suggest-header="{f:translate(extensionName: 'desiderio', key: 'solr.suggest.header', default: 'Top results')}"
                    >
                        <label class="d-sr-only" for="desiderio-header-search">
                            <f:translate extensionName="desiderio" key="search.label">Search</f:translate>
                        </label>
                        <input
                            id="desiderio-header-search"
                            class="desiderio-header__search-input"
                            type="search"
                            name="{site.configuration.settings.desiderio.search.queryParameter -> f:or(alternative: 'q')}"
                            placeholder="{f:translate(extensionName: 'desiderio', key: 'search.placeholder', default: 'Search')}"
                            autocomplete="off"
                            data-d-solr-suggest
                            data-d-solr-type-label-pages="{f:translate(extensionName: 'desiderio', key: 'solr.contentType.pages', default: 'Pages')}"
                            data-d-solr-type-label-news="{f:translate(extensionName: 'desiderio', key: 'solr.contentType.news', default: 'News')}"
                            data-d-solr-type-label-addresses="{f:translate(extensionName: 'desiderio', key: 'solr.contentType.addresses', default: 'Addresses')}"
                        />
                        <button class="desiderio-header__search-submit btn btn--ghost btn--icon" type="submit" aria-label="{f:translate(extensionName: 'desiderio', key: 'search.submit', default: 'Search')}" title="{f:translate(extensionName: 'desiderio', key: 'search.submit', default: 'Search')}">
                            <d:atom.icon name="search" size="sm"/>
                        </button>
                    </form>
                </f:if>

                <f:if condition="{site.configuration.settings.desiderio.theme.darkModeToggle}">
                    <details
                        class="desiderio-theme-switch"
                        data-d-theme-switch
                        data-d-close-on-outside
                        data-d-theme-label="{f:translate(extensionName: 'desiderio', key: 'a11y.theme.switch', default: 'Colour scheme')}"
                        data-d-theme-label-light="{f:translate(extensionName: 'desiderio', key: 'theme.light', default: 'Light')}"
                        data-d-theme-label-dark="{f:translate(extensionName: 'desiderio', key: 'theme.dark', default: 'Dark')}"
                        data-d-theme-label-system="{f:translate(extensionName: 'desiderio', key: 'theme.system', default: 'System')}"
                    >
                        <summary class="desiderio-theme-switch__summary" data-d-theme-summary aria-label="{f:translate(extensionName: 'desiderio', key: 'a11y.theme.switch', default: 'Colour scheme')}" title="{f:translate(extensionName: 'desiderio', key: 'a11y.theme.switch', default: 'Colour scheme')}">
                            <span class="desiderio-theme-switch__current" aria-hidden="true">
                                <span class="desiderio-theme-switch__current-icon" data-d-theme-current-icon="light" hidden>
                                    <d:atom.icon name="sun" size="sm"/>
                                </span>
                                <span class="desiderio-theme-switch__current-icon" data-d-theme-current-icon="dark" hidden>
                                    <d:atom.icon name="moon" size="sm"/>
                                </span>
                                <span class="desiderio-theme-switch__current-icon" data-d-theme-current-icon="system">
                                    <d:atom.icon name="monitor" size="sm"/>
                                </span>
                            </span>
                            <span class="d-sr-only" data-d-theme-current-label>
                                <f:translate extensionName="desiderio" key="theme.system">System</f:translate>
                            </span>
                        </summary>
                        <ul class="desiderio-theme-switch__list" role="list" aria-label="{f:translate(extensionName: 'desiderio', key: 'a11y.theme.switch', default: 'Colour scheme')}">
                            <li>
                                <button type="button" class="desiderio-theme-switch__option" data-d-theme-option="light" aria-pressed="false">
                                    <d:atom.icon name="sun" size="sm"/>
                                    <span><f:translate extensionName="desiderio" key="theme.light">Light</f:translate></span>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="desiderio-theme-switch__option" data-d-theme-option="dark" aria-pressed="false">
                                    <d:atom.icon name="moon" size="sm"/>
                                    <span><f:translate extensionName="desiderio" key="theme.dark">Dark</f:translate></span>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="desiderio-theme-switch__option" data-d-theme-option="system" aria-pressed="false">
                                    <d:atom.icon name="monitor" size="sm"/>
                                    <span><f:translate extensionName="desiderio" key="theme.system">System</f:translate></span>
                                </button>
                            </li>
                        </ul>
                    </details>
                </f:if>

                <f:if condition="{languageNavigation}">
                    <details class="desiderio-header__lang">
                        <summary class="desiderio-header__lang-summary" aria-label="{f:translate(extensionName: 'desiderio', key: 'a11y.nav.language', default: 'Language')}">
                            <d:atom.icon name="globe" size="sm"/>
                            <span class="desiderio-header__lang-current">
                                <f:for each="{languageNavigation}" as="lang">
                                    <f:if condition="{lang.active}">
                                        <span lang="{lang.twoLetterIsoCode -> f:or(alternative: lang.hreflang)}">{lang.twoLetterIsoCode -> f:or(alternative: lang.navigationTitle)}</span>
                                    </f:if>
                                </f:for>
                            </span>
                        </summary>
                        <ul class="desiderio-header__lang-list" role="list">
                            <f:for each="{languageNavigation}" as="lang">
                                <f:if condition="{lang.available}">
                                    <li>
                                        <f:link.typolink parameter="{lang.link}" class="desiderio-header__lang-link {f:if(condition: '{lang.active}', then: 'desiderio-header__lang-link--active')}" additionalAttributes="{hreflang: '{lang.hreflang}'}" title="{lang.title}">
                                            <span lang="{lang.twoLetterIsoCode -> f:or(alternative: lang.hreflang)}">{lang.navigationTitle}</span>
                                        </f:link.typolink>
                                    </li>
                                </f:if>
                            </f:for>
                        </ul>
                    </details>
                </f:if>
            </div>
        </div>
    </d:layout.container>
</header>

</html>
