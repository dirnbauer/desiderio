name: desiderio/footer-minimal
typeName: desiderio_footerminimal
title: 'Minimal Footer'
description: 'A stripped-back footer showing only a copyright line and a single row of inline links. Use it on simple or landing pages where a full footer would feel heavy and only the essentials are needed. Key fields are the required copyright text and a repeatable list of links, each with a label and target URL.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: copyright
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:copyright_text'
    required: true
  -
    identifier: link_items
    type: Collection
    table: footer_minimal_link_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:links'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
