<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="metatype" type="string" optional="true"/>
<f:argument name="content" type="string" optional="true"/>

<div class="flex min-w-0 flex-wrap items-center gap-x-3 gap-y-1.5 text-xs text-muted-foreground" data-blog-meta-type="{metatype}">
    {content -> f:format.raw()}
</div>

</html>
