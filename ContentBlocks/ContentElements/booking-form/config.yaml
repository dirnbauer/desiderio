name: desiderio/booking-form
typeName: desiderio_bookingform
title: 'Booking Form'
description: 'Renders a boxed card with heading, rich-text description, a reassurance line with check icon (e.g. ''30-minute call, no commitment''), and an embedded TYPO3 booking form below. Use it for: appointment and consultation booking sections, ''schedule a call'' offers, reservation requests on service, scheduling, or contact pages. Prefer ''Callback Request'' when visitors only leave a phone number, ''Demo Request'' for a two-column product-demo pitch.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: reassurance
    type: Textarea
    rows: 1
    label: 'Reassurance Microcopy'
    description: 'Short trust line shown under the heading, e.g. "30-minute call. No commitment."'
