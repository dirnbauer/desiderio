name: desiderio/pricing-toggle
typeName: desiderio_pricingtoggle
title: 'Pricing Toggle'
description: 'A shadcn/ui styled TYPO3 content element for pricing section, using theme tokens for light and dark mode.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: plans
    type: Collection
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:plans'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: monthly_price
        type: Textarea
        rows: 1
        label: 'Monthly Price'
        required: true
      -
        identifier: yearly_price
        type: Textarea
        rows: 1
        label: 'Yearly Price'
        required: true
      -
        identifier: description
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: features_list
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features_one_per_line'
        rows: 4
      -
        identifier: button_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
        default: 'Choose Plan'
      -
        identifier: button_link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
