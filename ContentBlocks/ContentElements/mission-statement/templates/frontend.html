<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-mission-statement" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="mission-statement">
    <d:layout.container>
        <div class="mission-statement__content">
            <f:if condition="{data.eyebrow}"><d:atom.typography tag="span" variant="small" class="mission-statement__eyebrow">{data -> f:render.text(field: 'eyebrow')}</d:atom.typography></f:if>
            <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
            <f:if condition="{data.statement}"><blockquote class="mission-statement__quote"><d:atom.typography tag="p" variant="lead" class="mission-statement__quote-text">{data -> f:render.text(field: 'statement')}</d:atom.typography></blockquote></f:if>
            <f:if condition="{data.attribution}"><cite class="mission-statement__attribution"><d:atom.typography tag="span" variant="muted">{data -> f:render.text(field: 'attribution')}</d:atom.typography></cite></f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
