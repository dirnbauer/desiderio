name: desiderio/feature-cards
typeName: desiderio_featurecards
title: 'Feature Cards Grid'
description: 'A tidy grid of equal-sized cards that presents each feature side by side with consistent weight. Use it on landing, product, or service pages to give a balanced overview of several capabilities at a glance. Each card holds a title and a rich-text description, while an optional eyebrow line, headline, and sub-headline introduce the whole section.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_cards_items
    prefixField: true
    label: 'Feature Cards'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
