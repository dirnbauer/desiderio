name: desiderio/feature-video
typeName: desiderio_featurevideo
title: 'Video Feature Section'
description: 'A section with eyebrow, heading, and rich-text copy above one video: either an embedded iframe (YouTube/Vimeo URL) or an uploaded video file with optional poster image. Use it for: sections whose core asset is a video — product demos, explainers, tutorials, or recorded talks referenced in a document. Prefer ''Video Embed'' for a bare video without intro copy; ''Video Hero'' to open a page; ''Video Testimonial'' for a customer video with quote.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: video_url
    type: Text
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:video_url'
    description: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:video_url.description'
  -
    identifier: video_file
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:video_file'
    allowed: common-media-types
    maxitems: 1
  -
    identifier: poster
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:poster_image'
    allowed: common-image-types
    maxitems: 1
