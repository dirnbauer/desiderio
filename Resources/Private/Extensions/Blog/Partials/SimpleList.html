<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="posts" type="iterable" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>

<ul role="list" class="grid gap-2 text-sm">
    <f:for each="{posts}" as="post">
        <li class="rounded-lg border border-border bg-card px-3 py-2 transition-colors hover:bg-muted">
            <div class="flex flex-wrap items-center gap-x-3 gap-y-1">
                <time class="text-xs text-muted-foreground" datetime="{f:format.date(format: 'c', date: post.publishDate)}">{f:format.date(format: '{settings.lists.posts.dateFormat}', date: post.publishDate)}</time>
                <blogvh:link.post post="{post}" class="font-medium text-foreground underline-offset-4 hover:text-primary hover:underline">
                    {post.title}
                </blogvh:link.post>
            </div>
        </li>
    </f:for>
</ul>

</html>
