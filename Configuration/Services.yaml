services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Webconsulting\Desiderio\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/ViewHelpers/*'
      # Composed per seeder command with a FAL folder name, not autowirable.
      - '../Classes/Seeding/ContentElementSeeder.php'

  Webconsulting\Desiderio\ViewHelpers\:
    resource: '../Classes/ViewHelpers/*'
    tags:
      - name: fluid.viewhelper

  Webconsulting\Desiderio\Domain\Factory\BlogCommentFormFactory:
    public: true
