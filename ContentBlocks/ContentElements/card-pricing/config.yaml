name: desiderio/card-pricing
typeName: desiderio_cardpricing
title: 'Card Pricing Data View'
description: 'Use when the card pricing data view should present costs or plan choices close to a decision.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
    required: true
  -
    identifier: billing_period
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/card-pricing/language/labels.xlf:billing_period'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/card-pricing/language/labels.xlf:billing_period.description'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: feature_items
    type: Collection
    table: card_pricing_feature_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/card-pricing/language/labels.xlf:feature_text'
      -
        identifier: included
        type: Checkbox
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:included'
        default: 1
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
  -
    identifier: highlighted
    type: Checkbox
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:highlighted'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/card-pricing/language/labels.xlf:highlighted.description'
    default: 0
