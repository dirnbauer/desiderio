name: desiderio/hero-illustration
typeName: desiderio_heroillustration
title: 'Illustration Hero'
description: 'Two-column hero pairing headline, subheadline, and primary plus secondary buttons with a single custom illustration placed left or right of the text. Use it for: page openers where a drawing, vector graphic, or concept artwork explains the offer — service intros, feature pitches, abstract topics without photography. Prefer ''Product Spotlight Hero'' for photographed products with a price; ''SaaS Hero'' when the visual is a dashboard screenshot; ''App Hero'' for phone mockups.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: illustration
    type: File
    label: Illustration
    allowed: common-image-types
    maxitems: 1
  -
    identifier: image_position
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image_position'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.right'
        value: right
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.left'
        value: left
    default: right
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: secondary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_text'
  -
    identifier: secondary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:secondary_button_link'
