name: desiderio/awards
typeName: desiderio_awards
title: 'Awards'
description: 'Renders a grid of award entries, each with a badge or logo image, a linked or plain title, awarding organization, and year, beneath an optional eyebrow, heading, and subheadline. Use it for: lists of awards won, prizes, rankings, ''best of'' seals, competition results that name year and issuer. Prefer ''Certifications'' for standards like ISO, ''Compliance Badges'' for a compact seal row, ''Press Mentions Grid'' for media quotes.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: awards
    type: Collection
    table: awards_awards
    prefixField: true
    label: Awards
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Award Title'
        required: true
      -
        identifier: year
        type: Textarea
        rows: 1
        label: Year
      -
        identifier: organization
        type: Textarea
        rows: 1
        label: 'Awarding Organization'
      -
        identifier: image
        type: File
        label: 'Award Badge/Logo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
