<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:vh="http://typo3.org/ns/In2code/Powermail/ViewHelpers"
    xmlns:di="http://typo3.org/ns/Webconsulting/Desiderio/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>
<f:argument name="field" type="object" />
<f:argument name="settings" type="array" optional="{true}" />
<f:argument name="mail" type="object" optional="{true}" />

<f:variable name="checkboxInputClass"><d:atom.controlClass slot="checkboxInput" /></f:variable>
<f:variable name="checkboxIconClass"><d:atom.controlClass slot="checkboxIcon" /></f:variable>
<f:variable name="optionTextClass"><d:atom.controlClass slot="optionText" /></f:variable>

<d:molecule.fieldSet class="powermail_fieldwrap_{field.marker} {field.css}">
    <f:if condition="{field.css} != 'nolabel'">
        <d:molecule.fieldLegend mandatory="{field.mandatory}" title="{field.description}">
            <vh:string.escapeLabels>{field.title}</vh:string.escapeLabels>
        </d:molecule.fieldLegend>
    </f:if>
    <div data-slot="checkbox-group" class="grid gap-3">
        <f:for each="{field.modifiedSettings}" as="setting" iteration="index">
            <div>
                <d:molecule.optionLabel for="powermail_field_{field.marker}_{index.cycle}" class="{vh:validation.errorClass(field: field, class: 'text-destructive')}">
                    <d:molecule.checkboxControl>
                        <f:form.checkbox
                            property="{field.marker}"
                            multiple="true"
                            value="{setting.value}"
                            checked="{vh:misc.prefillMultiField(field: field, mail: mail, cycle: index.cycle)}"
                            id="powermail_field_{field.marker}_{index.cycle}"
                            additionalAttributes="{vh:validation.validationDataAttribute(field: field, iteration: index)}"
                            class="{checkboxInputClass -> f:format.trim()}" />
                        <di:icon name="check" size="sm" class="{checkboxIconClass -> f:format.trim()}" />
                    </d:molecule.checkboxControl>
                    <span data-slot="label" class="{optionTextClass -> f:format.trim()}">
                        <vh:string.escapeLabels>{setting.label}</vh:string.escapeLabels>
                    </span>
                </d:molecule.optionLabel>
            </div>
        </f:for>
    </div>
    <f:render partial="Misc/FieldError" arguments="{field: field, settings: settings}" />
</d:molecule.fieldSet>
</html>
