name: desiderio/gdpr-banner
typeName: desiderio_gdprbanner
title: 'GDPR Consent Banner'
description: 'A cookie-consent banner with a message, per-category opt-in checkboxes, and accept and save-preferences buttons. Place it sitewide to capture granular GDPR consent before non-essential cookies load. Key fields are an optional title, the rich-text banner message, a collection of cookie categories (each with name, description, and a required toggle), the accept and save button labels, and a privacy-policy link.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: content
    type: Textarea
    label: 'Banner Message'
    enableRichtext: true
    richtextConfiguration: desiderio
    rows: 3
    required: true
  -
    identifier: cookie_categories
    type: Collection
    table: gdpr_banner_cookie_categories
    prefixField: true
    label: 'Cookie Categories'
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Category Name'
        required: true
      -
        identifier: description_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
      -
        identifier: required
        type: Checkbox
        label: 'Required (cannot be disabled)'
        default: 0
  -
    identifier: accept_text
    type: Textarea
    rows: 1
    label: 'Accept All Text'
    default: 'Accept All'
  -
    identifier: save_text
    type: Textarea
    rows: 1
    label: 'Save Preferences Text'
    default: 'Save Preferences'
  -
    identifier: privacy_link
    type: Link
    label: 'Privacy Policy Link'
