name: desiderio/privacy-notice
typeName: desiderio_privacynotice
title: 'Privacy Notice'
description: 'Renders a privacy overview with heading, ''last updated'' date, rich-text introduction, and a stack of expandable accordion sections (native details/summary), each a titled rich-text passage. Use it for: privacy policy content — sectioned legal text about data collection, cookies, processing purposes, and user rights. Prefer ''Imprint'' for company legal-notice details, ''Terms Summary'' for terms-of-service key points, and ''GDPR Consent Banner'' for actual consent collection.'
group: footer
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: intro
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Introduction
    rows: 3
  -
    identifier: sections
    type: Collection
    table: privacy_notice_sections
    prefixField: true
    label: Sections
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Section Title'
        required: true
      -
        identifier: content
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:content'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
  -
    identifier: last_updated
    type: Textarea
    rows: 1
    label: 'Last Updated Date'
