name: desiderio/leaderboard
typeName: desiderio_leaderboard
title: Leaderboard
description: 'Use when the leaderboard should surface key numbers for quick comparison.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: items
    type: Collection
    table: leaderboard_items
    prefixField: true
    label: Entries
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.score'
        required: true
      -
        identifier: subtitle
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.subtitle'
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.avatar'
        allowed: common-image-types
        maxitems: 1
  -
    identifier: show_rank
    type: Checkbox
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:leaderboard.show_rank'
    default: 1
