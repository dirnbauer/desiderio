name: desiderio/card-interactive
typeName: desiderio_cardinteractive
title: 'Interactive Card'
description: 'A single card with hover and click states, topped by an icon and optional badge and closed by a linked call-to-action. Use it in feature or resource grids where each card should invite a click through to more detail. Key fields are an icon selector, a badge label, the heading, a rich-text description, and a card link.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: icon_style
    type: Select
    renderType: selectSingle
    label: Icon
    description: 'Semantic icon key rendered through the active shadcn icon library.'
    itemsProcessors:
      10:
        class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
    default: star
  -
    identifier: link
    type: Link
    label: 'Card Link'
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
