name: desiderio/social-links
typeName: desiderio_sociallinks
title: 'Social Links'
description: 'A compact navigation row that routes visitors to your external social media profiles. Use it in footers, contact pages or about sections to connect your audience with your channels. Each entry pairs a platform label (e.g. LinkedIn, GitHub, YouTube) with an external URL and an optional icon, introduced by an optional heading and description.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
  -
    identifier: link_items
    type: Collection
    table: social_links_link_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:social_links'
    minItems: 1
    fields:
      -
        identifier: icon
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:icon'
        description: 'Optional semantic icon key rendered through the active shadcn icon library.'
        itemsProcessors:
          10:
            class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
        default: none
      -
        identifier: platform
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:platform'
        description: 'Network name shown as the link label, e.g. LinkedIn, GitHub, YouTube.'
        required: true
      -
        identifier: url
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:url'
        required: true
