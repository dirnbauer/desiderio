<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-gallery" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="gallery">
    <d:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="gallery__intro">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <div class="gallery__browser" data-d-gallery>
            <figure class="gallery__featured">
                <f:for each="{data.items}" as="item" iteration="galleryIteration">
                    <f:if condition="{galleryIteration.isFirst}">
                        <f:for each="{item.image}" as="fileReference">
                            <button type="button" class="d-lightbox" data-d-lightbox
                                    data-d-lightbox-src="{f:uri.image(image: fileReference, maxWidth: 2880)}"
                                    data-d-lightbox-close="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:aria.dismiss', default: 'Dismiss this notice')}"
                                    aria-label="{f:translate(key: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:lightbox.open', default: 'Show image in full size')}">
                                <f:image image="{fileReference}" maxWidth="1440" alt="{fileReference.alternative -> f:or(alternative: item.title)}" class="gallery__featured-image" data="{d-gallery-main: 'true'}" loading="lazy" decoding="async"/>
                            </button>
                            <f:variable name="featuredCredit" value="{fileReference.description}"/>
                        </f:for>
                        <figcaption class="gallery__featured-caption">
                            <span class="gallery__title" data-d-gallery-title<f:if condition="{item.title}"><f:else> hidden</f:else></f:if>>{item -> f:render.text(field: 'title')}</span>
                            <span class="gallery__description" data-d-gallery-description<f:if condition="{item.description}"><f:else> hidden</f:else></f:if>>{item -> f:render.text(field: 'description')}</span>
                            <span class="gallery__credit" data-d-gallery-credit<f:if condition="{featuredCredit}"><f:else> hidden</f:else></f:if>>{featuredCredit}</span>
                            <f:variable name="viewLabel">{f:translate(key: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/gallery/language/labels.xlf:view_image', default: 'View image')}</f:variable>
                            <a class="gallery__featured-link" data-d-gallery-link href="{f:uri.typolink(parameter: item.link.url)}"<f:if condition="{item.link.url}"><f:else> hidden</f:else></f:if>>{viewLabel}</a>
                        </figcaption>
                    </f:if>
                </f:for>
            </figure>

            <div class="gallery__thumbs gallery__thumbs--cols-{data.columns -> f:or(alternative: '3')}">
                <f:for each="{data.items}" as="item" iteration="galleryIteration">
                    <f:for each="{item.image}" as="fileReference">
                        <button type="button"
                                class="gallery__thumb"
                                data-d-gallery-thumb
                                data-large-src="{f:uri.image(image: fileReference, maxWidth: 1440)}"
                                data-large-src-2x="{f:uri.image(image: fileReference, maxWidth: 2880)}"
                                data-thumb-title="{item.title}"
                                data-thumb-description="{item.description}"
                                data-thumb-credit="{fileReference.description}"
                                data-thumb-alt="{fileReference.alternative -> f:or(alternative: item.title)}"
                                data-thumb-link="{f:uri.typolink(parameter: item.link.url)}"
                                aria-current="{f:if(condition: galleryIteration.isFirst, then: 'true', else: 'false')}">
                            <f:image image="{fileReference}" maxWidth="480" alt="{fileReference.alternative -> f:or(alternative: item.title)}" loading="lazy" decoding="async" class="gallery__thumb-image"/>
                            <f:if condition="{item.title}">
                                <span class="gallery__thumb-label">{item -> f:render.text(field: 'title')}</span>
                            </f:if>
                        </button>
                    </f:for>
                </f:for>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
