name: desiderio/code-block
typeName: desiderio_codeblock
title: 'Code Block'
description: 'A styled code block that displays a source-code or technical snippet in a scrollable, keyboard-focusable panel prepared for syntax highlighting. Use it in documentation, tutorials or developer-facing pages to present commands, configuration or example markup cleanly. Key fields are an optional heading, a language label, the code itself, and an optional filename shown in a header bar above the snippet.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: language
    type: Text
    label: 'Language Label'
    description: 'e.g. JavaScript, PHP, HTML, Fluid, TypoScript, TSconfig, YAML'
  -
    identifier: code
    type: Textarea
    label: Code
    rows: 12
    required: true
  -
    identifier: filename
    type: Text
    label: Filename
    description: 'Optional filename shown above the code'
