<html xmlns="http://www.w3.org/1999/xhtml" lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="resultSet" type="object"/>

<f:section name="FacetsActive">
    <f:if condition="{resultSet.facets.used -> f:count()}">
        <div id="tx-solr-facets-in-use" class="d-solr-active-facets" data-slot="card">
            <span class="d-solr-active-facets__label"><f:translate key="solr.facets.narrowedBy" domain="desiderio.labels">Narrowed by</f:translate>:</span>
            <f:for each="{resultSet.facets.used}" as="facet">
                <f:for each="{facet.allFacetItems.selected}" as="item">
                    <a href="{s:uri.facet.removeFacetItem(facet: facet, facetItem: item)}" class="facet remove-facet-option solr-ajaxified d-solr-active-facets__badge" data-slot="badge">
                        {facet.label}: {item.label}
                        <span aria-hidden="true">x</span>
                    </a>
                </f:for>
            </f:for>
            <a href="{s:uri.facet.removeAllFacets()}" class="solr-ajaxified d-solr-active-facets__clear" data-slot="button">
                <f:translate key="solr.facets.removeAll" domain="desiderio.labels">Remove all filters</f:translate>
            </a>
        </div>
    </f:if>
</f:section>

</html>
