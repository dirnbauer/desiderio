<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-comparison-table" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="comparison-table-section">
    <d:layout.container>
        <f:if condition="{data.header} || {data.description}">
            <header class="comparison-table__intro">
                <f:if condition="{data.header}">
                    <h2 class="comparison-table__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.description}">
                    <p class="comparison-table__description">{data -> f:render.text(field: 'description')}</p>
                </f:if>
            </header>
        </f:if>
        <div class="comparison-table__wrapper" role="region" aria-label="{data.header -> f:or(alternative: 'Comparison table')}" tabindex="0">
            <table class="comparison-table__table">
                <f:if condition="{data.description}">
                    <caption class="sr-only">{data -> f:render.text(field: 'description')}</caption>
                </f:if>
                <thead>
                    <tr>
                        <th scope="col" class="comparison-table__feature-col">Feature</th>
                        <f:for each="{data.column_items}" as="col">
                            <th scope="col" class="{f:if(condition: col.highlighted, then: 'comparison-table__col--highlighted')}">
                                {col -> f:render.text(field: 'name')}
                                <f:if condition="{col.highlighted}"><span class="sr-only"> (recommended)</span></f:if>
                            </th>
                        </f:for>
                    </tr>
                </thead>
                <tbody>
                    <f:for each="{data.comparison_feature_items}" as="feature">
                        <tr>
                            <th scope="row" class="comparison-table__feature-name">{feature.name}</th>
                            <f:for each="{feature.tier_values}" as="value">
                                <td class="comparison-table__cell">{value.value}</td>
                            </f:for>
                        </tr>
                    </f:for>
                </tbody>
            </table>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
