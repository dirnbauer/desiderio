<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-product-gallery" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="product-gallery">
    <d:layout.container>
        <figure class="product-gallery__figure" aria-label="{f:if(condition: data.header, then: '{data.header}', else: 'Product gallery')}">
            <f:if condition="{data.header}">
                <h2 class="product-gallery__heading">{data -> f:render.text(field: 'header')}</h2>
            </f:if>

            <div class="product-gallery__main">
                <f:for each="{data.images}" as="fileReference" iteration="iter">
                    <f:if condition="{iter.isFirst}">
                        <f:image image="{fileReference}" maxWidth="800" alt="{fileReference.alternative -> f:or(alternative: data.header)}" class="product-gallery__main-image"/>
                    </f:if>
                </f:for>
            </div>

            <f:if condition="{data.images}">
                <ul class="product-gallery__thumbnails product-gallery__thumbnails--cols-{data.columns -> f:or(alternative: '4')}">
                    <f:for each="{data.images}" as="fileReference" iteration="iter">
                        <li class="product-gallery__thumb {f:if(condition: iter.isFirst, then: 'product-gallery__thumb--active')}">
                            <f:image image="{fileReference}" width="160" height="160" alt="{fileReference.alternative -> f:or(alternative: '{data.header} view {iter.cycle}')}" class="product-gallery__thumb-img" loading="lazy" decoding="async"/>
                        </li>
                    </f:for>
                </ul>
            </f:if>

            <f:if condition="{data.caption}">
                <figcaption class="product-gallery__caption">{data -> f:render.text(field: 'caption')}</figcaption>
            </f:if>
        </figure>
    </d:layout.container>
</d:layout.section>
</html>
