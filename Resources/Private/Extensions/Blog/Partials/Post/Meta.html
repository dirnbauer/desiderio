<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:blogvh="http://typo3.org/ns/T3G/AgencyPack/Blog/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:argument name="post" type="T3G\AgencyPack\Blog\Domain\Model\Post" optional="true"/>
<f:argument name="settings" type="array" optional="true"/>

<div class="flex flex-wrap items-center gap-x-3 gap-y-2 text-xs text-muted-foreground">
    <span class="entry-date">
        <blogvh:link.post post="{post}" rel="bookmark" class="text-muted-foreground !no-underline transition-colors hover:text-link">
            <time datetime="{f:format.date(format: 'c', date: post.publishDate)}" itemprop="datePublished">{f:format.date(format: '{settings.lists.posts.dateFormat}', date: post.publishDate)}</time>
        </blogvh:link.post>
    </span>
    <f:if condition="{post.categories}">
        <span aria-hidden="true">·</span>
        <span class="inline-flex flex-wrap items-center gap-1">
            <f:for each="{post.categories}" as="postCategory">
                <blogvh:link.category category="{postCategory}" class="!no-underline">
                    <d:atom.badge variant="secondary">{postCategory.title}</d:atom.badge>
                </blogvh:link.category>
            </f:for>
        </span>
    </f:if>
    <f:if condition="{post.tags}">
        <span aria-hidden="true">·</span>
        <span class="inline-flex flex-wrap items-center gap-1" itemprop="keywords">
            <f:for each="{post.tags}" as="postTag">
                <blogvh:link.tag tag="{postTag}" class="!no-underline">
                    <d:atom.badge variant="outline">{postTag.title}</d:atom.badge>
                </blogvh:link.tag>
            </f:for>
        </span>
    </f:if>
    <f:if condition="{settings.comments.disqus.enable} !== '1'">
        <f:then>
            <f:alias map="{commentCount: '{f:count(subject: \'{post.activeComments}\')}'}">
                <span aria-hidden="true">·</span>
                <meta itemprop="commentCount" content="{commentCount}"/>
                <span>
                    <blogvh:link.post post="{post}" section="comments" class="text-muted-foreground !no-underline transition-colors hover:text-link">
                        <f:translate extensionName="desiderio" key="blog.comments.count" arguments="{count: commentCount}">{commentCount} comments</f:translate>
                    </blogvh:link.post>
                </span>
            </f:alias>
        </f:then>
        <f:else>
            <blogvh:link.post post="{post}" section="disqus_thread" data="{disqus-identifier: '{settings.comments.disqus.shortname}:post:{post.uid}'}" class="text-muted-foreground !no-underline transition-colors hover:text-link">
                <f:translate extensionName="desiderio" key="blog.comments.count" arguments="{count: 0}">0 comments</f:translate>
            </blogvh:link.post>
        </f:else>
    </f:if>
</div>

</html>
