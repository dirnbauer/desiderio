name: desiderio/product-comparison
typeName: desiderio_productcomparison
title: 'Product Comparison Grid'
description: 'Renders two or three product cards in a grid, each with name, image, price, a bullet list of up to eight specs, an optional recommended badge, and a details link. Use it for: source content contrasting product models or variants — spec sheets of two or three devices, package options with feature lists. Prefer ''Comparison Table'' or ''Plan Comparison Matrix'' for row-by-row feature tables; use ''Two Tier Pricing'' for subscription plans with CTAs.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: products
    type: Collection
    table: product_comparison_products
    prefixField: true
    label: Products
    labelField: name
    minItems: 2
    maxItems: 3
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Product Name'
        required: true
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:product_image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
      -
        identifier: specs
        type: Collection
        table: product_comparison_specs
        label: Specs
        labelField: text
        minItems: 1
        maxItems: 8
        fields:
          -
            identifier: text
            type: Textarea
            rows: 1
            label: Spec
      -
        identifier: is_recommended
        type: Checkbox
        label: Recommended
      -
        identifier: link
        type: Link
        label: 'Product Link'
