name: desiderio/content-columns
typeName: desiderio_contentcolumns
title: 'Content Columns'
description: 'Renders an optional heading above two or three balanced columns, each column holding its own required rich-text block (paragraphs, lists, links). Use it for: long flowing body copy that reads better split across the page, parallel text sections without card framing, multi-part notes, terms excerpts or newspaper-style editorial text. Prefer ''Content Grid'' when items need titles, cards and links; ''Split Text & Media'' when text should sit beside an image.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
    default: '2'
  -
    identifier: items
    type: Collection
    table: content_columns_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:column_content'
    minItems: 2
    fields:
      -
        identifier: content
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:content'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 6
        required: true
