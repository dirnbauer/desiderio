name: desiderio/testimonial-wall
typeName: desiderio_testimonialwall
title: 'Testimonial Wall'
description: 'A dense masonry-style wall that packs many quote cards into a staggered, magazine-like arrangement. Use it to convey overwhelming social proof at scale, ideal for a reviews or customers page that should feel busy and validated. Each card holds a quote, author name and title and an optional author photo, framed by an intro with eyebrow, headline and sub-headline.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: testimonials
    type: Collection
    table: testimonial_wall_testimonials
    prefixField: true
    label: Testimonials
    minItems: 3
    fields:
      -
        identifier: quote
        type: Textarea
        label: Quote
        rows: 3
        required: true
      -
        identifier: author_name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
        required: true
      -
        identifier: author_title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_title'
      -
        identifier: author_image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_photo'
        allowed: common-image-types
        maxitems: 1
