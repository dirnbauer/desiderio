<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-content-columns" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="content-columns">
    <d:layout.container>
        <f:if condition="{data.header}">
            <d:atom.typography tag="h2" variant="h2" class="content-columns__headline">{data -> f:render.text(field: 'header')}</d:atom.typography>
        </f:if>

        <div class="content-columns__grid content-columns__grid--cols-{data.columns -> f:or(alternative: '2')}">
            <f:for each="{data.items}" as="item">
                <div class="content-columns__col">
                    {item -> f:render.text(field: 'content')}
                </div>
            </f:for>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
