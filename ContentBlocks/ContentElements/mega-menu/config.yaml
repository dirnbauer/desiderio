name: desiderio/mega-menu
typeName: desiderio_megamenu
title: 'Mega Menu Panel'
description: 'A rich, multi-column dropdown panel that groups many links under titled sections, with a brand header and a call-to-action button. Use it as a content-driven navigation hub for sites with deep structure that a simple menu cannot cover. Fields include the layout (full-width or two columns), eyebrow, brand name, tagline and link, an intro title and rich-text, a primary button, and menu groups each holding a title, description, and up to five labelled links.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: shadcn_layout
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:shadcn_layout'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.full_width'
        value: full-width
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.two_columns'
        value: two-columns
    default: full-width
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: brand
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand'
    required: true
  -
    identifier: brand_tagline
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:tagline'
  -
    identifier: brand_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:brand_link'
  -
    identifier: intro_title
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
  -
    identifier: intro_text
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: menu_groups
    type: Collection
    table: mega_menu_menu_groups
    prefixField: true
    label: 'Menu Groups'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:group_title'
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: link_1_label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_1_label'
      -
        identifier: link_1
        type: Link
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_1'
      -
        identifier: link_2_label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_2_label'
      -
        identifier: link_2
        type: Link
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_2'
      -
        identifier: link_3_label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_3_label'
      -
        identifier: link_3
        type: Link
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_3'
      -
        identifier: link_4_label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_4_label'
      -
        identifier: link_4
        type: Link
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_4'
      -
        identifier: link_5_label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_5_label'
      -
        identifier: link_5
        type: Link
        label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/mega-menu/language/labels.xlf:link_5'
