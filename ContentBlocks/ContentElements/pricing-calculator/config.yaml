name: desiderio/pricing-calculator
typeName: desiderio_pricingcalculator
title: 'Calculator Pricing'
description: 'Calculator Pricing supports buying decisions with prices, plans, packages, or calculated options. Editors can manage headline and copy fields and repeatable entries.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: unit_label
    type: Textarea
    rows: 1
    label: 'Unit Label'
    description: 'e.g. users, API calls, seats'
    default: users
  -
    identifier: tiers
    type: Collection
    label: 'Pricing Tiers'
    minItems: 1
    fields:
      -
        identifier: up_to
        type: Textarea
        rows: 1
        label: 'Up To (quantity)'
        required: true
      -
        identifier: price_per_unit
        type: Textarea
        rows: 1
        label: 'Price Per Unit'
        required: true
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'Tier Label'
