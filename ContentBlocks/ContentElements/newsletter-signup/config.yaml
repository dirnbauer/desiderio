name: desiderio/newsletter-signup
typeName: desiderio_newslettersignup
title: 'Newsletter Signup'
description: 'A full newsletter sign-up section pairing a sign-up form card with optional benefit bullets beside it. Use it as a dedicated standalone block to grow your mailing list, with room to sell the value of subscribing. Fields include an eyebrow, headline, sub-headline, a privacy reassurance line under the form, and a list of supporting benefit points; the email field and submit are owned by the Form Framework.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: form_action
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:form_action'
  -
    identifier: email_placeholder
    type: Text
    label: 'Email Placeholder'
    description: 'Greyed-out hint shown inside the email field (kept for migrated records; the Form Framework owns the live field).'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
  -
    identifier: privacy_text
    type: Textarea
    label: 'Privacy Reassurance'
    description: 'Short reassurance under the button, e.g. "No spam, unsubscribe anytime".'
    rows: 2
  -
    identifier: points
    type: Collection
    table: newsletter_signup_points
    prefixField: true
    label: 'Supporting Points'
    description: 'Optional benefit bullets shown beside the form. Keep each to a short, scannable phrase.'
    fields:
      -
        identifier: text
        type: Textarea
        rows: 1
        label: Point
