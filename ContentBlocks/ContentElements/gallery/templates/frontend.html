<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-gallery" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="gallery">
    <d:layout.container>
        <f:if condition="{data.header} || {data.subheadline}">
            <header class="gallery__intro">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.subheadline}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'subheadline')}</d:atom.typography></f:if>
            </header>
        </f:if>

        <div class="gallery__browser" data-d-gallery>
            <figure class="gallery__featured">
                <f:for each="{data.items}" as="item" iteration="galleryIteration">
                    <f:if condition="{galleryIteration.isFirst}">
                        <f:for each="{item.image}" as="fileReference">
                            <f:image image="{fileReference}" maxWidth="1440" alt="{item.title}" class="gallery__featured-image" data="{d-gallery-main: 'true'}"/>
                        </f:for>
                        <f:if condition="{item.title} || {item.description}">
                            <figcaption class="gallery__featured-caption">
                                <f:if condition="{item.title}"><span class="gallery__title" data-d-gallery-title>{item -> f:render.text(field: 'title')}</span></f:if>
                                <f:if condition="{item.description}"><span class="gallery__description" data-d-gallery-description>{item -> f:render.text(field: 'description')}</span></f:if>
                            </figcaption>
                        </f:if>
                    </f:if>
                </f:for>
            </figure>

            <div class="gallery__thumbs gallery__thumbs--cols-{data.columns -> f:or(alternative: '3')}" role="list">
                <f:for each="{data.items}" as="item" iteration="galleryIteration">
                    <f:for each="{item.image}" as="fileReference">
                        <button type="button"
                                class="gallery__thumb"
                                data-d-gallery-thumb
                                data-large-src="{f:uri.image(image: fileReference, maxWidth: 1440)}"
                                data-thumb-title="{item.title}"
                                data-thumb-description="{item.description}"
                                data-thumb-alt="{item.title}"
                                data-thumb-link="{item.link.url}"
                                aria-selected="{f:if(condition: galleryIteration.isFirst, then: 'true', else: 'false')}"
                                role="listitem">
                            <f:image image="{fileReference}" maxWidth="480" alt="{item.title}" class="gallery__thumb-image"/>
                            <f:if condition="{item.title}">
                                <span class="gallery__thumb-label">{item -> f:render.text(field: 'title')}</span>
                            </f:if>
                        </button>
                    </f:for>
                </f:for>
            </div>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
