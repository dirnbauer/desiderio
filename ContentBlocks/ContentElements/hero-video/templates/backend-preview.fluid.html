<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Preview"/>

<f:section name="Header"></f:section>

<f:section name="Content">
    <f:asset.css identifier="desiderio-content-preview" href="EXT:desiderio/Resources/Public/Css/content-preview.css" />
    <div class="d-ce-preview" data-slot="card">
        <div class="d-ce-preview__meta">
            <span class="d-ce-preview__type" data-slot="badge">Video Hero</span>
            <f:if condition="{settings._content_block_name}"><span class="d-ce-preview__ctype">{settings._content_block_name}</span></f:if>
            <span class="d-ce-preview__ctype"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:preview.uid"/>: {data.uid}</span>
            <span class="d-ce-preview__ctype"><f:translate key="LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:preview.page"/>: {data.pid}</span>
        </div>
        <f:if condition="{data.header}">
            <h3 class="d-ce-preview__title">{data.header}</h3>
        </f:if>
        <f:if condition="{data.eyebrow}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Eyebrow</span>
                <span class="d-ce-preview__value">{data.eyebrow}</span>
            </div>
        </f:if>
        <f:if condition="{data.subheadline}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Subheadline</span>
                <span class="d-ce-preview__value">{data.subheadline}</span>
            </div>
        </f:if>
        <f:if condition="{data.video_description}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Video Description</span>
                <span class="d-ce-preview__value">{data.video_description}</span>
            </div>
        </f:if>
        <f:if condition="{data.primary_button_text}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Primary Button Text</span>
                <span class="d-ce-preview__value">{data.primary_button_text}</span>
            </div>
        </f:if>
        <f:if condition="{data.video_title}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Video Title</span>
                <span class="d-ce-preview__value">{data.video_title}</span>
            </div>
        </f:if>
    </div>
</f:section>

</html>
