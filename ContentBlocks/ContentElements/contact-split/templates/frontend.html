<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-contact-split" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="contact-split">
    <d:layout.container>
        <div class="contact-split__layout">
            <div class="contact-split__content">
                <f:if condition="{data.header}"><d:atom.typography tag="h2" variant="h2">{data -> f:render.text(field: 'header')}</d:atom.typography></f:if>
                <f:if condition="{data.description}"><d:atom.typography variant="muted">{data -> f:render.text(field: 'description')}</d:atom.typography></f:if>
<f:comment>Legacy editor fields kept for migrated records; TYPO3 Form Framework owns rendering and submit behavior. {data.form_action}{data.submit_text}</f:comment>

                <d:molecule.formRenderer persistenceIdentifier="EXT:desiderio/Resources/Private/Forms/DesiderioContact.form.yaml" class="contact-split__form"/>
            </div>
            <f:if condition="{data.image}">
                <div class="contact-split__image-wrapper">
                    <f:for each="{data.image}" as="fileReference">
                        <f:image image="{fileReference}" maxWidth="640" alt="{fileReference.alternative}" class="contact-split__image" loading="lazy" decoding="async"/>
                    </f:for>
                </div>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
