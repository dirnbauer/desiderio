name: desiderio/contact-split
typeName: desiderio_contactsplit
title: 'Contact Split Form'
description: 'A two-column block placing a working contact form next to a side image and intro copy. Use it on contact or landing pages where you want a personal visual alongside the form. Edit the headline, a rich-text description, and the side image; the form itself is rendered by the TYPO3 Form Framework.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: image
    type: File
    label: 'Side Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: form_action
    type: Link
    label: 'Form Action URL'
  -
    identifier: submit_text
    type: Textarea
    rows: 1
    label: 'Submit Button Text'
    default: 'Send message'
