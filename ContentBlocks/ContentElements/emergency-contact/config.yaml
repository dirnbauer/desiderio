name: desiderio/emergency-contact
typeName: desiderio_emergencycontact
title: 'Emergency Contact'
description: 'A compact, highlighted notice card with an alert icon that surfaces an urgent hotline or important warning. Use it on contact, support, or service pages where visitors must reach someone quickly without a full section. Fill in a headline, short description, phone number with an optional click-to-call link, and an availability line such as opening hours.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
  -
    identifier: phone
    type: Text
    label: 'Phone Number'
  -
    identifier: phone_link
    type: Link
    label: 'Phone Link'
  -
    identifier: available
    type: Textarea
    rows: 1
    label: Availability
