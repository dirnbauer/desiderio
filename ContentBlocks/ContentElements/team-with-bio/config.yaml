name: desiderio/team-with-bio
typeName: desiderio_teamwithbio
title: 'Team with Bios'
description: 'Renders a vertical list of team members, each with a portrait (with optional photo credit), name, role, rich-text short biography, and a ''View profile'' button, under an optional eyebrow, heading, and subheadline. Use it for: team rosters where every person gets a paragraph of context, expert or consultant listings, practice or agency staff pages. Prefer ''Minimal Team Grid'' for name-and-role-only lists; use ''Team Member Spotlight'' for one person in depth.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: members
    type: Collection
    table: team_with_bio_members
    prefixField: true
    label: 'Team Members'
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: role
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:role'
      -
        identifier: bio
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Biography
        rows: 4
      -
        identifier: profile_link
        type: Link
        label: 'Profile Link'
