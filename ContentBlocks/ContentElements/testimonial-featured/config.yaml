name: desiderio/testimonial-featured
typeName: desiderio_testimonialfeatured
title: 'Featured Testimonial'
description: 'A single standout quote enlarged into a full-width hero block, optionally laid over a background image with a company logo. Use it to lead a page or break up sections with one powerful, high-impact endorsement from a marquee customer. It provides the quote text, author name, title and company, an author photo, a company logo and a background image.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: quote
    type: Textarea
    label: 'Quote Text'
    rows: 4
    required: true
  -
    identifier: author_name
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_name'
    required: true
  -
    identifier: author_title
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_title'
  -
    identifier: author_company
    type: Textarea
    rows: 1
    label: Company
  -
    identifier: author_image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:author_photo'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: company_logo
    type: File
    label: 'Company Logo'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: background_image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:background_image'
    allowed: common-image-types
    maxitems: 1
