<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Default" />

<f:section name="Content">
    <f:if condition="{tag}">
        <f:then>
            <header class="mb-8 flex flex-col gap-4">
                <div class="flex flex-wrap items-center gap-3">
                    <d:atom.typography tag="h1" variant="h1">
                        <f:translate extensionName="Blog" key="headline.tag.simple">Tag</f:translate>:
                        {tag.title}
                    </d:atom.typography>
                    <blogvh:link.tag class="inline-flex h-9 items-center gap-2 rounded-lg border border-border px-3 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground" rss="true" tag="{tag}">
                        <f:render partial="General/SocialIcons" section="Rss" optional="true" />
                        <span><f:translate extensionName="Blog" key="link.rss" default="RSS"/></span>
                    </blogvh:link.tag>
                </div>
                <f:if condition="{tag.description}">
                    <p class="text-base leading-7 text-muted-foreground">{tag.description}</p>
                </f:if>
            </header>
            <f:render partial="List" arguments="{_all}" />
            <f:if condition="{settings.tagUid} || {tag.content}">
                <footer class="mt-8 flex flex-col gap-6 border-t border-border pt-6">
                    <f:if condition="{settings.tagUid}">
                        <div>
                            <f:link.page pageUid="{settings.tagUid}" class="inline-flex h-9 items-center rounded-lg border border-border px-3 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground">
                                &larr; <f:translate extensionName="Blog" key="list.backlink.tags">Back to all tags</f:translate>
                            </f:link.page>
                        </div>
                    </f:if>
                    <f:if condition="{tag.content}">
                        <div class="prose prose-neutral max-w-none dark:prose-invert">
                            <f:cObject typoscriptObjectPath="lib.blog.contentElementRendering">{tag.contentElementUidList}</f:cObject>
                        </div>
                    </f:if>
                </footer>
            </f:if>
        </f:then>
        <f:else>
            <header class="mb-8">
                <d:atom.typography tag="h1" variant="h1"><f:translate extensionName="Blog" key="headline.tags">Tags</f:translate></d:atom.typography>
            </header>
            <ul role="list" class="flex flex-wrap gap-2">
                <f:for each="{tags}" as="tag">
                    <li>
                        <f:render partial="List/Tag" arguments="{_all}" />
                    </li>
                </f:for>
            </ul>
        </f:else>
    </f:if>
</f:section>

</html>
