name: desiderio/product-comparison
typeName: desiderio_productcomparison
title: 'Product Comparison Grid'
description: 'A side-by-side grid of two or three product cards that contrasts their specs at a glance. Use it on pricing or product pages to help visitors weigh options and pick a plan. Each product holds a name, image, price, a list of spec lines, a Recommended flag that highlights one card with a badge, and a product link; an eyebrow and headline introduce the set.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: products
    type: Collection
    table: product_comparison_products
    prefixField: true
    label: Products
    labelField: name
    minItems: 2
    maxItems: 3
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'Product Name'
        required: true
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:product_image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
      -
        identifier: specs
        type: Collection
        table: product_comparison_specs
        label: Specs
        labelField: text
        minItems: 1
        maxItems: 8
        fields:
          -
            identifier: text
            type: Textarea
            rows: 1
            label: Spec
      -
        identifier: is_recommended
        type: Checkbox
        label: Recommended
      -
        identifier: link
        type: Link
        label: 'Product Link'
