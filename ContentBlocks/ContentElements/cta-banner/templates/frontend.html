<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="d-cta-banner" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section class="cta-banner cta-banner--{data.bg_style -> f:or(alternative: 'primary')}">
    <d:layout.container>
        <div class="cta-banner__content">
            <f:if condition="{data.header}"><h2 class="cta-banner__headline">{data -> f:render.text(field: 'header')}</h2></f:if>
            <f:if condition="{data.description}"><p class="cta-banner__description">{data -> f:render.text(field: 'description')}</p></f:if>
            <f:if condition="{data.cta_text} && {data.cta_link.url}">
                <d:atom.button href="{data.cta_link.url}" target="{data.cta_link.target}" variant="secondary" size="lg">{data -> f:render.text(field: 'cta_text')}</d:atom.button>
            </f:if>
        </div>
    </d:layout.container>
</d:layout.section>

</html>
