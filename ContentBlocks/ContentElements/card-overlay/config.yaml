name: desiderio/card-overlay
typeName: desiderio_cardoverlay
title: 'Overlay Image Card'
description: 'Renders a single full-bleed image card with an adjustable dark gradient overlay (light, medium, strong) and, layered on top, an eyebrow badge, heading, rich-text description, and an arrow button. Use it for: a promotional teaser, campaign highlight, destination or offer spotlight — any short message paired with one strong photo. Prefer ''Hero Section'' for the page opener; use ''Content Card'' for standard cards without a full-image background.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:background_image'
    allowed: common-image-types
    maxitems: 1
    required: true
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
  -
    identifier: link_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link_text'
  -
    identifier: overlay_intensity
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.light'
        value: light
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.medium'
        value: medium
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.strong'
        value: strong
    default: medium
