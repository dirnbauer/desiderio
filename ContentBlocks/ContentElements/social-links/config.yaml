name: desiderio/social-links
typeName: desiderio_sociallinks
title: 'Social Links'
description: 'Social Links provides a focused editorial building block for a recognizable page task. Editors can manage headline and copy fields and link and CTA controls.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
  -
    identifier: link_items
    type: Collection
    label: 'Social Links'
    minItems: 1
    fields:
      -
        identifier: platform
        type: Textarea
        rows: 1
        label: Platform
        required: true
      -
        identifier: url
        type: Link
        label: URL
        required: true
