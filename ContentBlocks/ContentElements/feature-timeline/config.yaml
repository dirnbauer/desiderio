name: desiderio/feature-timeline
typeName: desiderio_featuretimeline
title: 'Timeline Feature Section'
description: 'Use when the timeline feature section should explain product value in a structured section.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_timeline_items
    prefixField: true
    label: 'Timeline Steps'
    minItems: 2
    fields:
      -
        identifier: step
        type: Textarea
        rows: 1
        label: 'Step Label'
        required: true
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 3
