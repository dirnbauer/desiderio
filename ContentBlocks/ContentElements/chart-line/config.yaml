name: desiderio/chart-line
typeName: desiderio_chartline
title: 'Line Chart'
description: 'Place the Line Chart content element as a focused page section.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: series_label
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-line/language/labels.xlf:field.series_label'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-line/language/labels.xlf:field.series_label.description'
    required: true
  -
    identifier: unit
    type: Text
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-line/language/labels.xlf:field.unit'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-line/language/labels.xlf:field.unit.description'
  -
    identifier: data_points
    type: Textarea
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-line/language/labels.xlf:field.data_points'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-line/language/labels.xlf:field.data_points.description'
    rows: 6
    required: true
  -
    identifier: chart_data
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:chart_data_json'
    description: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-line/language/labels.xlf:field.chart_data.description'
    rows: 6
    required: true
  -
    identifier: color_variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:color_field'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.blue'
        value: blue
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.green'
        value: green
    default: primary
  -
    identifier: show_dots
    type: Checkbox
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-line/language/labels.xlf:field.show_dots'
    default: 1
  -
    identifier: smooth
    type: Checkbox
    label: 'LLL:EXT:desiderio/ContentBlocks/ContentElements/chart-line/language/labels.xlf:field.smooth'
    default: 1
