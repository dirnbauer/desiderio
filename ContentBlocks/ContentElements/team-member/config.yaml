name: desiderio/team-member
typeName: desiderio_teammember
title: 'Team Member Spotlight'
description: 'A detailed single-person card pairing a portrait with name, role, rich-text biography, and contact details. Use it on a profile or about page to highlight one individual in depth. Key fields are the heading (name), portrait image, role, rich-text biography, email and phone contact links, and a collection of social links (platform and URL).'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:portrait'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: role
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:role'
  -
    identifier: bio
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Biography
    rows: 4
  -
    identifier: email
    type: Text
    label: Email
  -
    identifier: phone
    type: Text
    label: Phone
  -
    identifier: social_links
    type: Collection
    table: team_member_social_links
    prefixField: true
    label: 'Social Links'
    fields:
      -
        identifier: platform
        type: Textarea
        rows: 1
        label: Platform
      -
        identifier: url
        type: Link
        label: URL
