<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Pages/Default"/>

<f:section name="Stage">
    <f:render partial="Presets/Stage" arguments="{content: content.stage, class: 'desiderio-corporate-template__stage', containerSize: 'xl', innerClass: 'desiderio-corporate-template__stage-inner'}"/>
</f:section>

<f:section name="Main">
    <div class="desiderio-corporate-template">
        <d:layout.container size="xl" class="desiderio-corporate-template__container">
            <div class="desiderio-corporate-template__intro">
                <p class="desiderio-corporate-template__eyebrow">{breadcrumb.0.title}</p>
                <p class="desiderio-corporate-template__summary">{page.pageRecord.title}</p>
            </div>

            <div class="desiderio-corporate-template__content">
                <f:render partial="Presets/ContentArea" arguments="{content: content.main}"/>
            </div>
        </d:layout.container>
    </div>
</f:section>

</html>
