name: desiderio/waitlist-signup
typeName: desiderio_waitlistsignup
title: 'Waitlist Signup'
description: 'Renders a centered section with heading and rich-text description above a card holding an embedded TYPO3 Form Framework signup form and an optional social-proof count line (''Join 2,000 others''). Use it for: pre-launch and coming-soon pages, beta or early-access invitations, ''notify me when available'' sections, product announcements collecting interest. Prefer ''Startup Waitlist Hero'' as the page opener, ''Newsletter Signup'' for ongoing subscriptions, and ''Newsletter Inline'' for a slim between-sections strip.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: count_text
    type: Textarea
    rows: 1
    label: 'Count Text'
