name: desiderio/hero-countdown
typeName: desiderio_herocountdown
title: 'Countdown Hero'
description: 'A centered hero with a live timer counting down days, hours, minutes and seconds toward a set date. Use it at the top of a launch, sale or event page to build urgency before the deadline. Built from a badge, headline, subheadline, the target date that feeds the timer, and a single primary call-to-action button with its link.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: target_date
    type: DateTime
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:target_date'
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
