<html xmlns="http://www.w3.org/1999/xhtml" lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="document" type="object"/>
<f:argument name="resultSet" type="object"/>
<f:argument name="settings" type="array" optional="true"/>
<f:argument name="logging" type="array" optional="true"/>

<f:section name="Document">
    <article class="search-result results-entry d-solr-result-card{f:if(condition:document.isElevated, then: ' results-elevated')}"
        data-slot="card"
        data-document-score="{document.score}"
        data-document-id="{document.id}"
        data-document-url="{document.url}"
    >
        <f:if condition="{document.isElevated}">
            <div class="d-solr-result-card__sponsored" data-slot="badge">
                <f:translate key="solr.sponsored" domain="desiderio.labels"/>
            </div>
        </f:if>

        <header class="d-solr-result-card__header">
            <div class="d-solr-result-card__title-group">
                <h3 class="d-solr-result-card__title">
                    <a href="{s:uri.result.addSearchWordList(url:document.url, searchWords:resultSet.usedQuery.query)}">
                        <d:searchSnippet text="{document.title}" query="{resultSet.usedQuery.rawSearchTerm}" maxCharacters="140"/>
                    </a>
                </h3>
                <f:if condition="{document.url}">
                    <p class="d-solr-result-card__url">{document.url}</p>
                </f:if>
            </div>
            <f:if condition="{document.type}">
                <span class="d-solr-result-card__type" data-slot="badge">
                    <f:switch expression="{document.type}">
                        <f:case value="pages"><f:translate key="solr.contentType.pages" domain="desiderio.labels">Pages</f:translate></f:case>
                        <f:case value="tx_news_domain_model_news"><f:translate key="solr.contentType.news" domain="desiderio.labels">News</f:translate></f:case>
                        <f:case value="tt_address"><f:translate key="solr.contentType.addresses" domain="desiderio.labels">Addresses</f:translate></f:case>
                        <f:defaultCase>{document.type}</f:defaultCase>
                    </f:switch>
                </span>
            </f:if>
        </header>

        <div class="d-solr-result-card__body">
            <p class="result-content d-solr-result-card__content">
                <d:searchSnippet text="{document.content}" query="{resultSet.usedQuery.rawSearchTerm}" maxCharacters="200"/>
            </p>
            <f:if condition="{document.type} == 'tx_solr_file'">
                <div class="d-solr-result-card__file">
                    <p><f:translate key="solr.fileMimeType" domain="desiderio.labels"/>: {document.fileMimeType}</p>
                    <p><f:translate key="solr.fileReferenced" domain="desiderio.labels"/>:</p>
                    <ul role="list" class="d-solr-result-card__file-list">
                        <f:if condition="{document.fileReferenceUrl}">
                            <li><f:link.typolink title="{document.fileReferenceTitle}" parameter="{document.fileReferenceUrl}">{document.fileReferenceTitle}</f:link.typolink></li>
                        </f:if>
                        <f:if condition="{document.variants}">
                            <f:for each="{document.variants}" as="variant">
                                <li><f:link.typolink title="{variant.fileReferenceTitle}" parameter="{variant.fileReferenceUrl}">{variant.fileReferenceTitle}</f:link.typolink></li>
                            </f:for>
                        </f:if>
                    </ul>
                </div>
            </f:if>

            <f:if condition="{settings.logging.debugOutput} || {logging.debugOutput}">
                <f:variable name="documentScoreAnalyze"><f:render partial="Debug/Explain" section="Explain" arguments="{document: document, resultSet: resultSet}" /></f:variable>
                <f:if condition="{documentScoreAnalyze}">
                    <div class="d-solr-result-card__debug"><f:format.raw>{documentScoreAnalyze}</f:format.raw></div>
                </f:if>
            </f:if>
        </div>
    </article>
</f:section>

</html>
