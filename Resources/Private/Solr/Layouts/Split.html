<div class="tx_solr d-solr-create" data-shadcn-pattern="create-shell">
    <f:variable name="extraContent"><f:render section="extra" /></f:variable>
    <f:variable name="extraContentPlain" value="{extraContent -> f:format.stripTags() -> f:format.trim()}" />
    <div class="d-solr-create__viewport">
        <div class="d-solr-create__grid{f:if(condition: extraContentPlain, else: ' d-solr-create__grid--single')}">
            <f:if condition="{extraContentPlain}">
                <aside class="d-solr-create__sidebar" aria-label="{f:translate(key: 'solr.filters', domain: 'desiderio.labels', default: 'Search filters')}">
                    <f:format.raw>{extraContent}</f:format.raw>
                </aside>
            </f:if>
            <div class="d-solr-create__main">
                <f:render section="content" />
            </div>
        </div>
    </div>
</div>
