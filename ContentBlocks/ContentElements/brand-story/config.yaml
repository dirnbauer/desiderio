name: desiderio/brand-story
typeName: desiderio_brandstory
title: 'Brand Story'
description: 'A two-column narrative block that pairs flowing text with a supporting image to tell your brand''s origin and values. Use it on About or company pages to build identity and emotional connection. Key fields are an eyebrow badge, the heading, a lead paragraph, rich-text body, and a single accompanying image.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: lead
    type: Textarea
    label: 'Lead Paragraph'
    rows: 3
  -
    identifier: body
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Body Text'
    rows: 6
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
    allowed: common-image-types
    maxitems: 1
