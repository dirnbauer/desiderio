name: desiderio/leaderboard
typeName: desiderio_leaderboard
title: Leaderboard
description: 'Leaderboard presents performance numbers as a quick-read dashboard block. Editors can manage headline and copy fields, repeatable entries and layout or variant options.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: items
    type: Collection
    table: leaderboard_items
    label: Entries
    minItems: 1
    fields:
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: value
        type: Textarea
        rows: 1
        label: 'Value / Score'
        required: true
      -
        identifier: subtitle
        type: Textarea
        rows: 1
        label: Subtitle
      -
        identifier: image
        type: File
        label: Avatar
        allowed: common-image-types
        maxitems: 1
  -
    identifier: show_rank
    type: Checkbox
    label: 'Show Rank Numbers'
    default: 1
