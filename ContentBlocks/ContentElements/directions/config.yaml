name: desiderio/directions
typeName: desiderio_directions
title: 'Directions Routes'
description: 'A list of route cards, each marked with a map-pin icon, that explains how to reach a location by different means of transport. Use it on contact, location, or event pages to answer how-to-get-here questions. Set an optional headline and sub-headline, then add one or more routes, each with a transport mode label and rich-text turn-by-turn directions.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: routes
    type: Collection
    table: directions_routes
    prefixField: true
    label: Routes
    minItems: 1
    fields:
      -
        identifier: mode
        type: Textarea
        rows: 1
        label: 'Transport Mode'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Directions
        rows: 3
