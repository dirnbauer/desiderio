name: desiderio/blog-teasers
typeName: desiderio_blogteasers
title: 'Blog Teasers'
description: 'Renders a heading and subheadline above a two- or three-column grid of manually curated post teasers, each with image, category label, meta line (date or read time), linked title, and rich-text excerpt. Use it for: ''latest from the blog'' sections, news previews, editorial highlights, article roundups on home or overview pages. Prefer ''Article Grid'' for text-first article cards, ''Case Study Grid'' for customer success stories.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
    default: '3'
  -
    identifier: posts
    type: Collection
    table: blog_teasers_posts
    prefixField: true
    label: Posts
    minItems: 1
    fields:
      -
        identifier: image
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:image'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: category
        type: Textarea
        rows: 1
        label: Category
      -
        identifier: meta
        type: Textarea
        rows: 1
        label: Meta
        description: 'e.g. 5 min read or Mar 18, 2026'
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: excerpt
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: Excerpt
        rows: 3
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
