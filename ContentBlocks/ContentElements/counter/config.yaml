name: desiderio/counter
typeName: desiderio_counter
title: 'Animated Stat Counter'
description: 'An animated statistics grid in two, three, or four columns; each entry counts up to a target number on scroll and carries an optional prefix (e.g. $), suffix (%, K, M), and a required label, under an optional section heading. Use it for: key figures and milestones — customers served, years in business, projects completed, satisfaction percentages. Prefer ''KPI Cards'' when values need trend arrows; ''Inline Stats Row'' for a slim single-line strip.'
group: data
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: items
    type: Collection
    table: counter_items
    prefixField: true
    label: Counters
    minItems: 1
    fields:
      -
        identifier: target_value
        type: Number
        label: 'Target Value'
        required: true
      -
        identifier: prefix
        type: Textarea
        rows: 1
        label: Prefix
        description: 'e.g. $ or +'
      -
        identifier: suffix
        type: Textarea
        rows: 1
        label: Suffix
        description: 'e.g. %, K, M'
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
        required: true
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.4_columns'
        value: '4'
    default: '3'
