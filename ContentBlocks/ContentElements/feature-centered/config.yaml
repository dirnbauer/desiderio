name: desiderio/feature-centered
typeName: desiderio_featurecentered
title: 'Centered Feature Section'
description: 'A center-aligned feature block where each entry stacks a large icon, title, and description down the middle of the page. Use it when you want a calm, focused presentation of one or a few key capabilities rather than a busy grid. It offers an optional eyebrow, headline, and lead sub-headline above the items, and each feature carries an icon, title, and rich-text description.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: items
    type: Collection
    table: feature_centered_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    minItems: 1
    fields:
      -
        identifier: icon
        type: Select
        renderType: selectSingle
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:icon_emoji'
        description: 'Semantic icon key rendered through the active shadcn icon library.'
        itemsProcessors:
          10:
            class: Webconsulting\Desiderio\DataHandling\IconItemsProcessor
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
