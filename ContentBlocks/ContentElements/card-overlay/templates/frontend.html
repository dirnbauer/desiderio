<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<d:layout.section>
    <d:layout.container>
        <article data-slot="card" class="group relative flex min-h-[22rem] items-end overflow-hidden rounded-xl bg-card text-card-foreground shadow-[var(--d-surface-shadow)] ring-1 ring-foreground/10 md:min-h-[30rem]">
            <f:if condition="{data.image.0}">
                <f:image image="{data.image.0}" alt="{data.image.0.alternative -> f:or(alternative: data.header)}" maxWidth="1600" loading="lazy" decoding="async" class="absolute inset-0 h-full w-full border-0 object-cover shadow-none"/>
            </f:if>
            <f:switch expression="{data.overlay_intensity}">
                <f:case value="light"><div class="absolute inset-0 z-10 bg-gradient-to-tr from-foreground/75 via-foreground/35 to-foreground/0" aria-hidden="true"></div></f:case>
                <f:case value="strong"><div class="absolute inset-0 z-10 bg-gradient-to-tr from-foreground via-foreground/80 to-foreground/20" aria-hidden="true"></div></f:case>
                <f:defaultCase><div class="absolute inset-0 z-10 bg-gradient-to-tr from-foreground/95 via-foreground/65 to-foreground/5" aria-hidden="true"></div></f:defaultCase>
            </f:switch>
            <d:layout.stack gap="sm" class="relative z-20 max-w-2xl p-6 text-background sm:p-8 lg:p-10">
                <f:if condition="{data.eyebrow}">
                    <d:atom.badge variant="secondary" class="w-fit">{data -> f:render.text(field: 'eyebrow')}</d:atom.badge>
                </f:if>
                <f:if condition="{data.header}">
                    <d:atom.typography tag="h2" variant="h2" class="max-w-xl text-background">{data -> f:render.text(field: 'header')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.description}">
                    <d:atom.typography tag="div" variant="p" class="max-w-xl text-base/7 text-background/90 [&_a]:text-inherit [&_a]:underline [&_a]:underline-offset-2 [&_p]:m-0 [&_strong]:font-semibold">{data -> f:render.text(field: 'description')}</d:atom.typography>
                </f:if>
                <f:if condition="{data.link.url}">
                    <d:atom.button href="{f:uri.typolink(parameter: data.link.url)}" target="{data.link.target}" size="lg" class="mt-2">
                        <span>{data -> f:render.text(field: 'link_text')}</span>
                        <span aria-hidden="true">&rarr;</span>
                    </d:atom.button>
                </f:if>
            </d:layout.stack>
        </article>
    </d:layout.container>
</d:layout.section>

</html>
