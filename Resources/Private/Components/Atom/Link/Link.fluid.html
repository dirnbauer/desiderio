<f:argument name="href" type="string" optional="{true}" default="" />
<f:argument name="variant" type="string" optional="{true}" default="default" />
<f:argument name="external" type="bool" optional="{true}" default="{false}" />
<f:argument name="class" type="string" optional="{true}" default="" />
<f:argument name="target" type="string" optional="{true}" default="" />
<f:argument name="title" type="string" optional="{true}" />

<f:variable name="variantClass" value="text-primary underline-offset-4 hover:underline" />
<f:if condition="{variant} == 'muted'">
    <f:variable name="variantClass" value="text-muted-foreground hover:text-foreground transition-colors" />
</f:if>
<f:if condition="{variant} == 'underline'">
    <f:variable name="variantClass" value="text-foreground underline underline-offset-4 hover:text-primary" />
</f:if>
<f:if condition="{variant} == 'button'">
    <f:variable name="variantClass" value="inline-flex items-center gap-2 text-sm font-medium text-primary hover:underline" />
</f:if>

<f:variable name="resolvedTarget" value="{f:if(condition: external, then: '_blank', else: target)}" />
<f:variable name="rel" value="{f:if(condition: '{resolvedTarget} == \'_blank\'', then: 'noopener noreferrer', else: '')}" />

<a href="{href}" class="{variantClass -> f:format.trim()} {class}" target="{resolvedTarget}" rel="{rel}" title="{title}" data-slot="link" data-variant="{variant}">
    <f:slot />
</a>
