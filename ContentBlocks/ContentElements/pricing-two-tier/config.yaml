name: desiderio/pricing-two-tier
typeName: desiderio_pricingtwotier
title: 'Two Tier Pricing'
description: 'Renders exactly two pricing plan cards side by side, each with title, price, description, up to eight check-marked features, and a CTA button; the featured plan gets a ring and recommended badge. Use it for: either-or plan offers in the source — Basic vs Pro, Free vs Paid, private vs business rates. Prefer ''Three Tier Pricing'' for three plans; use ''Compare Two Options'' for non-pricing side-by-side comparisons.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: plans
    type: Collection
    table: pricing_two_tier_plans
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:plans'
    labelField: title
    minItems: 2
    maxItems: 2
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
        required: true
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
        required: true
      -
        identifier: description
        type: Textarea
        enableRichtext: true
        richtextConfiguration: desiderio
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
        rows: 2
      -
        identifier: features
        type: Collection
        table: pricing_two_tier_plan_features
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
        labelField: text
        minItems: 1
        maxItems: 8
        fields:
          -
            identifier: text
            type: Textarea
            rows: 1
            label: Feature
      -
        identifier: featured
        type: Checkbox
        label: Featured
      -
        identifier: button_text
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
        default: 'Get Started'
      -
        identifier: button_link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
