name: desiderio/content-grid
typeName: desiderio_contentgrid
title: 'Content Grid'
description: 'Renders an optional heading above a two- or three-column card grid; each card has an optional title (linked when a link is set), rich-text body and a Read-more arrow link. Use it for: service listings, offering overviews, related-topic teasers, program summaries — sets of short titled text blocks with optional targets. Prefer ''3-Column Feature Grid'' for icon-led features, ''Article Grid'' for blog posts, ''Content Columns'' for flowing text without cards.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: columns
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:columns'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.2_columns'
        value: '2'
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.3_columns'
        value: '3'
    default: '2'
  -
    identifier: items
    type: Collection
    table: content_grid_items
    prefixField: true
    label: 'Grid Items'
    minItems: 2
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:title'
      -
        identifier: content
        type: Textarea
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:content'
        enableRichtext: true
        richtextConfiguration: desiderio
        rows: 4
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
