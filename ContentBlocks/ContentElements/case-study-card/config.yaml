name: desiderio/case-study-card
typeName: desiderio_casestudycard
title: 'Case Study Card'
description: 'Renders one case-study teaser card: optional section heading, cover image, client logo, client name, rich-text summary, a highlighted key-result figure with label (e.g. 3x, 150%), and a ''Read case study'' link. Use it for: a single customer success story, project reference, or before/after result summary. Prefer ''Case Study Grid'' for several stories, ''Featured Case Study'' for a large flagship spotlight with multiple metrics, and ''Single Testimonial'' for a bare customer quote.'
group: social-proof
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: client_name
    type: Textarea
    rows: 1
    label: 'Client Name'
    required: true
  -
    identifier: client_logo
    type: File
    label: 'Client Logo'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: summary
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: Summary
    rows: 3
    required: true
  -
    identifier: result_value
    type: Textarea
    rows: 1
    label: 'Key Result Value'
    description: 'e.g. 3x, 150%, $2M'
  -
    identifier: result_label
    type: Textarea
    rows: 1
    label: 'Key Result Label'
  -
    identifier: image
    type: File
    label: 'Cover Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: link
    type: Link
    label: 'Read More Link'
