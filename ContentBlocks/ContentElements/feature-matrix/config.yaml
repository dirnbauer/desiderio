name: desiderio/feature-matrix
typeName: desiderio_featurematrix
title: 'Matrix Feature Section'
description: 'Matrix Feature Section explains product value, features, or use cases in a clear content structure. Editors can manage headline and copy fields and repeatable entries.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: left_label
    type: Textarea
    rows: 1
    label: 'Left Column Label'
  -
    identifier: right_label
    type: Textarea
    rows: 1
    label: 'Right Column Label'
  -
    identifier: rows
    type: Collection
    table: feature_matrix_rows
    label: Rows
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: left_value
        type: Textarea
        rows: 1
        label: 'Left Value'
      -
        identifier: right_value
        type: Textarea
        rows: 1
        label: 'Right Value'
