name: desiderio/callback-request
typeName: desiderio_callbackrequest
title: 'Callback Request'
description: 'Renders a compact card with heading, rich-text description, and an embedded TYPO3 callback form where visitors leave their phone number to be called back. Use it for: ''we call you'' sections, phone-first contact offers, sales or support hotline alternatives, lead capture where a call is the next step. Prefer ''Booking Form'' when a concrete appointment slot is requested, ''Contact Form Block'' for general written inquiries.'
group: conversion
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
