name: desiderio/hero-dual-cta
typeName: desiderio_herodualcta
title: 'Dual CTA Hero'
description: 'Renders a hero with headline and subheadline above two side-by-side cards, each holding its own title, rich-text description, and button (filled left, outlined right). Use it for: openers addressing two audiences or paths at once — sign up versus contact sales, for companies versus for individuals, buy versus sell. Prefer ''Split Call to Action'' for the same two-card pattern deeper in the page; ''Hero Section'' when a single message with two buttons suffices.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 3
  -
    identifier: left_title
    type: Textarea
    rows: 1
    label: 'Left CTA Title'
  -
    identifier: left_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Left CTA Description'
    rows: 2
  -
    identifier: left_button_text
    type: Textarea
    rows: 1
    label: 'Left Button Text'
  -
    identifier: left_button_link
    type: Link
    label: 'Left Button Link'
  -
    identifier: right_title
    type: Textarea
    rows: 1
    label: 'Right CTA Title'
  -
    identifier: right_description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'Right CTA Description'
    rows: 2
  -
    identifier: right_button_text
    type: Textarea
    rows: 1
    label: 'Right Button Text'
  -
    identifier: right_button_link
    type: Link
    label: 'Right Button Link'
