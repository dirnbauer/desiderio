name: desiderio/utility-bar
typeName: desiderio_utilitybar
title: 'Utility Bar'
description: 'A thin top bar with a short text on the left and a row of small utility links on the right. Use it above the main header for secondary items like login, language switch, or contact. It pairs left text with a collection of link items, each holding a label and a link, plus a screen-reader-only heading for accessible navigation labelling.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: left_text
    type: Textarea
    rows: 1
    label: 'Left Text'
  -
    identifier: link_items
    type: Collection
    table: utility_bar_link_items
    prefixField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:links'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
