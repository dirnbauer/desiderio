name: desiderio/hero-product
typeName: desiderio_heroproduct
title: 'Product Spotlight Hero'
description: 'Two-column hero pairing badge, product name, description, checkmark feature list, price, and buy button with a large product image. Use it for: single-product introductions — a flagship item with photo, key features, and price from brochure or shop copy. Prefer ''Shop Product Hero'' for a bolder full-width buy banner; ''Product Gallery Buy Panel'' for detail pages with several photos; ''Single Product Card'' for compact listings.'
group: hero
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'Product Name'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: badge_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:badge_text'
  -
    identifier: price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
  -
    identifier: product_image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:product_image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: primary_button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_text'
  -
    identifier: primary_button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:primary_button_link'
  -
    identifier: feature_items
    type: Collection
    table: hero_product_feature_items
    prefixField: true
    label: 'Key Features'
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: Feature
