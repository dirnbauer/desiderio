name: desiderio/product-hero
typeName: desiderio_producthero
title: 'Shop Product Hero'
description: 'Renders a full-width hero placing eyebrow, headline, rich-text description, a price with optional note such as Starting at, and a buy button beside one large, eagerly loaded product image. Use it for: the opening section of a product or shop landing page where a product name, price and purchase call-to-action appear together. Prefer ''Product Spotlight Hero'' for benefit-led copy without a price; use ''Product Gallery Buy Panel'' for detail pages with multiple images.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 3
  -
    identifier: image
    type: File
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:product_image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
  -
    identifier: price_note
    type: Textarea
    rows: 1
    label: 'Price Note'
    description: 'e.g. Starting at, From'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    default: 'Buy Now'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
