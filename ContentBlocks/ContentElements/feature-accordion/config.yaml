name: desiderio/feature-accordion
typeName: desiderio_featureaccordion
title: 'Accordion Feature Section'
description: 'A shadcn/ui styled TYPO3 content element for feature section, using theme tokens for light and dark mode.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: image
    type: File
    label: 'Side Image'
    allowed: common-image-types
    maxitems: 1
  -
    identifier: items
    type: Collection
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:features'
    minItems: 1
    fields:
      -
        identifier: title
        type: Textarea
        rows: 1
        label: 'Feature Title'
        required: true
      -
        identifier: content
        type: Textarea
        label: 'Feature Details'
        enableRichtext: true
        rows: 4
