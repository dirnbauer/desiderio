name: desiderio/pricing-slider
typeName: desiderio_pricingslider
title: 'Pricing Slider'
description: 'Renders an interactive block: an intro (eyebrow, heading, description) above a draggable range slider whose position highlights the matching volume tier card with volume, price, and included features. Use it for: volume- or usage-tier price tables in source documents (''up to 10,000 requests: $49''), tiered API or metered pricing where readers explore cost by quantity. Prefer ''Pricing Tier Table'' for a static per-unit rate table; ''Usage-Based Pricing'' for flat pay-as-you-go rate cards.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:description'
    rows: 2
  -
    identifier: unit_label
    type: Textarea
    rows: 1
    label: 'Unit Label'
    default: requests
  -
    identifier: tiers
    type: Collection
    table: pricing_slider_tiers
    prefixField: true
    label: 'Volume Tiers'
    minItems: 2
    fields:
      -
        identifier: volume
        type: Textarea
        rows: 1
        label: Volume
        required: true
      -
        identifier: price
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:price'
        required: true
      -
        identifier: included_features
        type: Textarea
        rows: 1
        label: 'Included Features'
