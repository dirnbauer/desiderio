name: desiderio/investor-grid
typeName: desiderio_investorgrid
title: 'Investor Grid'
description: 'A four-column logo grid presenting backers and investors, each as a logo with name, optional funding-round label, and an external link. Use it on about, company, or fundraising pages to build credibility by showcasing who supports the business. Key fields are the heading, sub-headline, and a repeatable investor collection holding the logo, name, investment round or type, and a link.'
group: team
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: subheadline
    type: Textarea
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:subheadline'
    rows: 2
  -
    identifier: investors
    type: Collection
    table: investor_grid_investors
    prefixField: true
    label: Investors
    minItems: 1
    fields:
      -
        identifier: logo
        type: File
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:logo'
        allowed: common-image-types
        maxitems: 1
      -
        identifier: name
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:name'
        required: true
      -
        identifier: type
        type: Text
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:investor_round'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
