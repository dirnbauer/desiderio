name: desiderio/feature-comparison
typeName: desiderio_featurecomparison
title: 'Feature Comparison Table'
description: 'Renders an accessible table with a feature column and two option columns (defaults Free and Pro); each row marks a feature as included with a check or excluded with a dash — boolean values only, no text cells. Use it for: yes/no availability lists contrasting exactly two plans, editions, or product variants. Prefer ''Feature Comparison Matrix'' when cells hold text values like limits or quotas; ''Plan Comparison Matrix'' for up to four pricing plans.'
group: features
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: left_title
    type: Textarea
    rows: 1
    label: 'Left Column Title'
  -
    identifier: right_title
    type: Textarea
    rows: 1
    label: 'Right Column Title'
  -
    identifier: items
    type: Collection
    table: feature_comparison_items
    prefixField: true
    label: 'Comparison Rows'
    minItems: 1
    fields:
      -
        identifier: feature
        type: Textarea
        rows: 1
        label: 'Feature Name'
        required: true
      -
        identifier: left_supported
        type: Checkbox
        label: 'Supported (Left)'
        default: 0
      -
        identifier: right_supported
        type: Checkbox
        label: 'Supported (Right)'
        default: 0
