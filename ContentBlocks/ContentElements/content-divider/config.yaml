name: desiderio/content-divider
typeName: desiderio_contentdivider
title: 'Content Divider'
description: 'Renders a slim separator in three variants — plain horizontal rule, rule with centered text label, or decorative line with middle dot — plus spacing (small/default/large) and color (default/muted/primary) options. Use it for: thematic breaks in long documents, asterisk or horizontal-rule markers in source text, transitions between chapters or topic shifts. Prefer ''Section Header'' when the break carries a heading and intro; ''Divider'' is the simpler core equivalent.'
group: content
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'Divider Style'
    onChange: reload
    items:
      -
        label: Horizontal
        value: horizontal
      -
        label: 'With Text'
        value: with-text
      -
        label: Decorative
        value: decorative
    default: horizontal
  -
    identifier: divider_text
    type: Textarea
    rows: 1
    label: 'Divider Text'
    description: 'Text displayed on the divider line'
    displayCond: 'FIELD:variant:=:with-text'
  -
    identifier: spacing
    type: Select
    renderType: selectSingle
    label: Spacing
    items:
      -
        label: Small
        value: sm
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.large'
        value: lg
    default: default
  -
    identifier: color
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:color_field'
    items:
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.default'
        value: default
      -
        label: Muted
        value: muted
      -
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:item.primary'
        value: primary
    default: default
