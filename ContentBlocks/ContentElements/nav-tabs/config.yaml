name: desiderio/nav-tabs
typeName: desiderio_navtabs
title: 'Tabs Navigation'
description: 'Renders a horizontal row of tab-styled links in underline, pill, or boxed variants; each tab has a label and link, and one can be flagged active with aria-current. The tabs link to other pages or sections rather than toggling panels. Use it for: switching between sibling views — details, specs, reviews — category filters, or sub-navigation. Prefer ''Tabbed Content Panels'' when the tab content lives inside the element, ''Tabbed Navigation Bar'' for a site header.'
group: navigation
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: variant
    type: Select
    renderType: selectSingle
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:style'
    items:
      -
        label: Underline
        value: underline
      -
        label: Pill
        value: pill
      -
        label: Boxed
        value: boxed
    default: underline
  -
    identifier: tabs
    type: Collection
    table: nav_tabs_tabs
    prefixField: true
    label: Tabs
    minItems: 1
    fields:
      -
        identifier: label
        type: Textarea
        rows: 1
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:label_field'
      -
        identifier: link
        type: Link
        label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:link'
      -
        identifier: active
        type: Checkbox
        label: Active
