name: desiderio/special-offer
typeName: desiderio_specialoffer
title: 'Special Offer Pricing'
description: 'A centered promotional banner that pairs a struck-through original price with a sale price and a bold scannable discount badge. Use it on landing or pricing pages to push a limited-time deal and create urgency. Key fields are the eyebrow, headline, rich-text description, discount text, original and sale prices, and a benefit-led CTA button with link.'
group: pricing
prefixFields: false
basics:
  - TYPO3/Appearance
  - TYPO3/Links
  - TYPO3/Categories
fields:
  -
    identifier: header
    useExistingField: true
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:heading'
  -
    identifier: eyebrow
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:eyebrow'
    description: 'e.g. Limited Time'
  -
    identifier: description
    type: Textarea
    enableRichtext: true
    richtextConfiguration: desiderio
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:offer_description'
    rows: 2
  -
    identifier: discount_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:discount_text'
    description: 'Big scannable badge, e.g. 50% off, Save $200.'
  -
    identifier: original_price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:original_price'
  -
    identifier: sale_price
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:sale_price'
  -
    identifier: button_text
    type: Textarea
    rows: 1
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_text'
    description: '2-5 words, benefit-led, e.g. Claim my discount.'
    default: 'Claim offer'
  -
    identifier: button_link
    type: Link
    label: 'LLL:EXT:desiderio/Resources/Private/Language/labels.xlf:button_link'
