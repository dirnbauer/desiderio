<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Preview"/>

<f:section name="Header">
    <f:if condition="{data.header}">
        <f:then><cb:link.editRecord uid="{data.uid}" table="{data.mainType}">{data.header}</cb:link.editRecord></f:then>
        <f:else><cb:link.editRecord uid="{data.uid}" table="{data.mainType}">Member Team Section</cb:link.editRecord></f:else>
    </f:if>
</f:section>

<f:section name="Content">
    <f:asset.css identifier="desiderio-content-preview" href="EXT:desiderio/Resources/Public/Css/content-preview.css" />
    <div class="d-ce-preview" data-slot="card">
        <div class="d-ce-preview__meta">
            <span class="d-ce-preview__type" data-slot="badge">Member Team Section</span>
            <f:if condition="{settings._content_block_name}"><span class="d-ce-preview__ctype">{settings._content_block_name}</span></f:if>
        </div>
        <f:if condition="{data.header}">
            <h3 class="d-ce-preview__title">{data.header}</h3>
        </f:if>
        <f:if condition="{data.role}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Role</span>
                <span class="d-ce-preview__value">{data.role}</span>
            </div>
        </f:if>
        <f:if condition="{data.bio}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Bio</span>
                <span class="d-ce-preview__value">{data.bio}</span>
            </div>
        </f:if>
        <f:if condition="{data.email}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Email</span>
                <span class="d-ce-preview__value">{data.email}</span>
            </div>
        </f:if>
        <f:if condition="{data.phone}">
            <div class="d-ce-preview__field">
                <span class="d-ce-preview__label">Phone</span>
                <span class="d-ce-preview__value">{data.phone}</span>
            </div>
        </f:if>
        <f:if condition="{data.image}">
            <div class="d-ce-preview__thumbs" aria-label="Image">
                <f:for each="{data.image}" as="file">
                    <f:if condition="{file.publicUrl}">
                        <img src="{file.publicUrl}" alt="{file.alternative}" class="d-ce-preview__thumb" loading="lazy" />
                    </f:if>
                </f:for>
            </div>
        </f:if>
        <f:if condition="{data.social_links}">
            <div class="d-ce-preview__collection">
                <span class="d-ce-preview__label">Social Links</span>
                <ul class="d-ce-preview__list">
                    <f:for each="{data.social_links}" as="item">
                        <li>
                            <f:if condition="{item.platform}"><span>{item.platform}</span></f:if>
                        </li>
                    </f:for>
                </ul>
            </div>
        </f:if>
    </div>
</f:section>

</html>
