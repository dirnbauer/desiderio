<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Post" />

<f:section name="Content">
    <header class="min-w-0 border-b border-border pb-8">
        <d:layout.stack gap="lg">
            <f:if condition="{post.featuredImage}">
                <figure class="overflow-hidden rounded-xl border border-border bg-muted">
                    <f:render partial="General/FeaturedImage" arguments="{image: post.featuredImage, settings: settings.post.featuredImage, featured: 1}" />
                </figure>
            </f:if>

            <d:layout.stack gap="md" class="max-w-4xl">
                <d:atom.typography tag="h1" variant="h1" class="text-balance leading-tight" itemprop="headline">{post.title}</d:atom.typography>

                <f:if condition="{post.abstract} || {post.description}">
                    <d:atom.typography variant="lead" class="max-w-3xl text-pretty leading-8" itemprop="description">
                        <f:if condition="{post.abstract}">
                            <f:then>{post.abstract}</f:then>
                            <f:else>{post.description}</f:else>
                        </f:if>
                    </d:atom.typography>
                </f:if>

                <f:if condition="{settings.meta.postheader.enable}">
                    <f:render partial="Meta/PostHeader" arguments="{_all}" />
                </f:if>
            </d:layout.stack>
        </d:layout.stack>
    </header>
</f:section>

</html>
